<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKKODiS Global Antenna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    .navbar {
      background: #001f33;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      padding: 6px 14px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .page-header {
      max-width: 1100px;
      margin: 28px auto 16px;
      padding: 0 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .page-header h1 { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
    .page-subtitle { font-size: 0.8rem; color: #8a9bb0; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .meta-text { font-size: 0.75rem; color: #b2bec3; }
    .badge-new-global {
      background: #ffb81c;
      color: #001f33;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 12px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items: start;
    }
    @media (max-width: 760px) { .columns { grid-template-columns: 1fr; } }

    .col {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      overflow: hidden;
    }
    .col-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #001f33;
      background: #f8f9fb;
    }
    .col-label { font-size: 0.88rem; font-weight: 700; color: #001f33; }
    .col-count { font-size: 0.72rem; color: #b2bec3; font-weight: 600; }
    .col-count .new-cnt { color: #ffb81c; font-weight: 700; }

    .col-body { overflow-y: auto; max-height: 560px; }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: #e8ecf0; }

    .item {
      padding: 9px 14px;
      border-bottom: 1px solid #f0f2f5;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #fafbfc; }
    .item.is-new { border-left-color: #ffb81c; }

    .item-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-title a { color: #2d3436; text-decoration: none; }
    .item-title a:hover { color: #001f33; text-decoration: underline; }

    .item-meta { font-size: 0.7rem; color: #b2bec3; display: flex; align-items: center; gap: 5px; }

    .badge-new {
      background: #ffb81c;
      color: #001f33;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 6px;
    }

    .empty { padding: 28px 14px; text-align: center; color: #b2bec3; font-size: 0.82rem; }

    .info-bar {
      max-width: 1100px;
      margin: 0 auto 14px;
      padding: 0 20px;
      font-size: 0.77rem;
      color: #8a9bb0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .info-bar span { display: flex; align-items: center; gap: 4px; }
    .info-bar strong { color: #636e72; }

    /* フィルター・リセット */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .filter-input {
      flex: 1;
      min-width: 200px;
      padding: 8px 14px;
      border: 1.5px solid #e8ecf0;
      background: #fff;
      font-size: 0.88rem;
      color: #2d3436;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .filter-input:focus { border-color: #ffb81c; }
    .filter-input::placeholder { color: #b2bec3; }
    .reset-read-btn {
      padding: 8px 16px;
      background: none;
      border: 1.5px solid #e8ecf0;
      color: #8a9bb0;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .reset-read-btn:hover { border-color: #e17055; color: #e17055; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <a href="../../" class="back-btn">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <img src="../../assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:22px;display:block;">
    <div class="navbar-divider"></div>
    <span class="navbar-title">Global Antenna</span>
  </div>
</nav>

<div class="page-header">
  <div>
    <h1>AKKODiS Global Antenna</h1>
    <p class="page-subtitle">グローバルサイトの新着記事を自動収集・毎朝9時更新</p>
  </div>
  <div class="header-right">
    <span class="meta-text" id="last-scraped">読み込み中...</span>
    <span id="new-count"></span>
  </div>
</div>

<div class="wrap">
  <div class="info-bar">
    <span><strong>監視対象</strong> Blog / Thinkers &amp; Makers / Client Stories</span>
    <span><strong><span class="badge-new" style="vertical-align:middle;">NEW</span></strong> 公開から14日以内</span>
  </div>
  <div class="toolbar">
    <input class="filter-input" id="filter-input" type="text" placeholder="キーワードで絞り込む..." autocomplete="off" />
    <button class="reset-read-btn" id="reset-read-btn">既読をリセット</button>
  </div>
  <div class="columns" id="columns"></div>
</div>

<script>
  const NEW_DAYS = 14;
  const THIS_YEAR = new Date().getFullYear();
  localStorage.setItem('antennaLastVisit', Date.now());

  // ── 既読管理 ────────────────────────────────────────
  const READ_KEY = 'antennaReadUrls';
  const readUrls = new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]'));

  function markRead(url) {
    if (readUrls.has(url)) return;
    readUrls.add(url);
    localStorage.setItem(READ_KEY, JSON.stringify([...readUrls]));
  }

  function dateType(article) {
    const p = article.published_date;
    if (!p) return 'none';
    if (/^\d{4}$/.test(p)) return 'year';
    return 'full';
  }

  function isNew(article) {
    if (dateType(article) !== 'full') return false;
    if (readUrls.has(article.url)) return false;
    return Date.now() - new Date(article.published_date).getTime() < NEW_DAYS * 86400000;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });
  }

  function getDateStr(article) {
    const t = dateType(article);
    if (t === 'full') return formatDate(article.published_date);
    if (t === 'year') return `${article.published_date}年`;
    return formatDate(article.first_seen);
  }

  function sortArticles(items) {
    return [...items].sort((a, b) => {
      const order = { full: 0, year: 1, none: 2 };
      const ta = dateType(a), tb = dateType(b);
      if (order[ta] !== order[tb]) return order[ta] - order[tb];
      if (ta === 'full') return new Date(b.published_date) - new Date(a.published_date);
      if (ta === 'year') return parseInt(b.published_date) - parseInt(a.published_date);
      return new Date(b.first_seen) - new Date(a.first_seen);
    });
  }

  function renderColumn(sourceId, label, articles) {
    const sorted = sortArticles(articles);
    const newCount = sorted.filter(a => isNew(a)).length;

    const items = sorted.map(a => {
      const n = isNew(a);
      const dateStr = getDateStr(a);
      return `
        <div class="item${n ? ' is-new' : ''}">
          <div class="item-title">
            ${n ? '<span class="badge-new">NEW</span> ' : ''}<a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
          </div>
          ${dateStr ? `<div class="item-meta"><span>${dateStr}</span></div>` : ''}
        </div>`;
    }).join('');

    const countHtml = newCount > 0
      ? `${articles.length}件 <span class="new-cnt">NEW ${newCount}</span>`
      : `${articles.length}件`;

    return `
      <div class="col" data-source="${sourceId}">
        <div class="col-header">
          <span class="col-label">${label}</span>
          <span class="col-count">${countHtml}</span>
        </div>
        <div class="col-body">
          ${items || '<div class="empty">記事なし</div>'}
        </div>
      </div>`;
  }

  fetch('data/articles.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('last-scraped').textContent =
        data.last_scraped ? `更新: ${formatDate(data.last_scraped)}` : '未更新';

      const articles = data.articles || [];
      const totalNew = articles.filter(a => isNew(a)).length;
      if (totalNew > 0) {
        document.getElementById('new-count').innerHTML =
          `<span class="badge-new-global">NEW ${totalNew}</span>`;
      }

      if (articles.length === 0) {
        document.getElementById('columns').innerHTML = '<div class="empty">記事データがありません</div>';
        return;
      }

      const groups = {};
      articles.forEach(a => {
        if (!groups[a.source_id]) groups[a.source_id] = { label: a.source_label, items: [] };
        groups[a.source_id].items.push(a);
      });

      document.getElementById('columns').innerHTML =
        Object.entries(groups).map(([id, g]) => renderColumn(id, g.label, g.items)).join('');

      // クリックで既読化
      document.getElementById('columns').addEventListener('click', e => {
        const link = e.target.closest('a[href]');
        if (!link) return;
        const item = link.closest('.item');
        if (!item || !item.classList.contains('is-new')) return;
        markRead(link.href);
        item.classList.remove('is-new');
        const badge = item.querySelector('.badge-new');
        if (badge) badge.remove();
      });

      // キーワードフィルター
      document.getElementById('filter-input').addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        document.querySelectorAll('.item').forEach(item => {
          const title = item.querySelector('.item-title')?.textContent.toLowerCase() || '';
          item.style.display = (!q || title.includes(q)) ? '' : 'none';
        });
      });

      // 既読リセット
      document.getElementById('reset-read-btn').addEventListener('click', () => {
        if (!confirm('既読をすべてリセットしますか？')) return;
        readUrls.clear();
        localStorage.removeItem(READ_KEY);
        location.reload();
      });
    })
    .catch(() => {
      document.getElementById('last-scraped').textContent = '読み込みエラー';
    });
</script>
</body>
</html>
