<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKKODiS Global Antenna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .header {
      max-width: 860px;
      margin: 0 auto 32px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 0.85rem;
      color: #636e72;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .badge-new {
      display: inline-block;
      background: #e17055;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      vertical-align: middle;
      margin-left: 6px;
    }

    .section {
      max-width: 860px;
      margin: 0 auto 40px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #636e72;
      border-bottom: 2px solid #dfe6e9;
      padding-bottom: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .count {
      font-size: 0.8rem;
      background: #dfe6e9;
      border-radius: 99px;
      padding: 2px 8px;
    }

    .card {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: all 0.15s;
    }

    .card:hover {
      border-color: #6c5ce7;
      box-shadow: 0 4px 16px rgba(108,92,231,0.1);
    }

    .card.is-new {
      border-color: #e17055;
      background: #fff8f7;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-title a {
      color: #2d3436;
      text-decoration: none;
    }

    .card-title a:hover { text-decoration: underline; }

    .card-meta {
      font-size: 0.78rem;
      color: #636e72;
    }

    .empty {
      text-align: center;
      color: #636e72;
      padding: 40px;
      font-size: 0.9rem;
    }

    .back {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #6c5ce7;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }

    .login-overlay {
      position: fixed;
      inset: 0;
      background: #f5f6fa;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-box {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .login-box p {
      font-size: 0.85rem;
      color: #636e72;
      margin-bottom: 24px;
    }

    .login-box input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #dfe6e9;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
    }

    .login-box input:focus { border-color: #6c5ce7; }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .login-box button:hover { background: #5a4bd1; }

    .login-error {
      font-size: 0.8rem;
      color: #e17055;
      margin-top: 8px;
      min-height: 1.2em;
    }

    .is-hidden { display: none; }

    .more-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: none;
      border: 2px dashed #dfe6e9;
      border-radius: 12px;
      color: #636e72;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .more-btn:hover {
      border-color: #6c5ce7;
      color: #6c5ce7;
    }
  </style>
</head>
<body>

  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <h2>AKKODiS Global Antenna</h2>
      <p>パスワードを入力してください</p>
      <input type="password" id="pw-input" placeholder="パスワード" />
      <button onclick="doLogin()">ログイン</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div class="header">
    <a class="back" href="../../">← アプリ一覧へ</a>
    <h1>AKKODiS Global Antenna</h1>
    <div class="meta">
      <span id="last-scraped">読み込み中...</span>
      <span id="new-count"></span>
    </div>
  </div>

  <div id="content"></div>

  <script>
    const PASSWORD = 'marketing';

    function doLogin() {
      const val = document.getElementById('pw-input').value;
      if (val === PASSWORD) {
        sessionStorage.setItem('antenna_auth', '1');
        document.getElementById('login-overlay').style.display = 'none';
      } else {
        document.getElementById('login-error').textContent = 'パスワードが違います';
      }
    }

    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    if (sessionStorage.getItem('antenna_auth') === '1') {
      document.getElementById('login-overlay').style.display = 'none';
    }

    const NEW_DAYS = 7; // 何日以内を NEW とみなすか

    function isNew(firstSeen) {
      if (!firstSeen) return false;
      const diff = Date.now() - new Date(firstSeen).getTime();
      return diff < NEW_DAYS * 24 * 60 * 60 * 1000;
    }

    function formatDate(iso) {
      if (!iso) return '不明';
      const d = new Date(iso);
      return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
    }

    const INITIAL_SHOW = 5;

    function renderSection(label, articles) {
      if (articles.length === 0) return '';
      const newCount = articles.filter(a => isNew(a.first_seen)).length;
      const sectionId = `sec-${Math.random().toString(36).slice(2)}`;

      const cards = articles.map((a, i) => {
        const n = isNew(a.first_seen);
        const hidden = i >= INITIAL_SHOW && !n;
        const dateLabel = a.published_date
          ? /^\d{4}$/.test(a.published_date)
            ? `検出日: ${formatDate(a.first_seen)}`
            : `公開日: ${formatDate(a.published_date)}`
          : '—';
        return `
          <div class="card${n ? ' is-new' : ''}${hidden ? ' is-hidden' : ''}">
            <div class="card-title">
              <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
              ${n ? '<span class="badge-new">NEW</span>' : ''}
            </div>
            <div class="card-meta">${dateLabel}</div>
          </div>`;
      }).join('');

      const hiddenCount = articles.filter((a, i) => i >= INITIAL_SHOW && !isNew(a.first_seen)).length;
      const moreBtn = hiddenCount > 0
        ? `<button class="more-btn" onclick="toggleMore('${sectionId}', this)">さらに ${hiddenCount} 件表示</button>`
        : '';

      return `
        <div class="section" id="${sectionId}">
          <div class="section-title">
            ${label}
            <span class="count">${articles.length} 件${newCount > 0 ? ` / NEW ${newCount}` : ''}</span>
          </div>
          ${cards}
          ${moreBtn}
        </div>`;
    }

    function toggleMore(sectionId, btn) {
      const section = document.getElementById(sectionId);
      section.querySelectorAll('.card.is-hidden').forEach(el => el.classList.remove('is-hidden'));
      btn.remove();
    }

    fetch('data/articles.json')
      .then(r => r.json())
      .then(data => {
        // 最終スクレイピング日時
        document.getElementById('last-scraped').textContent =
          data.last_scraped
            ? `最終更新: ${formatDate(data.last_scraped)}`
            : '未スクレイピング（GitHub Actions が初回実行されるまでお待ちください）';

        const articles = data.articles || [];
        const totalNew = articles.filter(a => isNew(a.first_seen)).length;
        if (totalNew > 0) {
          document.getElementById('new-count').textContent = `NEW ${totalNew} 件`;
        }

        if (articles.length === 0) {
          document.getElementById('content').innerHTML =
            '<div class="empty">記事データがありません。GitHub Actions が実行されると自動で更新されます。</div>';
          return;
        }

        // source_id ごとにグループ化し、日付降順でソート
        const groups = {};
        articles.forEach(a => {
          const key = a.source_id;
          if (!groups[key]) groups[key] = { label: a.source_label, items: [] };
          groups[key].items.push(a);
        });
        Object.values(groups).forEach(g => {
          g.items.sort((a, b) => {
            const da = new Date(a.published_date || a.first_seen);
            const db = new Date(b.published_date || b.first_seen);
            return db - da;
          });
        });

        document.getElementById('content').innerHTML =
          Object.values(groups).map(g => renderSection(g.label, g.items)).join('');
      })
      .catch(() => {
        document.getElementById('last-scraped').textContent = 'データ読み込みエラー';
      });
  </script>
</body>
</html>
