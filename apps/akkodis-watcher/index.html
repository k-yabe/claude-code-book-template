<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKKODiS Global Antenna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .header {
      max-width: 1100px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-left h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .back {
      font-size: 0.78rem;
      color: #888;
      text-decoration: none;
      display: block;
      margin-bottom: 3px;
    }
    .back:hover { text-decoration: underline; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meta-text {
      font-size: 0.78rem;
      color: #999;
    }

    .badge-new-global {
      background: #e17055;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 99px;
    }

    /* 3カラムグリッド */
    .columns {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      align-items: start;
    }

    @media (max-width: 760px) {
      .columns { grid-template-columns: 1fr; }
    }

    .col {
      background: #fff;
      border: 1px solid #e2e6ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }

    .col-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafbfc;
    }

    .col-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #2d3436;
    }

    .col-count {
      font-size: 0.72rem;
      color: #b2bec3;
      font-weight: 600;
    }

    .col-count .new-cnt {
      color: #e17055;
      font-weight: 700;
    }

    .col-body {
      overflow-y: auto;
      max-height: 520px;
    }

    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .item {
      padding: 9px 14px;
      border-bottom: 1px solid #f5f6fa;
      transition: background 0.1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #f8f9fa; }

    .item.is-new {
      border-left: 3px solid #e17055;
      padding-left: 11px;
    }

    .item-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-title a {
      color: #2d3436;
      text-decoration: none;
    }
    .item-title a:hover { color: #0984e3; }

    .item-meta {
      font-size: 0.7rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item.no-date .item-meta {
      color: #ccc;
      font-style: italic;
    }

    .badge-new {
      display: inline-block;
      background: #e17055;
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
      font-style: normal;
    }

    .empty {
      padding: 28px 14px;
      text-align: center;
      color: #ccc;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back" href="../../">← アプリ一覧へ</a>
    <h1>AKKODiS Global Antenna</h1>
  </div>
  <div class="header-right">
    <span class="meta-text" id="last-scraped">読み込み中...</span>
    <span id="new-count"></span>
  </div>
</div>

<div class="columns" id="columns"></div>

<script>
  const NEW_DAYS = 14;

  function dateType(article) {
    const p = article.published_date;
    if (!p) return 'none';
    if (/^\d{4}$/.test(p)) return 'year';
    return 'full';
  }

  function isNew(article) {
    if (dateType(article) !== 'full') return false;
    return Date.now() - new Date(article.published_date).getTime() < NEW_DAYS * 86400000;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });
  }

  function getDateStr(article) {
    const t = dateType(article);
    if (t === 'full') return formatDate(article.published_date);
    if (t === 'year') return `${article.published_date}年`;
    return formatDate(article.first_seen);
  }

  function sortArticles(items) {
    return [...items].sort((a, b) => {
      const ta = dateType(a), tb = dateType(b);
      const order = { full: 0, year: 1, none: 2 };
      if (order[ta] !== order[tb]) return order[ta] - order[tb];
      if (ta === 'full') return new Date(b.published_date) - new Date(a.published_date);
      if (ta === 'year') return parseInt(b.published_date) - parseInt(a.published_date);
      return new Date(b.first_seen) - new Date(a.first_seen);
    });
  }

  function renderColumn(label, articles) {
    const sorted = sortArticles(articles);
    const newCount = sorted.filter(a => isNew(a)).length;

    const items = sorted.map(a => {
      const n = isNew(a);
      const noDate = dateType(a) === 'none';
      const dateStr = getDateStr(a);
      return `
        <div class="item${n ? ' is-new' : ''}${noDate ? ' no-date' : ''}">
          <div class="item-title">
            <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
          </div>
          <div class="item-meta">
            ${n ? '<span class="badge-new">NEW</span>' : ''}
            <span>${dateStr}</span>
          </div>
        </div>`;
    }).join('');

    const countHtml = newCount > 0
      ? `${articles.length}件 <span class="new-cnt">/ NEW ${newCount}</span>`
      : `${articles.length}件`;

    return `
      <div class="col">
        <div class="col-header">
          <span class="col-label">${label}</span>
          <span class="col-count">${countHtml}</span>
        </div>
        <div class="col-body">
          ${items || '<div class="empty">記事なし</div>'}
        </div>
      </div>`;
  }

  fetch('data/articles.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('last-scraped').textContent =
        data.last_scraped ? `更新: ${formatDate(data.last_scraped)}` : '未更新';

      const articles = data.articles || [];
      const totalNew = articles.filter(a => isNew(a)).length;
      if (totalNew > 0) {
        document.getElementById('new-count').innerHTML =
          `<span class="badge-new-global">NEW ${totalNew}</span>`;
      }

      if (articles.length === 0) {
        document.getElementById('columns').innerHTML =
          '<div class="empty">記事データがありません</div>';
        return;
      }

      const groups = {};
      articles.forEach(a => {
        if (!groups[a.source_id]) groups[a.source_id] = { label: a.source_label, items: [] };
        groups[a.source_id].items.push(a);
      });

      document.getElementById('columns').innerHTML =
        Object.values(groups).map(g => renderColumn(g.label, g.items)).join('');
    })
    .catch(() => {
      document.getElementById('last-scraped').textContent = '読み込みエラー';
    });
</script>
</body>
</html>
