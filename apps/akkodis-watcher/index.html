<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKKODiS Global Antenna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .header {
      max-width: 1100px;
      margin: 0 auto 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-left h1 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .back {
      font-size: 0.82rem;
      color: #636e72;
      text-decoration: none;
      display: block;
      margin-bottom: 4px;
    }
    .back:hover { text-decoration: underline; }

    .meta {
      font-size: 0.8rem;
      color: #636e72;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge-new-global {
      background: #e17055;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }

    /* 3カラムグリッド */
    .columns {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 760px) {
      .columns { grid-template-columns: 1fr; }
    }

    .col {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .col-body {
      overflow-y: auto;
      max-height: 480px;
    }

    .col-header {
      padding: 14px 16px 12px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .col-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: #2d3436;
    }

    .col-count {
      font-size: 0.75rem;
      color: #b2bec3;
      font-weight: 600;
    }

    .col-count .new-cnt {
      color: #e17055;
      font-weight: 700;
    }

    .item {
      padding: 10px 16px;
      border-bottom: 1px solid #f5f6fa;
      transition: background 0.1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #f8f9fa; }

    .item.is-new {
      border-left: 3px solid #e17055;
      padding-left: 13px;
    }

    .item-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 3px;
    }

    .item-title a {
      color: #2d3436;
      text-decoration: none;
    }
    .item-title a:hover { color: #001f33; text-decoration: underline; }

    .item-meta {
      font-size: 0.73rem;
      color: #636e72;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-new {
      display: inline-block;
      background: #e17055;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: #b2bec3;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back" href="../../">← アプリ一覧へ</a>
    <h1>AKKODiS Global Antenna</h1>
  </div>
  <div class="meta">
    <span id="last-scraped">読み込み中...</span>
    <span id="new-count"></span>
  </div>
</div>

<div class="columns" id="columns"></div>

<script>
  const NEW_DAYS = 14;

  function isNew(article) {
    // published_date がある場合はそちらを優先、なければ first_seen で判定
    const base = (article.published_date && !/^\d{4}$/.test(article.published_date))
      ? article.published_date
      : article.first_seen;
    if (!base) return false;
    return Date.now() - new Date(base).getTime() < NEW_DAYS * 86400000;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });
  }

  function renderColumn(label, articles) {
    const newCount = articles.filter(a => isNew(a)).length;

    const items = articles.map(a => {
      const n = isNew(a);
      const dateStr = a.published_date
        ? /^\d{4}$/.test(a.published_date)
          ? formatDate(a.first_seen)
          : formatDate(a.published_date)
        : formatDate(a.first_seen);
      return `
        <div class="item${n ? ' is-new' : ''}">
          <div class="item-title">
            <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
          </div>
          <div class="item-meta">
            ${n ? '<span class="badge-new">NEW</span>' : ''}
            <span>${dateStr}</span>
          </div>
        </div>`;
    }).join('');

    const countHtml = newCount > 0
      ? `${articles.length}件 <span class="new-cnt">/ NEW ${newCount}</span>`
      : `${articles.length}件`;

    return `
      <div class="col">
        <div class="col-header">
          <span class="col-label">${label}</span>
          <span class="col-count">${countHtml}</span>
        </div>
        <div class="col-body">
          ${items || '<div class="empty">記事なし</div>'}
        </div>
      </div>`;
  }

  fetch('data/articles.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('last-scraped').textContent =
        data.last_scraped ? `更新: ${formatDate(data.last_scraped)}` : '未更新';

      const articles = data.articles || [];
      const totalNew = articles.filter(a => isNew(a)).length;
      if (totalNew > 0) {
        document.getElementById('new-count').innerHTML =
          `<span class="badge-new-global">NEW ${totalNew}</span>`;
      }

      if (articles.length === 0) {
        document.getElementById('columns').innerHTML =
          '<div class="empty">記事データがありません</div>';
        return;
      }

      // source_id ごとにグループ化・日付降順ソート
      const groups = {};
      articles.forEach(a => {
        if (!groups[a.source_id]) groups[a.source_id] = { label: a.source_label, items: [] };
        groups[a.source_id].items.push(a);
      });
      Object.values(groups).forEach(g => {
        g.items.sort((a, b) => {
          const da = new Date(a.published_date || a.first_seen);
          const db = new Date(b.published_date || b.first_seen);
          return db - da;
        });
      });

      document.getElementById('columns').innerHTML =
        Object.values(groups).map(g => renderColumn(g.label, g.items)).join('');
    })
    .catch(() => {
      document.getElementById('last-scraped').textContent = '読み込みエラー';
    });
</script>
</body>
</html>
