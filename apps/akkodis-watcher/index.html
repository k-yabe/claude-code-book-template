<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKKODiS Global Antenna</title>
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <style>
    /* ── App-specific: body padding ── */
    body { min-height: 100vh; padding: 0 0 60px; }

    /* ── App-specific: page header (wider layout) ── */
    .page-header {
      max-width: 1100px;
      margin: var(--sp-8) auto 0;
      padding: 0 var(--sp-5) var(--sp-3);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--sp-2);
    }
    .page-subtitle { font-size: 0.8rem; color: var(--text-muted); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .meta-text { font-size: 0.75rem; color: var(--text-faint); }
    .badge-new-global {
      background: var(--gold);
      color: var(--navy);
      font-size: var(--text-xs);
      font-weight: 700;
      padding: 3px 12px;
    }

    /* ── App-specific: wrap / columns layout ── */
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--sp-2) var(--sp-5) 0;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-3);
      align-items: start;
    }
    @media (max-width: 760px) { .columns { grid-template-columns: 1fr; } }

    /* ── App-specific: column cards ── */
    .col {
      background: var(--surface);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }
    .col-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--navy);
      background: var(--surface-alt);
    }
    .col-label { font-size: var(--text-base); font-weight: 700; color: var(--navy); }
    .col-count { font-size: var(--text-xs); color: var(--text-faint); font-weight: 600; }
    .col-count .new-cnt { color: var(--gold); font-weight: 700; }

    .col-body { overflow-y: auto; max-height: 560px; }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── App-specific: article items ── */
    .item {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-light);
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: var(--surface-alt); }
    .item.is-new { border-left-color: var(--gold); }

    .item-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .item-title:hover { color: var(--navy); }

    .item-meta { font-size: 0.7rem; color: var(--text-faint); display: flex; align-items: center; gap: 5px; }

    .badge-new {
      background: var(--gold);
      color: var(--navy);
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 6px;
    }

    .empty { padding: var(--sp-7) 14px; text-align: center; color: var(--text-faint); font-size: 0.82rem; }

    /* ── App-specific: info bar ── */
    .info-bar {
      max-width: 1100px;
      margin: 0 auto 18px;
      padding: 0 var(--sp-5);
      font-size: 0.77rem;
      color: var(--text-muted);
      display: flex;
      gap: var(--sp-4);
      flex-wrap: wrap;
    }
    .info-bar span { display: flex; align-items: center; gap: var(--sp-1); }
    .info-bar strong { color: var(--text-secondary); }

    /* ── App-specific: toolbar / filters ── */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: var(--sp-3);
    }
    .filter-input {
      flex: 1;
      min-width: 200px;
      padding: var(--sp-2) 14px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: var(--text-base);
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .filter-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--focus-ring); outline: none; }
    .filter-input::placeholder { color: var(--text-faint); }
    .reset-read-btn {
      padding: var(--sp-2) var(--sp-4);
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all var(--ease);
    }
    .reset-read-btn:hover { border-color: var(--navy); color: var(--navy); }

    /* ── App-specific: source filter buttons ── */
    .source-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .source-filter-btn {
      padding: 6px 14px;
      background: var(--border);
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all var(--ease);
    }
    .source-filter-btn:hover {
      background: #d8dde6;
      border-color: #d8dde6;
    }
    .source-filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy);
    }

    /* ── App-specific: article detail modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 31, 51, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: var(--sp-5);
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal {
      background: var(--surface);
      border: 1.5px solid var(--border);
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-header {
      background: var(--navy);
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-3);
    }
    .modal-header-source {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--sp-1);
    }
    .modal-title {
      font-size: var(--text-md);
      font-weight: 700;
      color: var(--white);
      line-height: 1.45;
    }
    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 var(--sp-1);
      line-height: 1;
      flex-shrink: 0;
      transition: color var(--ease);
    }
    .modal-close:hover { color: var(--white); }
    .modal-body {
      padding: 18px;
    }
    .modal-meta {
      display: flex;
      gap: var(--sp-3);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .modal-meta-item {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: var(--sp-1);
    }
    .modal-meta-item strong { color: var(--text-secondary); }
    .modal-description {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: var(--sp-5);
    }
    .modal-summary-loading {
      color: var(--text-faint);
      font-style: italic;
      font-size: 0.82rem;
    }
    .modal-open-btn {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 10px 22px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background var(--ease);
    }
    .modal-open-btn:hover { background: #f0ac10; }

    /* ── App-specific: footer override (wider + margin) ── */
    .app-footer { margin-top: var(--sp-10); }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <a href="../../" class="back-btn">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Global Antenna</span>
  </div>
</nav>

<div class="page-header">
  <div>
    <h1>AKKODiS Global Antenna</h1>
    <p class="page-subtitle">グローバルサイトの新着記事を自動収集・毎朝9時更新</p>
  </div>
  <div class="header-right">
    <span class="meta-text" id="last-scraped">読み込み中...</span>
    <span id="new-count"></span>
  </div>
</div>

<div class="wrap">
  <div class="info-bar">
    <span><strong>監視対象</strong> Blog / Thinkers &amp; Makers / Client Stories</span>
    <span><strong><span class="badge-new" style="vertical-align:middle;">NEW</span></strong> 公開から14日以内</span>
  </div>
  <div class="source-filters" id="source-filters">
    <button class="source-filter-btn active" data-source="all">すべて</button>
    <button class="source-filter-btn" data-source="blog">Blog</button>
    <button class="source-filter-btn" data-source="thinkers">Thinkers &amp; Makers</button>
    <button class="source-filter-btn" data-source="client">Client Stories</button>
  </div>
  <div class="toolbar">
    <input class="filter-input" id="filter-input" type="text" placeholder="キーワードで絞り込む..." autocomplete="off" />
    <button class="reset-read-btn" id="reset-read-btn">既読をリセット</button>
  </div>
  <div class="columns" id="columns"></div>
</div>

<!-- 記事詳細モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-header-source" id="modal-source"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta">
        <div class="modal-meta-item" id="modal-date-wrap">
          <strong>公開日</strong><span id="modal-date"></span>
        </div>
      </div>
      <div class="modal-description" id="modal-description">
        <span class="modal-summary-loading" id="modal-summary-loading" style="display:none;">⏳ 要約を生成中...</span>
        <span id="modal-summary-text"></span>
      </div>
      <a class="modal-open-btn" id="modal-link" href="#" target="_blank" rel="noopener">記事を開く →</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('auth') !== '1') { location.href = '/'; }
  const NEW_DAYS = 14;
  const THIS_YEAR = new Date().getFullYear();
  localStorage.setItem('antennaLastVisit', Date.now());

  // ── 既読管理 ────────────────────────────────────────
  const READ_KEY = 'antennaReadUrls';
  const readUrls = new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]'));

  function markRead(url) {
    if (readUrls.has(url)) return;
    readUrls.add(url);
    localStorage.setItem(READ_KEY, JSON.stringify([...readUrls]));
  }

  function dateType(article) {
    const p = article.published_date;
    if (!p) return 'none';
    if (/^\d{4}$/.test(p)) return 'year';
    return 'full';
  }

  function isNew(article) {
    if (dateType(article) !== 'full') return false;
    if (readUrls.has(article.url)) return false;
    return Date.now() - new Date(article.published_date).getTime() < NEW_DAYS * 86400000;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });
  }

  function getDateStr(article) {
    const t = dateType(article);
    if (t === 'full') return formatDate(article.published_date);
    if (t === 'year') return `${article.published_date}年`;
    return formatDate(article.first_seen);
  }

  function sortArticles(items) {
    return [...items].sort((a, b) => {
      const order = { full: 0, year: 1, none: 2 };
      const ta = dateType(a), tb = dateType(b);
      if (order[ta] !== order[tb]) return order[ta] - order[tb];
      if (ta === 'full') return new Date(b.published_date) - new Date(a.published_date);
      if (ta === 'year') return parseInt(b.published_date) - parseInt(a.published_date);
      return new Date(b.first_seen) - new Date(a.first_seen);
    });
  }

  function renderColumn(sourceId, label, articles) {
    const sorted = sortArticles(articles);
    const newCount = sorted.filter(a => isNew(a)).length;

    const items = sorted.map(a => {
      const n = isNew(a);
      const dateStr = getDateStr(a);
      const desc = (a.summary_ja || '').replace(/"/g, '&quot;');
      return `
        <div class="item${n ? ' is-new' : ''}" data-article-url="${a.url}"
             data-article-title="${(a.title || '').replace(/"/g, '&quot;')}"
             data-article-desc="${desc}"
             data-article-date="${dateStr}"
             data-article-source="${a.source_label || ''}">
          <div class="item-title">
            ${n ? '<span class="badge-new">NEW</span> ' : ''}${a.title}
          </div>
          ${dateStr ? `<div class="item-meta"><span>${dateStr}</span></div>` : ''}
        </div>`;
    }).join('');

    const countHtml = newCount > 0
      ? `${articles.length}件 <span class="new-cnt">NEW ${newCount}</span>`
      : `${articles.length}件`;

    return `
      <div class="col" data-source="${sourceId}">
        <div class="col-header">
          <span class="col-label">${label}</span>
          <span class="col-count">${countHtml}</span>
        </div>
        <div class="col-body">
          ${items || '<div class="empty">記事なし</div>'}
        </div>
      </div>`;
  }

  fetch('data/articles.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('last-scraped').textContent =
        data.last_scraped ? `更新: ${formatDate(data.last_scraped)}` : '未更新';

      const articles = data.articles || [];
      const totalNew = articles.filter(a => isNew(a)).length;
      if (totalNew > 0) {
        document.getElementById('new-count').innerHTML =
          `<span class="badge-new-global">NEW ${totalNew}</span>`;
      }

      if (articles.length === 0) {
        document.getElementById('columns').innerHTML = '<div class="empty">記事データがありません</div>';
        return;
      }

      const groups = {};
      articles.forEach(a => {
        if (!groups[a.source_id]) groups[a.source_id] = { label: a.source_label, items: [] };
        groups[a.source_id].items.push(a);
      });

      document.getElementById('columns').innerHTML =
        Object.entries(groups).map(([id, g]) => renderColumn(id, g.label, g.items)).join('');

      // クリックで既読化
      document.getElementById('columns').addEventListener('click', e => {
        const link = e.target.closest('a[href]');
        if (!link) return;
        const item = link.closest('.item');
        if (!item || !item.classList.contains('is-new')) return;
        markRead(link.href);
        item.classList.remove('is-new');
        const badge = item.querySelector('.badge-new');
        if (badge) badge.remove();
      });

      // キーワードフィルター（ソースフィルターとの組み合わせ対応）
      let activeSource = 'all';

      function applyFilters() {
        const q = document.getElementById('filter-input').value.trim().toLowerCase();
        document.querySelectorAll('.item').forEach(item => {
          const title = item.querySelector('.item-title')?.textContent.toLowerCase() || '';
          const matchKeyword = !q || title.includes(q);
          item.style.display = matchKeyword ? '' : 'none';
        });
        document.querySelectorAll('.col').forEach(col => {
          const sid = col.dataset.source || '';
          if (activeSource === 'all') {
            col.style.display = '';
          } else {
            col.style.display = sid === activeSource ? '' : 'none';
          }
        });
      }

      document.getElementById('filter-input').addEventListener('input', applyFilters);

      // ソース別フィルター
      const sourceMap = {
        'all': 'all',
        'blog': 'blog',
        'thinkers': 'thinkers',
        'client': 'client_stories'
      };

      document.getElementById('source-filters').addEventListener('click', e => {
        const btn = e.target.closest('.source-filter-btn');
        if (!btn) return;
        document.querySelectorAll('.source-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSource = sourceMap[btn.dataset.source] || 'all';
        applyFilters();
      });

      // 記事詳細モーダル
      const overlay = document.getElementById('modal-overlay');
      const modal = document.getElementById('modal');

      function openModal(item) {
        const url = item.dataset.articleUrl || '#';
        document.getElementById('modal-title').textContent = item.dataset.articleTitle || '';
        document.getElementById('modal-source').textContent = item.dataset.articleSource || '';
        const dateEl = document.getElementById('modal-date');
        const dateWrap = document.getElementById('modal-date-wrap');
        const dateStr = item.dataset.articleDate || '';
        if (dateStr) {
          dateEl.textContent = dateStr;
          dateWrap.style.display = '';
        } else {
          dateWrap.style.display = 'none';
        }

        const loadingEl = document.getElementById('modal-summary-loading');
        const summaryEl = document.getElementById('modal-summary-text');
        loadingEl.style.display = 'none';
        const summary = (item.dataset.articleDesc || '').replace(/^#+\s.*\n?/gm, '').trim();
        summaryEl.textContent = summary || '（この記事の要約はまだ生成されていません）';
        summaryEl.style.color = summary ? '' : '#b2bec3';

        document.getElementById('modal-link').href = url;
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      document.getElementById('columns').addEventListener('click', e => {
        const item = e.target.closest('.item[data-article-url]');
        if (!item) return;
        openModal(item);
      });

      document.getElementById('modal-close').addEventListener('click', closeModal);
      overlay.addEventListener('click', e => {
        if (!modal.contains(e.target)) closeModal();
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
      });

      // 既読リセット
      document.getElementById('reset-read-btn').addEventListener('click', () => {
        if (!confirm('既読をすべてリセットしますか？')) return;
        readUrls.clear();
        localStorage.removeItem(READ_KEY);
        location.reload();
      });
    })
    .catch(() => {
      document.getElementById('last-scraped').textContent = '読み込みエラー';
    });
</script>
  <footer class="app-footer">
    <span class="app-footer-text">⚠️ 機密情報・個人情報のアップロードは禁止です</span>
  </footer>
  <script src="../../assets/onboarding.js"></script>
  <script>initOnboarding({
    appName: 'akkodis-watcher',
    title: 'Global Antenna',
    description: 'グローバル側の動きを見逃さなくなります',
    features: [
      { icon: '🌍', text: 'AKKODiSグローバルサイトの新着を自動巡回' },
      { icon: '🇯🇵', text: '英語記事もAIが日本語で要約してくれる' },
      { icon: '🔔', text: '新着にはNEWバッジが付くので一目瞭然' }
    ]
  });</script>
</body>
</html>
