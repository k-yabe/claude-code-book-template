<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Maker | AKKODiS Tools</title>
  <link rel="manifest" href="/manifest.json">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; display: flex; flex-direction: column; }
    .hidden { display: none !important; }

    /* ナビバー */
    .navbar { background: #001f33; height: 58px; display: flex; align-items: center; padding: 0 40px; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .navbar-back { color: #fff; text-decoration: none; font-size: 0.82rem; opacity: 0.8; border: 1px solid transparent; padding: 6px 12px; transition: border-color 0.2s, opacity 0.2s; }
    .navbar-back:hover { border-color: rgba(255,255,255,0.5); opacity: 1; }
    .navbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
    .navbar-title { color: #fff; font-size: 0.95rem; font-weight: 600; }

    /* コンテナ */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; flex: 1; width: 100%; }

    /* ===== フェーズバー ===== */
    .phase-bar { display: flex; background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .phase-step { flex: 1; text-align: center; padding: 12px 8px; font-size: 0.78rem; font-weight: 600; color: #b0bec5; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s; }
    .phase-step.active { color: #001f33; border-bottom-color: #ffb81c; }
    .phase-step.completed { color: #4a5568; border-bottom-color: #001f33; }
    .phase-step .step-num { display: inline-block; width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 0.68rem; font-weight: 700; margin-right: 4px; background: #e8ecf0; color: #8a9bb0; }
    .phase-step.active .step-num { background: #ffb81c; color: #001f33; }
    .phase-step.completed .step-num { background: #001f33; color: #fff; }

    /* ===== Phase 1: チャット ===== */
    .chat-section { background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.09); display: flex; flex-direction: column; min-height: 500px; }

    /* インポートゾーン */
    .import-zone { padding: 12px 16px; border-bottom: 1px solid #e8ecf0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .import-drop { flex: 1; min-width: 200px; border: 2px dashed #e0e4e8; padding: 10px 14px; font-size: 0.78rem; color: #8a9bb0; text-align: center; cursor: pointer; transition: all 0.2s; }
    .import-drop:hover, .import-drop.dragover { border-color: #ffb81c; background: rgba(255,184,28,0.04); color: #4a5568; }
    .import-drop input[type="file"] { display: none; }
    .import-url-row { display: flex; gap: 0; flex: 1; min-width: 200px; }
    .import-url-input { flex: 1; border: 1.5px solid #e0e4e8; padding: 8px 12px; font-size: 0.78rem; font-family: inherit; color: #2d3436; outline: none; }
    .import-url-input:focus { border-color: #ffb81c; }
    .import-url-input::placeholder { color: #c0cdd9; }
    .btn-url-go { background: #001f33; color: #fff; border: none; padding: 8px 14px; font-size: 0.75rem; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .btn-url-go:hover { opacity: 0.85; }

    /* チャットメッセージ */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; max-height: 420px; min-height: 240px; }
    .chat-bubble { max-width: 82%; padding: 11px 16px; font-size: 0.85rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .chat-bubble.ai { align-self: flex-start; background: #001f33; color: #fff; }
    .chat-bubble.user { align-self: flex-end; background: #f0f2f5; color: #2d3436; }
    .chat-typing { align-self: flex-start; padding: 10px 16px; background: #001f33; color: rgba(255,255,255,0.6); font-size: 0.8rem; }
    .chat-typing::after { content: '...'; animation: dots 1.2s steps(4) infinite; }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
    .chat-action-btn { display: inline-block; margin-top: 8px; background: #ffb81c; color: #001f33; border: none; padding: 8px 18px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .chat-action-btn:hover { opacity: 0.88; }
    .chat-suggestions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; align-self: flex-start; }
    .chat-sug-chip { background: transparent; border: 1.5px solid #334d66; color: #8a9bb0; padding: 6px 14px; font-size: 0.78rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .chat-sug-chip:hover { border-color: #ffb81c; color: #fff; background: rgba(255,184,28,0.1); }
    .chat-citations { margin-top: 8px; font-size: 0.7rem; }
    .chat-citation-link { color: #8a9bb0; text-decoration: none; display: block; padding: 1px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-citation-link:hover { color: #ffb81c; }

    /* チャット入力 */
    .chat-input-area { border-top: 1px solid #e8ecf0; padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
    .chat-textarea { flex: 1; border: 1.5px solid #e8ecf0; padding: 10px 14px; font-size: 0.85rem; font-family: inherit; color: #2d3436; resize: none; outline: none; min-height: 44px; max-height: 120px; line-height: 1.5; }
    .chat-textarea:focus { border-color: #ffb81c; }
    .chat-textarea::placeholder { color: #b0bec5; }
    .btn-send { background: #001f33; color: #fff; border: none; padding: 10px 18px; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0; transition: opacity 0.2s; }
    .btn-send:hover:not(:disabled) { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* テンプレートバー */
    .tpl-bar { padding: 10px 16px; border-top: 1px solid #e8ecf0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tpl-label { font-size: 0.72rem; font-weight: 600; color: #8a9bb0; white-space: nowrap; }
    .tpl-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .tpl-chip { border: 1.5px solid #e0e4e8; background: #fff; color: #4a5568; padding: 4px 10px; font-size: 0.72rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
    .tpl-chip:hover { border-color: #001f33; color: #001f33; }
    .tpl-chip.selected { border-color: #ffb81c; background: #fffbf0; color: #001f33; }
    .tpl-chip.dark { background: #001f33; color: rgba(255,255,255,0.7); border-color: #334d66; }
    .tpl-chip.dark:hover { border-color: #ffb81c; color: #fff; }
    .tpl-chip.dark.selected { border-color: #ffb81c; background: #0a2540; color: #ffb81c; }
    .tpl-bar-right { margin-left: auto; }
    .btn-reset-sm { background: none; border: 1px solid #e0e4e8; color: #b0bec5; padding: 4px 8px; font-size: 0.75rem; cursor: pointer; font-family: inherit; }
    .btn-reset-sm:hover { border-color: #8a9bb0; color: #4a5568; }

    /* ===== Phase 2: アウトライン ===== */
    .outline-section { background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.09); padding: 20px 24px; }
    .outline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .outline-title { font-size: 1rem; font-weight: 700; color: #001f33; }
    .outline-actions { display: flex; gap: 8px; }
    .btn-back { background: none; border: 1.5px solid #e0e4e8; color: #4a5568; padding: 8px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-back:hover { border-color: #001f33; color: #001f33; }
    .btn-primary { background: #ffb81c; color: #001f33; border: none; padding: 8px 20px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .outline-list { display: flex; flex-direction: column; gap: 6px; }
    .outline-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f9fafb; border: 1.5px solid #e8ecf0; transition: all 0.15s; }
    .outline-item:hover { border-color: #ffb81c; }
    .outline-item.dragging { opacity: 0.4; }
    .outline-drag { cursor: grab; color: #b0bec5; font-size: 1rem; flex-shrink: 0; user-select: none; }
    .outline-num { font-size: 0.72rem; font-weight: 700; color: #8a9bb0; width: 22px; text-align: center; flex-shrink: 0; }
    .outline-layout-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; background: #001f33; color: #ffb81c; flex-shrink: 0; white-space: nowrap; }
    .outline-title-edit { flex: 1; font-size: 0.85rem; color: #2d3436; padding: 2px 6px; border: 1px solid transparent; outline: none; min-width: 0; font-family: inherit; background: transparent; }
    .outline-title-edit:focus { border-color: #ffb81c; background: #fff; }
    .outline-layout-select { border: 1px solid #e0e4e8; padding: 3px 6px; font-size: 0.72rem; font-family: inherit; color: #4a5568; outline: none; }
    .outline-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .outline-btn { background: none; border: 1px solid #e0e4e8; color: #8a9bb0; padding: 3px 7px; font-size: 0.72rem; cursor: pointer; font-family: inherit; }
    .outline-btn:hover { border-color: #4a5568; color: #4a5568; }
    .outline-btn.del:hover { border-color: #c0392b; color: #c0392b; }
    .btn-add-slide { margin-top: 8px; background: none; border: 2px dashed #e0e4e8; padding: 10px; text-align: center; font-size: 0.82rem; color: #8a9bb0; cursor: pointer; width: 100%; font-family: inherit; }
    .btn-add-slide:hover { border-color: #ffb81c; color: #4a5568; }

    /* ===== Phase 3: プレビュー ===== */
    .preview-section { }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #001f33; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .slide-count-badge { font-size: 0.72rem; font-weight: 700; background: #001f33; color: #ffb81c; padding: 2px 8px; }

    /* クイックアクション */
    .quick-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .btn-quick { border: 1.5px solid #e0e4e8; background: #fff; color: #4a5568; padding: 7px 14px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn-quick:hover:not(:disabled) { border-color: #001f33; color: #001f33; }
    .btn-quick:disabled { opacity: 0.5; cursor: not-allowed; }

    .slides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .slide-thumb { aspect-ratio: 16/9; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; overflow: hidden; }
    .slide-thumb:hover { border-color: #ffb81c; }
    .slide-num { position: absolute; top: 6px; left: 6px; background: rgba(0,31,51,0.7); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 6px; z-index: 2; }
    .slide-layout-label { position: absolute; bottom: 5px; right: 5px; font-size: 0.58rem; font-weight: 700; background: rgba(0,31,51,0.62); color: rgba(255,255,255,0.9); padding: 1px 5px; z-index: 2; pointer-events: none; }

    /* スライドプレビュー HTML */
    .slide-inner { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 8%; font-family: 'Meiryo UI', 'Segoe UI', sans-serif; }
    .slide-cover { background: #001f33; color: #fff; }
    .slide-cover .s-title { font-size: 1.5em; font-weight: 700; color: #ffb81c; line-height: 1.2; }
    .slide-cover .s-subtitle { font-size: 0.65em; color: rgba(255,255,255,0.8); margin-top: 0.5em; }
    .slide-cover .s-date { font-size: 0.55em; color: rgba(255,255,255,0.5); margin-top: auto; }
    .slide-white { background: #fff; }
    .slide-white .s-title { font-size: 0.9em; font-weight: 700; color: #001f33; border-bottom: 2px solid #ffb81c; padding-bottom: 4px; margin-bottom: 10px; }
    .slide-white .s-body { font-size: 0.6em; color: #2d3436; line-height: 1.6; flex: 1; }
    .slide-chapter { background: #ffb81c; color: #001f33; justify-content: center; }
    .slide-chapter .s-title { font-size: 1.1em; font-weight: 700; text-align: center; }
    .slide-chapter .s-num { font-size: 0.6em; text-align: center; margin-bottom: 8px; opacity: 0.7; }
    .slide-agenda { background: #001f33; color: #fff; }
    .slide-agenda .s-title { font-size: 0.9em; font-weight: 700; color: #ffb81c; margin-bottom: 10px; }
    .slide-agenda .s-item { font-size: 0.6em; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .slide-closing { background: #001f33; color: #fff; justify-content: center; align-items: center; text-align: center; }
    .slide-closing .s-msg { font-size: 1em; font-weight: 700; color: #ffb81c; }
    .slide-table th, .slide-table td { font-size: 0.5em; padding: 3px 6px; border: 1px solid #e8ecf0; }
    .slide-table th { background: #001f33; color: #fff; font-weight: 600; }

    /* リファイン */
    .refine-section { margin-top: 16px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 16px 20px; }
    .refine-input-row { display: flex; gap: 10px; }
    .refine-input-row input { flex: 1; border: 1.5px solid #e8ecf0; padding: 8px 12px; font-size: 0.85rem; font-family: inherit; color: #2d3436; background: #fff; outline: none; }
    .refine-input-row input:focus { border-color: #ffb81c; }
    .refine-count { font-size: 0.75rem; color: #8a9bb0; margin-top: 6px; }
    .btn-secondary { background: #001f33; color: #fff; border: none; padding: 10px 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-secondary:hover:not(:disabled) { opacity: 0.8; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
    .refine-history { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .refine-chip { font-size: 0.72rem; color: #4a5568; padding: 3px 10px; cursor: pointer; border: 1px solid #e0e4e8; background: #f7f8fa; font-family: inherit; }
    .refine-chip:hover { background: #e8ecf0; }

    /* ダウンロード */
    .download-area { margin-top: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn-download { background: #001f33; color: #fff; border: none; padding: 13px 28px; font-size: 0.88rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }
    .btn-download:hover:not(:disabled) { opacity: 0.8; }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
    .download-note { font-size: 0.75rem; color: #8a9bb0; }

    /* ローディング */
    .loading-area { margin-top: 20px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 28px; text-align: center; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid #e8ecf0; border-top-color: #ffb81c; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-step { font-size: 0.85rem; color: #4a5568; font-weight: 600; }
    .progress-bar { width: 100%; height: 4px; background: #e8ecf0; margin-top: 12px; }
    .progress-fill { height: 100%; background: #ffb81c; transition: width 0.4s ease; }

    /* エラー */
    .error-msg { padding: 12px 16px; background: #ffeaea; border-left: 3px solid #c0392b; font-size: 0.82rem; color: #c0392b; margin-top: 12px; display: flex; align-items: center; gap: 10px; }

    /* トースト */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #27ae60; color: #fff; padding: 11px 20px; font-size: 0.85rem; font-weight: 600; z-index: 2000; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* モーダル */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.52); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: #fff; max-width: 560px; width: 100%; max-height: 82vh; overflow-y: auto; padding: 28px; position: relative; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .modal-slide-num { font-size: 1rem; font-weight: 700; color: #001f33; }
    .modal-close { background: none; border: none; font-size: 1.4rem; color: #b0bec5; cursor: pointer; padding: 0; line-height: 1; }
    .modal-close:hover { color: #001f33; }
    .modal-layout-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; background: #001f33; color: #ffb81c; padding: 2px 8px; margin-bottom: 16px; }
    .modal-field { margin-bottom: 12px; }
    .modal-label { font-size: 0.7rem; font-weight: 700; color: #8a9bb0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .modal-input { width: 100%; border: 1.5px solid #e8ecf0; padding: 8px 12px; font-size: 0.85rem; font-family: inherit; color: #2d3436; outline: none; }
    .modal-input:focus { border-color: #ffb81c; }
    textarea.modal-input { resize: vertical; min-height: 80px; line-height: 1.6; }
    .modal-divider { border: none; border-top: 1px solid #e8ecf0; margin: 4px 0 12px; }
    .modal-save { background: #ffb81c; color: #001f33; border: none; padding: 10px 24px; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .modal-save:hover { opacity: 0.88; }

    /* ノートインジケーター */
    .slide-notes-icon { position: absolute; bottom: 5px; left: 6px; font-size: 0.6rem; color: rgba(255,255,255,0.8); background: rgba(0,31,51,0.6); padding: 1px 5px; z-index: 2; pointer-events: none; }

    /* プレゼンテーションモード */
    .pres-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; flex-direction: column; }
    .pres-overlay.active { display: flex; }
    .pres-slide-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .pres-slide { width: 100%; max-width: 1200px; aspect-ratio: 16/9; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
    .pres-controls { height: 56px; background: rgba(0,31,51,0.95); display: flex; align-items: center; justify-content: center; gap: 16px; padding: 0 20px; }
    .pres-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; font-family: inherit; }
    .pres-btn:hover { border-color: #ffb81c; color: #ffb81c; }
    .pres-counter { color: rgba(255,255,255,0.7); font-size: 0.82rem; min-width: 60px; text-align: center; }
    .pres-notes { background: rgba(0,31,51,0.9); color: rgba(255,255,255,0.8); padding: 10px 20px; font-size: 0.78rem; line-height: 1.6; max-height: 80px; overflow-y: auto; border-top: 1px solid rgba(255,184,28,0.3); }
    .pres-timer { color: #ffb81c; font-size: 0.85rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* チャート用hidden canvas */
    #chart-canvas { display: none; position: absolute; top: -9999px; }

    /* フッター */
    footer { background: #001f33; border-top: 1px solid rgba(255,255,255,0.08); padding: 16px 40px; margin-top: auto; }
    footer p { font-size: 0.72rem; color: rgba(255,255,255,0.6); }
    footer strong { color: #ffb81c; }

    @media (max-width: 768px) {
      .navbar { padding: 0 16px; }
      .container { padding: 16px 12px 40px; }
      .import-zone { flex-direction: column; }
      .chat-messages { max-height: 350px; }
      .outline-item { flex-wrap: wrap; }
      .quick-actions { flex-direction: column; }
      .refine-input-row { flex-direction: column; }
      .download-area { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-back">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Slide Maker</span>
  </nav>

  <div class="container">
    <!-- フェーズバー -->
    <div class="phase-bar">
      <div class="phase-step active" data-phase="chat" onclick="setPhase('chat')"><span class="step-num">1</span>ヒアリング</div>
      <div class="phase-step" data-phase="outline" onclick="outlineData && setPhase('outline')"><span class="step-num">2</span>構成確認</div>
      <div class="phase-step" data-phase="preview" onclick="currentSlides && setPhase('preview')"><span class="step-num">3</span>プレビュー</div>
      <div class="phase-step" data-phase="export" onclick="currentSlides && setPhase('export')"><span class="step-num">4</span>出力</div>
    </div>

    <!-- Phase 1: チャット -->
    <div id="phase-chat">
      <div class="chat-section">
        <!-- インポートゾーン -->
        <div class="import-zone">
          <div class="import-drop" id="import-drop" onclick="document.getElementById('file-input').click()">
            📎 PDF / Word / PPTX をドロップまたは選択
            <input type="file" id="file-input" accept=".pdf,.docx,.pptx" onchange="handleFileImport(this.files[0])">
          </div>
          <div class="import-url-row">
            <input type="url" class="import-url-input" id="url-input" placeholder="https:// URL貼り付け" onkeydown="if(event.key==='Enter')handleUrlImport()">
            <button class="btn-url-go" onclick="handleUrlImport()">読込</button>
          </div>
        </div>

        <!-- チャットメッセージ -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- チャット入力 -->
        <div class="chat-input-area">
          <textarea class="chat-textarea" id="chat-input" placeholder="メッセージを入力..." rows="1" onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" id="btn-send" onclick="sendChat()">送信</button>
        </div>

        <!-- テンプレートバー -->
        <div class="tpl-bar">
          <span class="tpl-label">テンプレート</span>
          <div class="tpl-chips">
            <button class="tpl-chip selected" data-val="external-white" onclick="selectTpl(this)">社外 WHITE</button>
            <button class="tpl-chip dark" data-val="external-dark" onclick="selectTpl(this)">社外 DARK</button>
            <button class="tpl-chip" data-val="internal-white" onclick="selectTpl(this)">社内 WHITE</button>
            <button class="tpl-chip dark" data-val="internal-dark" onclick="selectTpl(this)">社内 DARK</button>
          </div>
          <div class="tpl-bar-right">
            <button class="btn-reset-sm" onclick="resetAll()" title="リセット">↺ リセット</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Phase 2: アウトライン -->
    <div id="phase-outline" class="hidden">
      <div class="outline-section">
        <div class="outline-header">
          <div class="outline-title">スライド構成（ドラッグで並替・クリックで編集）</div>
          <div class="outline-actions">
            <button class="btn-back" onclick="setPhase('chat')">← チャットに戻る</button>
            <button class="btn-primary" id="btn-gen-from-outline" onclick="generateFromOutline()">この構成で生成 →</button>
          </div>
        </div>
        <div class="outline-list" id="outline-list"></div>
        <button class="btn-add-slide" onclick="addOutlineSlide()">＋ スライドを追加</button>
      </div>
    </div>

    <!-- Phase 3: プレビュー -->
    <div id="phase-preview" class="hidden">
      <div class="preview-section">
        <div class="section-title">
          プレビュー <span class="slide-count-badge" id="slide-count-badge">0枚</span>
          <div style="margin-left:auto"><button class="btn-back" onclick="setPhase('outline')">← 構成に戻る</button></div>
        </div>

        <!-- クイックアクション -->
        <div class="quick-actions">
          <button class="btn-quick" onclick="quickAction('レイアウトを最適化。content-with-chartやcontent-with-flowを活用し、contentの連続を避けてください')">🔧 レイアウト修正</button>
          <button class="btn-quick" onclick="quickAction('全スライドの文章を改善。主張型タイトル、数値・固有名詞を活用してください')">✍️ 文章ブラッシュアップ</button>
          <button class="btn-quick" onclick="quickAction('冗長な表現を削除し、箇条書きを3行以内に削減してください')">🗜️ シンプルにする</button>
          <button class="btn-quick" onclick="quickAction('content-with-chartスライドを1枚追加し、既存の数値データからグラフを作成してください')">📊 データスライド追加</button>
          <button class="btn-quick" onclick="quickAction('全スライドを英語に翻訳してください。タイトル・本文・ノートすべて英訳し、layout構造は変更しないでください')">🌐 英語に翻訳</button>
        </div>

        <div class="slides-grid" id="slides-grid"></div>
      </div>

      <!-- リファイン -->
      <div class="refine-section">
        <div class="refine-input-row">
          <input type="text" id="refine-input" placeholder="例：3枚目をシンプルにして　／　比較表のスライドを追加して" onkeydown="if(event.key==='Enter')refine()">
          <button class="btn-secondary" id="btn-refine" onclick="refine()">修正する</button>
        </div>
        <div class="refine-count" id="refine-count">残り5回</div>
        <div class="refine-history" id="refine-history"></div>
      </div>

      <!-- ダウンロード・プレゼン -->
      <div class="download-area">
        <button class="btn-download" id="btn-download" onclick="downloadPptx()">⬇ PPTX</button>
        <button class="btn-secondary" onclick="enterPresMode()">▶ プレゼン</button>
        <span class="download-note">PowerPoint / Keynote で開けます</span>
      </div>
    </div>

    <!-- Phase 4: 出力（プレビューと統合 — DL部分にスクロール） -->

    <!-- ローディング -->
    <div id="loading-area" class="hidden">
      <div class="loading-area">
        <div class="loading-spinner"></div>
        <div class="loading-step" id="loading-step">生成中…</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
      </div>
    </div>

    <!-- エラー -->
    <div id="error-area" class="hidden">
      <div class="error-msg"><span id="error-text"></span></div>
    </div>
  </div>

  <!-- プレゼンテーションモード -->
  <div class="pres-overlay" id="pres-overlay">
    <div class="pres-slide-area" onclick="presNext()">
      <div class="pres-slide" id="pres-slide"></div>
    </div>
    <div class="pres-notes" id="pres-notes"></div>
    <div class="pres-controls">
      <button class="pres-btn" onclick="presPrev()">← 前</button>
      <span class="pres-counter" id="pres-counter">1 / 1</span>
      <button class="pres-btn" onclick="presNext()">次 →</button>
      <span class="pres-timer" id="pres-timer">00:00</span>
      <button class="pres-btn" onclick="exitPresMode()">✕ 終了</button>
    </div>
  </div>

  <!-- スライド詳細モーダル（編集可能） -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-slide-num" id="modal-slide-num">スライド 1</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-layout-badge" id="modal-layout-badge">cover</div>
      <hr class="modal-divider">
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <p>⚠️ <strong>機密情報・個人情報の入力は禁止</strong>です。社外秘情報はVercel環境変数で管理してください。</p>
  </footer>

  <canvas id="chart-canvas" width="800" height="450"></canvas>

  <script>
    // ===== 認証・初期変数 =====
    if (localStorage.getItem('auth') !== '1') { location.href = '/'; }
    const USER = localStorage.getItem('user') || '';

    let selectedTemplate = 'external-white';
    let currentSlides = null;
    let outlineData = null;
    let refineCount = 0;
    const MAX_REFINE = 5;
    let chatHistory = [];
    let collectedContext = null;
    let importedContent = '';
    let currentPhase = 'chat';
    let editingSlideIdx = -1;

    // pdf.js worker 設定
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';
    }

    // ===== フェーズ管理 =====
    function setPhase(phase) {
      currentPhase = phase;
      ['chat','outline','preview'].forEach(p => {
        const el = document.getElementById(`phase-${p}`);
        if (el) el.classList.toggle('hidden', p !== phase);
      });
      document.querySelectorAll('.phase-step').forEach(el => {
        const p = el.dataset.phase;
        const phases = ['chat','outline','preview','export'];
        const idx = phases.indexOf(p);
        const cur = phases.indexOf(phase === 'export' ? 'preview' : phase);
        el.classList.remove('active','completed');
        if (idx === cur) el.classList.add('active');
        else if (idx < cur) el.classList.add('completed');
      });
      if (phase === 'preview' || phase === 'export') {
        document.getElementById('phase-preview').classList.remove('hidden');
      }
    }

    // ===== テンプレート =====
    function selectTpl(el) {
      document.querySelectorAll('.tpl-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedTemplate = el.dataset.val;
      preloadTemplate(selectedTemplate);
      if (currentSlides) renderPreview(currentSlides);
    }
    function selectTplByVal(val) {
      const chip = document.querySelector(`.tpl-chip[data-val="${val}"]`);
      if (chip) selectTpl(chip);
    }

    // ===== チャット =====
    function initChat() {
      chatHistory = [];
      collectedContext = null;
      importedContent = '';
      const msgs = document.getElementById('chat-messages');
      msgs.innerHTML = '';
      addChatBubble('ai', 'こんにちは！プレゼン資料の構成をお手伝いします。\n\nどんなプレゼンを作りますか？テーマと目的を教えてください。\nファイル（PDF / Word / PPTX）やURLからの読み込みも可能です。');
      showSuggestions(['経営陣への提案資料', '顧客向けの提案書', '社内の報告・共有資料']);
    }

    function showCitations(citations) {
      if (!citations?.length) return;
      const msgs = document.getElementById('chat-messages');
      const last = msgs.querySelector('.chat-bubble.ai:last-of-type');
      if (!last) return;
      const div = document.createElement('div');
      div.className = 'chat-citations';
      citations.forEach(c => {
        const a = document.createElement('a');
        a.className = 'chat-citation-link';
        a.href = c.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = `📎 ${c.title || c.url}`;
        div.appendChild(a);
      });
      last.appendChild(div);
    }

    function showSuggestions(suggestions) {
      // 既存のサジェスチョンを削除
      document.querySelectorAll('.chat-suggestions').forEach(el => el.remove());
      if (!suggestions?.length) return;

      const msgs = document.getElementById('chat-messages');
      const container = document.createElement('div');
      container.className = 'chat-suggestions';
      suggestions.forEach(sug => {
        const chip = document.createElement('button');
        chip.className = 'chat-sug-chip';
        chip.textContent = sug;
        chip.onclick = () => {
          container.remove();
          document.getElementById('chat-input').value = sug;
          sendChat();
        };
        container.appendChild(chip);
      });
      msgs.appendChild(container);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addChatBubble(role, text, actionBtn = null) {
      const msgs = document.getElementById('chat-messages');
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      bubble.textContent = text;
      if (actionBtn) {
        const btn = document.createElement('button');
        btn.className = 'chat-action-btn';
        btn.textContent = actionBtn.label;
        btn.onclick = actionBtn.action;
        bubble.appendChild(document.createElement('br'));
        bubble.appendChild(btn);
      }
      msgs.appendChild(bubble);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('chat-messages');
      const el = document.createElement('div');
      el.className = 'chat-typing';
      el.id = 'typing-indicator';
      el.textContent = '考え中';
      msgs.appendChild(el);
      msgs.scrollTop = msgs.scrollHeight;
    }
    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function handleChatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendChat(); }
    }
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      autoResize(input);
      addChatBubble('user', text);
      chatHistory.push({ role: 'user', content: text });

      document.getElementById('btn-send').disabled = true;
      showTyping();

      try {
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: 'chat',
            chatMessages: chatHistory,
            importedContent: importedContent || undefined,
            _user: USER,
          }),
        });

        hideTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `エラー (${res.status})`);
        }

        const json = await res.json();
        chatHistory.push({ role: 'assistant', content: json.reply });

        if (json.readyForOutline && json.context) {
          collectedContext = json.context;
          addChatBubble('ai', json.reply, {
            label: '📋 構成を作成する',
            action: () => generateOutline(),
          });
        } else {
          addChatBubble('ai', json.reply);
        }

        // 引用情報を表示
        if (json.citations?.length) {
          showCitations(json.citations);
        }

        // サジェスチョンチップを表示
        if (json.suggestions?.length) {
          showSuggestions(json.suggestions);
        }
      } catch (err) {
        hideTyping();
        addChatBubble('ai', `エラーが発生しました: ${err.message}\nもう一度お試しください。`);
      } finally {
        document.getElementById('btn-send').disabled = false;
        document.getElementById('chat-input').focus();
      }
    }

    // ===== ファイルインポート =====
    const dropZone = document.getElementById('import-drop');
    if (dropZone) {
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFileImport(e.dataTransfer.files[0]); });
    }

    async function handleFileImport(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      showTyping();
      try {
        let text = '';
        if (ext === 'pdf') text = await extractPdfText(file);
        else if (ext === 'docx') text = await extractDocxText(file);
        else if (ext === 'pptx') text = await extractPptxText(file);
        else { hideTyping(); addChatBubble('ai', '対応形式: PDF, Word(.docx), PPTX'); return; }

        importedContent = text;
        hideTyping();
        addChatBubble('ai', `「${file.name}」を読み込みました（${text.length.toLocaleString()}文字）。\nこの内容をもとにスライドを作成しますか？そのまま構成を作成するか、追加の情報を教えてください。`, {
          label: '📋 この内容で構成を作成',
          action: () => generateOutlineFromImport(),
        });
      } catch (err) {
        hideTyping();
        addChatBubble('ai', `ファイルの読み込みに失敗しました: ${err.message}`);
      }
    }

    async function handleUrlImport() {
      const url = document.getElementById('url-input').value.trim();
      if (!url || !/^https?:\/\/.+/.test(url)) return;

      showTyping();
      try {
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'url', url, _user: USER }),
        });
        hideTyping();
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (json.error) throw new Error(json.error);

        // URLモードは直接スライドJSONを返す
        outlineData = json.slides;
        addChatBubble('ai', `URLからスライド構成を生成しました（${json.slides.length}枚）。構成を確認しますか？`, {
          label: '📋 構成を確認する',
          action: () => { renderOutline(); setPhase('outline'); },
        });
      } catch (err) {
        hideTyping();
        addChatBubble('ai', `URLの読み込みに失敗しました: ${err.message}`);
      }
    }

    async function extractPdfText(file) {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= Math.min(pdf.numPages, 50); i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        text += tc.items.map(it => it.str).join(' ') + '\n';
      }
      return text.trim().slice(0, 15000);
    }

    async function extractDocxText(file) {
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      return (result.value || '').trim().slice(0, 15000);
    }

    async function extractPptxText(file) {
      const buf = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(buf);
      const slideFiles = Object.keys(zip.files)
        .filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f))
        .sort((a, b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));
      let text = '';
      for (const f of slideFiles) {
        const xml = await zip.file(f).async('string');
        const matches = xml.match(/<a:t>([^<]*)<\/a:t>/g) || [];
        const slideText = matches.map(m => m.replace(/<\/?a:t>/g, '')).join(' ');
        if (slideText.trim()) text += slideText.trim() + '\n---\n';
      }
      return text.trim().slice(0, 15000);
    }

    // ===== アウトライン生成 =====
    async function generateOutline() {
      const ctx = collectedContext || {};
      showLoading('🔄 スライド構成を生成中…', 20);

      try {
        const body = {
          mode: 'free',
          freeText: buildFreeTextFromContext(ctx),
          _user: USER,
        };
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (json.error) throw new Error(json.error);

        outlineData = json.slides;
        hideLoading();
        renderOutline();
        setPhase('outline');
      } catch (err) {
        hideLoading();
        addChatBubble('ai', `構成の生成に失敗しました: ${err.message}\nもう一度お試しください。`);
      }
    }

    async function generateOutlineFromImport() {
      showLoading('🔄 スライド構成を生成中…', 20);
      try {
        const body = {
          mode: 'free',
          freeText: importedContent.slice(0, 10000),
          _user: USER,
        };
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (json.error) throw new Error(json.error);

        outlineData = json.slides;
        hideLoading();
        renderOutline();
        setPhase('outline');
      } catch (err) {
        hideLoading();
        addChatBubble('ai', `構成の生成に失敗しました: ${err.message}`);
      }
    }

    function buildFreeTextFromContext(ctx) {
      let text = '';
      if (ctx.topic) text += `テーマ: ${ctx.topic}\n`;
      if (ctx.audience) text += `対象者: ${ctx.audience}\n`;
      if (ctx.background) text += `背景・課題: ${ctx.background}\n`;
      if (ctx.messages?.length) text += `伝えたいメッセージ:\n${ctx.messages.map((m,i) => `${i+1}. ${m}`).join('\n')}\n`;
      if (ctx.data) text += `データ・数値: ${ctx.data}\n`;
      if (ctx.tone) text += `トーン: ${ctx.tone}\n`;
      if (ctx.slideCount) text += `枚数: ${ctx.slideCount}枚\n`;
      if (ctx.language) text += `言語: ${ctx.language}\n`;
      return text || 'プレゼン資料を作成してください。';
    }

    // ===== アウトラインエディター =====
    const LAYOUT_NAMES = {
      cover:'カバー', agenda:'アジェンダ', chapter:'チャプター',
      content:'コンテンツ', 'content-with-chart':'グラフ付き',
      'content-with-flow':'フロー付き', comparison:'比較表', closing:'クロージング',
    };
    const VALID_LAYOUTS = ['cover','agenda','chapter','content','content-with-chart','content-with-flow','comparison','closing'];

    function renderOutline() {
      const list = document.getElementById('outline-list');
      list.innerHTML = '';
      if (!outlineData) return;

      outlineData.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'outline-item';
        item.draggable = true;
        item.dataset.idx = i;

        const summary = slide.body ? slide.body.slice(0, 50) + (slide.body.length > 50 ? '…' : '') :
                         slide.items ? slide.items.join(', ').slice(0, 50) :
                         slide.message || '';

        item.innerHTML = `
          <span class="outline-drag" title="ドラッグで並替">⠿</span>
          <span class="outline-num">${i + 1}</span>
          <span class="outline-layout-badge">${esc(LAYOUT_NAMES[slide.layout] || slide.layout)}</span>
          <input class="outline-title-edit" value="${esc(slide.title || slide.message || '')}" data-idx="${i}" onchange="updateOutlineTitle(${i}, this.value)">
          <select class="outline-layout-select" data-idx="${i}" onchange="updateOutlineLayout(${i}, this.value)">
            ${VALID_LAYOUTS.map(l => `<option value="${l}" ${l === slide.layout ? 'selected' : ''}>${LAYOUT_NAMES[l]}</option>`).join('')}
          </select>
          <div class="outline-btns">
            <button class="outline-btn" onclick="openEditModal(${i})" title="編集">✎</button>
            <button class="outline-btn" onclick="duplicateOutlineSlide(${i})" title="複製">⧉</button>
            <button class="outline-btn" onclick="moveOutline(${i},-1)" title="上へ">↑</button>
            <button class="outline-btn" onclick="moveOutline(${i},1)" title="下へ">↓</button>
            <button class="outline-btn del" onclick="deleteOutlineSlide(${i})" title="削除">✕</button>
          </div>
        `;

        // ドラッグ&ドロップ
        item.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); item.classList.add('dragging'); });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));
        item.addEventListener('dragover', e => e.preventDefault());
        item.addEventListener('drop', e => {
          e.preventDefault();
          const from = parseInt(e.dataTransfer.getData('text/plain'));
          const to = i;
          if (from !== to) { const [moved] = outlineData.splice(from, 1); outlineData.splice(to, 0, moved); renderOutline(); }
        });

        list.appendChild(item);
      });
    }

    function updateOutlineTitle(idx, val) { if (outlineData[idx]) outlineData[idx].title = val; }
    function updateOutlineLayout(idx, val) { if (outlineData[idx]) outlineData[idx].layout = val; renderOutline(); }
    function moveOutline(idx, dir) {
      const to = idx + dir;
      if (to < 0 || to >= outlineData.length) return;
      [outlineData[idx], outlineData[to]] = [outlineData[to], outlineData[idx]];
      renderOutline();
    }
    function deleteOutlineSlide(idx) { outlineData.splice(idx, 1); renderOutline(); }
    function addOutlineSlide() {
      outlineData.push({ layout: 'content', title: '新しいスライド', body: '' });
      renderOutline();
      openEditModal(outlineData.length - 1);
    }

    function generateFromOutline() {
      currentSlides = JSON.parse(JSON.stringify(outlineData));
      refineCount = 0;
      renderPreview(currentSlides);
      setPhase('preview');
    }

    // ===== 編集モーダル =====
    function openEditModal(idx) {
      editingSlideIdx = idx;
      const slide = (currentPhase === 'outline' ? outlineData : currentSlides)[idx];
      if (!slide) return;

      document.getElementById('modal-slide-num').textContent = `スライド ${idx + 1}`;
      document.getElementById('modal-layout-badge').textContent = LAYOUT_NAMES[slide.layout] || slide.layout;

      const field = (label, key, type = 'input', val = '') => {
        const v = esc(val || '');
        if (type === 'textarea') return `<div class="modal-field"><div class="modal-label">${label}</div><textarea class="modal-input" data-key="${key}">${v}</textarea></div>`;
        return `<div class="modal-field"><div class="modal-label">${label}</div><input class="modal-input" data-key="${key}" value="${v}"></div>`;
      };

      let html = '';
      switch (slide.layout) {
        case 'cover':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('サブタイトル', 'subtitle', 'input', slide.subtitle);
          html += field('日付', 'date', 'input', slide.date);
          break;
        case 'agenda':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('項目（改行区切り）', 'items', 'textarea', (slide.items || []).join('\n'));
          break;
        case 'chapter':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('番号', 'number', 'input', slide.number);
          break;
        case 'content':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('本文', 'body', 'textarea', slide.body);
          break;
        case 'content-with-chart':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('本文', 'body', 'textarea', slide.body);
          html += field('グラフタイプ (bar/line/pie)', 'chart.type', 'input', slide.chart?.type);
          html += field('グラフタイトル', 'chart.title', 'input', slide.chart?.title);
          html += field('ラベル（カンマ区切り）', 'chart.labels', 'input', (slide.chart?.labels || []).join(', '));
          html += field('データ（カンマ区切り）', 'chart.data', 'input', (slide.chart?.data || []).join(', '));
          html += field('単位', 'chart.unit', 'input', slide.chart?.unit);
          break;
        case 'content-with-flow':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('本文', 'body', 'textarea', slide.body);
          html += field('ステップ（改行区切り）', 'flow.steps', 'textarea', (slide.flow?.steps || []).join('\n'));
          break;
        case 'comparison':
          html += field('タイトル', 'title', 'input', slide.title);
          html += field('ヘッダー（カンマ区切り）', 'table.headers', 'input', (slide.table?.headers || []).join(', '));
          html += field('行データ（行ごとにカンマ区切り、改行で行分割）', 'table.rows', 'textarea', (slide.table?.rows || []).map(r => r.join(', ')).join('\n'));
          break;
        case 'closing':
          html += field('メッセージ', 'message', 'input', slide.message);
          break;
      }
      // 全レイアウト共通: スピーカーノート
      html += `<hr class="modal-divider">`;
      html += field('スピーカーノート', 'notes', 'textarea', slide.notes);
      html += `<button class="modal-save" onclick="saveModalEdit()">保存</button>`;
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function saveModalEdit() {
      const slides = currentPhase === 'outline' ? outlineData : currentSlides;
      const slide = slides[editingSlideIdx];
      if (!slide) return;

      document.querySelectorAll('#modal-body .modal-input').forEach(el => {
        const key = el.dataset.key;
        const val = el.value;
        if (key.includes('.')) {
          const [parent, child] = key.split('.');
          if (!slide[parent]) slide[parent] = {};
          if (child === 'labels' || child === 'data') slide[parent][child] = val.split(',').map(s => s.trim()).filter(Boolean);
          else if (child === 'steps') slide[parent][child] = val.split('\n').filter(Boolean);
          else if (child === 'headers') slide[parent][child] = val.split(',').map(s => s.trim()).filter(Boolean);
          else if (child === 'rows') slide[parent][child] = val.split('\n').filter(Boolean).map(r => r.split(',').map(s => s.trim()));
          else slide[parent][child] = val;
          // data を数値に変換
          if (child === 'data' && slide[parent][child]) slide[parent][child] = slide[parent][child].map(v => isNaN(Number(v)) ? v : Number(v));
        } else if (key === 'items') {
          slide[key] = val.split('\n').filter(Boolean);
        } else {
          slide[key] = val;
        }
      });

      closeModal();
      if (currentPhase === 'outline') renderOutline();
      else renderPreview(currentSlides);
      showToast('✅ 保存しました');
    }

    function openModal(slide, num) { openEditModal(num - 1); }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); document.body.style.overflow = ''; }
    function handleModalClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

    // ===== リファイン・クイックアクション =====
    async function refine() {
      const instruction = document.getElementById('refine-input').value.trim();
      if (!instruction || !currentSlides) return;
      if (refineCount >= MAX_REFINE) { showError('リファイン上限（5回）に達しました。'); return; }
      await doRefine(instruction);
      document.getElementById('refine-input').value = '';
    }

    async function quickAction(instruction) {
      if (!currentSlides || refineCount >= MAX_REFINE) return;
      document.querySelectorAll('.btn-quick').forEach(b => b.disabled = true);
      await doRefine(instruction);
      document.querySelectorAll('.btn-quick').forEach(b => b.disabled = false);
    }

    async function doRefine(instruction) {
      hideError();
      document.getElementById('btn-refine').disabled = true;

      try {
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'refine', currentSlides, instruction, _user: USER }),
        });
        if (!res.ok) throw new Error(`エラー (${res.status})`);
        const json = await res.json();
        if (json.error) throw new Error(json.error);

        currentSlides = json.slides;
        outlineData = JSON.parse(JSON.stringify(json.slides));
        refineCount++;
        addRefineHistory(instruction);
        renderPreview(currentSlides);
        updateRefineCount();
        showToast('✅ スライドを修正しました');
      } catch (err) {
        showError(err.message);
      } finally {
        document.getElementById('btn-refine').disabled = false;
      }
    }

    function updateRefineCount() {
      const el = document.getElementById('refine-count');
      const remaining = MAX_REFINE - refineCount;
      el.textContent = remaining > 0 ? `残り${remaining}回` : 'リファイン上限に達しました';
    }

    const refineHistory = [];
    function addRefineHistory(instruction) {
      const idx = refineHistory.indexOf(instruction);
      if (idx !== -1) refineHistory.splice(idx, 1);
      refineHistory.unshift(instruction);
      if (refineHistory.length > 4) refineHistory.pop();
      const el = document.getElementById('refine-history');
      if (!el) return;
      el.innerHTML = refineHistory.map(h =>
        `<div class="refine-chip" onclick="document.getElementById('refine-input').value=this.textContent;document.getElementById('refine-input').focus();">${esc(h)}</div>`
      ).join('');
    }

    // ===== プレビュー =====
    function renderPreview(slides) {
      const grid = document.getElementById('slides-grid');
      grid.innerHTML = '';
      document.getElementById('slide-count-badge').textContent = `${slides.length}枚`;
      slides.forEach((slide, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'slide-thumb';
        const notesIcon = slide.notes ? `<div class="slide-notes-icon">📝</div>` : '';
        thumb.innerHTML = `<div class="slide-num">${i + 1}</div>${notesIcon}<div class="slide-layout-label">${LAYOUT_NAMES[slide.layout] || slide.layout}</div>${buildSlideHtml(slide)}`;
        thumb.onclick = () => openEditModal(i);
        thumb.title = 'クリックで編集';
        grid.appendChild(thumb);
      });
    }

    function esc(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function buildSlideHtml(slide) {
      switch (slide.layout) {
        case 'cover': return `<div class="slide-inner slide-cover"><div class="s-title">${esc(slide.title)}</div><div class="s-subtitle">${esc(slide.subtitle || '')}</div><div class="s-date">${esc(slide.date || '')}</div></div>`;
        case 'agenda': return `<div class="slide-inner slide-agenda"><div class="s-title">${esc(slide.title || 'Agenda')}</div>${(slide.items || []).map((item, i) => `<div class="s-item">　${i+1}. ${esc(item)}</div>`).join('')}</div>`;
        case 'chapter': return `<div class="slide-inner slide-chapter"><div class="s-num">${esc(slide.number || '')}</div><div class="s-title">${esc(slide.title)}</div></div>`;
        case 'content': case 'content-with-chart': case 'content-with-flow':
          return `<div class="slide-inner slide-white"><div class="s-title">${esc(slide.title)}</div><div class="s-body">${esc(slide.body || '').replace(/\n/g,'<br>')}</div>${slide.chart ? `<div style="font-size:0.5em;background:#f0f2f5;padding:4px 8px;margin-top:4px;color:#8a9bb0;">📊 ${esc(slide.chart.title || '')}</div>` : ''}${slide.flow ? `<div style="font-size:0.5em;background:#f0f2f5;padding:4px 8px;margin-top:4px;color:#8a9bb0;">→ ${(slide.flow.steps||[]).join(' → ')}</div>` : ''}</div>`;
        case 'comparison': const t = slide.table || { headers: [], rows: [] }; return `<div class="slide-inner slide-white"><div class="s-title">${esc(slide.title)}</div><table class="slide-table" style="width:100%;border-collapse:collapse;margin-top:8px;"><tr>${(t.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('')}</tr>${(t.rows||[]).map(row=>`<tr>${row.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</table></div>`;
        case 'closing': return `<div class="slide-inner slide-closing"><div class="s-msg">${esc(slide.message || 'Thank you')}</div></div>`;
        default: return `<div class="slide-inner slide-white"><div class="s-title">${esc(slide.title||'')}</div></div>`;
      }
    }

    // ===== ユーティリティ =====
    function showLoading(step, progress) {
      document.getElementById('loading-area').classList.remove('hidden');

      document.getElementById('progress-fill').style.width = progress + '%';

    function showError(msg) { document.getElementById('error-text').textContent = msg; document.getElementById('error-area').classList.remove('hidden'); }
    function hideError() { document.getElementById('error-area').classList.add('hidden'); }
    function showToast(msg, duration = 2800) {
      const toast = document.getElementById('toast');

      toast.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => toast.classList.remove('show'), duration);

    // ===== テンプレートキャッシュ =====
    const templateCache = {};
    async function preloadTemplate(templateId) {
      if (templateCache[templateId]) return;
      try { const res = await fetch(`templates/${templateId}.pptx`); if (res.ok) templateCache[templateId] = await res.arrayBuffer(); } catch {}
    }

    // ===== PPTX生成 =====
    async function downloadPptx() {
      if (!currentSlides) return;
      const btn = document.getElementById('btn-download');
      btn.disabled = true; btn.textContent = '⏳ PPTXを生成中…';
      try {
        const pptx = await buildPptx(currentSlides, selectedTemplate);
        const blob = await pptx.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${(currentSlides[0]?.title || 'slide').replace(/[/\\:*?"<>|]/g, '_').slice(0, 40)}_${selectedTemplate}.pptx`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('⬇ PPTXをダウンロードしました');
      } catch (err) { showError('PPTXの生成に失敗しました: ' + err.message); }
      finally { btn.disabled = false; btn.textContent = '⬇ PPTXをダウンロード'; }

    // ===== スライド複製 =====
    function duplicateOutlineSlide(idx) {
      const clone = JSON.parse(JSON.stringify(outlineData[idx]));
      clone.title = (clone.title || '') + '（コピー）';
      outlineData.splice(idx + 1, 0, clone);
      renderOutline();
    }

    // ===== プレゼンテーションモード =====
    let presIndex = 0;
    let presTimerInterval = null;
    let presStartTime = null;

    function enterPresMode() {
      if (!currentSlides || currentSlides.length === 0) return;
      presIndex = 0;
      presStartTime = Date.now();
      document.getElementById('pres-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      renderPresSlide();
      presTimerInterval = setInterval(updatePresTimer, 1000);
      document.addEventListener('keydown', presKeyHandler);
    }

    function exitPresMode() {
      document.getElementById('pres-overlay').classList.remove('active');
      document.body.style.overflow = '';
      clearInterval(presTimerInterval);
      document.removeEventListener('keydown', presKeyHandler);
    }

    function presKeyHandler(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); presNext(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); presPrev(); }
      else if (e.key === 'Escape') exitPresMode();
    }

    function presNext() { if (presIndex < currentSlides.length - 1) { presIndex++; renderPresSlide(); } }
    function presPrev() { if (presIndex > 0) { presIndex--; renderPresSlide(); } }

    function renderPresSlide() {
      const slide = currentSlides[presIndex];
      document.getElementById('pres-slide').innerHTML = buildSlideHtml(slide);
      document.getElementById('pres-counter').textContent = `${presIndex + 1} / ${currentSlides.length}`;
      document.getElementById('pres-notes').textContent = slide.notes || '';
      document.getElementById('pres-notes').style.display = slide.notes ? 'block' : 'none';
    }

    function updatePresTimer() {
      const elapsed = Math.floor((Date.now() - presStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('pres-timer').textContent = `${m}:${s}`;
    }

    // ===== リセット =====
    function resetAll() {
      if (!confirm('すべてリセットしますか？')) return;
      chatHistory = []; collectedContext = null; importedContent = '';
      currentSlides = null; outlineData = null; refineCount = 0;
      selectTplByVal('external-white');
      document.getElementById('slides-grid').innerHTML = '';
      document.getElementById('refine-history').innerHTML = '';
      document.getElementById('url-input').value = '';
      hideError();
      setPhase('chat');
      initChat();
    }

    // レイアウト → テンプレートスライド番号マッピング
    const LAYOUT_TO_TEMPLATE_SLIDE = {
      'cover': 1, 'agenda': 5, 'chapter': 3,
      'content': 7, 'content-with-chart': 7, 'content-with-flow': 7,
      'comparison': 12, 'closing': 15,
    };

    function escXml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
    }

    function buildPara(text) {
      return `<a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(text)}</a:t></a:r></a:p>`;
    }

    // 単純テキスト置換（単一<a:t>タグ内）
    function replaceText(xml, oldText, newText) {
      return xml.split(`<a:t>${oldText}</a:t>`).join(`<a:t>${escXml(newText)}</a:t>`);
    }

    // indexOf ベースで <p:sp> を特定し txBody の段落のみを置換（bodyPr/lstStyleは原本を保持）
    function replaceShapeText(xml, phMatcher, lines) {
      const phPos = xml.indexOf(phMatcher);
      if (phPos === -1) return xml;
      const spStart = xml.lastIndexOf('<p:sp>', phPos);
      if (spStart === -1) return xml;
      const spEnd = xml.indexOf('</p:sp>', phPos) + 7;
      if (spEnd < 7) return xml;
      const spXml = xml.slice(spStart, spEnd);
      // PPTX の shape 内 txBody は p:txBody（PresentationML名前空間）
      const txStart = spXml.indexOf('<p:txBody>');
      const txEnd = spXml.indexOf('</p:txBody>') + 11;
      if (txStart === -1 || txEnd < 11) return xml;

      // txBody 内の bodyPr / lstStyle を保持（属性・子要素ごと残す）
      const txXml = spXml.slice(txStart, txEnd);
      const bodyPrM = txXml.match(/<a:bodyPr[\s\S]*?(?:\/>|<\/a:bodyPr>)/);
      const lstStyleM = txXml.match(/<a:lstStyle[\s\S]*?(?:\/>|<\/a:lstStyle>)/);
      const bodyPr = bodyPrM ? bodyPrM[0] : '<a:bodyPr/>';
      const lstStyle = lstStyleM ? lstStyleM[0] : '<a:lstStyle/>';

      const paras = (lines.filter(Boolean).length ? lines.filter(Boolean) : ['']).map(buildPara).join('');
      const newSp = spXml.slice(0, txStart) + `<p:txBody>${bodyPr}${lstStyle}${paras}</p:txBody>` + spXml.slice(txEnd);
      return xml.slice(0, spStart) + newSp + xml.slice(spEnd);
    }

    // <a:tbl> をデータで完全置換（comparison用）
    function replaceTableData(xml, headers, rows) {
      const tblStart = xml.indexOf('<a:tbl>');
      if (tblStart === -1) return xml;
      const tblEnd = xml.indexOf('</a:tbl>') + 8;
      const tblXml = xml.slice(tblStart, tblEnd);

      // tblPr を保持
      const tblPrM = tblXml.match(/<a:tblPr[^>]*(?:\/>|>[\s\S]*?<\/a:tblPr>)/);
      const tblPr = tblPrM ? tblPrM[0] : '<a:tblPr firstRow="1" bandRow="1"/>';

      // 既存 gridCol の合計幅を取得して均等分割
      let totalW = 0;
      const gridM = tblXml.match(/<a:tblGrid>[\s\S]*?<\/a:tblGrid>/);
      if (gridM) {
        const gwRe = /w="(\d+)"/g;
        let gm;
        while ((gm = gwRe.exec(gridM[0])) !== null) totalW += parseInt(gm[1]);
      }
      if (!totalW) totalW = 8229600;
      const colCount = Math.max(headers.length, ...rows.map(r => r.length), 1);
      const colW = Math.floor(totalW / colCount);
      const tblGrid = `<a:tblGrid>${Array(colCount).fill(`<a:gridCol w="${colW}"/>`).join('')}</a:tblGrid>`;

      // 既存セルから tcPr テンプレートを抽出
      const firstCellM = tblXml.match(/<a:tc\b[\s\S]*?<\/a:tc>/);
      const tcPrM = firstCellM ? firstCellM[0].match(/<a:tcPr[\s\S]*?(?:\/>|<\/a:tcPr>)/) : null;
      const tcPr = tcPrM ? tcPrM[0] : '';

      function makeCell(text, isHeader) {
        const rPr = isHeader
          ? `<a:rPr lang="ja-JP" dirty="0" b="1"/>`
          : `<a:rPr lang="ja-JP" dirty="0"/>`;
        return `<a:tc><a:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r>${rPr}<a:t>${escXml(String(text || ''))}</a:t></a:r></a:p></a:txBody>${tcPr}</a:tc>`;
      }
      function makeRow(cells, isHeader) {
        return `<a:tr h="370840">${cells.map(c => makeCell(c, isHeader)).join('')}</a:tr>`;
      }

      let newRows = '';
      if (headers.length > 0) newRows += makeRow(headers, true);
      rows.forEach(row => { newRows += makeRow(row, false); });

      return xml.slice(0, tblStart) + `<a:tbl>${tblPr}${tblGrid}${newRows}</a:tbl>` + xml.slice(tblEnd);
    }

    // content系スライドにタイトルshapeを追加（slide7にはtitleプレースホルダーがない）
    function addTitleShape(xml, titleText) {
      const sp = `<p:sp><p:nvSpPr><p:cNvPr id="9901" name="SMTitle"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr><p:ph type="title"/></p:nvPr></p:nvSpPr><p:spPr/><p:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(titleText)}</a:t></a:r></a:p></p:txBody></p:sp>`;
      return xml.replace('</p:spTree>', `${sp}</p:spTree>`);
    }

    async function buildPptx(slides, templateId) {
      let buffer = templateCache[templateId];
      if (!buffer) {
        const response = await fetch(`templates/${templateId}.pptx`);
        if (!response.ok) throw new Error(`テンプレートの読み込みに失敗しました (${response.status})`);
        buffer = await response.arrayBuffer();
        templateCache[templateId] = buffer;
      }
      // キャッシュバッファをクローンして渡す（JSZip処理でバッファが破壊されないよう）
      const zip = await JSZip.loadAsync(buffer.slice(0));

      const prsXml = await zip.file('ppt/presentation.xml').async('string');
      const prsRels = await zip.file('ppt/_rels/presentation.xml.rels').async('string');
      const contentTypes = await zip.file('[Content_Types].xml').async('string');

      // 元スライドのXML / relsをキャッシュ（テンプレートのスライド数を動的に取得）
      const slideFiles = Object.keys(zip.files)
        .filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f));
      const maxSlideNum = slideFiles.length > 0
        ? Math.max(...slideFiles.map(f => parseInt(f.match(/slide(\d+)\.xml/)[1])))
        : 16;
      const slideCache = {}, slideRelsCache = {};
      for (let i = 1; i <= maxSlideNum; i++) {
        const sf = zip.file(`ppt/slides/slide${i}.xml`);
        const rf = zip.file(`ppt/slides/_rels/slide${i}.xml.rels`);
        if (sf) slideCache[i] = await sf.async('string');
        if (rf) slideRelsCache[i] = await rf.async('string');
      }

      const newEntries = [];
      let imgCounter = 1;

      for (let i = 0; i < slides.length; i++) {
        const slide = slides[i];
        const srcNum = LAYOUT_TO_TEMPLATE_SLIDE[slide.layout] || 7;
        let xml = slideCache[srcNum] || slideCache[1] || '';
        const EMPTY_RELS = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>';
        let rels = slideRelsCache[srcNum] || slideRelsCache[1] || EMPTY_RELS;

        // コンテンツを適用（xmlとrelsを両方更新）
        const result = await applySlideContent(xml, rels, slide, zip, imgCounter);
        xml = result.xml;
        rels = result.rels;
        if (slide.chart || slide.flow) imgCounter++;

        const newNum = 200 + i;
        const rId = `rId${50 + i}`;
        newEntries.push({ num: newNum, rId, slideId: 500 + i, notes: slide.notes || '' });

        // スピーカーノートがあればスライドrelsにnotesSlide参照を追加
        if (slide.notes) {
          rels = rels.replace('</Relationships>',
            `<Relationship Id="rIdNotes" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/notesSlide" Target="../notesSlides/notesSlide${newNum}.xml"/></Relationships>`);
        }

        zip.file(`ppt/slides/slide${newNum}.xml`, xml);
        zip.file(`ppt/slides/_rels/slide${newNum}.xml.rels`, rels);
      }

      // presentation.xml のスライドリストを更新
      const sldIdLst = newEntries.map(e => `<p:sldId id="${e.slideId}" r:id="${e.rId}"/>`).join('');
      zip.file('ppt/presentation.xml',
        prsXml.replace(/<p:sldIdLst>[\s\S]*?<\/p:sldIdLst>/, `<p:sldIdLst>${sldIdLst}</p:sldIdLst>`)
      );

      // _rels/presentation.xml.rels を更新
      const slideRelsXml = newEntries.map(e =>
        `<Relationship Id="${e.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${e.num}.xml"/>`
      ).join('');
      zip.file('ppt/_rels/presentation.xml.rels',
        prsRels
          .replace(/<Relationship[^>]+Type="[^"]*\/relationships\/slide"[^>]*\/>/g, '')
          .replace('</Relationships>', `${slideRelsXml}</Relationships>`)
      );

      // 元のnotesSlides を削除
      Object.keys(zip.files)
        .filter(f => f.startsWith('ppt/notesSlides/'))
        .forEach(f => zip.remove(f));

      // 新しいnotesSlides を生成
      let ctNotes = '';
      for (const e of newEntries) {
        if (!e.notes) continue;
        const notesParagraphs = e.notes.split('\n').filter(Boolean).map(line =>
          `<a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(line)}</a:t></a:r></a:p>`
        ).join('');

        const notesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<p:notes xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main">
<p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>
<p:sp><p:nvSpPr><p:cNvPr id="2" name="Slide Image"/><p:cNvSpPr><a:spLocks noGrp="1" noRot="1" noChangeAspect="1"/></p:cNvSpPr><p:nvPr><p:ph type="sldImg"/></p:nvPr></p:nvSpPr><p:spPr/></p:sp>
<p:sp><p:nvSpPr><p:cNvPr id="3" name="Notes"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr><p:ph type="body" idx="1"/></p:nvPr></p:nvSpPr><p:spPr/><p:txBody><a:bodyPr/><a:lstStyle/>${notesParagraphs}</p:txBody></p:sp>
</p:spTree></p:cSld></p:notes>`;

        const notesRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/notesMaster" Target="../notesMasters/notesMaster1.xml"/>
<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="../slides/slide${e.num}.xml"/>
</Relationships>`;

        zip.file(`ppt/notesSlides/notesSlide${e.num}.xml`, notesXml);
        zip.file(`ppt/notesSlides/_rels/notesSlide${e.num}.xml.rels`, notesRels);
        ctNotes += `<Override PartName="/ppt/notesSlides/notesSlide${e.num}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.notesSlide+xml"/>`;
      }

      // [Content_Types].xml を更新
      const ctSlides = newEntries.map(e =>
        `<Override PartName="/ppt/slides/slide${e.num}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`
      ).join('');
      zip.file('[Content_Types].xml',
        contentTypes
          .replace(/<Override PartName="\/ppt\/slides\/slide\d+\.xml"[^>]*\/>/g, '')
          .replace(/<Override PartName="\/ppt\/notesSlides\/[^"]*"[^>]*\/>/g, '')
          .replace('</Types>', `${ctSlides}${ctNotes}</Types>`)
      );

      // 元のスライドファイルを削除
      for (let i = 1; i <= maxSlideNum; i++) {
        zip.remove(`ppt/slides/slide${i}.xml`);
        zip.remove(`ppt/slides/_rels/slide${i}.xml.rels`);
      }

      return zip;
    }

    // 各スライドのコンテンツを適用して { xml, rels } を返す
    async function applySlideContent(xml, rels, slide, zip, imgIdx) {
      switch (slide.layout) {

        case 'cover':
          xml = replaceText(xml, 'Presentation Title', slide.title || '');
          xml = replaceText(xml, 'Presentation Subtitle', slide.subtitle || '');
          xml = replaceText(xml, 'Month YYYY', slide.date || new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' }));
          return { xml, rels };

        case 'agenda': {
          const items = slide.items || [];
          for (let j = 1; j <= 6; j++) {
            xml = replaceText(xml, `Chapter Title 0${j}`, items[j - 1] || '');
          }
          return { xml, rels };
        }

        case 'chapter':
          xml = replaceText(xml, 'Chapter Title', slide.title || '');
          xml = replaceText(xml, '1.0', slide.number || '');
          return { xml, rels };

        case 'content': {
          // idx=29: 見出し（One Paragraph）→ slide.title
          // idx=30: サブタイトル（Lorem ipsum分割ラン）→ クリア
          // idx=32: 本文ボディ（Lorem ipsum分割ラン）→ slide.body
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', []);
          const lines = (slide.body || '').split('\n').filter(Boolean);
          xml = replaceShapeText(xml, 'idx="32"', lines.length ? lines : [slide.body || '']);
          return { xml, rels };
        }

        case 'content-with-chart': {
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', [slide.body || '']);
          xml = replaceShapeText(xml, 'idx="32"', []);
          if (slide.chart) {
            const png = await generateChartPng(slide.chart);
            const imgName = `sm_img${imgIdx}.png`;
            zip.file(`ppt/media/${imgName}`, png, { base64: true });
            const rId = `rIdImg${imgIdx}`;
            rels = rels.replace('</Relationships>',
              `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${imgName}"/></Relationships>`);
            xml = insertPicture(xml, rId, imgIdx);
          }
          return { xml, rels };
        }

        case 'content-with-flow': {
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', [slide.body || '']);
          xml = replaceShapeText(xml, 'idx="32"', []);
          if (slide.flow) {
            const png = await generateFlowPng(slide.flow.steps || []);
            const imgName = `sm_flow${imgIdx}.png`;
            zip.file(`ppt/media/${imgName}`, png, { base64: true });
            const rId = `rIdImg${imgIdx}`;
            rels = rels.replace('</Relationships>',
              `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${imgName}"/></Relationships>`);
            xml = insertPicture(xml, rId, imgIdx);
          }
          return { xml, rels };
        }

        case 'comparison': {
          // slide12: idx=30がテーブルタイトル、<a:tbl>をreplaceTableDataで完全置換
          xml = replaceShapeText(xml, 'idx="30"', [slide.title || '']);
          if (slide.table) {
            xml = replaceTableData(xml, slide.table.headers || [], slide.table.rows || []);
          }
          return { xml, rels };
        }

        case 'closing':
          xml = replaceText(xml, 'John SMITH', slide.message || 'Thank you');
          // テンプレートの正確な文字列に合わせる（末尾スペースなし、タブ文字あり）
          ['Function title',
           'M:\t+33 6 00 01 02 03',
           'E:\tjohn.smith@akkodis.com',
           'Paul JOHNSON',
           'Function Title',
           'M:\t+33 6 02 03 04 05',
           'E:\tpaul.jonhson@akkodis.com']
            .forEach(t => { xml = replaceText(xml, t, ''); });
          return { xml, rels };

        default:
          return { xml, rels };
      }
    }

    function insertPicture(xml, rId, idx) {
      // スライドサイズ: 9144000 x 6858000 EMU (10" x 7.5")
      // 下半分にチャートを配置: x=457200(0.5"), y=2400300(2.6"), w=8229600(9"), h=3886200(4.25")
      const pic = `<p:pic><p:nvPicPr><p:cNvPr id="${200 + idx}" name="img${idx}"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="457200" y="2400300"/><a:ext cx="8229600" cy="3886200"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic>`;
      return xml.replace('</p:spTree>', `${pic}</p:spTree>`);
    }

    async function generateChartPng(chartData) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('chart-canvas');
        canvas.style.display = 'block';
        canvas.width = 800;
        canvas.height = 500;
        const ctx = canvas.getContext('2d');

        // 既存チャートを破棄
        if (window._chartInstance) { window._chartInstance.destroy(); }

        const colors = ['#001f33', '#ffb81c', '#00ffff', '#8a9bb0', '#4a5568', '#e67e22'];

        const config = {
          type: chartData.type || 'bar',
          data: {
            labels: chartData.labels || [],
            datasets: [{
              label: chartData.title || '',
              data: chartData.data || [],
              backgroundColor: chartData.type === 'pie' || chartData.type === 'doughnut'
                ? colors.slice(0, (chartData.data || []).length)
                : '#001f33',
              borderColor: chartData.type === 'line' ? '#ffb81c' : 'transparent',
              borderWidth: chartData.type === 'line' ? 2 : 0,
              fill: false,
            }],
          },
          options: {
            animation: false,
            responsive: false,
            plugins: {
              legend: { display: chartData.type === 'pie' || chartData.type === 'doughnut' },
              title: {
                display: !!chartData.title,
                text: chartData.title || '',
                font: { size: 18, family: 'Meiryo UI, sans-serif', weight: 'bold' },
                color: '#001f33',
              },
            },
            scales: (chartData.type !== 'pie' && chartData.type !== 'doughnut') ? {
              y: {
                beginAtZero: true,
                ticks: { font: { family: 'Meiryo UI, sans-serif' } },
              },
              x: {
                ticks: { font: { family: 'Meiryo UI, sans-serif' } },
              },
            } : {},
          },
        };

        window._chartInstance = new Chart(ctx, config);

        setTimeout(() => {
          const dataUrl = canvas.toDataURL('image/png');
          canvas.style.display = 'none';
          if (window._chartInstance) { window._chartInstance.destroy(); window._chartInstance = null; }
          resolve(dataUrl.split(',')[1]);
        }, 200);
      });
    }

    async function generateFlowPng(steps) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('chart-canvas');
        canvas.style.display = 'block';
        canvas.width = 960;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 960, 400);

        // 背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 960, 400);

        const n = steps.length;
        const boxW = 140, boxH = 60, arrowW = 30;
        const totalW = n * boxW + (n - 1) * arrowW;
        const startX = (960 - totalW) / 2;
        const y = 170;

        steps.forEach((step, i) => {
          const x = startX + i * (boxW + arrowW);

          // ボックス
          ctx.fillStyle = '#001f33';
          ctx.fillRect(x, y, boxW, boxH);

          // テキスト
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 14px Meiryo UI, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          // テキスト折り返し（簡易）
          const words = step;
          ctx.fillText(words, x + boxW / 2, y + boxH / 2, boxW - 10);

          // ステップ番号
          ctx.fillStyle = '#ffb81c';
          ctx.font = 'bold 11px sans-serif';
          ctx.fillText(`${i + 1}`, x + boxW / 2, y - 20);

          // 矢印
          if (i < n - 1) {
            const arrowX = x + boxW;
            ctx.fillStyle = '#ffb81c';
            ctx.beginPath();
            ctx.moveTo(arrowX + 5, y + boxH / 2);
            ctx.lineTo(arrowX + arrowW - 5, y + boxH / 2 - 10);
            ctx.lineTo(arrowX + arrowW - 5, y + boxH / 2 + 10);
            ctx.closePath();
            ctx.fill();
          }
        });

        const dataUrl = canvas.toDataURL('image/png');
        canvas.style.display = 'none';
        resolve(dataUrl.split(',')[1]);
      });
    }
    // ===== 初期化 =====
    (function init() {
      preloadTemplate(selectedTemplate);
      initChat();

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
      });
    })();
  </script>
