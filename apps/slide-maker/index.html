<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Maker | AKKODiS Tools</title>
  <link rel="manifest" href="/manifest.json">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; display: flex; flex-direction: column; }

    /* ナビバー */
    .navbar { background: #001f33; height: 58px; display: flex; align-items: center; padding: 0 40px; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .navbar-back { color: #fff; text-decoration: none; font-size: 0.82rem; opacity: 0.8; border: 1px solid transparent; padding: 6px 12px; transition: border-color 0.2s, opacity 0.2s; }
    .navbar-back:hover { border-color: rgba(255,255,255,0.5); opacity: 1; }
    .navbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
    .navbar-title { color: #fff; font-size: 0.95rem; font-weight: 600; }

    /* コンテナ */
    .container { max-width: 820px; margin: 0 auto; padding: 32px 20px 60px; flex: 1; width: 100%; }
    .page-header { margin-bottom: 20px; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: #001f33; letter-spacing: -0.02em; }
    .page-subtitle { font-size: 0.82rem; color: #8a9bb0; margin-top: 4px; }

    /* メインカード */
    .input-card { background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.09); }
    .main-textarea { width: 100%; min-height: 200px; border: none; padding: 22px 24px; font-size: 0.9rem; font-family: inherit; color: #2d3436; background: transparent; resize: vertical; outline: none; line-height: 1.75; display: block; }
    .main-textarea::placeholder { color: #b0bec5; }
    .card-divider { height: 1px; background: #e8ecf0; margin: 0 20px; }
    .card-footer { padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* テンプレートチップ */
    .tpl-label { font-size: 0.72rem; font-weight: 600; color: #8a9bb0; white-space: nowrap; }
    .tpl-chips { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
    .tpl-chip { border: 1.5px solid #e0e4e8; background: #fff; color: #4a5568; padding: 5px 11px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
    .tpl-chip:hover { border-color: #001f33; color: #001f33; }
    .tpl-chip.selected { border-color: #ffb81c; background: #fffbf0; color: #001f33; }
    .tpl-chip.dark { background: #001f33; color: rgba(255,255,255,0.7); border-color: #334d66; }
    .tpl-chip.dark:hover { border-color: #ffb81c; color: #fff; }
    .tpl-chip.dark.selected { border-color: #ffb81c; background: #0a2540; color: #ffb81c; }

    /* カードアクション */
    .card-actions { display: flex; gap: 6px; align-items: center; margin-left: auto; }
    .btn-advanced { background: none; border: 1.5px solid #e0e4e8; color: #4a5568; padding: 7px 13px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
    .btn-advanced:hover { border-color: #001f33; color: #001f33; }
    .btn-advanced.open { border-color: #001f33; color: #001f33; background: #f5f7fa; }
    .btn-generate { background: #ffb81c; color: #001f33; border: none; padding: 9px 22px; font-size: 0.88rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; font-family: inherit; }
    .btn-generate:hover:not(:disabled) { opacity: 0.88; }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-reset-icon { background: none; border: 1.5px solid #e0e4e8; color: #b0bec5; padding: 7px 10px; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn-reset-icon:hover { border-color: #8a9bb0; color: #4a5568; }

    /* 詳細設定パネル */
    .advanced-panel { display: none; background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-top: 3px; padding: 20px 24px 16px; }
    .advanced-panel.open { display: block; }
    .adv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.75rem; font-weight: 600; color: #4a5568; }
    input[type="text"], select, textarea { border: 1.5px solid #e8ecf0; padding: 8px 12px; font-size: 0.85rem; font-family: inherit; color: #2d3436; background: #fff; width: 100%; transition: border-color 0.2s; outline: none; }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: #ffb81c; box-shadow: 0 0 0 3px rgba(255,184,28,0.12); }
    textarea { resize: vertical; min-height: 68px; }
    .msg-rows { display: flex; flex-direction: column; gap: 7px; }
    .msg-row { display: flex; gap: 8px; align-items: center; }
    .msg-row span { font-size: 0.75rem; font-weight: 700; color: #8a9bb0; width: 20px; flex-shrink: 0; }
    .msg-row input { flex: 1; }

    /* オプションチップ行 */
    .adv-chips-row { display: flex; gap: 20px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid #f0f2f5; }
    .chip-group { display: flex; align-items: center; gap: 6px; }
    .chip-label { font-size: 0.72rem; font-weight: 600; color: #8a9bb0; white-space: nowrap; }
    .opt-chip { border: 1.5px solid #e0e4e8; background: #fff; color: #4a5568; padding: 4px 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .opt-chip:hover { border-color: #001f33; color: #001f33; }
    .opt-chip.selected { border-color: #001f33; background: #001f33; color: #fff; }

    /* 文字数カウンター */
    .char-counter { font-size: 0.72rem; color: #b0bec5; text-align: right; margin-top: 2px; }
    .char-counter.warn { color: #e67e22; }
    .char-counter.over { color: #c0392b; font-weight: 700; }

    /* ローディング */
    .loading-area { display: none; margin-top: 24px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 28px; text-align: center; }
    .loading-area.active { display: block; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid #e8ecf0; border-top-color: #ffb81c; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-step { font-size: 0.85rem; color: #4a5568; font-weight: 600; }
    .progress-bar { width: 100%; height: 4px; background: #e8ecf0; margin-top: 12px; }
    .progress-fill { height: 100%; background: #ffb81c; transition: width 0.4s ease; }

    /* エラー */
    .error-msg { display: none; margin-top: 16px; padding: 12px 16px; background: #ffeaea; border-left: 3px solid #c0392b; font-size: 0.82rem; color: #c0392b; }
    .error-msg.active { display: flex; align-items: center; gap: 10px; }
    .btn-retry { background: #c0392b; color: #fff; border: none; padding: 6px 14px; font-size: 0.78rem; font-weight: 600; cursor: pointer; flex-shrink: 0; font-family: inherit; }

    /* プレビュー */
    .preview-section { display: none; margin-top: 28px; }
    .preview-section.active { display: block; }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #001f33; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .slide-count-badge { font-size: 0.72rem; font-weight: 700; background: #001f33; color: #ffb81c; padding: 2px 8px; }
    .slides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .slide-thumb { aspect-ratio: 16/9; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; overflow: hidden; }
    .slide-thumb:hover { border-color: #ffb81c; }
    .slide-num { position: absolute; top: 6px; left: 6px; background: rgba(0,31,51,0.7); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 6px; z-index: 2; }

    /* スライドプレビュー HTML */
    .slide-inner { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 8%; font-family: 'Meiryo UI', 'Segoe UI', sans-serif; }
    .slide-cover { background: #001f33; color: #fff; }
    .slide-cover .s-title { font-size: 1.5em; font-weight: 700; color: #ffb81c; line-height: 1.2; }
    .slide-cover .s-subtitle { font-size: 0.65em; color: rgba(255,255,255,0.8); margin-top: 0.5em; }
    .slide-cover .s-date { font-size: 0.55em; color: rgba(255,255,255,0.5); margin-top: auto; }
    .slide-white { background: #fff; }
    .slide-white .s-title { font-size: 0.9em; font-weight: 700; color: #001f33; border-bottom: 2px solid #ffb81c; padding-bottom: 4px; margin-bottom: 10px; }
    .slide-white .s-body { font-size: 0.6em; color: #2d3436; line-height: 1.6; flex: 1; }
    .slide-chapter { background: #ffb81c; color: #001f33; justify-content: center; }
    .slide-chapter .s-title { font-size: 1.1em; font-weight: 700; text-align: center; }
    .slide-chapter .s-num { font-size: 0.6em; text-align: center; margin-bottom: 8px; opacity: 0.7; }
    .slide-agenda { background: #001f33; color: #fff; }
    .slide-agenda .s-title { font-size: 0.9em; font-weight: 700; color: #ffb81c; margin-bottom: 10px; }
    .slide-agenda .s-item { font-size: 0.6em; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .slide-closing { background: #001f33; color: #fff; justify-content: center; align-items: center; text-align: center; }
    .slide-closing .s-msg { font-size: 1em; font-weight: 700; color: #ffb81c; }
    .slide-table th, .slide-table td { font-size: 0.5em; padding: 3px 6px; border: 1px solid #e8ecf0; }
    .slide-table th { background: #001f33; color: #fff; font-weight: 600; }

    /* リファイン */
    .refine-section { display: none; margin-top: 20px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 20px 24px; }
    .refine-section.active { display: block; }
    .refine-title { font-size: 0.85rem; font-weight: 700; color: #001f33; margin-bottom: 12px; }
    .refine-input-row { display: flex; gap: 10px; }
    .refine-input-row input { flex: 1; border: 1.5px solid #e8ecf0; padding: 8px 12px; font-size: 0.85rem; font-family: inherit; color: #2d3436; background: #fff; outline: none; transition: border-color 0.2s; }
    .refine-input-row input:focus { border-color: #ffb81c; box-shadow: 0 0 0 3px rgba(255,184,28,0.12); }
    .refine-count { font-size: 0.75rem; color: #8a9bb0; margin-top: 8px; }
    .btn-secondary { background: #001f33; color: #fff; border: none; padding: 10px 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-family: inherit; }
    .btn-secondary:hover:not(:disabled) { opacity: 0.8; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ダウンロード */
    .download-area { display: none; margin-top: 16px; }
    .download-area.active { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn-download { background: #001f33; color: #fff; border: none; padding: 13px 28px; font-size: 0.88rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; font-family: inherit; }
    .btn-download:hover:not(:disabled) { opacity: 0.8; }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
    .download-note { font-size: 0.75rem; color: #8a9bb0; }

    /* リファイン履歴 */
    .refine-history { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .refine-chip { font-size: 0.72rem; color: #4a5568; padding: 3px 10px; cursor: pointer; border: 1px solid #e0e4e8; background: #f7f8fa; transition: background 0.15s; font-family: inherit; }
    .refine-chip:hover { background: #e8ecf0; }

    /* スライドサムネイルラベル */
    .slide-layout-label { position: absolute; bottom: 5px; right: 5px; font-size: 0.58rem; font-weight: 700; background: rgba(0,31,51,0.62); color: rgba(255,255,255,0.9); padding: 1px 5px; z-index: 2; pointer-events: none; }

    /* トースト */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #27ae60; color: #fff; padding: 11px 20px; font-size: 0.85rem; font-weight: 600; z-index: 2000; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* モーダル */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.52); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: #fff; max-width: 560px; width: 100%; max-height: 82vh; overflow-y: auto; padding: 28px; position: relative; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .modal-slide-num { font-size: 1rem; font-weight: 700; color: #001f33; }
    .modal-close { background: none; border: none; font-size: 1.4rem; color: #b0bec5; cursor: pointer; padding: 0; line-height: 1; transition: color 0.2s; }
    .modal-close:hover { color: #001f33; }
    .modal-layout-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; background: #001f33; color: #ffb81c; padding: 2px 8px; margin-bottom: 16px; }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 0.7rem; font-weight: 700; color: #8a9bb0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .modal-value { font-size: 0.85rem; color: #2d3436; line-height: 1.65; white-space: pre-wrap; }
    .modal-divider { border: none; border-top: 1px solid #e8ecf0; margin: 4px 0 14px; }

    /* チャート用hidden canvas */
    #chart-canvas { display: none; position: absolute; top: -9999px; }

    /* フッター */
    footer { background: #001f33; border-top: 1px solid rgba(255,255,255,0.08); padding: 16px 40px; margin-top: auto; }
    footer p { font-size: 0.72rem; color: rgba(255,255,255,0.6); }
    footer strong { color: #ffb81c; }

    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
      .container { padding: 20px 16px 40px; }
      .card-footer { flex-direction: column; align-items: flex-start; gap: 10px; }
      .card-actions { margin-left: 0; width: 100%; }
      .btn-generate { flex: 1; justify-content: center; }
      .adv-grid { grid-template-columns: 1fr; }
      .adv-chips-row { flex-direction: column; gap: 10px; }
      .refine-input-row { flex-direction: column; }
      .download-area { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-back">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Slide Maker</span>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Slide Maker</h1>
      <p class="page-subtitle">AKKODiSブランド準拠のPPTXを自動生成します</p>
    </div>

    <!-- メイン入力カード -->
    <div class="input-card">
      <textarea class="main-textarea" id="free-text"
        placeholder="伝えたいことを自由に書いてください。

例：2026年度の採用戦略について経営陣に提案したい。応募数は増えているが内定承諾率が30%→15%に低下しており、選考期間短縮と候補者体験改善が急務。
・選考を4週間→2週間に短縮　・内定後のフォロー強化
数値データ：応募240件、承諾15%、採用単価120万円
8枚程度でフォーマルなトーン、日本語で。"></textarea>
      <div class="card-divider"></div>
      <div class="card-footer">
        <span class="tpl-label">テンプレート</span>
        <div class="tpl-chips">
          <button class="tpl-chip selected" data-val="external-white" onclick="selectTpl(this)">社外 WHITE</button>
          <button class="tpl-chip dark" data-val="external-dark" onclick="selectTpl(this)">社外 DARK</button>
          <button class="tpl-chip" data-val="internal-white" onclick="selectTpl(this)">社内 WHITE</button>
          <button class="tpl-chip dark" data-val="internal-dark" onclick="selectTpl(this)">社内 DARK</button>
        </div>
        <div class="card-actions">
          <button class="btn-advanced" id="btn-advanced" onclick="toggleAdvanced()">詳細設定 ▼</button>
          <button class="btn-reset-icon" onclick="resetAll()" title="リセット">↺</button>
          <button class="btn-generate" id="btn-generate" onclick="startGenerate()">✨ 生成する</button>
        </div>
      </div>
    </div>

    <!-- 詳細設定パネル -->
    <div class="advanced-panel" id="advanced-panel">
      <div class="adv-grid">
        <div class="form-group">
          <label for="title">タイトル</label>
          <input type="text" id="title" placeholder="2026年度 採用戦略の提案" maxlength="40" oninput="updateTitleCounter()">
          <div class="char-counter" id="title-counter">0 / 30文字</div>
        </div>
        <div class="form-group">
          <label for="audience">受け手・対象者</label>
          <input type="text" id="audience" placeholder="HR部門マネージャー、経営陣">
        </div>
        <div class="form-group full">
          <label for="background">背景・課題</label>
          <textarea id="background" placeholder="採用コスト増加と内定承諾率の低下が続いており、採用プロセスの見直しが急務となっている。"></textarea>
        </div>
        <div class="form-group full">
          <label>伝えたいメッセージ（最大3つ）</label>
          <div class="msg-rows">
            <div class="msg-row"><span>①</span><input type="text" class="msg-input" placeholder="採用プロセスを4週間から2週間に短縮する"></div>
            <div class="msg-row"><span>②</span><input type="text" class="msg-input" placeholder="内定承諾率を15%改善する施策を導入"></div>
            <div class="msg-row"><span>③</span><input type="text" class="msg-input" placeholder="（任意）"></div>
          </div>
        </div>
        <div class="form-group full">
          <label for="supplement">補足データ・根拠 <span style="font-weight:400;color:#b0bec5;">（任意）</span></label>
          <textarea id="supplement" placeholder="2024年応募数180件→2025年240件（33%増）、内定承諾率30%→15%に低下。競合他社の平均選考期間は2週間。"></textarea>
        </div>
      </div>
      <div class="adv-chips-row">
        <div class="chip-group">
          <span class="chip-label">枚数</span>
          <button class="opt-chip" data-group="count" data-val="6" onclick="selectChip(this)">6枚</button>
          <button class="opt-chip selected" data-group="count" data-val="8" onclick="selectChip(this)">8枚</button>
          <button class="opt-chip" data-group="count" data-val="10" onclick="selectChip(this)">10枚</button>
          <button class="opt-chip" data-group="count" data-val="12" onclick="selectChip(this)">12枚</button>
        </div>
        <div class="chip-group">
          <span class="chip-label">トーン</span>
          <button class="opt-chip selected" data-group="tone" data-val="フォーマル" onclick="selectChip(this)">フォーマル</button>
          <button class="opt-chip" data-group="tone" data-val="カジュアル" onclick="selectChip(this)">カジュアル</button>
        </div>
        <div class="chip-group">
          <span class="chip-label">言語</span>
          <button class="opt-chip selected" data-group="language" data-val="日本語" onclick="selectChip(this)">日本語</button>
          <button class="opt-chip" data-group="language" data-val="英語" onclick="selectChip(this)">English</button>
        </div>
      </div>
    </div>

    <!-- ローディング -->
    <div class="loading-area" id="loading-area">
      <div class="loading-spinner"></div>
      <div class="loading-step" id="loading-step">スライド構成を生成中…</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
    </div>

    <!-- エラー -->
    <div class="error-msg" id="error-msg">
      <span id="error-text"></span>
      <button class="btn-retry" id="btn-retry" onclick="retryGenerate()">再試行</button>
    </div>

    <!-- プレビュー -->
    <div class="preview-section" id="preview-section">
      <div class="section-title">
        プレビュー
        <span class="slide-count-badge" id="slide-count-badge">0枚</span>
      </div>
      <div class="slides-grid" id="slides-grid"></div>
    </div>

    <!-- リファイン -->
    <div class="refine-section" id="refine-section">
      <div class="refine-title">🔄 スライドを修正する</div>
      <div class="refine-input-row">
        <input type="text" id="refine-input" placeholder="例：3枚目をシンプルにして　／　比較表のスライドを追加して" onkeydown="if(event.key==='Enter')refine()">
        <button class="btn-secondary" id="btn-refine" onclick="refine()">修正する</button>
      </div>
      <div class="refine-count" id="refine-count">残り5回</div>
      <div class="refine-history" id="refine-history"></div>
    </div>

    <!-- ダウンロード -->
    <div class="download-area" id="download-area">
      <button class="btn-download" id="btn-download" onclick="downloadPptx()">
        ⬇ PPTXをダウンロード
      </button>
      <span class="download-note">PowerPoint / Keynote で開けます</span>
    </div>
  </div>

  <!-- スライド詳細モーダル -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-slide-num" id="modal-slide-num">スライド 1</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-layout-badge" id="modal-layout-badge">cover</div>
      <hr class="modal-divider">
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <footer>
    <p>⚠️ <strong>機密情報・個人情報の入力は禁止</strong>です。社外秘情報はVercel環境変数で管理してください。</p>
  </footer>

  <canvas id="chart-canvas" width="800" height="450"></canvas>

  <script>
    // 認証チェック
    if (localStorage.getItem('auth') !== '1') { location.href = '/'; }

    const USER = localStorage.getItem('user') || '';
    let selectedTemplate = 'external-white';
    let currentSlides = null;
    let refineCount = 0;
    const MAX_REFINE = 5;
    let advancedOpen = false;

    function selectTpl(el) {
      document.querySelectorAll('.tpl-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedTemplate = el.dataset.val;
      preloadTemplate(selectedTemplate);
      if (currentSlides) renderPreview(currentSlides);
      saveForm();
    }

    function selectTplByVal(val) {
      const chip = document.querySelector(`.tpl-chip[data-val="${val}"]`);
      if (chip) selectTpl(chip);
    }

    function toggleAdvanced() {
      advancedOpen = !advancedOpen;
      document.getElementById('advanced-panel').classList.toggle('open', advancedOpen);
      document.getElementById('btn-advanced').classList.toggle('open', advancedOpen);
      document.getElementById('btn-advanced').textContent = advancedOpen ? '詳細設定 ▲' : '詳細設定 ▼';
    }

    function selectChip(el) {
      const group = el.dataset.group;
      document.querySelectorAll(`.opt-chip[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      saveForm();
    }

    function getChipVal(group, defaultVal) {
      const sel = document.querySelector(`.opt-chip[data-group="${group}"].selected`);
      return sel ? sel.dataset.val : defaultVal;
    }

    function getWizardData() {
      return {
        template: selectedTemplate,
        purpose: '提案',
        slideCount: getChipVal('count', '8'),
        title: document.getElementById('title').value.trim(),
        audience: document.getElementById('audience').value.trim(),
        background: document.getElementById('background').value.trim(),
        messages: [...document.querySelectorAll('.msg-input')].map(i => i.value.trim()).filter(Boolean),
        supplement: document.getElementById('supplement').value.trim(),
        tone: getChipVal('tone', 'フォーマル'),
        language: getChipVal('language', '日本語'),
      };
    }

    function validate(data) {
      const txt = document.getElementById('free-text').value.trim();
      const hasWizard = data.title || data.background || data.messages.length > 0;
      if (!txt && !hasWizard) {
        showError('内容を入力してください（テキストエリア、または詳細設定）。');
        return false;
      }
      return true;
    }

    function setLoading(active, step = '', progress = 10) {
      document.getElementById('loading-area').classList.toggle('active', active);
      document.getElementById('btn-generate').disabled = active;
      if (active) {
        document.getElementById('loading-step').textContent = step;
        document.getElementById('progress-fill').style.width = progress + '%';
      }
    }

    function setProgress(step, progress) {
      document.getElementById('loading-step').textContent = step;
      document.getElementById('progress-fill').style.width = progress + '%';
    }

    function showError(msg, retryFn = null) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('active');
      document.getElementById('btn-retry').style.display = retryFn ? 'inline-block' : 'none';
      if (retryFn) window._retryFn = retryFn;
    }

    function hideError() { document.getElementById('error-msg').classList.remove('active'); }

    function retryGenerate() { if (window._retryFn) window._retryFn(); }

    async function startGenerate() {
      hideError();
      const data = getWizardData();
      if (!validate(data)) return;
      await runGenerate(data);
    }

    async function runGenerate(data) {
      setLoading(true, '🔄 スライド構成を生成中…', 10);

      try {
        const freeText = document.getElementById('free-text').value.trim();
        const body = freeText
          ? { mode: 'free', freeText, template: selectedTemplate, _user: USER }
          : { mode: 'generate', wizard: data, _user: USER };

        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        setProgress('🎨 プレビューを生成中…', 50);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (res.status === 429) throw new Error('しばらく時間をおいて再試行してください。');
          throw new Error(err.error || `APIエラー (${res.status})`);
        }

        const json = await res.json();
        if (json.error) throw new Error(json.error);

        currentSlides = json.slides;
        refineCount = 0;

        setProgress('📦 プレビューを組み立て中…', 80);
        renderPreview(currentSlides);

        setLoading(false);
        document.getElementById('preview-section').classList.add('active');
        document.getElementById('refine-section').classList.add('active');
        document.getElementById('download-area').classList.add('active');
        updateRefineCount();
        document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        setLoading(false);
        showError(err.message || 'スライドの生成に失敗しました。', () => runGenerate(data));
      }
    }

    async function refine() {
      const instruction = document.getElementById('refine-input').value.trim();
      if (!instruction) return;
      if (refineCount >= MAX_REFINE) { showError('リファイン上限（5回）に達しました。'); return; }
      if (!currentSlides) return;

      hideError();
      document.getElementById('btn-refine').disabled = true;
      document.getElementById('refine-input').disabled = true;

      try {
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'refine', currentSlides, instruction, _user: USER }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `エラー (${res.status})`);
        }

        const json = await res.json();
        if (json.error) throw new Error(json.error);

        currentSlides = json.slides;
        refineCount++;
        addRefineHistory(instruction);
        renderPreview(currentSlides);
        document.getElementById('refine-input').value = '';
        updateRefineCount();
        showToast('✅ スライドを修正しました');

      } catch (err) {
        showError(err.message || 'リファインに失敗しました。');
      } finally {
        document.getElementById('btn-refine').disabled = false;
        document.getElementById('refine-input').disabled = false;
      }
    }

    function updateRefineCount() {
      const remaining = MAX_REFINE - refineCount;
      document.getElementById('refine-count').textContent =
        remaining > 0 ? `残り${remaining}回` : 'リファイン上限に達しました';
    }

    // ===== プレビューレンダリング =====
    function renderPreview(slides) {
      const grid = document.getElementById('slides-grid');
      grid.innerHTML = '';
      document.getElementById('slide-count-badge').textContent = `${slides.length}枚`;

      slides.forEach((slide, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'slide-thumb';
        const layoutLabel = LAYOUT_NAMES[slide.layout] || slide.layout;
        thumb.innerHTML = `<div class="slide-num">${i + 1}</div><div class="slide-layout-label">${layoutLabel}</div>${buildSlideHtml(slide)}`;
        thumb.onclick = () => openModal(slide, i + 1);
        thumb.title = 'クリックで詳細を表示';
        grid.appendChild(thumb);
      });
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function buildSlideHtml(slide) {
      const isDark = selectedTemplate.includes('dark');
      switch (slide.layout) {
        case 'cover':
          return `<div class="slide-inner slide-cover">
            <div class="s-title">${esc(slide.title)}</div>
            <div class="s-subtitle">${esc(slide.subtitle || '')}</div>
            <div class="s-date">${esc(slide.date || '')}</div>
          </div>`;
        case 'agenda':
          return `<div class="slide-inner slide-agenda">
            <div class="s-title">${esc(slide.title || 'Agenda')}</div>
            ${(slide.items || []).map((item, i) => `<div class="s-item">　${i+1}. ${esc(item)}</div>`).join('')}
          </div>`;
        case 'chapter':
          return `<div class="slide-inner slide-chapter">
            <div class="s-num">${esc(slide.number || '')}</div>
            <div class="s-title">${esc(slide.title)}</div>
          </div>`;
        case 'content':
        case 'content-with-chart':
        case 'content-with-flow':
          return `<div class="slide-inner slide-white">
            <div class="s-title">${esc(slide.title)}</div>
            <div class="s-body">${esc(slide.body || '').replace(/\n/g,'<br>')}</div>
            ${slide.chart ? `<div style="font-size:0.5em;background:#f0f2f5;padding:4px 8px;margin-top:4px;color:#8a9bb0;">📊 ${esc(slide.chart.title || 'グラフ')}</div>` : ''}
            ${slide.flow ? `<div style="font-size:0.5em;background:#f0f2f5;padding:4px 8px;margin-top:4px;color:#8a9bb0;">→ ${(slide.flow.steps||[]).join(' → ')}</div>` : ''}
          </div>`;
        case 'comparison':
          const table = slide.table || { headers: [], rows: [] };
          return `<div class="slide-inner slide-white">
            <div class="s-title">${esc(slide.title)}</div>
            <table class="slide-table" style="width:100%;border-collapse:collapse;margin-top:8px;">
              <tr>${(table.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('')}</tr>
              ${(table.rows||[]).map(row=>`<tr>${row.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}
            </table>
          </div>`;
        case 'closing':
          return `<div class="slide-inner slide-closing">
            <div class="s-msg">${esc(slide.message || 'Thank you')}</div>
          </div>`;
        default:
          return `<div class="slide-inner slide-white"><div class="s-title">${esc(slide.title||'')}</div></div>`;
      }
    }

    // ===== サンプルデータ =====
    function fillSample() {
      document.getElementById('free-text').value = '2026年度の採用戦略について経営陣に提案したい。\n応募数は増えているが内定承諾率が30%→15%に低下しており、選考期間短縮と候補者体験改善が急務。\n・選考を4週間→2週間に短縮\n・内定後のフォロー強化\n・採用ブランド向上施策\n数値データ：応募240件、承諾15%、採用単価120万円\n8枚程度でフォーマルなトーン、日本語で。';
      selectTplByVal('external-white');
      showToast('📋 サンプルデータを入力しました');
      document.getElementById('free-text').focus();
    }

    // ===== localStorage 永続化 =====
    function saveForm() {
      try {
        localStorage.setItem('sm_form', JSON.stringify({
          template: selectedTemplate,
          freeText: document.getElementById('free-text').value,
          title: document.getElementById('title').value,
          audience: document.getElementById('audience').value,
          background: document.getElementById('background').value,
          messages: [...document.querySelectorAll('.msg-input')].map(el => el.value),
          supplement: document.getElementById('supplement').value,
          count: getChipVal('count', '8'),
          tone: getChipVal('tone', 'フォーマル'),
          language: getChipVal('language', '日本語'),
        }));
      } catch {}
    }

    function restoreForm() {
      try {
        const saved = JSON.parse(localStorage.getItem('sm_form') || 'null');
        if (!saved) return;
        if (saved.template) selectTplByVal(saved.template);
        if (saved.freeText) document.getElementById('free-text').value = saved.freeText;
        if (saved.title) document.getElementById('title').value = saved.title;
        if (saved.audience) document.getElementById('audience').value = saved.audience;
        if (saved.background) document.getElementById('background').value = saved.background;
        if (saved.supplement) document.getElementById('supplement').value = saved.supplement;
        if (saved.messages) {
          document.querySelectorAll('.msg-input').forEach((el, i) => { if (saved.messages[i]) el.value = saved.messages[i]; });
        }
        if (saved.count) { const c = document.querySelector(`.opt-chip[data-group="count"][data-val="${saved.count}"]`); if (c) { document.querySelectorAll('.opt-chip[data-group="count"]').forEach(x=>x.classList.remove('selected')); c.classList.add('selected'); } }
        if (saved.tone) { const t = document.querySelector(`.opt-chip[data-group="tone"][data-val="${saved.tone}"]`); if (t) { document.querySelectorAll('.opt-chip[data-group="tone"]').forEach(x=>x.classList.remove('selected')); t.classList.add('selected'); } }
        if (saved.language) { const l = document.querySelector(`.opt-chip[data-group="language"][data-val="${saved.language}"]`); if (l) { document.querySelectorAll('.opt-chip[data-group="language"]').forEach(x=>x.classList.remove('selected')); l.classList.add('selected'); } }
        updateTitleCounter();
      } catch {}
    }

    // ===== リセット =====
    function resetAll() {
      if (!confirm('入力内容とプレビューをリセットしますか？')) return;
      document.getElementById('free-text').value = '';
      document.getElementById('title').value = '';
      document.getElementById('audience').value = '';
      document.getElementById('background').value = '';
      document.getElementById('supplement').value = '';
      document.querySelectorAll('.msg-input').forEach(el => { el.value = ''; });
      selectTplByVal('external-white');
      document.querySelectorAll('.opt-chip[data-group="count"]').forEach(c => c.classList.toggle('selected', c.dataset.val === '8'));
      document.querySelectorAll('.opt-chip[data-group="tone"]').forEach(c => c.classList.toggle('selected', c.dataset.val === 'フォーマル'));
      document.querySelectorAll('.opt-chip[data-group="language"]').forEach(c => c.classList.toggle('selected', c.dataset.val === '日本語'));
      updateTitleCounter();
      currentSlides = null;
      refineCount = 0;
      ['preview-section','refine-section','download-area'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById('slides-grid').innerHTML = '';
      document.getElementById('refine-history').innerHTML = '';
      hideError();
      localStorage.removeItem('sm_form');
    }

    // ===== 文字数カウンター =====
    function updateTitleCounter() {
      const len = document.getElementById('title').value.length;
      const el = document.getElementById('title-counter');
      el.textContent = `${len} / 30文字`;
      el.className = 'char-counter' + (len > 30 ? ' over' : len > 24 ? ' warn' : '');
    }

    // ===== モーダル =====
    const LAYOUT_NAMES = {
      cover:'カバー', agenda:'アジェンダ', chapter:'チャプター',
      content:'コンテンツ', 'content-with-chart':'コンテンツ＋グラフ',
      'content-with-flow':'コンテンツ＋フロー', comparison:'比較表', closing:'クロージング',
    };

    function openModal(slide, num) {
      document.getElementById('modal-slide-num').textContent = `スライド ${num}`;
      document.getElementById('modal-layout-badge').textContent = LAYOUT_NAMES[slide.layout] || slide.layout;

      const f = (label, val) => val
        ? `<div class="modal-field"><div class="modal-label">${label}</div><div class="modal-value">${esc(String(val))}</div></div>`
        : '';

      let html = '';
      html += f('タイトル', slide.title);
      html += f('サブタイトル', slide.subtitle);
      html += f('日付', slide.date);
      html += f('本文', slide.body);
      html += f('メッセージ', slide.message);
      html += f('チャプター番号', slide.number);

      if (slide.items?.length) {
        html += f('アジェンダ項目', slide.items.map((item, i) => `${i+1}. ${item}`).join('\n'));
      }
      if (slide.chart) {
        html += f('グラフ', `タイプ: ${slide.chart.type || 'bar'}\nタイトル: ${slide.chart.title || ''}\nラベル: ${(slide.chart.labels||[]).join(', ')}\nデータ: ${(slide.chart.data||[]).join(', ')} ${slide.chart.unit || ''}`);
      }
      if (slide.flow?.steps) {
        html += f('フローステップ', slide.flow.steps.map((s, i) => `${i+1}. ${s}`).join('\n'));
      }
      if (slide.table) {
        const hdr = (slide.table.headers || []).join(' | ');
        const rows = (slide.table.rows || []).map(r => r.join(' | ')).join('\n');
        html += f('表', hdr + (rows ? '\n' + rows : ''));
      }

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function handleModalClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    // ===== トースト =====
    function showToast(msg, duration = 2800) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ===== リファイン履歴 =====
    const refineHistory = [];
    function addRefineHistory(instruction) {
      const idx = refineHistory.indexOf(instruction);
      if (idx !== -1) refineHistory.splice(idx, 1);
      refineHistory.unshift(instruction);
      if (refineHistory.length > 4) refineHistory.pop();
      renderRefineHistory();
    }

    function renderRefineHistory() {
      const el = document.getElementById('refine-history');
      if (!el) return;
      el.innerHTML = refineHistory.map(h =>
        `<div class="refine-chip" onclick="document.getElementById('refine-input').value=this.textContent;document.getElementById('refine-input').focus();">${esc(h)}</div>`
      ).join('');
    }

    // ===== テンプレートキャッシュ =====
    const templateCache = {};
    async function preloadTemplate(templateId) {
      if (templateCache[templateId]) return;
      try {
        const res = await fetch(`templates/${templateId}.pptx`);
        if (res.ok) templateCache[templateId] = await res.arrayBuffer();
      } catch {}
    }

    // ===== PPTX生成 =====
    async function downloadPptx() {
      if (!currentSlides) return;
      const btn = document.getElementById('btn-download');
      btn.disabled = true;
      btn.textContent = '⏳ PPTXを生成中…';

      try {
        const pptx = await buildPptx(currentSlides, selectedTemplate);
        const blob = await pptx.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const titleText = currentSlides[0]?.title || 'slide';
        const safe = titleText.replace(/[/\\:*?"<>|]/g, '_').slice(0, 40);
        a.download = `${safe}_${selectedTemplate}.pptx`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('⬇ PPTXをダウンロードしました');
      } catch (err) {
        showError('PPTXの生成に失敗しました: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '⬇ PPTXをダウンロード';
      }
    }

    // レイアウト → テンプレートスライド番号マッピング
    const LAYOUT_TO_TEMPLATE_SLIDE = {
      'cover': 1, 'agenda': 5, 'chapter': 3,
      'content': 7, 'content-with-chart': 7, 'content-with-flow': 7,
      'comparison': 12, 'closing': 15,
    };

    function escXml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
    }

    function buildPara(text) {
      return `<a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(text)}</a:t></a:r></a:p>`;
    }

    // 単純テキスト置換（単一<a:t>タグ内）
    function replaceText(xml, oldText, newText) {
      return xml.split(`<a:t>${oldText}</a:t>`).join(`<a:t>${escXml(newText)}</a:t>`);
    }

    // indexOf ベースで <p:sp> を特定し txBody の段落のみを置換（bodyPr/lstStyleは原本を保持）
    function replaceShapeText(xml, phMatcher, lines) {
      const phPos = xml.indexOf(phMatcher);
      if (phPos === -1) return xml;
      const spStart = xml.lastIndexOf('<p:sp>', phPos);
      if (spStart === -1) return xml;
      const spEnd = xml.indexOf('</p:sp>', phPos) + 7;
      if (spEnd < 7) return xml;
      const spXml = xml.slice(spStart, spEnd);
      const txStart = spXml.indexOf('<a:txBody>');
      const txEnd = spXml.indexOf('</a:txBody>') + 11;
      if (txStart === -1 || txEnd < 11) return xml;

      // txBody 内の bodyPr / lstStyle を保持（属性・子要素ごと残す）
      const txXml = spXml.slice(txStart, txEnd);
      const bodyPrM = txXml.match(/<a:bodyPr[\s\S]*?(?:\/>|<\/a:bodyPr>)/);
      const lstStyleM = txXml.match(/<a:lstStyle[\s\S]*?(?:\/>|<\/a:lstStyle>)/);
      const bodyPr = bodyPrM ? bodyPrM[0] : '<a:bodyPr/>';
      const lstStyle = lstStyleM ? lstStyleM[0] : '<a:lstStyle/>';

      const paras = (lines.filter(Boolean).length ? lines.filter(Boolean) : ['']).map(buildPara).join('');
      const newSp = spXml.slice(0, txStart) + `<a:txBody>${bodyPr}${lstStyle}${paras}</a:txBody>` + spXml.slice(txEnd);
      return xml.slice(0, spStart) + newSp + xml.slice(spEnd);
    }

    // <a:tbl> をデータで完全置換（comparison用）
    function replaceTableData(xml, headers, rows) {
      const tblStart = xml.indexOf('<a:tbl>');
      if (tblStart === -1) return xml;
      const tblEnd = xml.indexOf('</a:tbl>') + 8;
      const tblXml = xml.slice(tblStart, tblEnd);

      // tblPr を保持
      const tblPrM = tblXml.match(/<a:tblPr[^>]*(?:\/>|>[\s\S]*?<\/a:tblPr>)/);
      const tblPr = tblPrM ? tblPrM[0] : '<a:tblPr firstRow="1" bandRow="1"/>';

      // 既存 gridCol の合計幅を取得して均等分割
      let totalW = 0;
      const gridM = tblXml.match(/<a:tblGrid>[\s\S]*?<\/a:tblGrid>/);
      if (gridM) {
        const gwRe = /w="(\d+)"/g;
        let gm;
        while ((gm = gwRe.exec(gridM[0])) !== null) totalW += parseInt(gm[1]);
      }
      if (!totalW) totalW = 8229600;
      const colCount = Math.max(headers.length, ...rows.map(r => r.length), 1);
      const colW = Math.floor(totalW / colCount);
      const tblGrid = `<a:tblGrid>${Array(colCount).fill(`<a:gridCol w="${colW}"/>`).join('')}</a:tblGrid>`;

      // 既存セルから tcPr テンプレートを抽出
      const firstCellM = tblXml.match(/<a:tc\b[\s\S]*?<\/a:tc>/);
      const tcPrM = firstCellM ? firstCellM[0].match(/<a:tcPr[\s\S]*?(?:\/>|<\/a:tcPr>)/) : null;
      const tcPr = tcPrM ? tcPrM[0] : '';

      function makeCell(text, isHeader) {
        const rPr = isHeader
          ? `<a:rPr lang="ja-JP" dirty="0" b="1"/>`
          : `<a:rPr lang="ja-JP" dirty="0"/>`;
        return `<a:tc><a:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r>${rPr}<a:t>${escXml(String(text || ''))}</a:t></a:r></a:p></a:txBody>${tcPr}</a:tc>`;
      }
      function makeRow(cells, isHeader) {
        return `<a:tr h="370840">${cells.map(c => makeCell(c, isHeader)).join('')}</a:tr>`;
      }

      let newRows = '';
      if (headers.length > 0) newRows += makeRow(headers, true);
      rows.forEach(row => { newRows += makeRow(row, false); });

      return xml.slice(0, tblStart) + `<a:tbl>${tblPr}${tblGrid}${newRows}</a:tbl>` + xml.slice(tblEnd);
    }

    // content系スライドにタイトルshapeを追加（slide7にはtitleプレースホルダーがない）
    function addTitleShape(xml, titleText) {
      const sp = `<p:sp><p:nvSpPr><p:cNvPr id="9901" name="SMTitle"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr><p:ph type="title"/></p:nvPr></p:nvSpPr><p:spPr/><p:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(titleText)}</a:t></a:r></a:p></a:txBody></p:sp>`;
      return xml.replace('</p:spTree>', `${sp}</p:spTree>`);
    }

    async function buildPptx(slides, templateId) {
      let buffer = templateCache[templateId];
      if (!buffer) {
        const response = await fetch(`templates/${templateId}.pptx`);
        if (!response.ok) throw new Error(`テンプレートの読み込みに失敗しました (${response.status})`);
        buffer = await response.arrayBuffer();
        templateCache[templateId] = buffer;
      }
      // キャッシュバッファをクローンして渡す（JSZip処理でバッファが破壊されないよう）
      const zip = await JSZip.loadAsync(buffer.slice(0));

      const prsXml = await zip.file('ppt/presentation.xml').async('string');
      const prsRels = await zip.file('ppt/_rels/presentation.xml.rels').async('string');
      const contentTypes = await zip.file('[Content_Types].xml').async('string');

      // 元スライドのXML / relsをキャッシュ（テンプレートのスライド数を動的に取得）
      const slideFiles = Object.keys(zip.files)
        .filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f));
      const maxSlideNum = slideFiles.length > 0
        ? Math.max(...slideFiles.map(f => parseInt(f.match(/slide(\d+)\.xml/)[1])))
        : 16;
      const slideCache = {}, slideRelsCache = {};
      for (let i = 1; i <= maxSlideNum; i++) {
        const sf = zip.file(`ppt/slides/slide${i}.xml`);
        const rf = zip.file(`ppt/slides/_rels/slide${i}.xml.rels`);
        if (sf) slideCache[i] = await sf.async('string');
        if (rf) slideRelsCache[i] = await rf.async('string');
      }

      const newEntries = [];
      let imgCounter = 1;

      for (let i = 0; i < slides.length; i++) {
        const slide = slides[i];
        const srcNum = LAYOUT_TO_TEMPLATE_SLIDE[slide.layout] || 7;
        let xml = slideCache[srcNum] || slideCache[1] || '';
        const EMPTY_RELS = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>';
        let rels = slideRelsCache[srcNum] || slideRelsCache[1] || EMPTY_RELS;

        // コンテンツを適用（xmlとrelsを両方更新）
        const result = await applySlideContent(xml, rels, slide, zip, imgCounter);
        xml = result.xml;
        rels = result.rels;
        if (slide.chart || slide.flow) imgCounter++;

        const newNum = 200 + i;
        const rId = `rId${50 + i}`;
        newEntries.push({ num: newNum, rId, slideId: 500 + i });
        zip.file(`ppt/slides/slide${newNum}.xml`, xml);
        zip.file(`ppt/slides/_rels/slide${newNum}.xml.rels`, rels);
      }

      // presentation.xml のスライドリストを更新
      const sldIdLst = newEntries.map(e => `<p:sldId id="${e.slideId}" r:id="${e.rId}"/>`).join('');
      zip.file('ppt/presentation.xml',
        prsXml.replace(/<p:sldIdLst>[\s\S]*?<\/p:sldIdLst>/, `<p:sldIdLst>${sldIdLst}</p:sldIdLst>`)
      );

      // _rels/presentation.xml.rels を更新
      const slideRelsXml = newEntries.map(e =>
        `<Relationship Id="${e.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${e.num}.xml"/>`
      ).join('');
      zip.file('ppt/_rels/presentation.xml.rels',
        prsRels
          .replace(/<Relationship[^>]+Type="[^"]*\/relationships\/slide"[^>]*\/>/g, '')
          .replace('</Relationships>', `${slideRelsXml}</Relationships>`)
      );

      // [Content_Types].xml を更新
      const ctSlides = newEntries.map(e =>
        `<Override PartName="/ppt/slides/slide${e.num}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`
      ).join('');
      zip.file('[Content_Types].xml',
        contentTypes
          .replace(/<Override PartName="\/ppt\/slides\/slide\d+\.xml"[^>]*\/>/g, '')
          .replace('</Types>', `${ctSlides}</Types>`)
      );

      // 元のスライドファイルを削除
      for (let i = 1; i <= maxSlideNum; i++) {
        zip.remove(`ppt/slides/slide${i}.xml`);
        zip.remove(`ppt/slides/_rels/slide${i}.xml.rels`);
      }

      return zip;
    }

    // 各スライドのコンテンツを適用して { xml, rels } を返す
    async function applySlideContent(xml, rels, slide, zip, imgIdx) {
      switch (slide.layout) {

        case 'cover':
          xml = replaceText(xml, 'Presentation Title', slide.title || '');
          xml = replaceText(xml, 'Presentation Subtitle', slide.subtitle || '');
          xml = replaceText(xml, 'Month YYYY', slide.date || new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' }));
          return { xml, rels };

        case 'agenda': {
          const items = slide.items || [];
          for (let j = 1; j <= 6; j++) {
            xml = replaceText(xml, `Chapter Title 0${j}`, items[j - 1] || '');
          }
          return { xml, rels };
        }

        case 'chapter':
          xml = replaceText(xml, 'Chapter Title', slide.title || '');
          xml = replaceText(xml, '1.0', slide.number || '');
          return { xml, rels };

        case 'content': {
          // idx=29: 見出し（One Paragraph）→ slide.title
          // idx=30: サブタイトル（Lorem ipsum分割ラン）→ クリア
          // idx=32: 本文ボディ（Lorem ipsum分割ラン）→ slide.body
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', []);
          const lines = (slide.body || '').split('\n').filter(Boolean);
          xml = replaceShapeText(xml, 'idx="32"', lines.length ? lines : [slide.body || '']);
          return { xml, rels };
        }

        case 'content-with-chart': {
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', [slide.body || '']);
          xml = replaceShapeText(xml, 'idx="32"', []);
          if (slide.chart) {
            const png = await generateChartPng(slide.chart);
            const imgName = `sm_img${imgIdx}.png`;
            zip.file(`ppt/media/${imgName}`, png, { base64: true });
            const rId = `rIdImg${imgIdx}`;
            rels = rels.replace('</Relationships>',
              `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${imgName}"/></Relationships>`);
            xml = insertPicture(xml, rId, imgIdx);
          }
          return { xml, rels };
        }

        case 'content-with-flow': {
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', [slide.body || '']);
          xml = replaceShapeText(xml, 'idx="32"', []);
          if (slide.flow) {
            const png = await generateFlowPng(slide.flow.steps || []);
            const imgName = `sm_flow${imgIdx}.png`;
            zip.file(`ppt/media/${imgName}`, png, { base64: true });
            const rId = `rIdImg${imgIdx}`;
            rels = rels.replace('</Relationships>',
              `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${imgName}"/></Relationships>`);
            xml = insertPicture(xml, rId, imgIdx);
          }
          return { xml, rels };
        }

        case 'comparison': {
          // slide12: idx=30がテーブルタイトル、<a:tbl>をreplaceTableDataで完全置換
          xml = replaceShapeText(xml, 'idx="30"', [slide.title || '']);
          if (slide.table) {
            xml = replaceTableData(xml, slide.table.headers || [], slide.table.rows || []);
          }
          return { xml, rels };
        }

        case 'closing':
          xml = replaceText(xml, 'John SMITH', slide.message || 'Thank you');
          // テンプレートの正確な文字列に合わせる（末尾スペースなし、タブ文字あり）
          ['Function title',
           'M:\t+33 6 00 01 02 03',
           'E:\tjohn.smith@akkodis.com',
           'Paul JOHNSON',
           'Function Title',
           'M:\t+33 6 02 03 04 05',
           'E:\tpaul.jonhson@akkodis.com']
            .forEach(t => { xml = replaceText(xml, t, ''); });
          return { xml, rels };

        default:
          return { xml, rels };
      }
    }

    function insertPicture(xml, rId, idx) {
      // スライドサイズ: 9144000 x 6858000 EMU (10" x 7.5")
      // 下半分にチャートを配置: x=457200(0.5"), y=2400300(2.6"), w=8229600(9"), h=3886200(4.25")
      const pic = `<p:pic><p:nvPicPr><p:cNvPr id="${200 + idx}" name="img${idx}"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="457200" y="2400300"/><a:ext cx="8229600" cy="3886200"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic>`;
      return xml.replace('</p:spTree>', `${pic}</p:spTree>`);
    }

    async function generateChartPng(chartData) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('chart-canvas');
        canvas.style.display = 'block';
        canvas.width = 800;
        canvas.height = 500;
        const ctx = canvas.getContext('2d');

        // 既存チャートを破棄
        if (window._chartInstance) { window._chartInstance.destroy(); }

        const colors = ['#001f33', '#ffb81c', '#00ffff', '#8a9bb0', '#4a5568', '#e67e22'];

        const config = {
          type: chartData.type || 'bar',
          data: {
            labels: chartData.labels || [],
            datasets: [{
              label: chartData.title || '',
              data: chartData.data || [],
              backgroundColor: chartData.type === 'pie' || chartData.type === 'doughnut'
                ? colors.slice(0, (chartData.data || []).length)
                : '#001f33',
              borderColor: chartData.type === 'line' ? '#ffb81c' : 'transparent',
              borderWidth: chartData.type === 'line' ? 2 : 0,
              fill: false,
            }],
          },
          options: {
            animation: false,
            responsive: false,
            plugins: {
              legend: { display: chartData.type === 'pie' || chartData.type === 'doughnut' },
              title: {
                display: !!chartData.title,
                text: chartData.title || '',
                font: { size: 18, family: 'Meiryo UI, sans-serif', weight: 'bold' },
                color: '#001f33',
              },
            },
            scales: (chartData.type !== 'pie' && chartData.type !== 'doughnut') ? {
              y: {
                beginAtZero: true,
                ticks: { font: { family: 'Meiryo UI, sans-serif' } },
              },
              x: {
                ticks: { font: { family: 'Meiryo UI, sans-serif' } },
              },
            } : {},
          },
        };

        window._chartInstance = new Chart(ctx, config);

        setTimeout(() => {
          const dataUrl = canvas.toDataURL('image/png');
          canvas.style.display = 'none';
          if (window._chartInstance) { window._chartInstance.destroy(); window._chartInstance = null; }
          resolve(dataUrl.split(',')[1]);
        }, 200);
      });
    }

    async function generateFlowPng(steps) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('chart-canvas');
        canvas.style.display = 'block';
        canvas.width = 960;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 960, 400);

        // 背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 960, 400);

        const n = steps.length;
        const boxW = 140, boxH = 60, arrowW = 30;
        const totalW = n * boxW + (n - 1) * arrowW;
        const startX = (960 - totalW) / 2;
        const y = 170;

        steps.forEach((step, i) => {
          const x = startX + i * (boxW + arrowW);

          // ボックス
          ctx.fillStyle = '#001f33';
          ctx.fillRect(x, y, boxW, boxH);

          // テキスト
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 14px Meiryo UI, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          // テキスト折り返し（簡易）
          const words = step;
          ctx.fillText(words, x + boxW / 2, y + boxH / 2, boxW - 10);

          // ステップ番号
          ctx.fillStyle = '#ffb81c';
          ctx.font = 'bold 11px sans-serif';
          ctx.fillText(`${i + 1}`, x + boxW / 2, y - 20);

          // 矢印
          if (i < n - 1) {
            const arrowX = x + boxW;
            ctx.fillStyle = '#ffb81c';
            ctx.beginPath();
            ctx.moveTo(arrowX + 5, y + boxH / 2);
            ctx.lineTo(arrowX + arrowW - 5, y + boxH / 2 - 10);
            ctx.lineTo(arrowX + arrowW - 5, y + boxH / 2 + 10);
            ctx.closePath();
            ctx.fill();
          }
        });

        const dataUrl = canvas.toDataURL('image/png');
        canvas.style.display = 'none';
        resolve(dataUrl.split(',')[1]);
      });
    }
    // ===== 初期化 =====
    (function init() {
      restoreForm();
      preloadTemplate(selectedTemplate);

      document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => saveForm());
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && e.ctrlKey) startGenerate();
      });
    })();
  </script>
