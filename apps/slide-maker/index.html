<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Maker | AKKODiS Tools</title>
  <link rel="manifest" href="/manifest.json">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; display: flex; flex-direction: column; }

    /* ナビバー */
    .navbar { background: #001f33; height: 58px; display: flex; align-items: center; padding: 0 40px; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .navbar-back { color: #fff; text-decoration: none; font-size: 0.82rem; opacity: 0.8; border: 1px solid transparent; padding: 6px 12px; transition: border-color 0.2s, opacity 0.2s; }
    .navbar-back:hover { border-color: rgba(255,255,255,0.5); opacity: 1; }
    .navbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
    .navbar-title { color: #fff; font-size: 0.95rem; font-weight: 600; }

    /* メインコンテナ */
    .container { max-width: 860px; margin: 0 auto; padding: 36px 20px; flex: 1; width: 100%; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: #001f33; letter-spacing: -0.01em; }
    .page-subtitle { font-size: 0.82rem; color: #8a9bb0; margin-top: 4px; }

    /* ウィザード */
    .wizard { margin-top: 28px; }
    .step { background: #fff; border: 1.5px solid #e8ecf0; padding: 24px 28px; margin-bottom: 16px; }
    .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .step-num { width: 28px; height: 28px; background: #1c304b; color: #ffb81c; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-name { font-size: 0.9rem; font-weight: 700; color: #001f33; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.75rem; font-weight: 600; color: #4a5568; }
    .badge-required { font-size: 0.62rem; font-weight: 700; background: #ffeaea; color: #c0392b; padding: 1px 5px; margin-left: 4px; }
    .badge-optional { font-size: 0.62rem; font-weight: 700; background: #f0f0f0; color: #636e72; padding: 1px 5px; margin-left: 4px; }
    input, select, textarea { border: 1.5px solid #e8ecf0; padding: 9px 12px; font-size: 0.85rem; font-family: inherit; color: #2d3436; background: #fff; width: 100%; transition: border-color 0.2s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #ffb81c; box-shadow: 0 0 0 3px rgba(255,184,28,0.12); }
    textarea { resize: vertical; min-height: 72px; }
    .message-rows { display: flex; flex-direction: column; gap: 8px; }
    .message-row { display: flex; gap: 8px; align-items: center; }
    .message-row input { flex: 1; }
    .message-num { font-size: 0.75rem; font-weight: 700; color: #8a9bb0; width: 20px; flex-shrink: 0; }

    /* テンプレートカード */
    .template-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .template-card { border: 2px solid #e8ecf0; padding: 12px 8px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .template-card:hover { border-color: #001f33; }
    .template-card.selected { border-color: #ffb81c; background: #fffbf0; }
    .template-card.dark-card { background: #001f33; color: #fff; }
    .template-card.dark-card.selected { border-color: #ffb81c; }
    .template-preview { width: 100%; aspect-ratio: 16/9; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
    .preview-ext-white { background: #fff; border: 1px solid #e8ecf0; color: #001f33; }
    .preview-ext-dark { background: #001f33; color: #ffb81c; }
    .preview-int-white { background: #f5f7fa; border: 1px solid #e8ecf0; color: #001f33; }
    .preview-int-dark { background: #0a2540; color: #ffb81c; }
    .template-label { font-size: 0.7rem; font-weight: 600; }

    /* アクションボタン */
    .action-area { margin-top: 20px; display: flex; gap: 12px; align-items: center; }
    .btn-generate { background: #ffb81c; color: #001f33; border: none; padding: 13px 32px; font-size: 0.9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
    .btn-generate:hover:not(:disabled) { opacity: 0.88; }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #001f33; color: #fff; border: none; padding: 13px 24px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-secondary:hover:not(:disabled) { opacity: 0.8; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ローディング */
    .loading-area { display: none; margin-top: 24px; background: #fff; border: 1.5px solid #e8ecf0; padding: 28px; text-align: center; }
    .loading-area.active { display: block; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid #e8ecf0; border-top-color: #ffb81c; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-step { font-size: 0.85rem; color: #4a5568; font-weight: 600; }
    .progress-bar { width: 100%; height: 4px; background: #e8ecf0; margin-top: 12px; }
    .progress-fill { height: 100%; background: #ffb81c; transition: width 0.4s ease; }

    /* エラー */
    .error-msg { display: none; margin-top: 16px; padding: 12px 16px; background: #ffeaea; border-left: 3px solid #c0392b; font-size: 0.82rem; color: #c0392b; }
    .error-msg.active { display: flex; align-items: center; gap: 10px; }
    .btn-retry { background: #c0392b; color: #fff; border: none; padding: 6px 14px; font-size: 0.78rem; font-weight: 600; cursor: pointer; flex-shrink: 0; }

    /* プレビューセクション */
    .preview-section { display: none; margin-top: 28px; }
    .preview-section.active { display: block; }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #001f33; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .slide-count-badge { font-size: 0.72rem; font-weight: 700; background: #001f33; color: #ffb81c; padding: 2px 8px; }
    .slides-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .slide-thumb { aspect-ratio: 16/9; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; overflow: hidden; }
    .slide-thumb:hover { border-color: #ffb81c; }
    .slide-num { position: absolute; top: 6px; left: 6px; background: rgba(0,31,51,0.7); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 6px; z-index: 2; }

    /* スライドプレビュー HTML */
    .slide-inner { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 8%; font-family: 'Meiryo UI', 'Segoe UI', sans-serif; }
    .slide-cover { background: #001f33; color: #fff; }
    .slide-cover .s-title { font-size: 1.5em; font-weight: 700; color: #ffb81c; line-height: 1.2; }
    .slide-cover .s-subtitle { font-size: 0.65em; color: rgba(255,255,255,0.8); margin-top: 0.5em; }
    .slide-cover .s-date { font-size: 0.55em; color: rgba(255,255,255,0.5); margin-top: auto; }
    .slide-white { background: #fff; }
    .slide-white .s-title { font-size: 0.9em; font-weight: 700; color: #001f33; border-bottom: 2px solid #ffb81c; padding-bottom: 4px; margin-bottom: 10px; }
    .slide-white .s-body { font-size: 0.6em; color: #2d3436; line-height: 1.6; flex: 1; }
    .slide-chapter { background: #ffb81c; color: #001f33; justify-content: center; }
    .slide-chapter .s-title { font-size: 1.1em; font-weight: 700; text-align: center; }
    .slide-chapter .s-num { font-size: 0.6em; text-align: center; margin-bottom: 8px; opacity: 0.7; }
    .slide-agenda { background: #001f33; color: #fff; }
    .slide-agenda .s-title { font-size: 0.9em; font-weight: 700; color: #ffb81c; margin-bottom: 10px; }
    .slide-agenda .s-item { font-size: 0.6em; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .slide-closing { background: #001f33; color: #fff; justify-content: center; align-items: center; text-align: center; }
    .slide-closing .s-msg { font-size: 1em; font-weight: 700; color: #ffb81c; }
    .slide-table th, .slide-table td { font-size: 0.5em; padding: 3px 6px; border: 1px solid #e8ecf0; }
    .slide-table th { background: #001f33; color: #fff; font-weight: 600; }

    /* リファインセクション */
    .refine-section { display: none; margin-top: 20px; background: #fff; border: 1.5px solid #e8ecf0; padding: 20px 24px; }
    .refine-section.active { display: block; }
    .refine-title { font-size: 0.85rem; font-weight: 700; color: #001f33; margin-bottom: 12px; }
    .refine-input-row { display: flex; gap: 10px; }
    .refine-input-row input { flex: 1; }
    .refine-count { font-size: 0.75rem; color: #8a9bb0; margin-top: 8px; }

    /* ダウンロードエリア */
    .download-area { display: none; margin-top: 16px; }
    .download-area.active { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn-download { background: #001f33; color: #fff; border: none; padding: 13px 28px; font-size: 0.88rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
    .btn-download:hover:not(:disabled) { opacity: 0.8; }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
    .download-note { font-size: 0.75rem; color: #8a9bb0; }

    /* フッター */
    footer { background: #001f33; border-top: 1px solid rgba(255,255,255,0.08); padding: 16px 40px; margin-top: auto; }
    footer p { font-size: 0.72rem; color: rgba(255,255,255,0.6); }
    footer strong { color: #ffb81c; }

    /* チャート用hidden canvas */
    #chart-canvas { display: none; position: absolute; top: -9999px; }

    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
      .container { padding: 24px 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .template-grid { grid-template-columns: repeat(2, 1fr); }
      .action-area { flex-direction: column; align-items: stretch; }
      .refine-input-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-back">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Slide Maker</span>
  </nav>

  <div class="container">
    <h1 class="page-title">Slide Maker</h1>
    <p class="page-subtitle">AKKODiSブランド準拠のPPTXを自動生成します</p>

    <div class="wizard">
      <!-- STEP 1: 基本設定 -->
      <div class="step">
        <div class="step-header">
          <div class="step-num">1</div>
          <div class="step-name">基本設定</div>
        </div>
        <div style="margin-bottom:16px;">
          <label>テンプレート種別<span class="badge-required">必須</span></label>
          <div class="template-grid" style="margin-top:8px;" id="template-grid">
            <div class="template-card selected" data-val="external-white" onclick="selectTemplate(this)">
              <div class="template-preview preview-ext-white">社外 / WHITE</div>
              <div class="template-label">社外向け WHITE</div>
            </div>
            <div class="template-card dark-card" data-val="external-dark" onclick="selectTemplate(this)">
              <div class="template-preview preview-ext-dark">社外 / DARK</div>
              <div class="template-label" style="color:#fff;">社外向け DARK</div>
            </div>
            <div class="template-card" data-val="internal-white" onclick="selectTemplate(this)">
              <div class="template-preview preview-int-white">社内 / WHITE</div>
              <div class="template-label">社内向け WHITE</div>
            </div>
            <div class="template-card dark-card" data-val="internal-dark" onclick="selectTemplate(this)">
              <div class="template-preview preview-int-dark">社内 / DARK</div>
              <div class="template-label" style="color:#fff;">社内向け DARK</div>
            </div>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="purpose">用途<span class="badge-required">必須</span></label>
            <select id="purpose">
              <option value="提案">提案</option>
              <option value="報告">報告</option>
              <option value="研修・説明">研修・説明</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="slide-count">枚数目安<span class="badge-optional">任意</span></label>
            <select id="slide-count">
              <option value="6">6枚程度</option>
              <option value="8" selected>8枚程度</option>
              <option value="10">10枚程度</option>
              <option value="12">12枚程度</option>
            </select>
          </div>
        </div>
      </div>

      <!-- STEP 2: コンテンツ -->
      <div class="step">
        <div class="step-header">
          <div class="step-num">2</div>
          <div class="step-name">コンテンツ</div>
        </div>
        <div class="form-grid">
          <div class="form-group full">
            <label for="title">プレゼンタイトル<span class="badge-required">必須</span></label>
            <input type="text" id="title" placeholder="例：2026年度 採用戦略の提案">
          </div>
          <div class="form-group full">
            <label for="audience">受け手・対象者<span class="badge-required">必須</span></label>
            <input type="text" id="audience" placeholder="例：HR部門マネージャー、経営陣">
          </div>
          <div class="form-group full">
            <label for="background">背景・課題<span class="badge-required">必須</span></label>
            <textarea id="background" placeholder="例：採用コスト増加と内定承諾率低下が続いており、採用プロセスの見直しが急務となっている。"></textarea>
          </div>
          <div class="form-group full">
            <label>伝えたいメッセージ（最大3つ）<span class="badge-required">必須</span></label>
            <div class="message-rows">
              <div class="message-row"><span class="message-num">①</span><input type="text" class="msg-input" placeholder="例：採用プロセスを4週間から2週間に短縮する"></div>
              <div class="message-row"><span class="message-num">②</span><input type="text" class="msg-input" placeholder="例：内定承諾率を15%改善する施策を導入"></div>
              <div class="message-row"><span class="message-num">③</span><input type="text" class="msg-input" placeholder="例：（任意）"></div>
            </div>
          </div>
          <div class="form-group full">
            <label for="supplement">補足データ・根拠<span class="badge-optional">任意</span></label>
            <textarea id="supplement" placeholder="例：2024年応募数180件→2025年240件（33%増）、内定承諾率30%→15%に低下。競合他社の平均選考期間は2週間。"></textarea>
          </div>
        </div>
      </div>

      <!-- STEP 3: スタイル -->
      <div class="step">
        <div class="step-header">
          <div class="step-num">3</div>
          <div class="step-name">スタイル</div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="tone">トーン</label>
            <select id="tone">
              <option value="フォーマル">フォーマル（ビジネス向け）</option>
              <option value="カジュアル">カジュアル（社内向け）</option>
            </select>
          </div>
          <div class="form-group">
            <label for="language">言語</label>
            <select id="language">
              <option value="日本語">日本語</option>
              <option value="英語">English</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="action-area">
      <button class="btn-generate" id="btn-generate" onclick="startGenerate()">
        ✨ スライドを生成する
      </button>
    </div>

    <!-- ローディング -->
    <div class="loading-area" id="loading-area">
      <div class="loading-spinner"></div>
      <div class="loading-step" id="loading-step">スライド構成を生成中…</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
    </div>

    <!-- エラー -->
    <div class="error-msg" id="error-msg">
      <span id="error-text"></span>
      <button class="btn-retry" id="btn-retry" onclick="retryGenerate()">再試行</button>
    </div>

    <!-- プレビュー -->
    <div class="preview-section" id="preview-section">
      <div class="section-title">
        プレビュー
        <span class="slide-count-badge" id="slide-count-badge">0枚</span>
      </div>
      <div class="slides-grid" id="slides-grid"></div>
    </div>

    <!-- リファイン -->
    <div class="refine-section" id="refine-section">
      <div class="refine-title">🔄 スライドを修正する</div>
      <div class="refine-input-row">
        <input type="text" id="refine-input" placeholder="例：3枚目をシンプルにして　／　比較表のスライドを追加して" onkeydown="if(event.key==='Enter')refine()">
        <button class="btn-secondary" id="btn-refine" onclick="refine()">修正する</button>
      </div>
      <div class="refine-count" id="refine-count">残り5回</div>
    </div>

    <!-- ダウンロード -->
    <div class="download-area" id="download-area">
      <button class="btn-download" id="btn-download" onclick="downloadPptx()">
        ⬇ PPTXをダウンロード
      </button>
      <span class="download-note">PowerPoint / Keynote で開けます</span>
    </div>
  </div>

  <footer>
    <p>⚠️ <strong>機密情報・個人情報の入力は禁止</strong>です。社外秘情報はVercel環境変数で管理してください。</p>
  </footer>

  <canvas id="chart-canvas" width="800" height="450"></canvas>

  <script>
    // 認証チェック
    if (localStorage.getItem('auth') !== '1') { location.href = '/'; }

    const USER = localStorage.getItem('user') || '';
    let selectedTemplate = 'external-white';
    let currentSlides = null;
    let refineCount = 0;
    const MAX_REFINE = 5;

    function selectTemplate(el) {
      document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedTemplate = el.dataset.val;
    }

    function getWizardData() {
      return {
        template: selectedTemplate,
        purpose: document.getElementById('purpose').value,
        slideCount: document.getElementById('slide-count').value,
        title: document.getElementById('title').value.trim(),
        audience: document.getElementById('audience').value.trim(),
        background: document.getElementById('background').value.trim(),
        messages: [...document.querySelectorAll('.msg-input')].map(i => i.value.trim()).filter(Boolean),
        supplement: document.getElementById('supplement').value.trim(),
        tone: document.getElementById('tone').value,
        language: document.getElementById('language').value,
      };
    }

    function validate(data) {
      if (!data.title) { showError('タイトルを入力してください。'); return false; }
      if (!data.audience) { showError('受け手・対象者を入力してください。'); return false; }
      if (!data.background) { showError('背景・課題を入力してください。'); return false; }
      if (data.messages.length === 0) { showError('伝えたいメッセージを1つ以上入力してください。'); return false; }
      return true;
    }

    function setLoading(active, step = '', progress = 10) {
      document.getElementById('loading-area').classList.toggle('active', active);
      document.getElementById('btn-generate').disabled = active;
      if (active) {
        document.getElementById('loading-step').textContent = step;
        document.getElementById('progress-fill').style.width = progress + '%';
      }
    }

    function setProgress(step, progress) {
      document.getElementById('loading-step').textContent = step;
      document.getElementById('progress-fill').style.width = progress + '%';
    }

    function showError(msg, retryFn = null) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('active');
      document.getElementById('btn-retry').style.display = retryFn ? 'inline-block' : 'none';
      if (retryFn) window._retryFn = retryFn;
    }

    function hideError() { document.getElementById('error-msg').classList.remove('active'); }

    function retryGenerate() { if (window._retryFn) window._retryFn(); }

    async function startGenerate() {
      hideError();
      const data = getWizardData();
      if (!validate(data)) return;
      await runGenerate(data);
    }

    async function runGenerate(data) {
      setLoading(true, '🔄 スライド構成を生成中…', 10);

      try {
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'generate', wizard: data, _user: USER }),
        });

        setProgress('🎨 プレビューを生成中…', 50);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (res.status === 429) throw new Error('しばらく時間をおいて再試行してください。');
          throw new Error(err.error || `APIエラー (${res.status})`);
        }

        const json = await res.json();
        if (json.error) throw new Error(json.error);

        currentSlides = json.slides;
        refineCount = 0;

        setProgress('📦 プレビューを組み立て中…', 80);
        renderPreview(currentSlides);

        setLoading(false);
        document.getElementById('preview-section').classList.add('active');
        document.getElementById('refine-section').classList.add('active');
        document.getElementById('download-area').classList.add('active');
        updateRefineCount();
        document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        setLoading(false);
        showError(err.message || 'スライドの生成に失敗しました。', () => runGenerate(data));
      }
    }

    async function refine() {
      const instruction = document.getElementById('refine-input').value.trim();
      if (!instruction) return;
      if (refineCount >= MAX_REFINE) { showError('リファイン上限（5回）に達しました。'); return; }
      if (!currentSlides) return;

      hideError();
      document.getElementById('btn-refine').disabled = true;
      document.getElementById('refine-input').disabled = true;

      try {
        const res = await fetch('/api/slide-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'refine', currentSlides, instruction, _user: USER }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `エラー (${res.status})`);
        }

        const json = await res.json();
        if (json.error) throw new Error(json.error);

        currentSlides = json.slides;
        refineCount++;
        renderPreview(currentSlides);
        document.getElementById('refine-input').value = '';
        updateRefineCount();

      } catch (err) {
        showError(err.message || 'リファインに失敗しました。');
      } finally {
        document.getElementById('btn-refine').disabled = false;
        document.getElementById('refine-input').disabled = false;
      }
    }

    function updateRefineCount() {
      const remaining = MAX_REFINE - refineCount;
      document.getElementById('refine-count').textContent =
        remaining > 0 ? `残り${remaining}回` : 'リファイン上限に達しました';
    }

    // ===== プレビューレンダリング =====
    function renderPreview(slides) {
      const grid = document.getElementById('slides-grid');
      grid.innerHTML = '';
      document.getElementById('slide-count-badge').textContent = `${slides.length}枚`;

      slides.forEach((slide, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'slide-thumb';
        thumb.innerHTML = `<div class="slide-num">${i + 1}</div>${buildSlideHtml(slide)}`;
        grid.appendChild(thumb);
      });
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function buildSlideHtml(slide) {
      const isDark = selectedTemplate.includes('dark');
      switch (slide.layout) {
        case 'cover':
          return `<div class="slide-inner slide-cover">
            <div class="s-title">${esc(slide.title)}</div>
            <div class="s-subtitle">${esc(slide.subtitle || '')}</div>
            <div class="s-date">${esc(slide.date || '')}</div>
          </div>`;
        case 'agenda':
          return `<div class="slide-inner slide-agenda">
            <div class="s-title">${esc(slide.title || 'Agenda')}</div>
            ${(slide.items || []).map((item, i) => `<div class="s-item">　${i+1}. ${esc(item)}</div>`).join('')}
          </div>`;
        case 'chapter':
          return `<div class="slide-inner slide-chapter">
            <div class="s-num">${esc(slide.number || '')}</div>
            <div class="s-title">${esc(slide.title)}</div>
          </div>`;
        case 'content':
        case 'content-with-chart':
        case 'content-with-flow':
          return `<div class="slide-inner slide-white">
            <div class="s-title">${esc(slide.title)}</div>
            <div class="s-body">${esc(slide.body || '').replace(/\n/g,'<br>')}</div>
            ${slide.chart ? `<div style="font-size:0.5em;background:#f0f2f5;padding:4px 8px;margin-top:4px;color:#8a9bb0;">📊 ${esc(slide.chart.title || 'グラフ')}</div>` : ''}
            ${slide.flow ? `<div style="font-size:0.5em;background:#f0f2f5;padding:4px 8px;margin-top:4px;color:#8a9bb0;">→ ${(slide.flow.steps||[]).join(' → ')}</div>` : ''}
          </div>`;
        case 'comparison':
          const table = slide.table || { headers: [], rows: [] };
          return `<div class="slide-inner slide-white">
            <div class="s-title">${esc(slide.title)}</div>
            <table class="slide-table" style="width:100%;border-collapse:collapse;margin-top:8px;">
              <tr>${(table.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('')}</tr>
              ${(table.rows||[]).map(row=>`<tr>${row.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}
            </table>
          </div>`;
        case 'closing':
          return `<div class="slide-inner slide-closing">
            <div class="s-msg">${esc(slide.message || 'Thank you')}</div>
          </div>`;
        default:
          return `<div class="slide-inner slide-white"><div class="s-title">${esc(slide.title||'')}</div></div>`;
      }
    }

    // ===== PPTX生成 =====
    async function downloadPptx() {
      if (!currentSlides) return;
      const btn = document.getElementById('btn-download');
      btn.disabled = true;
      btn.textContent = '⏳ PPTXを生成中…';

      try {
        const pptx = await buildPptx(currentSlides, selectedTemplate);
        const blob = await pptx.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const titleText = currentSlides[0]?.title || 'slide';
        const safe = titleText.replace(/[/\\:*?"<>|]/g, '_').slice(0, 40);
        a.download = `${safe}_${selectedTemplate}.pptx`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        showError('PPTXの生成に失敗しました: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '⬇ PPTXをダウンロード';
      }
    }

    // レイアウト → テンプレートスライド番号マッピング
    const LAYOUT_TO_TEMPLATE_SLIDE = {
      'cover': 1, 'agenda': 5, 'chapter': 3,
      'content': 7, 'content-with-chart': 7, 'content-with-flow': 7,
      'comparison': 12, 'closing': 15,
    };

    function escXml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
    }

    function buildPara(text) {
      return `<a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(text)}</a:t></a:r></a:p>`;
    }

    // 単純テキスト置換（単一<a:t>タグ内）
    function replaceText(xml, oldText, newText) {
      return xml.split(`<a:t>${oldText}</a:t>`).join(`<a:t>${escXml(newText)}</a:t>`);
    }

    // indexOf ベースで <p:sp> を特定し txBody を置換（regexより確実）
    function replaceShapeText(xml, phMatcher, lines) {
      const phPos = xml.indexOf(phMatcher);
      if (phPos === -1) return xml;
      const spStart = xml.lastIndexOf('<p:sp>', phPos);
      if (spStart === -1) return xml;
      const spEnd = xml.indexOf('</p:sp>', phPos) + 7;
      const spXml = xml.slice(spStart, spEnd);
      const txStart = spXml.indexOf('<a:txBody>');
      const txEnd = spXml.indexOf('</a:txBody>') + 11;
      if (txStart === -1 || txEnd < 11) return xml;
      const paras = (lines.filter(Boolean).length ? lines.filter(Boolean) : ['']).map(buildPara).join('');
      const newSp = spXml.slice(0, txStart) + `<a:txBody><a:bodyPr/><a:lstStyle/>${paras}</a:txBody>` + spXml.slice(txEnd);
      return xml.slice(0, spStart) + newSp + xml.slice(spEnd);
    }

    // <a:tbl> をデータで完全置換（comparison用）
    function replaceTableData(xml, headers, rows) {
      const tblStart = xml.indexOf('<a:tbl>');
      if (tblStart === -1) return xml;
      const tblEnd = xml.indexOf('</a:tbl>') + 8;
      const tblXml = xml.slice(tblStart, tblEnd);

      // tblPr を保持
      const tblPrM = tblXml.match(/<a:tblPr[^>]*(?:\/>|>[\s\S]*?<\/a:tblPr>)/);
      const tblPr = tblPrM ? tblPrM[0] : '<a:tblPr firstRow="1" bandRow="1"/>';

      // 既存 gridCol の合計幅を取得して均等分割
      let totalW = 0;
      const gridM = tblXml.match(/<a:tblGrid>[\s\S]*?<\/a:tblGrid>/);
      if (gridM) {
        const gwRe = /w="(\d+)"/g;
        let gm;
        while ((gm = gwRe.exec(gridM[0])) !== null) totalW += parseInt(gm[1]);
      }
      if (!totalW) totalW = 8229600;
      const colCount = Math.max(headers.length, ...rows.map(r => r.length), 1);
      const colW = Math.floor(totalW / colCount);
      const tblGrid = `<a:tblGrid>${Array(colCount).fill(`<a:gridCol w="${colW}"/>`).join('')}</a:tblGrid>`;

      // 既存セルから tcPr テンプレートを抽出
      const firstCellM = tblXml.match(/<a:tc\b[\s\S]*?<\/a:tc>/);
      const tcPrM = firstCellM ? firstCellM[0].match(/<a:tcPr[\s\S]*?(?:\/>|<\/a:tcPr>)/) : null;
      const tcPr = tcPrM ? tcPrM[0] : '';

      function makeCell(text, isHeader) {
        const rPr = isHeader
          ? `<a:rPr lang="ja-JP" dirty="0" b="1"/>`
          : `<a:rPr lang="ja-JP" dirty="0"/>`;
        return `<a:tc><a:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r>${rPr}<a:t>${escXml(String(text || ''))}</a:t></a:r></a:p></a:txBody>${tcPr}</a:tc>`;
      }
      function makeRow(cells, isHeader) {
        return `<a:tr h="370840">${cells.map(c => makeCell(c, isHeader)).join('')}</a:tr>`;
      }

      let newRows = '';
      if (headers.length > 0) newRows += makeRow(headers, true);
      rows.forEach(row => { newRows += makeRow(row, false); });

      return xml.slice(0, tblStart) + `<a:tbl>${tblPr}${tblGrid}${newRows}</a:tbl>` + xml.slice(tblEnd);
    }

    // content系スライドにタイトルshapeを追加（slide7にはtitleプレースホルダーがない）
    function addTitleShape(xml, titleText) {
      const sp = `<p:sp><p:nvSpPr><p:cNvPr id="901" name="SMTitle"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr><p:ph type="title"/></p:nvPr></p:nvSpPr><p:spPr/><p:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r><a:rPr lang="ja-JP" dirty="0"/><a:t>${escXml(titleText)}</a:t></a:r></a:p></a:txBody></p:sp>`;
      return xml.replace('</p:spTree>', `${sp}</p:spTree>`);
    }

    async function buildPptx(slides, templateId) {
      const response = await fetch(`templates/${templateId}.pptx`);
      if (!response.ok) throw new Error(`テンプレートの読み込みに失敗しました (${response.status})`);
      const zip = await JSZip.loadAsync(await response.arrayBuffer());

      const prsXml = await zip.file('ppt/presentation.xml').async('string');
      const prsRels = await zip.file('ppt/_rels/presentation.xml.rels').async('string');
      const contentTypes = await zip.file('[Content_Types].xml').async('string');

      // 元スライドのXML / relsをキャッシュ（テンプレートのスライド数を動的に取得）
      const slideFiles = Object.keys(zip.files)
        .filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f));
      const maxSlideNum = slideFiles.length > 0
        ? Math.max(...slideFiles.map(f => parseInt(f.match(/slide(\d+)\.xml/)[1])))
        : 16;
      const slideCache = {}, slideRelsCache = {};
      for (let i = 1; i <= maxSlideNum; i++) {
        const sf = zip.file(`ppt/slides/slide${i}.xml`);
        const rf = zip.file(`ppt/slides/_rels/slide${i}.xml.rels`);
        if (sf) slideCache[i] = await sf.async('string');
        if (rf) slideRelsCache[i] = await rf.async('string');
      }

      const newEntries = [];
      let imgCounter = 1;

      for (let i = 0; i < slides.length; i++) {
        const slide = slides[i];
        const srcNum = LAYOUT_TO_TEMPLATE_SLIDE[slide.layout] || 7;
        let xml = slideCache[srcNum] || slideCache[1];
        let rels = slideRelsCache[srcNum] || slideRelsCache[1];

        // コンテンツを適用（xmlとrelsを両方更新）
        const result = await applySlideContent(xml, rels, slide, zip, imgCounter);
        xml = result.xml;
        rels = result.rels;
        if (slide.chart || slide.flow) imgCounter++;

        const newNum = 200 + i;
        const rId = `rId${50 + i}`;
        newEntries.push({ num: newNum, rId, slideId: 500 + i });
        zip.file(`ppt/slides/slide${newNum}.xml`, xml);
        zip.file(`ppt/slides/_rels/slide${newNum}.xml.rels`, rels);
      }

      // presentation.xml のスライドリストを更新
      const sldIdLst = newEntries.map(e => `<p:sldId id="${e.slideId}" r:id="${e.rId}"/>`).join('');
      zip.file('ppt/presentation.xml',
        prsXml.replace(/<p:sldIdLst>[\s\S]*?<\/p:sldIdLst>/, `<p:sldIdLst>${sldIdLst}</p:sldIdLst>`)
      );

      // _rels/presentation.xml.rels を更新
      const slideRelsXml = newEntries.map(e =>
        `<Relationship Id="${e.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${e.num}.xml"/>`
      ).join('');
      zip.file('ppt/_rels/presentation.xml.rels',
        prsRels
          .replace(/<Relationship[^>]+relationships\/slide[^>]+\/>/g, '')
          .replace('</Relationships>', `${slideRelsXml}</Relationships>`)
      );

      // [Content_Types].xml を更新
      const ctSlides = newEntries.map(e =>
        `<Override PartName="/ppt/slides/slide${e.num}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`
      ).join('');
      zip.file('[Content_Types].xml',
        contentTypes
          .replace(/<Override PartName="\/ppt\/slides\/slide\d+\.xml"[^/]*\/>/g, '')
          .replace('</Types>', `${ctSlides}</Types>`)
      );

      // 元のスライドファイルを削除
      for (let i = 1; i <= maxSlideNum; i++) {
        zip.remove(`ppt/slides/slide${i}.xml`);
        zip.remove(`ppt/slides/_rels/slide${i}.xml.rels`);
      }

      return zip;
    }

    // 各スライドのコンテンツを適用して { xml, rels } を返す
    async function applySlideContent(xml, rels, slide, zip, imgIdx) {
      switch (slide.layout) {

        case 'cover':
          xml = replaceText(xml, 'Presentation Title', slide.title || '');
          xml = replaceText(xml, 'Presentation Subtitle', slide.subtitle || '');
          xml = replaceText(xml, 'Month YYYY', slide.date || new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' }));
          return { xml, rels };

        case 'agenda': {
          const items = slide.items || [];
          for (let j = 1; j <= 6; j++) {
            xml = replaceText(xml, `Chapter Title 0${j}`, items[j - 1] || '');
          }
          return { xml, rels };
        }

        case 'chapter':
          xml = replaceText(xml, 'Chapter Title', slide.title || '');
          xml = replaceText(xml, '1.0', slide.number || '');
          return { xml, rels };

        case 'content': {
          // slide7: titleプレースホルダーなし→addTitleShapeで注入
          // idx=29: 見出し（One Paragraph）→ slide.title
          // idx=30: サブタイトル（Lorem ipsum分割ラン）→ クリア
          // idx=32: 本文ボディ（Lorem ipsum分割ラン）→ slide.body
          xml = addTitleShape(xml, slide.title || '');
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', []);
          const lines = (slide.body || '').split('\n').filter(Boolean);
          xml = replaceShapeText(xml, 'idx="32"', lines.length ? lines : [slide.body || '']);
          return { xml, rels };
        }

        case 'content-with-chart': {
          xml = addTitleShape(xml, slide.title || '');
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', [slide.body || '']);
          xml = replaceShapeText(xml, 'idx="32"', []);
          if (slide.chart) {
            const png = await generateChartPng(slide.chart);
            const imgName = `sm_img${imgIdx}.png`;
            zip.file(`ppt/media/${imgName}`, png, { base64: true });
            const rId = `rIdImg${imgIdx}`;
            rels = rels.replace('</Relationships>',
              `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${imgName}"/></Relationships>`);
            xml = insertPicture(xml, rId, imgIdx);
          }
          return { xml, rels };
        }

        case 'content-with-flow': {
          xml = addTitleShape(xml, slide.title || '');
          xml = replaceShapeText(xml, 'idx="29"', [slide.title || '']);
          xml = replaceShapeText(xml, 'idx="30"', [slide.body || '']);
          xml = replaceShapeText(xml, 'idx="32"', []);
          if (slide.flow) {
            const png = await generateFlowPng(slide.flow.steps || []);
            const imgName = `sm_flow${imgIdx}.png`;
            zip.file(`ppt/media/${imgName}`, png, { base64: true });
            const rId = `rIdImg${imgIdx}`;
            rels = rels.replace('</Relationships>',
              `<Relationship Id="${rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${imgName}"/></Relationships>`);
            xml = insertPicture(xml, rId, imgIdx);
          }
          return { xml, rels };
        }

        case 'comparison': {
          // slide12: idx=30がテーブルタイトル、<a:tbl>をreplaceTableDataで完全置換
          xml = addTitleShape(xml, slide.title || '');
          xml = replaceShapeText(xml, 'idx="30"', [slide.title || '']);
          if (slide.table) {
            xml = replaceTableData(xml, slide.table.headers || [], slide.table.rows || []);
          }
          return { xml, rels };
        }

        case 'closing':
          xml = replaceText(xml, 'John SMITH', slide.message || 'Thank you');
          // テンプレートの正確な文字列に合わせる（末尾スペースなし、タブ文字あり）
          ['Function title',
           'M:\t+33 6 00 01 02 03',
           'E:\tjohn.smith@akkodis.com',
           'Paul JOHNSON',
           'Function Title',
           'M:\t+33 6 02 03 04 05',
           'E:\tpaul.jonhson@akkodis.com']
            .forEach(t => { xml = replaceText(xml, t, ''); });
          return { xml, rels };

        default:
          xml = addTitleShape(xml, slide.title || '');
          return { xml, rels };
      }
    }

    function insertPicture(xml, rId, idx) {
      // スライドサイズ: 9144000 x 6858000 EMU (10" x 7.5")
      // 下半分にチャートを配置: x=457200(0.5"), y=2400300(2.6"), w=8229600(9"), h=3886200(4.25")
      const pic = `<p:pic><p:nvPicPr><p:cNvPr id="${200 + idx}" name="img${idx}"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="457200" y="2400300"/><a:ext cx="8229600" cy="3886200"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic>`;
      return xml.replace('</p:spTree>', `${pic}</p:spTree>`);
    }

    async function generateChartPng(chartData) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('chart-canvas');
        canvas.style.display = 'block';
        canvas.width = 800;
        canvas.height = 500;
        const ctx = canvas.getContext('2d');

        // 既存チャートを破棄
        if (window._chartInstance) { window._chartInstance.destroy(); }

        const colors = ['#001f33', '#ffb81c', '#00ffff', '#8a9bb0', '#4a5568', '#e67e22'];

        const config = {
          type: chartData.type || 'bar',
          data: {
            labels: chartData.labels || [],
            datasets: [{
              label: chartData.title || '',
              data: chartData.data || [],
              backgroundColor: chartData.type === 'pie' || chartData.type === 'doughnut'
                ? colors.slice(0, (chartData.data || []).length)
                : '#001f33',
              borderColor: chartData.type === 'line' ? '#ffb81c' : 'transparent',
              borderWidth: chartData.type === 'line' ? 2 : 0,
              fill: false,
            }],
          },
          options: {
            animation: false,
            responsive: false,
            plugins: {
              legend: { display: chartData.type === 'pie' || chartData.type === 'doughnut' },
              title: {
                display: !!chartData.title,
                text: chartData.title || '',
                font: { size: 18, family: 'Meiryo UI, sans-serif', weight: 'bold' },
                color: '#001f33',
              },
            },
            scales: (chartData.type !== 'pie' && chartData.type !== 'doughnut') ? {
              y: {
                beginAtZero: true,
                ticks: { font: { family: 'Meiryo UI, sans-serif' } },
              },
              x: {
                ticks: { font: { family: 'Meiryo UI, sans-serif' } },
              },
            } : {},
          },
        };

        window._chartInstance = new Chart(ctx, config);

        setTimeout(() => {
          const dataUrl = canvas.toDataURL('image/png');
          canvas.style.display = 'none';
          if (window._chartInstance) { window._chartInstance.destroy(); window._chartInstance = null; }
          resolve(dataUrl.split(',')[1]);
        }, 200);
      });
    }

    async function generateFlowPng(steps) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('chart-canvas');
        canvas.style.display = 'block';
        canvas.width = 960;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 960, 400);

        // 背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 960, 400);

        const n = steps.length;
        const boxW = 140, boxH = 60, arrowW = 30;
        const totalW = n * boxW + (n - 1) * arrowW;
        const startX = (960 - totalW) / 2;
        const y = 170;

        steps.forEach((step, i) => {
          const x = startX + i * (boxW + arrowW);

          // ボックス
          ctx.fillStyle = '#001f33';
          ctx.fillRect(x, y, boxW, boxH);

          // テキスト
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 14px Meiryo UI, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          // テキスト折り返し（簡易）
          const words = step;
          ctx.fillText(words, x + boxW / 2, y + boxH / 2, boxW - 10);

          // ステップ番号
          ctx.fillStyle = '#ffb81c';
          ctx.font = 'bold 11px sans-serif';
          ctx.fillText(`${i + 1}`, x + boxW / 2, y - 20);

          // 矢印
          if (i < n - 1) {
            const arrowX = x + boxW;
            ctx.fillStyle = '#ffb81c';
            ctx.beginPath();
            ctx.moveTo(arrowX + 5, y + boxH / 2);
            ctx.lineTo(arrowX + arrowW - 5, y + boxH / 2 - 10);
            ctx.lineTo(arrowX + arrowW - 5, y + boxH / 2 + 10);
            ctx.closePath();
            ctx.fill();
          }
        });

        const dataUrl = canvas.toDataURL('image/png');
        canvas.style.display = 'none';
        resolve(dataUrl.split(',')[1]);
      });
    }
  </script>
</body>
</html>
