<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テトリス</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #game-area {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #mainCanvas {
      background: #0d1117;
      border: 2px solid #e94560;
      border-radius: 4px;
      display: block;
    }

    #side-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 130px;
    }

    .panel-box {
      background: #16213e;
      border: 2px solid #457b9d;
      border-radius: 6px;
      padding: 10px 14px;
    }

    .panel-box h3 {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .panel-box .value {
      font-size: 1.5rem;
      color: #a8dadc;
      font-weight: bold;
    }

    #nextCanvas {
      background: #0d1117;
      border-radius: 3px;
      display: block;
      margin: 0 auto;
    }

    #message {
      margin-top: 16px;
      font-size: 1.15rem;
      min-height: 1.5em;
      color: #f1fa8c;
      text-align: center;
    }

    #instructions {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #666;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>テトリス</h1>
  <div id="game-area">
    <canvas id="mainCanvas" width="300" height="600"></canvas>
    <div id="side-panel">
      <div class="panel-box">
        <h3>スコア</h3>
        <div class="value" id="score">0</div>
      </div>
      <div class="panel-box">
        <h3>ライン</h3>
        <div class="value" id="lines">0</div>
      </div>
      <div class="panel-box">
        <h3>レベル</h3>
        <div class="value" id="level">1</div>
      </div>
      <div class="panel-box">
        <h3>次のピース</h3>
        <canvas id="nextCanvas" width="100" height="80"></canvas>
      </div>
    </div>
  </div>
  <div id="message">スペースキーでスタート</div>
  <div id="instructions">
    ← → 移動 &nbsp;|&nbsp; ↑ / Z 回転<br>
    ↓ ソフトドロップ &nbsp;|&nbsp; スペース ハードドロップ<br>
    P ポーズ
  </div>
  <script src="main.js"></script>
</body>
</html>
