<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGP Checker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      color: #2d3436;
      min-height: 100vh;
    }

    .navbar {
      background: #001f33;
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      padding: 6px 14px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 40px 80px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #001f33; letter-spacing: -0.01em; margin-bottom: 4px; }
    .subtitle { font-size: 0.82rem; color: #8a9bb0; margin-bottom: 20px; }

    .input-row { display: flex; gap: 12px; margin-bottom: 16px; }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e8ecf0;
      background: #fff;
      font-size: 0.95rem;
      color: #2d3436;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]::placeholder { color: #b2bec3; }
    input[type="text"]:focus {
      border-color: #ffb81c;
      box-shadow: 0 0 0 3px rgba(255,184,28,0.12);
    }

    .check-btn {
      padding: 12px 28px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,184,28,0.25);
      white-space: nowrap;
    }
    .check-btn:hover { opacity: 0.88; }
    .check-btn:active { transform: scale(0.99); }
    .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,31,51,0.3);
      border-top-color: #001f33;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e17055;
      font-size: 0.85rem;
      padding: 12px 16px;
      background: #fff5f4;
      border: 1.5px solid #fab1a0;
      margin-bottom: 16px;
      display: none;
    }

    /* ── バリデーション スコアカード ── */
    .score-card {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: none;
    }
    .score-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .score-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #b2bec3; white-space: nowrap; }
    .score-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 12px;
      
    }
    .badge-ok    { background: #f0fdf8; color: #00695c; border: 1.5px solid #b2dfdb; }
    .badge-warn  { background: #fffde7; color: #b45309; border: 1.5px solid #fcd34d; }
    .badge-error { background: #fff5f4; color: #c0392b; border: 1.5px solid #fab1a0; }

    .val-list { display: flex; flex-direction: column; gap: 4px; }
    /* OK は小さくシンプルに */
    .val-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      font-size: 0.82rem;
      
    }
    .val-ok    { background: #f8fffe; color: #2d7a6b; }
    .val-warn  { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; padding: 7px 10px; }
    .val-error { background: #fff5f4; border: 1px solid #fab1a0; color: #c0392b; padding: 7px 10px; }
    .val-icon { flex-shrink: 0; font-size: 0.85rem; }
    .val-msg { line-height: 1.4; }

    /* ── タブ ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: #fff;
      border: 1.5px solid #e8ecf0;
      padding: 6px;
    }
    .tab-btn {
      padding: 7px 16px;
      background: none;
      border: none;
      font-size: 0.83rem;
      font-weight: 600;
      color: #8a9bb0;
      cursor: pointer;
      transition: all 0.15s;
      
    }
    .tab-btn:hover { color: #2d3436; background: #f0f2f5; }
    .tab-btn.active { color: #001f33; background: #ffb81c; }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── タグテーブル ── */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a9bb0;
      margin-bottom: 10px;
      margin-top: 24px;
    }
    .section-label:first-child { margin-top: 0; }

    .tag-card {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      margin-bottom: 16px;
    }
    .tag-table { width: 100%; border-collapse: collapse; }
    .tag-table th, .tag-table td {
      padding: 9px 14px;
      text-align: left;
      font-size: 0.83rem;
      border-bottom: 1px solid #f0f2f5;
    }
    .tag-table th {
      background: #f8f9fb;
      font-weight: 700;
      color: #636e72;
      width: 210px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
    }
    .tag-table tr:last-child th,
    .tag-table tr:last-child td { border-bottom: none; }
    .tag-table td { color: #2d3436; word-break: break-all; line-height: 1.5; }
    .tag-missing { color: #b2bec3; font-style: italic; }
    .tag-ok   { color: #2d3436; } /* 正常時はニュートラル */
    .tag-warn { color: #b45309; font-weight: 600; background: #fffbeb; padding: 1px 6px; }

    /* ── SNSプレビュー ── */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .preview-card { background: #fff; border: 1.5px solid #e8ecf0; }
    .preview-card-header {
      padding: 9px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #636e72;
      border-bottom: 1.5px solid #e8ecf0;
      background: #f8f9fb;
    }
    .preview-card-body { padding: 14px; }

    /* Twitter/X */
    .tw-card { border: 1px solid #cfd9de;  overflow: hidden; font-family: -apple-system, 'Segoe UI', sans-serif; }
    .tw-image { width: 100%; aspect-ratio: 600/314; background: #e8ecf0; display: flex; align-items: center; justify-content: center; color: #b2bec3; font-size: 0.78rem; overflow: hidden; }
    .tw-image img { width: 100%; height: 100%; object-fit: cover; }
    .tw-info { padding: 10px 12px; }
    .tw-domain { font-size: 0.73rem; color: #536471; margin-bottom: 3px; }
    .tw-title { font-size: 0.88rem; font-weight: 700; color: #0f1419; line-height: 1.3; margin-bottom: 3px; }
    .tw-desc { font-size: 0.8rem; color: #536471; line-height: 1.4; }

    /* Facebook */
    .fb-card { font-family: Arial, sans-serif; }
    .fb-image { width: 100%; aspect-ratio: 1200/628; background: #e8ecf0; display: flex; align-items: center; justify-content: center; color: #b2bec3; font-size: 0.78rem; overflow: hidden; }
    .fb-image img { width: 100%; height: 100%; object-fit: cover; }
    .fb-info { padding: 10px 12px; background: #f0f2f5; border-top: 1px solid #dadde1; }
    .fb-domain { font-size: 0.72rem; color: #606770; text-transform: uppercase; margin-bottom: 3px; }
    .fb-title { font-size: 0.88rem; font-weight: 600; color: #1d2129; line-height: 1.3; margin-bottom: 3px; }
    .fb-desc { font-size: 0.8rem; color: #606770; line-height: 1.4; }

    /* LINE */
    .line-card { border: 1px solid #e0e0e0;  overflow: hidden; display: flex; }
    .line-thumb { width: 90px; flex-shrink: 0; aspect-ratio: 1; background: #e8ecf0; display: flex; align-items: center; justify-content: center; color: #b2bec3; font-size: 0.72rem; overflow: hidden; }
    .line-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .line-info { padding: 10px 12px; flex: 1; min-width: 0; }
    .line-title { font-size: 0.85rem; font-weight: 700; color: #333; line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .line-desc { font-size: 0.75rem; color: #888; line-height: 1.4; }
    .line-domain { font-size: 0.7rem; color: #aaa; margin-top: 5px; }

    /* LinkedIn */
    .li-card { border: 1px solid #e0e0e0;  overflow: hidden; background: #fff; }
    .li-image { width: 100%; aspect-ratio: 1200/627; background: #e8ecf0; display: flex; align-items: center; justify-content: center; color: #b2bec3; font-size: 0.78rem; overflow: hidden; }
    .li-image img { width: 100%; height: 100%; object-fit: cover; }
    .li-info { padding: 10px 12px; background: #f3f2ef; border-top: 1px solid #e0e0e0; }
    .li-title { font-size: 0.88rem; font-weight: 600; color: rgba(0,0,0,0.9); line-height: 1.3; margin-bottom: 3px; }
    .li-domain { font-size: 0.72rem; color: rgba(0,0,0,0.6); }

    /* 構造化データ */
    .json-block {
      background: #1e2a35;
      color: #a8d8a8;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      padding: 16px;
      overflow-x: auto;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .no-data {
      padding: 32px;
      text-align: center;
      color: #b2bec3;
      font-size: 0.85rem;
      background: #fff;
      border: 1.5px solid #e8ecf0;
    }

    .result-area { display: none; }

    /* ── 履歴 ── */
    .history-wrap {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      align-items: center;
    }
    .history-label { font-size: 0.72rem; color: #b2bec3; font-weight: 600; white-space: nowrap; }
    .history-chip {
      font-size: 0.75rem;
      padding: 3px 10px;
      background: #fff;
      border: 1.5px solid #e8ecf0;
      color: #636e72;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .history-chip:hover { border-color: #ffb81c; color: #001f33; }

    /* ── コピーボタン ── */
    .copy-tags-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: #001f33;
      color: #fff;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .copy-tags-btn:hover { opacity: 0.8; }
    .copy-tags-btn.copied { background: #00b894; }

    /* ── og:image サムネイル ── */
    .ogimage-thumb-wrap {
      margin-top: 12px;
      border-top: 1px solid #f0f2f5;
      padding-top: 12px;
    }
    .ogimage-thumb-wrap img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
      border: 1px solid #e8ecf0;
      background: #f8f9fb;
      display: block;
    }
    .ogimage-thumb-label {
      font-size: 0.72rem;
      color: #b2bec3;
      margin-top: 5px;
    }

    /* ── Google検索プレビュー ── */
    .google-preview-card {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      padding: 20px 24px;
    }
    .gp-site {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .gp-favicon {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #e8ecf0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #8a9bb0; flex-shrink: 0;
      overflow: hidden;
    }
    .gp-favicon img { width: 100%; height: 100%; object-fit: cover; }
    .gp-domain { font-size: 0.82rem; color: #202124; line-height: 1.3; }
    .gp-breadcrumb { font-size: 0.78rem; color: #4d5156; }
    .gp-title {
      font-size: 1.1rem;
      color: #1a0dab;
      font-family: arial, sans-serif;
      line-height: 1.3;
      margin-bottom: 4px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gp-title.over { color: #c0392b; }
    .gp-desc {
      font-size: 0.85rem;
      color: #4d5156;
      font-family: arial, sans-serif;
      line-height: 1.58;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .gp-char-hint {
      margin-top: 6px;
      font-size: 0.73rem;
      color: #b2bec3;
    }
    .gp-char-over { color: #e17055; font-weight: 600; }

    /* ── Markdownコピーボタン ── */
    .copy-md-btn {
      margin-left: auto;
      padding: 4px 12px;
      background: none;
      border: 1.5px solid #e8ecf0;
      color: #8a9bb0;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .copy-md-btn:hover { border-color: #001f33; color: #001f33; }
    .copy-md-btn.copied { border-color: #00b894; color: #00b894; }

    /* ── 結果コピーボタン ── */
    .copy-result-btn {
      display: none;
      padding: 7px 16px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
      margin-top: 14px;
    }
    .copy-result-btn:hover { opacity: 0.85; }
    .copy-result-btn.copied { background: #00b894; color: #fff; }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <a href="../../" class="back-btn">← アプリ一覧へ</a>
      <div class="navbar-divider"></div>
      <img src="../../assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:22px;display:block;">
      <div class="navbar-divider"></div>
      <span class="navbar-title">OGP Checker</span>
    </div>
  </nav>

  <div class="container">
    <h1>OGP Checker</h1>
    <p class="subtitle">URLを入力してSNS表示・OGP・SEO・構造化データを一括確認</p>

    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://example.com/your-page" autocomplete="off" />
      <button class="check-btn" id="check-btn">チェック</button>
    </div>
    <div class="history-wrap" id="history-wrap">
      <span class="history-label">履歴</span>
      <div id="history-chips"></div>
    </div>
    <div class="error-msg" id="error-msg"></div>

    <div class="result-area" id="result-area">

      <!-- バリデーション -->
      <div class="score-card" id="score-card">
        <div class="score-header">
          <span class="score-label">バリデーション</span>
          <div class="score-badges" id="score-badges"></div>
          <button class="copy-md-btn" id="copy-md-btn">📄 Markdownでコピー</button>
        </div>
        <div class="val-list" id="val-list"></div>
        <button class="copy-result-btn" id="copy-result-btn">📋 結果をコピー</button>
        <div id="ogimage-preview" style="display:none;"></div>
      </div>

      <!-- タブ -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="preview">SNSプレビュー</button>
        <button class="tab-btn" data-tab="ogp">OGP / SNSタグ</button>
        <button class="tab-btn" data-tab="seo">SEO</button>
        <button class="tab-btn" data-tab="structured">構造化データ</button>
      </div>

      <!-- SNSプレビュー -->
      <div class="tab-pane active" id="tab-preview">
        <div class="preview-grid" id="preview-grid"></div>
      </div>

      <!-- OGP / SNSタグ -->
      <div class="tab-pane" id="tab-ogp">
        <button class="copy-tags-btn" id="copy-tags-btn">📋 メタタグをHTMLコピー</button>
        <div class="section-label">Open Graph</div>
        <div class="tag-card"><table class="tag-table" id="ogp-table"></table></div>
        <div class="section-label">Twitter Card</div>
        <div class="tag-card"><table class="tag-table" id="tw-table"></table></div>
      </div>

      <!-- SEO -->
      <div class="tab-pane" id="tab-seo">
        <div class="section-label">Google 検索プレビュー</div>
        <div class="google-preview-card" id="google-preview"></div>
        <div class="section-label" style="margin-top:20px;">SEO タグ</div>
        <div class="tag-card"><table class="tag-table" id="seo-table"></table></div>
      </div>

      <!-- 構造化データ -->
      <div class="tab-pane" id="tab-structured">
        <div id="structured-area"></div>
      </div>

    </div>
  </div>

  <script>
    if (localStorage.getItem('auth') !== '1') { location.href = '/'; }
    // ── フェッチ（自前APIルート → 公開プロキシのフォールバック）──
    async function fetchPage(url) {
      const enc = encodeURIComponent(url);

      // 1st: 自前 Vercel API（ブラウザ風ヘッダーで取得）
      try {
        const res = await fetch('/api/ogp?url=' + enc, {
          signal: AbortSignal.timeout(12000),
        });
        if (res.ok) {
          const html = await res.text();
          if (html.trim().startsWith('<') || html.includes('<html')) return html;
        }
      } catch {}

      // 2nd: allorigins.win（フォールバック）
      const res = await fetch('https://api.allorigins.win/get?url=' + enc, {
        signal: AbortSignal.timeout(12000),
      });
      if (!res.ok) throw new Error(`HTTPエラー: ${res.status}`);
      const data = await res.json();
      if (!data.contents) throw new Error('ページの取得に失敗しました');
      return data.contents;
    }

    // ── タグ取得ヘルパー ──────────────────────────────────
    function getMeta(doc, prop) {
      const el = doc.querySelector(`meta[property="${prop}"]`) ||
                 doc.querySelector(`meta[name="${prop}"]`);
      return el ? (el.getAttribute('content') || '') : '';
    }
    function getLink(doc, rel) {
      const el = doc.querySelector(`link[rel="${rel}"]`);
      return el ? (el.getAttribute('href') || '') : '';
    }
    function getDomain(url) {
      try { return new URL(url).hostname; } catch { return url; }
    }
    function trunc(str, n) {
      return str && str.length > n ? str.slice(0, n) + '…' : (str || '');
    }
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── エラー表示 ────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError() { document.getElementById('error-msg').style.display = 'none'; }

    // ── タグテーブル描画 ──────────────────────────────────
    function renderTable(id, rows) {
      document.getElementById(id).innerHTML = rows.map(([key, val, cls]) => `
        <tr>
          <th>${key}</th>
          <td>${val
            ? `<span class="${cls || ''}">${escHtml(val)}</span>`
            : '<span class="tag-missing">（未設定）</span>'
          }</td>
        </tr>
      `).join('');
    }

    // ── バリデーション ────────────────────────────────────
    function renderValidation(ogp, seo, imgSize) {
      const items = [];

      const addItem = (type, msg) => items.push({ type, msg });

      // OGP
      if (!ogp.title)                    addItem('error', 'og:title が未設定です');
      else if (ogp.title.length > 70)    addItem('warn',  `og:title が ${ogp.title.length} 文字です（Twitter/X は約70文字で切れます）`);
      else                               addItem('ok',    `og:title OK（${ogp.title.length} 文字）`);

      if (!ogp.description)              addItem('error', 'og:description が未設定です');
      else if (ogp.description.length > 155) addItem('warn', `og:description が ${ogp.description.length} 文字です（推奨155文字以内）`);
      else                               addItem('ok',    `og:description OK（${ogp.description.length} 文字）`);

      if (!ogp.image) {
        addItem('error', 'og:image が未設定です（SNSシェア時に画像が表示されません）');
      } else if (imgSize) {
        const { width, height } = imgSize;
        if (width < 1200 || height < 630) {
          addItem('warn', `og:image サイズが ${width}×${height}px です（推奨: 1200×630px 以上）`);
        } else {
          addItem('ok', `og:image OK（${width}×${height}px）`);
        }
      } else {
        addItem('ok', 'og:image が設定されています（サイズ取得不可）');
      }


      // SEO（og:titleと別の値の場合のみチェック）
      if (seo.title && seo.title !== ogp.title) {
        if (seo.title.length > 70) addItem('warn', `<title> が ${seo.title.length} 文字です（Google検索は約70文字で切れます）`);
        else                       addItem('ok',   `<title> OK（${seo.title.length} 文字）`);
      }

      if (!seo.metaDesc)                  addItem('warn',  'meta description が未設定です');
      else if (seo.metaDesc.length > 160) addItem('warn',  `meta description が ${seo.metaDesc.length} 文字です（推奨160文字以内）`);
      else                                addItem('ok',    `meta description OK（${seo.metaDesc.length} 文字）`);

      if (!seo.canonical) addItem('warn', 'canonical URL が未設定です');
      else                addItem('ok',   'canonical が設定されています');

      // カウント
      const ok    = items.filter(i => i.type === 'ok').length;
      const warn  = items.filter(i => i.type === 'warn').length;
      const error = items.filter(i => i.type === 'error').length;

      const icons = { ok: '✅', warn: '⚠️', error: '❌' };
      document.getElementById('val-list').innerHTML = items.map(i => `
        <div class="val-item val-${i.type}">
          <span class="val-icon">${icons[i.type]}</span>
          <span class="val-msg">${i.msg}</span>
        </div>
      `).join('');

      document.getElementById('score-badges').innerHTML = `
        <span class="badge badge-ok">✅ ${ok}</span>
        <span class="badge badge-warn">⚠️ ${warn}</span>
        <span class="badge badge-error">❌ ${error}</span>
      `;
      document.getElementById('score-card').style.display = 'block';
      document.getElementById('copy-result-btn').style.display = 'inline-block';
      _lastValidationItems = items;

      // og:image サムネイル
      const imgPreview = document.getElementById('ogimage-preview');
      if (ogp.image) {
        imgPreview.innerHTML = `
          <div class="ogimage-thumb-wrap">
            <img src="${escHtml(ogp.image)}" alt="og:image"
                 onerror="this.parentElement.innerHTML='<span style=\'color:#b2bec3;font-size:0.78rem;\'>（画像読み込み失敗）</span>'" />
            <div class="ogimage-thumb-label">og:image プレビュー</div>
          </div>`;
        imgPreview.style.display = 'block';
      } else {
        imgPreview.style.display = 'none';
      }
    }

    // ── SNSプレビュー描画 ─────────────────────────────────
    function imgBlock(src, cls) {
      if (!src) return `<div class="${cls}">画像なし</div>`;
      return `<div class="${cls}"><img src="${escHtml(src)}" alt="" onerror="this.parentElement.innerHTML='（画像読み込み失敗）'" /></div>`;
    }

    function renderPreviews(ogp, url) {
      const domain = getDomain(url);
      const title  = ogp.title || '（タイトルなし）';
      const desc   = ogp.description || '（説明なし）';

      const previews = [
        {
          name: 'Twitter / X',
          html: `<div class="tw-card">
            ${imgBlock(ogp.image, 'tw-image')}
            <div class="tw-info">
              <div class="tw-domain">${escHtml(domain)}</div>
              <div class="tw-title">${escHtml(trunc(title, 70))}</div>
              <div class="tw-desc">${escHtml(trunc(desc, 120))}</div>
            </div></div>`,
        },
        {
          name: 'Facebook',
          html: `<div class="fb-card">
            ${imgBlock(ogp.image, 'fb-image')}
            <div class="fb-info">
              <div class="fb-domain">${escHtml(domain)}</div>
              <div class="fb-title">${escHtml(trunc(title, 90))}</div>
              <div class="fb-desc">${escHtml(trunc(desc, 150))}</div>
            </div></div>`,
        },
        {
          name: 'LINE',
          html: `<div class="line-card">
            ${ogp.image
              ? `<div class="line-thumb"><img src="${escHtml(ogp.image)}" alt="" onerror="this.parentElement.innerHTML=''" /></div>`
              : '<div class="line-thumb">画像なし</div>'}
            <div class="line-info">
              <div class="line-title">${escHtml(trunc(title, 50))}</div>
              <div class="line-desc">${escHtml(trunc(desc, 80))}</div>
              <div class="line-domain">${escHtml(domain)}</div>
            </div></div>`,
        },
        {
          name: 'LinkedIn',
          html: `<div class="li-card">
            ${imgBlock(ogp.image, 'li-image')}
            <div class="li-info">
              <div class="li-title">${escHtml(trunc(title, 120))}</div>
              <div class="li-domain">${escHtml(domain)}</div>
            </div></div>`,
        },
      ];

      document.getElementById('preview-grid').innerHTML = previews.map(p => `
        <div class="preview-card">
          <div class="preview-card-header">${p.name}</div>
          <div class="preview-card-body">${p.html}</div>
        </div>
      `).join('');
    }

    // ── Google検索プレビュー描画 ──────────────────────────
    function renderGooglePreview(seo, url) {
      const el = document.getElementById('google-preview');
      const title = seo.title || '（タイトルなし）';
      const desc  = seo.metaDesc || '（meta descriptionなし）';
      const titleOver = title.length > 70;
      const descOver  = desc.length > 160;

      let domain = '';
      let breadcrumb = '';
      try {
        const u = new URL(url);
        domain = u.hostname;
        const path = u.pathname.replace(/\/$/, '').split('/').filter(Boolean);
        breadcrumb = path.length > 0 ? u.hostname + ' › ' + path.join(' › ') : u.hostname;
      } catch {}

      el.innerHTML = `
        <div class="gp-site">
          <div class="gp-favicon">
            <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32" alt=""
                 onerror="this.parentElement.textContent='G'">
          </div>
          <div>
            <div class="gp-domain">${escHtml(domain)}</div>
            <div class="gp-breadcrumb">${escHtml(breadcrumb)}</div>
          </div>
        </div>
        <div class="gp-title ${titleOver ? 'over' : ''}">${escHtml(title)}</div>
        <div class="gp-desc">${escHtml(desc)}</div>
        <div class="gp-char-hint">
          タイトル: <span class="${titleOver ? 'gp-char-over' : ''}">${title.length}文字</span>（推奨70文字以内）
          説明文: <span class="${descOver ? 'gp-char-over' : ''}">${desc.length}文字</span>（推奨160文字以内）
        </div>
      `;
    }

    // ── 構造化データ描画 ──────────────────────────────────
    function renderStructured(jsonLdList, microdataItems, hasH1) {
      const area = document.getElementById('structured-area');
      const parts = [];

      if (jsonLdList.length > 0) {
        parts.push(jsonLdList.map((raw, i) => {
          let pretty = raw;
          try { pretty = JSON.stringify(JSON.parse(raw), null, 2); } catch {}
          return `
            <div class="section-label">JSON-LD${jsonLdList.length > 1 ? ` #${i + 1}` : ''}</div>
            <div class="json-block">${escHtml(pretty)}</div>
          `;
        }).join(''));
      }

      if (microdataItems.length > 0) {
        parts.push(`<div class="section-label">Microdata</div>`);
        parts.push(microdataItems.map(item => {
          const propsJson = JSON.stringify(item.props, null, 2);
          return `
            <div style="font-size:0.75rem;color:#8a9bb0;margin:4px 0 4px;font-family:'Courier New',monospace;">${escHtml(item.type)}</div>
            <div class="json-block">${escHtml(propsJson)}</div>
          `;
        }).join(''));
      }

      if (parts.length === 0) {
        const jsNote = !hasH1
          ? '<br><span style="font-size:0.8rem;color:#b2bec3;">※ このページはJavaScriptでレンダリングされているため、静的取得では構造化データを確認できません</span>'
          : '';
        area.innerHTML = `<div class="no-data">構造化データ（JSON-LD / Microdata）が見つかりませんでした${jsNote}</div>`;
        return;
      }

      area.innerHTML = parts.join('');
    }

    // ── チェック履歴 ─────────────────────────────────────
    const HISTORY_KEY = 'ogp_checker_history';
    const HISTORY_MAX = 5;

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
    }
    function saveHistory(url) {
      let history = loadHistory().filter(u => u !== url);
      history.unshift(url);
      history = history.slice(0, HISTORY_MAX);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }
    function renderHistory() {
      const history = loadHistory();
      const wrap = document.getElementById('history-wrap');
      const chips = document.getElementById('history-chips');
      if (history.length === 0) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'flex';
      chips.innerHTML = history.map(url => {
        const label = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
        return `<button class="history-chip" title="${escHtml(url)}">${escHtml(trunc(label, 40))}</button>`;
      }).join('');
      chips.querySelectorAll('.history-chip').forEach((btn, i) => {
        btn.addEventListener('click', () => {
          document.getElementById('url-input').value = history[i];
          check();
        });
      });
    }

    // ── og:image 実サイズチェック ─────────────────────────
    function checkImageSize(imageUrl) {
      return new Promise(resolve => {
        if (!imageUrl) { resolve(null); return; }
        const img = new Image();
        const timeout = setTimeout(() => resolve(null), 8000);
        img.onload = () => {
          clearTimeout(timeout);
          resolve({ width: img.naturalWidth, height: img.naturalHeight });
        };
        img.onerror = () => { clearTimeout(timeout); resolve(null); };
        img.src = imageUrl;
      });
    }

    // ── チェック結果プレーンテキストコピー ───────────────
    let _lastValidationItems = [];
    let _lastCheckedUrl = '';
    let _lastSeo = null;

    function copyResult() {
      if (!_lastCheckedUrl || !_lastValidationItems.length) return;
      const icons = { ok: '[OK]', warn: '[警告]', error: '[エラー]' };
      const ok    = _lastValidationItems.filter(i => i.type === 'ok').length;
      const warn  = _lastValidationItems.filter(i => i.type === 'warn').length;
      const error = _lastValidationItems.filter(i => i.type === 'error').length;

      const lines = [];
      lines.push('OGP チェック結果');
      lines.push('================');
      lines.push(`URL   : ${_lastCheckedUrl}`);
      lines.push(`日時  : ${new Date().toLocaleString('ja-JP')}`);
      lines.push('');
      lines.push(`スコア: OK ${ok}件 / 警告 ${warn}件 / エラー ${error}件`);
      lines.push('');
      lines.push('--- チェック項目 ---');
      _lastValidationItems.forEach(i => {
        lines.push(`${icons[i.type]} ${i.msg}`);
      });

      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const btn = document.getElementById('copy-result-btn');
        btn.classList.add('copied');
        btn.textContent = '✅ コピーしました';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.textContent = '📋 結果をコピー';
        }, 2000);
      }).catch(() => alert('クリップボードへのコピーに失敗しました'));
    }

    // ── Markdownレポートコピー ────────────────────────────

    function copyMarkdown() {
      if (!_lastOgp || !_lastCheckedUrl) return;
      const o = _lastOgp;
      const s = _lastSeo;
      const icons = { ok: '✅', warn: '⚠️', error: '❌' };
      const lines = [];

      lines.push(`# OGP チェック結果`);
      lines.push(`**URL:** ${_lastCheckedUrl}`);
      lines.push(`**日時:** ${new Date().toLocaleString('ja-JP')}`);
      lines.push('');
      lines.push('## バリデーション');
      _lastValidationItems.forEach(i => lines.push(`- ${icons[i.type]} ${i.msg}`));
      lines.push('');
      lines.push('## OGP タグ');
      lines.push('| タグ | 値 |');
      lines.push('|------|-----|');
      [['og:title', o.title], ['og:description', o.description], ['og:image', o.image],
       ['og:url', o.url], ['og:type', o.type], ['og:site_name', o.siteName]].forEach(([k, v]) => {
        lines.push(`| \`${k}\` | ${v || '（未設定）'} |`);
      });
      if (s) {
        lines.push('');
        lines.push('## SEO');
        lines.push('| 項目 | 値 |');
        lines.push('|------|-----|');
        [['title', s.title], ['meta description', s.metaDesc], ['canonical', s.canonical],
         ['robots', s.robots], ['h1', s.h1], ['lang', s.lang]].forEach(([k, v]) => {
          lines.push(`| ${k} | ${v || '（未設定）'} |`);
        });
      }

      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const btn = document.getElementById('copy-md-btn');
        btn.classList.add('copied');
        btn.textContent = '✅ コピーしました';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📄 Markdownでコピー'; }, 2000);
      }).catch(() => alert('クリップボードへのコピーに失敗しました'));
    }

    // ── メタタグ HTML コピー ──────────────────────────────
    let _lastOgp = null;
    function copyMetaTags() {
      if (!_lastOgp) return;
      const o = _lastOgp;
      const lines = [];
      if (o.title)        lines.push(`<meta property="og:title" content="${o.title.replace(/"/g, '&quot;')}">`);
      if (o.description)  lines.push(`<meta property="og:description" content="${o.description.replace(/"/g, '&quot;')}">`);
      if (o.image)        lines.push(`<meta property="og:image" content="${o.image}">`);
      if (o.url)          lines.push(`<meta property="og:url" content="${o.url}">`);
      if (o.type)         lines.push(`<meta property="og:type" content="${o.type}">`);
      if (o.siteName)     lines.push(`<meta property="og:site_name" content="${o.siteName.replace(/"/g, '&quot;')}">`);
      if (o.twitterCard)  lines.push(`<meta name="twitter:card" content="${o.twitterCard}">`);
      if (o.twitterTitle) lines.push(`<meta name="twitter:title" content="${o.twitterTitle.replace(/"/g, '&quot;')}">`);
      if (o.twitterDesc)  lines.push(`<meta name="twitter:description" content="${o.twitterDesc.replace(/"/g, '&quot;')}">`);
      if (o.twitterImage) lines.push(`<meta name="twitter:image" content="${o.twitterImage}">`);
      const text = lines.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-tags-btn');
        btn.classList.add('copied');
        btn.textContent = '✅ コピーしました';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '📋 メタタグをHTMLコピー'; }, 2000);
      }).catch(() => { alert('クリップボードへのコピーに失敗しました'); });
    }

    // ── メイン処理 ────────────────────────────────────────
    async function check() {
      hideError();
      const url = document.getElementById('url-input').value.trim();
      if (!url || !/^https?:\/\//.test(url)) {
        showError('有効なURLを入力してください（http:// または https://）');
        return;
      }

      const btn = document.getElementById('check-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>取得中...';
      document.getElementById('result-area').style.display = 'none';
      document.getElementById('score-card').style.display = 'none';

      try {
        let html;
        try {
          html = await fetchPage(url);
        } catch (e) {
          throw new Error('プロキシ経由での取得に失敗しました。サイトがプロキシをブロックしているか、URLが正しくない可能性があります。');
        }
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // OGP
        const ogp = {
          title:        getMeta(doc, 'og:title') || doc.querySelector('title')?.textContent?.trim() || '',
          description:  getMeta(doc, 'og:description'),
          image:        getMeta(doc, 'og:image'),
          url:          getMeta(doc, 'og:url') || url,
          type:         getMeta(doc, 'og:type'),
          siteName:     getMeta(doc, 'og:site_name'),
          twitterCard:  getMeta(doc, 'twitter:card'),
          twitterTitle: getMeta(doc, 'twitter:title'),
          twitterDesc:  getMeta(doc, 'twitter:description'),
          twitterImage: getMeta(doc, 'twitter:image'),
        };

        // SEO
        const seo = {
          title:     doc.querySelector('title')?.textContent?.trim() || '',
          metaDesc:  getMeta(doc, 'description'),
          canonical: getLink(doc, 'canonical'),
          robots:    getMeta(doc, 'robots'),
          h1:        doc.querySelector('h1')?.textContent?.trim() || '',
          lang:      doc.querySelector('html')?.getAttribute('lang') || '',
        };

        // 構造化データ（JSON-LD）
        const jsonLdList = [...doc.querySelectorAll('script[type="application/ld+json"]')]
          .map(el => el.textContent?.trim()).filter(Boolean);

        // microdata（itemtype/itemprop）
        const microdataItems = [...doc.querySelectorAll('[itemtype]')].map(el => {
          const type = el.getAttribute('itemtype') || '';
          const props = {};
          el.querySelectorAll('[itemprop]').forEach(prop => {
            const key = prop.getAttribute('itemprop');
            const val = prop.getAttribute('content') || prop.getAttribute('href') || prop.textContent.trim();
            if (key && val) props[key] = val;
          });
          return { type, props };
        });

        // 履歴に保存
        saveHistory(url);
        renderHistory();

        // og:image 実サイズ取得
        const imgSize = await checkImageSize(ogp.image);

        // コピー用に保存
        _lastOgp = ogp;
        _lastSeo = seo;
        _lastCheckedUrl = url;

        // 描画
        renderPreviews(ogp, url);

        renderTable('ogp-table', [
          ['og:title',       ogp.title],
          ['og:description', ogp.description],
          ['og:image',       ogp.image],
          ['og:url',         ogp.url],
          ['og:type',        ogp.type],
          ['og:site_name',   ogp.siteName],
        ]);

        renderTable('tw-table', [
          ['twitter:card',        ogp.twitterCard],
          ['twitter:title',       ogp.twitterTitle],
          ['twitter:description', ogp.twitterDesc],
          ['twitter:image',       ogp.twitterImage],
        ]);

        renderTable('seo-table', [
          ['&lt;title&gt;',    seo.title,     (seo.title || '').length > 70 ? 'tag-warn' : 'tag-ok'],
          ['meta description', seo.metaDesc,  (seo.metaDesc || '').length > 160 ? 'tag-warn' : 'tag-ok'],
          ['canonical',        seo.canonical, 'tag-ok'],
          ['robots',           seo.robots,    ''],
          ['h1',               seo.h1,        ''],
          ['lang',             seo.lang,      seo.lang ? 'tag-ok' : ''],
        ]);
        // h1・lang が空の場合はJSレンダリングの可能性を注記
        if (!seo.h1) {
          const seoTable = document.getElementById('seo-table');
          const note = document.createElement('tr');
          note.innerHTML = '<td colspan="2" style="padding:8px 14px;font-size:0.75rem;color:#b2bec3;font-style:italic;">※ h1・構造化データが空の場合、ページがJavaScriptでレンダリングされている可能性があります</td>';
          seoTable.appendChild(note);
        }

        renderGooglePreview(seo, url);
        renderStructured(jsonLdList, microdataItems, !!seo.h1);
        renderValidation(ogp, seo, imgSize);

        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'チェック';
      }
    }

    // ── タブ切り替え ──────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    document.getElementById('check-btn').addEventListener('click', check);
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });
    document.getElementById('copy-tags-btn').addEventListener('click', copyMetaTags);
    document.getElementById('copy-md-btn').addEventListener('click', copyMarkdown);
    document.getElementById('copy-result-btn').addEventListener('click', copyResult);

    // 起動時に履歴を表示
    renderHistory();
  </script>

</body>
</html>
