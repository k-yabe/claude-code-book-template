<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぷよぷよ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    canvas {
      display: block;
      box-shadow: 0 0 40px rgba(100, 200, 100, 0.2);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  // ── 定数 ──
  const COLS = 6;
  const ROWS = 13;       // row0=隠し行, row1〜12=表示行（12行）
  const CELL = 40;
  const BW   = COLS * CELL; // 240px ボード幅
  const BH   = 12 * CELL;   // 480px ボード高さ（12行表示）
  const PW   = 160;          // サイドパネル幅
  const W    = BW + PW;      // 400px キャンバス幅
  const H    = BH;           // 480px キャンバス高さ

  // ぷよの色（赤・緑・青・黄）
  const COLORS = ['#e74c3c', '#2ecc71', '#3498db', '#f1c40f'];

  // 連鎖ボーナス表（インデックス = 連鎖数）
  const CHAIN_BONUS = [0, 0, 8, 16, 32, 64, 96, 128, 160, 192, 224, 256, 288];

  // 色ボーナス表（インデックス = 消去に含まれる色数）
  const COLOR_BONUS = [0, 0, 3, 6, 12];

  // サブぷよのオフセット（rotation: 0=上, 1=右, 2=下, 3=左）
  const ROT_OFFSET = [[-1, 0], [0, 1], [1, 0], [0, -1]];

  // ── キャンバス ──
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width  = W;
  canvas.height = H;

  // ── ゲーム状態 ──
  // state: 'idle' | 'playing' | 'paused' | 'gameover'
  let board, pair, nextColors, score, level, totalCleared;
  let state, chainAnimating, flashCells, dropTimer, dropInterval;

  // ── 初期化 ──
  function newBoard() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  function randColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  function reset() {
    board          = newBoard();
    score          = 0;
    level          = 1;
    totalCleared   = 0;
    nextColors     = [randColor(), randColor()]; // [mainColor, subColor]
    chainAnimating = false;
    flashCells     = [];
    dropTimer      = 0;
    dropInterval   = 800; // ms/行
    state          = 'idle';
    spawnPair();
  }

  // 次のペアをスポーン
  function spawnPair() {
    const [mc, sc] = nextColors;
    nextColors = [randColor(), randColor()];
    pair = {
      mainRow:   1,
      mainCol:   2,
      rotation:  0,  // 0=サブ上, 1=サブ右, 2=サブ下, 3=サブ左
      mainColor: mc,
      subColor:  sc,
    };
    // スポーン位置が塞がれていればゲームオーバー
    if (!isValidPair(pair.mainRow, pair.mainCol, pair.rotation)) {
      state = 'gameover';
      pair  = null;
    }
  }

  // ── 位置計算・判定 ──

  // サブぷよの位置を計算（メイン基準）
  function getSubPos(mr, mc, rot) {
    const [dr, dc] = ROT_OFFSET[rot];
    return { r: mr + dr, c: mc + dc };
  }

  // ボード範囲内かチェック
  function isInBounds(r, c) {
    return r >= 0 && r < ROWS && c >= 0 && c < COLS;
  }

  // ペアの配置が有効か判定（ボード上の固定済みぷよと干渉しないか）
  function isValidPair(mr, mc, rot) {
    if (!isInBounds(mr, mc) || board[mr][mc] !== null) return false;
    const sub = getSubPos(mr, mc, rot);
    if (!isInBounds(sub.r, sub.c) || board[sub.r][sub.c] !== null) return false;
    return true;
  }

  // ペアが1行落下できるか
  function canDrop() {
    if (!pair) return false;
    return isValidPair(pair.mainRow + 1, pair.mainCol, pair.rotation);
  }

  // ── ペア操作 ──

  function moveLeft() {
    if (isValidPair(pair.mainRow, pair.mainCol - 1, pair.rotation))
      pair.mainCol--;
  }

  function moveRight() {
    if (isValidPair(pair.mainRow, pair.mainCol + 1, pair.rotation))
      pair.mainCol++;
  }

  // 時計回り回転（壁蹴り付き）
  function rotateCW() {
    const newRot = (pair.rotation + 1) % 4;
    for (const kick of [0, 1, -1]) {
      if (isValidPair(pair.mainRow, pair.mainCol + kick, newRot)) {
        pair.mainCol  += kick;
        pair.rotation  = newRot;
        return;
      }
    }
  }

  // 反時計回り回転（壁蹴り付き）
  function rotateCCW() {
    const newRot = (pair.rotation + 3) % 4;
    for (const kick of [0, 1, -1]) {
      if (isValidPair(pair.mainRow, pair.mainCol + kick, newRot)) {
        pair.mainCol  += kick;
        pair.rotation  = newRot;
        return;
      }
    }
  }

  // ソフトドロップ（1行落下またはロック）
  function softDrop() {
    if (canDrop()) {
      pair.mainRow++;
      dropTimer = 0;
    } else {
      lockPair();
    }
  }

  // ── ロック＆連鎖処理 ──

  // ペアをボードに固定し、連鎖処理を開始
  function lockPair() {
    board[pair.mainRow][pair.mainCol] = pair.mainColor;
    const sub = getSubPos(pair.mainRow, pair.mainCol, pair.rotation);
    board[sub.r][sub.c] = pair.subColor;
    pair           = null;
    chainAnimating = true;
    runChain(1);
  }

  // 連鎖ループ（重力→消去判定→点滅→消去→再帰）
  function runChain(chain) {
    applyGravity();
    const erasable = findErasable();

    if (erasable.length === 0) {
      // 消えるグループなし → チェーン終了
      chainAnimating = false;
      if (state === 'playing') spawnPair();
      return;
    }

    // スコア計算・点滅セルを設定
    score     += calcChainScore(erasable, chain);
    flashCells = erasable.flatMap(g => g.cells);
    updateLevel();

    // 300ms点滅演出後に消去し、次の連鎖へ
    setTimeout(() => {
      eraseGroups(erasable);
      flashCells = [];
      setTimeout(() => runChain(chain + 1), 100);
    }, 300);
  }

  // ── ボードロジック ──

  // 空中のぷよを下に落とす
  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      // 下から順にぷよを集める
      const stack = [];
      for (let r = ROWS - 1; r >= 0; r--)
        if (board[r][c] !== null) stack.push(board[r][c]);
      // 下から詰め直す
      for (let r = ROWS - 1; r >= 0; r--)
        board[r][c] = stack.length > 0 ? stack.shift() : null;
    }
  }

  // BFS で同色連結グループを列挙
  function findGroups() {
    const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    const groups  = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] && !visited[r][c]) {
          const color = board[r][c];
          const cells = [];
          const queue = [{ r, c }];
          visited[r][c] = true;
          while (queue.length) {
            const { r: cr, c: cc } = queue.shift();
            cells.push({ r: cr, c: cc });
            for (const [dr, dc] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
              const nr = cr + dr, nc = cc + dc;
              if (isInBounds(nr, nc) && !visited[nr][nc] && board[nr][nc] === color) {
                visited[nr][nc] = true;
                queue.push({ r: nr, c: nc });
              }
            }
          }
          groups.push({ color, cells });
        }
      }
    }
    return groups;
  }

  // 4個以上の連結グループを返す
  function findErasable() {
    return findGroups().filter(g => g.cells.length >= 4);
  }

  // グループをボードから消去
  function eraseGroups(groups) {
    for (const g of groups)
      for (const { r, c } of g.cells)
        board[r][c] = null;
  }

  // スコア計算（公式ぷよぷよ方式）
  function calcChainScore(erasable, chain) {
    const total      = erasable.reduce((s, g) => s + g.cells.length, 0);
    totalCleared    += total;

    // 連鎖ボーナス（chain=1は0、chain=2から加算）
    const chainBonus = CHAIN_BONUS[Math.min(chain, CHAIN_BONUS.length - 1)];

    // 色ボーナス（消去に含まれる色の種類数）
    const colorCount = new Set(erasable.map(g => g.color)).size;
    const colorBonus = COLOR_BONUS[Math.min(colorCount, 4)];

    // グループボーナス（グループサイズ5以上に加算）
    const groupBonus = erasable.reduce((s, g) => {
      const sz = g.cells.length;
      if (sz <= 4)  return s;
      if (sz >= 11) return s + 10;
      return s + (sz - 3); // 5→2, 6→3, 7→4, 8→5, 9→6, 10→7
    }, 0);

    return 10 * total * Math.max(1, chainBonus + colorBonus + groupBonus);
  }

  // 消去数に応じてレベルと落下速度を更新
  function updateLevel() {
    level        = Math.floor(totalCleared / 30) + 1;
    dropInterval = Math.max(150, 800 - (level - 1) * 80);
  }

  // ── 描画ユーティリティ ──

  function lighten(hex, t) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${(r + (255 - r) * t) | 0},${(g + (255 - g) * t) | 0},${(b + (255 - b) * t) | 0})`;
  }

  function darken(hex, t) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${(r * (1 - t)) | 0},${(g * (1 - t)) | 0},${(b * (1 - t)) | 0})`;
  }

  // ぷよを円形・放射グラデーションで描画（x, y はキャンバス座標の中心）
  function drawPuyoAt(x, y, color, flash) {
    const radius = CELL / 2 - 3;
    const hx = x - radius * 0.28;
    const hy = y - radius * 0.28;

    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);

    if (flash) {
      ctx.fillStyle = '#ffffff';
    } else {
      const grad = ctx.createRadialGradient(hx, hy, 1, x, y, radius);
      grad.addColorStop(0, lighten(color, 0.55));
      grad.addColorStop(1, darken(color, 0.25));
      ctx.fillStyle = grad;
    }
    ctx.fill();

    // 光沢ハイライト
    if (!flash) {
      ctx.beginPath();
      ctx.arc(hx, hy, radius * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
    }
  }

  // ボード座標 → キャンバス中心座標
  function puyoCX(col) { return col * CELL + CELL / 2; }
  function puyoCY(row) { return (row - 1) * CELL + CELL / 2; } // row1→y=20

  // ── メイン描画 ──
  function draw() {
    // 背景
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // ボード背景
    ctx.fillStyle = '#10102a';
    ctx.fillRect(0, 0, BW, BH);

    // グリッド線
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth   = 1;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, BH); ctx.stroke();
    }
    for (let r = 0; r <= 12; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(BW, r * CELL); ctx.stroke();
    }

    // ボード領域をクリップ（row0=隠し行を非表示）
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, BW, BH);
    ctx.clip();

    // 点滅トグル（120msごとに切り替え）
    const flashOn  = Math.floor(Date.now() / 120) % 2 === 0;
    const flashSet = new Set(flashCells.map(({ r, c }) => `${r},${c}`));

    // 固定済みぷよを描画（row1〜12のみ）
    for (let r = 1; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c]) {
          const isFlash = flashSet.has(`${r},${c}`) && flashOn;
          drawPuyoAt(puyoCX(c), puyoCY(r), board[r][c], isFlash);
        }
      }
    }

    // 落下中ペアを描画
    if (pair) {
      drawPuyoAt(puyoCX(pair.mainCol), puyoCY(pair.mainRow), pair.mainColor, false);
      const sub = getSubPos(pair.mainRow, pair.mainCol, pair.rotation);
      if (sub.r >= 1) { // サブが表示行にある場合のみ描画
        drawPuyoAt(puyoCX(sub.c), puyoCY(sub.r), pair.subColor, false);
      }
    }

    ctx.restore();

    // サイドパネル
    drawPanel();

    // 状態オーバーレイ
    if (state === 'idle')
      drawOverlay('ぷよぷよ', 'Space キーでスタート');
    if (state === 'paused')
      drawOverlay('一時停止', 'P キーで再開');
    if (state === 'gameover')
      drawOverlay('GAME OVER', `スコア: ${score.toLocaleString()}\nSpace キーでリスタート`);
  }

  function drawPanel() {
    const px = BW + 12;
    ctx.textAlign = 'left';

    // スコア・レベル・消去数
    panelLabel(px, 36,  'SCORE');
    panelValue(px, 60,  score.toLocaleString());

    panelLabel(px, 102, 'LEVEL');
    panelValue(px, 126, level);

    panelLabel(px, 168, 'CLEARED');
    panelValue(px, 192, totalCleared);

    // NEXTプレビュー（サブ=上、メイン=下）
    panelLabel(px, 236, 'NEXT');
    if (nextColors) {
      const nx = BW + PW / 2;
      drawPuyoAt(nx, 255, nextColors[1], false); // サブ（上）
      drawPuyoAt(nx, 295, nextColors[0], false); // メイン（下）
    }

    // 操作説明
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font      = '10px monospace';
    [
      '← →  左右移動',
      '↓     ソフトドロップ',
      'Z/X  回転',
      'P      一時停止',
    ].forEach((t, i) => ctx.fillText(t, px, H - 80 + i * 18));
  }

  function panelLabel(x, y, text) {
    ctx.font      = '600 11px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.fillText(text, x, y);
  }

  function panelValue(x, y, val) {
    ctx.font      = 'bold 24px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(String(val), x, y);
  }

  function drawOverlay(title, subtitle) {
    ctx.fillStyle = 'rgba(0,0,0,0.68)';
    ctx.fillRect(0, 0, BW, BH);

    ctx.textAlign = 'center';
    ctx.font      = 'bold 32px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(title, BW / 2, BH / 2 - 18);

    ctx.font      = '14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.60)';
    subtitle.split('\n').forEach((line, i) => {
      ctx.fillText(line, BW / 2, BH / 2 + 16 + i * 24);
    });

    ctx.textAlign = 'left';
  }

  // ── キー入力 ──
  document.addEventListener('keydown', e => {
    if (['ArrowLeft', 'ArrowRight', 'ArrowDown', 'Space'].includes(e.code))
      e.preventDefault();

    if (state === 'idle'     && e.code === 'Space') { state = 'playing';                  return; }
    if (state === 'gameover' && e.code === 'Space') { reset(); state = 'playing';          return; }

    if (e.code === 'KeyP') {
      if      (state === 'playing') state = 'paused';
      else if (state === 'paused')  state = 'playing';
      return;
    }

    if (state !== 'playing' || chainAnimating || !pair) return;

    if (e.code === 'ArrowLeft')  moveLeft();
    if (e.code === 'ArrowRight') moveRight();
    if (e.code === 'ArrowDown')  softDrop();
    if (e.code === 'KeyZ')       rotateCCW();
    if (e.code === 'KeyX')       rotateCW();
  });

  // ── ゲームループ ──
  let lastTime = null;

  function loop(ts) {
    const dt = lastTime === null ? 0 : ts - lastTime;
    lastTime = ts;

    if (state === 'playing' && !chainAnimating && pair) {
      dropTimer += dt;
      if (dropTimer >= dropInterval) {
        if (canDrop()) {
          pair.mainRow++;
        } else {
          lockPair();
        }
        dropTimer = 0;
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  // ── 起動 ──
  reset();
  requestAnimationFrame(loop);
</script>
</body>
</html>
