<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cache Checker — AKKODiS Marketing Apps</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23ffb81c'>⚡</text></svg>">
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    .result-section { margin-top: 24px; }
    .result-card {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      padding: 20px;
      margin-bottom: 16px;
    }
    .result-card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #001f33;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
    }
    .status-badge.synced { background: #00b894; }
    .status-badge.diff { background: #e17055; }
    .status-badge.error { background: #c0392b; }

    .header-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .header-table th {
      text-align: left;
      padding: 6px 10px;
      background: rgba(0,31,51,0.04);
      color: #636e72;
      font-weight: 600;
      white-space: nowrap;
      width: 160px;
    }
    .header-table td {
      padding: 6px 10px;
      color: #2d3436;
      word-break: break-all;
    }
    .header-table tr + tr th,
    .header-table tr + tr td {
      border-top: 1px solid #e8ecf0;
    }
    .header-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .header-compare { grid-template-columns: 1fr; }
    }
    .header-compare-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #8a9bb0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .diff-container {
      background: #fff;
      border: 1px solid #e8ecf0;
      font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      overflow-x: auto;
      max-height: 500px;
      overflow-y: auto;
    }
    .diff-line { padding: 1px 12px; white-space: pre-wrap; word-break: break-all; }
    .diff-added { background: rgba(0,184,148,0.12); color: #00b894; }
    .diff-removed { background: rgba(225,112,85,0.12); color: #e17055; }
    .diff-info {
      font-size: 0.82rem;
      color: #8a9bb0;
      margin-bottom: 8px;
    }

    .loading-area {
      text-align: center;
      padding: 32px 0;
      display: none;
    }
    .loading-area.show { display: block; }
    .loading-text {
      font-size: 0.9rem;
      color: #636e72;
      margin-bottom: 8px;
    }
    .loading-dots { display: inline-flex; gap: 6px; }
    .loading-dots span {
      width: 8px; height: 8px;
      background: #ffb81c;
      display: inline-block;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .error-msg {
      background: #fff5f4;
      border: 1.5px solid #fab1a0;
      color: #c0392b;
      padding: 10px 14px;
      font-size: 0.85rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .url-note {
      font-size: 0.75rem;
      color: #8a9bb0;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('auth')!=='1')location.href='/';</script>

  <nav class="navbar">
    <div class="navbar-brand">
      <a class="back-btn" href="../../">← アプリ一覧へ</a>
      <div class="navbar-divider"></div>
      <span class="navbar-title">Cache Checker</span>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Cache Checker</h1>
      <p class="page-desc">URLを入力してキャッシュの反映状況を確認できます</p>
    </div>

    <div class="step">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">URLを入力</div>
      </div>
      <div class="step-body">
        <input type="url" id="url-input" class="input-field" placeholder="https://example.com/page" autocomplete="url">
        <p class="url-note">通常版と、ランダムパラメータ付き（キャッシュバイパス）版を取得して比較します</p>
      </div>
    </div>

    <button id="check-btn" class="cta-btn" onclick="runCheck()">キャッシュをチェック</button>

    <div class="error-msg" id="error-msg"></div>

    <div class="loading-area" id="loading">
      <div class="loading-text">キャッシュ状態を確認中</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>

    <div id="result" class="result-section" style="display:none;">

      <div class="result-card">
        <div class="result-card-title">
          <span>ステータス</span>
          <span class="status-badge" id="status-badge"></span>
        </div>
        <p id="status-text" style="font-size:0.85rem;color:#636e72;"></p>
      </div>

      <div class="result-card">
        <div class="result-card-title">レスポンスヘッダー比較</div>
        <div class="header-compare">
          <div>
            <div class="header-compare-label">通常版（キャッシュ）</div>
            <table class="header-table" id="headers-normal"></table>
          </div>
          <div>
            <div class="header-compare-label">バイパス版（最新）</div>
            <table class="header-table" id="headers-bypass"></table>
          </div>
        </div>
      </div>

      <div class="result-card" id="diff-card" style="display:none;">
        <div class="result-card-title">ボディ差分</div>
        <p class="diff-info" id="diff-info"></p>
        <div class="diff-container" id="diff-view"></div>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <span class="app-footer-text">⚠️ 機密情報・個人情報のアップロードは禁止です</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/diff@5/dist/diff.min.js"></script>
  <script src="../../assets/copy-utils.js"></script>
  <script src="../../assets/history.js"></script>
  <script>
    const urlInput = document.getElementById('url-input');
    const checkBtn = document.getElementById('check-btn');
    const errorMsg = document.getElementById('error-msg');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('result');

    const PROXY_URL = '/api/proxy';
    const DISPLAY_HEADERS = ['cache-control', 'age', 'last-modified', 'etag', 'x-cache', 'x-cache-hits', 'cf-cache-status', 'expires', 'date', 'content-type'];

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    function clearError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('show');
    }

    function setLoading(on) {
      loading.classList.toggle('show', on);
      checkBtn.disabled = on;
      checkBtn.textContent = on ? 'チェック中...' : 'キャッシュをチェック';
    }

    function renderHeaders(tableEl, headers) {
      const rows = DISPLAY_HEADERS
        .filter(k => headers[k])
        .map(k => `<tr><th>${escHtml(k)}</th><td>${escHtml(headers[k])}</td></tr>`)
        .join('');
      tableEl.innerHTML = rows || '<tr><td colspan="2" style="color:#b2bec3;padding:8px 10px;">ヘッダー情報なし</td></tr>';
    }

    function renderDiff(normalBody, bypassBody) {
      const diffCard = document.getElementById('diff-card');
      const diffView = document.getElementById('diff-view');
      const diffInfo = document.getElementById('diff-info');

      if (normalBody === bypassBody) {
        diffCard.style.display = 'none';
        return 0;
      }

      diffCard.style.display = '';
      const changes = Diff.diffLines(normalBody, bypassBody);
      let added = 0, removed = 0;
      let html = '';

      for (const part of changes) {
        const lines = part.value.split('\n');
        if (lines[lines.length - 1] === '') lines.pop();

        for (const line of lines) {
          if (part.added) {
            added++;
            html += `<div class="diff-line diff-added">+ ${escHtml(line)}</div>`;
          } else if (part.removed) {
            removed++;
            html += `<div class="diff-line diff-removed">- ${escHtml(line)}</div>`;
          }
        }
      }

      diffInfo.textContent = `追加: ${added}行 / 削除: ${removed}行（合計 ${added + removed}行の差分）`;
      diffView.innerHTML = html;
      return added + removed;
    }

    async function fetchViaProxy(url) {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || `Proxy error (${res.status})`);
      }
      return data;
    }

    function generateCacheBuster() {
      return Date.now() + '-' + Math.random().toString(36).slice(2);
    }

    function addParam(url, key, value) {
      const u = new URL(url);
      u.searchParams.set(key, value);
      return u.toString();
    }

    async function runCheck() {
      clearError();
      resultSection.style.display = 'none';

      const rawUrl = urlInput.value.trim();
      if (!rawUrl) {
        showError('URLを入力してください');
        urlInput.focus();
        return;
      }

      let parsed;
      try {
        parsed = new URL(rawUrl);
      } catch {
        showError('有効なURLを入力してください（例: https://example.com/page）');
        urlInput.focus();
        return;
      }

      if (!['http:', 'https:'].includes(parsed.protocol)) {
        showError('HTTP/HTTPS のURLを入力してください');
        return;
      }

      setLoading(true);

      try {
        const bypassUrl = addParam(rawUrl, '_', generateCacheBuster());
        const [normalRes, bypassRes] = await Promise.all([
          fetchViaProxy(rawUrl),
          fetchViaProxy(bypassUrl),
        ]);

        renderHeaders(document.getElementById('headers-normal'), normalRes.headers);
        renderHeaders(document.getElementById('headers-bypass'), bypassRes.headers);

        const diffCount = renderDiff(normalRes.body, bypassRes.body);

        const badge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');

        if (diffCount === 0) {
          badge.textContent = 'SYNCED';
          badge.className = 'status-badge synced';
          statusText.textContent = 'キャッシュは最新の状態です。通常版とバイパス版に差分はありません。';
        } else {
          badge.textContent = 'DIFF DETECTED';
          badge.className = 'status-badge diff';
          statusText.textContent = `通常版とバイパス版に ${diffCount}行の差分があります。キャッシュが古い可能性があります。`;
        }

        resultSection.style.display = '';

        // 履歴に保存
        if (typeof HistoryManager !== 'undefined' && HistoryManager.save) {
          HistoryManager.save(`${rawUrl} → ${diffCount === 0 ? 'SYNCED' : diffCount + '行の差分'}`, rawUrl);
        }
      } catch (err) {
        showError(err.message || 'チェック中にエラーが発生しました');
      } finally {
        setLoading(false);
      }
    }

    // Enter キーでチェック実行
    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') runCheck();
    });

    HistoryManager.init('Cache Checker');
  </script>
</body>
</html>
