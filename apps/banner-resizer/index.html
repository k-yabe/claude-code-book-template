<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Resizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; }

    /* ナビ */
    .navbar {
      background: #001f33; height: 58px; display: flex; align-items: center;
      padding: 0 40px; gap: 14px; position: sticky; top: 0; z-index: 10;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2); font-size: 0.78rem;
      color: rgba(255,255,255,0.65); cursor: pointer; padding: 6px 14px;
      text-decoration: none; transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .container { max-width: 800px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ページヘッダー */
    .page-header { margin-bottom: 16px; }
    .page-header h1 { font-size: 1.3rem; font-weight: 700; color: #001f33; letter-spacing: -0.01em; margin-bottom: 2px; }
    .page-header p { font-size: 0.8rem; color: #8a9bb0; }

    /* ステップ */
    .step {
      background: #fff; border: 1.5px solid #e8ecf0;
      margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .step-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid #f0f2f5; background: #fafbfc;
    }
    .step-num {
      width: 22px; height: 22px; background: #001f33; color: #fff;
      font-size: 0.68rem; font-weight: 800; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .step-title { font-size: 0.84rem; font-weight: 700; color: #001f33; }
    .step-desc { font-size: 0.72rem; color: #a0aab4; margin-left: auto; }
    .step-body { padding: 14px 16px; }

    /* Format selector */
    .format-row { display: flex; align-items: center; gap: 10px; }
    .format-label { font-size: 0.82rem; font-weight: 700; color: #4a5568; }
    .format-btn {
      padding: 6px 18px; border: 1.5px solid #e2e8f0; font-size: 0.82rem;
      font-weight: 700; cursor: pointer; background: #fff; color: #636e72;
      transition: all 0.15s; font-family: inherit;
    }
    .format-btn.active { background: #001f33; color: #fff; border-color: #001f33; }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #c8d6e5; padding: 16px; text-align: center;
      cursor: pointer; transition: all 0.2s; background: #f8f9fa;
    }
    .dropzone:hover, .dropzone.over { border-color: #001f33; background: #f0f4f8; }
    .dropzone-icon { font-size: 1.2rem; margin-bottom: 2px; color: #b2bec3; }
    .dropzone-text { font-size: 0.78rem; font-weight: 600; color: #636e72; margin-bottom: 1px; }
    .dropzone-sub { font-size: 0.7rem; color: #a0aab4; }
    .dropzone input { display: none; }
    .dropzone.has-image {
      padding: 8px 14px; border-style: solid; border-color: #001f33;
      background: rgba(0,31,51,0.03);
    }
    .dropzone.has-image .dropzone-icon { display: none; }
    .dropzone.has-image .dropzone-text { font-size: 0.75rem; color: #001f33; }
    .dropzone.has-image .dropzone-sub { color: #636e72; }

    /* Output area — hidden until image uploaded */
    .group-outputs { display: none; margin-top: 12px; }
    .group-outputs.active { display: block; }
    .group-outputs.active.output-cards { display: grid; }

    /* Output cards */
    .output-cards { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
    .output-card { background: #fafbfc; border: 1.5px solid #e8ecf0; padding: 12px; }
    .output-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .output-card-dot { width: 8px; height: 8px; flex-shrink: 0; }
    .output-card-title { font-size: 0.82rem; font-weight: 700; color: #2d3436; }
    .output-card-badge {
      display: inline-block; font-size: 0.6rem; font-weight: 700;
      padding: 1px 5px; margin-left: 2px;
    }
    .output-card-meta { font-size: 0.72rem; color: #a0aab4; margin-bottom: 6px; }

    .preview-canvas-wrap {
      width: 100%; background: #e8ecf0; overflow: hidden; margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-canvas-wrap canvas { width: 100%; height: auto; display: block; }

    .ai-loading { padding: 12px 8px; font-size: 0.75rem; color: #636e72; text-align: center; line-height: 1.6; }
    .ai-loading-spinner { display: inline-block; animation: spin 1.2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .option-check {
      display: flex; align-items: center; gap: 5px; margin-bottom: 3px;
      font-size: 0.72rem; color: #636e72; cursor: pointer; user-select: none;
    }
    .option-check input[type="checkbox"] { accent-color: #001f33; width: 12px; height: 12px; cursor: pointer; }

    .file-size-info { font-size: 0.72rem; color: #667; margin: 4px 0 6px; min-height: 1.1em; }

    .dl-btn {
      width: 100%; padding: 7px; background: #f0f2f5; color: #001f33; border: none;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .dl-btn:hover { background: #001f33; color: #fff; }
    .dl-btn:disabled { opacity: 0.4; cursor: default; }
    .dl-btn:disabled:hover { background: #f0f2f5; color: #001f33; }

    /* ZIP download */
    .dl-all-step .step-body { padding: 10px 16px; }
    .dl-all-btn {
      width: 100%; padding: 14px; background: #001f33; color: #fff; border: none;
      font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
      letter-spacing: 0.04em; font-family: inherit;
    }
    .dl-all-btn:hover { opacity: 0.85; }

    .app-footer {
      background: #001f33; padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-footer-text { font-size: 0.72rem; color: rgba(255,255,255,0.8); }

    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
    }
    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .container { padding: 20px 16px 60px; }
      .output-cards { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <a href="../../" class="back-btn">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Banner Resizer</span>
  </div>
</nav>
<div class="container">
  <div class="page-header">
    <h1>Banner Resizer</h1>
    <p>画像をアップロードして、MV・OGP・サムネイルを規定サイズに変換します</p>
  </div>

  <!-- Step 1: Format -->
  <div class="step">
    <div class="step-header">
      <span class="step-num">1</span>
      <span class="step-title">出力形式</span>
      <span class="step-desc">OGPはPNG固定</span>
    </div>
    <div class="step-body">
      <div class="format-row">
        <span class="format-label">形式：</span>
        <button class="format-btn active" id="btn-webp" onclick="setFormat('webp')">WebP</button>
        <button class="format-btn" id="btn-png" onclick="setFormat('png')">PNG</button>
      </div>
    </div>
  </div>

  <!-- Step 2: MV / OGP -->
  <div class="step">
    <div class="step-header">
      <span class="step-num">2</span>
      <span class="step-title">MV / OGP</span>
      <span class="step-desc">1枚の画像からMVとOGPを生成</span>
    </div>
    <div class="step-body">
      <div class="dropzone" id="dz-mv" onclick="document.getElementById('file-mv').click()">
        <div class="dropzone-icon">📤</div>
        <div class="dropzone-text">画像をドロップ or クリック</div>
        <div class="dropzone-sub">推奨: 1920×1080px</div>
        <input type="file" id="file-mv" accept="image/png,image/jpeg,image/webp">
      </div>
      <div class="group-outputs" id="outputs-mv"></div>
    </div>
  </div>

  <!-- Step 3: Thumbnail -->
  <div class="step">
    <div class="step-header">
      <span class="step-num">3</span>
      <span class="step-title">一覧サムネイル</span>
      <span class="step-desc">CMS上で上下24px・左右100pxが自動カット</span>
    </div>
    <div class="step-body">
      <div class="dropzone" id="dz-thumb" onclick="document.getElementById('file-thumb').click()">
        <div class="dropzone-icon">📤</div>
        <div class="dropzone-text">画像をドロップ or クリック</div>
        <div class="dropzone-sub">推奨: 1920×1080px</div>
        <input type="file" id="file-thumb" accept="image/png,image/jpeg,image/webp">
      </div>
      <div class="group-outputs" id="outputs-thumb"></div>
    </div>
  </div>

  <!-- Download all -->
  <div class="step dl-all-step">
    <div class="step-body">
      <button class="dl-all-btn" id="dl-all-btn" onclick="downloadAll()">📦 まとめてダウンロード（ZIP）</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  if (localStorage.getItem('auth') !== '1') { location.href = '/'; }

  // Group definitions: which sizes belong to which upload
  const GROUPS = [
    {
      id: 'mv',
      sizes: [
        { id: 'banner', label: 'バナー（MV）', w: 1920, h: 1080, dlName: 'img-mv', maxBytes: 1 * 1024 * 1024, color: '#ffb81c' },
        { id: 'ogp',    label: 'OGP',         w: 1200, h: 630, forcePng: true, aiUpscale: true, dlName: 'img-ogp', maxBytes: 100 * 1024, crop: true, color: '#1C304B' },
      ],
    },
    {
      id: 'thumb',
      sizes: [
        { id: 'index', label: '一覧サムネイル', w: 1920, h: 1080, dlName: 'img-index', maxBytes: 1 * 1024 * 1024, color: '#636e72', thumbTrim: { top: 24, bottom: 24, left: 100, right: 100 } },
      ],
    },
  ];

  const ALL_SIZES = GROUPS.flatMap(g => g.sizes);
  let format = 'webp';
  const sourceImages = {};  // groupId → Image
  const aiUpscaleFlags = {};

  // ── AI Upscale ────────────────────────────────────────
  let _libsLoading = null;
  let _upscaler = null;

  function loadAILibs() {
    if (_libsLoading) return _libsLoading;
    _libsLoading = (async () => {
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/upscalerjs@1.0.0-beta.18/dist/browser/umd/upscaler.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@1.0.0-beta.16/dist/browser/umd/2x.min.js');
    })();
    return _libsLoading;
  }

  function loadImageFromSrc(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function createWithAI(img, w, h, crop) {
    if (img.width >= w && img.height >= h) {
      return createResized(img, w, h, crop);
    }
    try {
      await loadAILibs();
      if (!_upscaler) {
        const modelArg = window.ESRGANSlim ? window.ESRGANSlim['2x'] : undefined;
        _upscaler = new Upscaler(modelArg ? { model: modelArg } : {});
      }
      const upscaledSrc = await _upscaler.upscale(img);
      const upscaledImg = await loadImageFromSrc(upscaledSrc);
      return createResized(upscaledImg, w, h, crop);
    } catch (e) {
      console.warn('AI upscale failed, using standard resize:', e);
      return createResized(img, w, h, crop);
    }
  }

  // ── Format selector ───────────────────────────────────
  function setFormat(f) {
    format = f;
    document.getElementById('btn-png').classList.toggle('active', f === 'png');
    document.getElementById('btn-webp').classList.toggle('active', f === 'webp');
    for (const g of GROUPS) {
      if (sourceImages[g.id]) renderGroup(g);
    }
  }

  // ── Build output cards ────────────────────────────────
  function buildOutputCards() {
    for (const group of GROUPS) {
      const container = document.getElementById('outputs-' + group.id);
      if (group.sizes.length > 1) container.classList.add('output-cards');

      for (const size of group.sizes) {
        if (aiUpscaleFlags[size.id] === undefined) {
          aiUpscaleFlags[size.id] = size.aiUpscale === true;
        }
        const card = document.createElement('div');
        card.className = 'output-card';
        const maxLabel = size.maxBytes >= 1024*1024 ? (size.maxBytes/1024/1024)+'MB' : (size.maxBytes/1024)+'KB';
        card.innerHTML = `
          <div class="output-card-header">
            <span class="output-card-dot" style="background:${size.color}"></span>
            <span class="output-card-title">${size.label}${size.forcePng ? '<span class="output-card-badge" style="color:#001f33;background:#ffb81c;">PNG固定</span>' : ''}</span>
          </div>
          <div class="output-card-meta">${size.w}×${size.h}px　/　上限 ${maxLabel}${size.crop ? '　/　センタークロップ' : ''}</div>
          <label class="option-check">
            <input type="checkbox" id="ai-check-${size.id}" ${aiUpscaleFlags[size.id] ? 'checked' : ''}
              onchange="toggleAiUpscale('${group.id}', '${size.id}', this.checked)">
            AIアップスケール（小さい画像を高品質拡大）
          </label>
          <div class="preview-canvas-wrap" id="wrap-${size.id}" style="display:none;"></div>
          ${size.thumbTrim ? `<label class="option-check">
            <input type="checkbox" id="trim-check-${size.id}" checked
              onchange="toggleThumbTrim('${group.id}', '${size.id}', this.checked)">
            サムネイル時のカット領域を表示
          </label>` : ''}
          <div class="file-size-info" id="filesize-${size.id}"></div>
          <button class="dl-btn" id="dl-btn-${size.id}" onclick="downloadSingle('${group.id}', '${size.id}')" disabled>ダウンロード</button>
        `;
        container.appendChild(card);
      }
    }
  }

  // ── Drag & Drop ───────────────────────────────────────
  function setupDropZones() {
    for (const group of GROUPS) {
      const dz = document.getElementById('dz-' + group.id);
      const fileInput = document.getElementById('file-' + group.id);

      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('over'));
      dz.addEventListener('drop', e => {
        e.preventDefault();
        dz.classList.remove('over');
        if (e.dataTransfer.files[0]) loadFileForGroup(e.dataTransfer.files[0], group);
      });
      fileInput.addEventListener('change', e => {
        if (e.target.files[0]) loadFileForGroup(e.target.files[0], group);
      });
    }
  }

  function loadFileForGroup(file, group) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        sourceImages[group.id] = img;
        renderGroup(group);
        const dz = document.getElementById('dz-' + group.id);
        dz.classList.add('has-image');
        dz.querySelector('.dropzone-text').textContent = `✅ ${file.name}（クリックで変更）`;
        dz.querySelector('.dropzone-sub').textContent = `${img.width}×${img.height}px`;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── Render group ──────────────────────────────────────
  async function renderGroup(group) {
    const img = sourceImages[group.id];
    if (!img) return;

    // Show output cards
    const outputContainer = document.getElementById('outputs-' + group.id);
    outputContainer.classList.add('active');

    for (const size of group.sizes) {
      const wrap = document.getElementById('wrap-' + size.id);
      wrap.style.display = 'flex';
      wrap.innerHTML = '';

      const aiEnabled = !!aiUpscaleFlags[size.id];
      const needsAI = aiEnabled && (img.width < size.w || img.height < size.h);

      if (needsAI) {
        wrap.innerHTML = '<div class="ai-loading"><span class="ai-loading-spinner">⏳</span><br>AI処理中...</div>';
        const canvas = await createWithAI(img, size.w, size.h, size.crop);
        canvas.id = 'canvas-' + size.id;
        wrap.innerHTML = '';
        wrap.appendChild(canvas);
      } else {
        const canvas = createResized(img, size.w, size.h, size.crop);
        canvas.id = 'canvas-' + size.id;
        wrap.appendChild(canvas);
      }

      if (size.thumbTrim) {
        const trimCheck = document.getElementById('trim-check-' + size.id);
        const show = trimCheck ? trimCheck.checked : true;
        if (show) {
          const canvas = document.getElementById('canvas-' + size.id);
          drawThumbTrimOverlay(canvas, size.thumbTrim);
          canvas.dataset.thumbTrimOverlay = '1';
        }
      }

      document.getElementById('dl-btn-' + size.id).disabled = false;
      updateFileSizeDisplay(size.id, group.id);
    }
  }

  // ── Resize ────────────────────────────────────────────
  function createResized(img, targetW, targetH, crop) {
    let sx = 0, sy = 0, sw = img.width, sh = img.height;
    if (crop) {
      const srcRatio = img.width / img.height;
      const dstRatio = targetW / targetH;
      if (srcRatio > dstRatio) {
        sw = img.height * dstRatio;
        sx = (img.width - sw) / 2;
      } else {
        sh = img.width / dstRatio;
        sy = (img.height - sh) / 2;
      }
    }
    let srcCanvas = document.createElement('canvas');
    srcCanvas.width = sw;
    srcCanvas.height = sh;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.imageSmoothingEnabled = true;
    srcCtx.imageSmoothingQuality = 'high';
    srcCtx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    let curW = sw, curH = sh;
    while (curW / targetW > 2 || curH / targetH > 2) {
      const nextW = Math.max(Math.floor(curW / 2), targetW);
      const nextH = Math.max(Math.floor(curH / 2), targetH);
      const tmp = document.createElement('canvas');
      tmp.width = nextW;
      tmp.height = nextH;
      const tmpCtx = tmp.getContext('2d');
      tmpCtx.imageSmoothingEnabled = true;
      tmpCtx.imageSmoothingQuality = 'high';
      tmpCtx.drawImage(srcCanvas, 0, 0, nextW, nextH);
      srcCanvas = tmp;
      curW = nextW;
      curH = nextH;
    }

    const canvas = document.createElement('canvas');
    canvas.width = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(srcCanvas, 0, 0, targetW, targetH);
    return canvas;
  }

  // ── Thumb trim overlay ────────────────────────────────
  function drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawThumbTrimOverlay(canvas, sz) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = 'rgba(255, 100, 100, 0.3)';
    ctx.fillRect(0, 0, w, sz.top);
    ctx.fillRect(0, h - sz.bottom, w, sz.bottom);
    ctx.fillRect(0, sz.top, sz.left, h - sz.top - sz.bottom);
    ctx.fillRect(w - sz.right, sz.top, sz.right, h - sz.top - sz.bottom);
    ctx.setLineDash([8, 5]);
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = 2;
    ctx.strokeRect(sz.left, sz.top, w - sz.left - sz.right, h - sz.top - sz.bottom);
    ctx.setLineDash([]);
    ctx.font = 'bold 14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const safeW = w - sz.left - sz.right, safeH = h - sz.top - sz.bottom;
    const label = `サムネイル安全エリア ${safeW}×${safeH}px`;
    const lw = ctx.measureText(label).width + 16;
    const lx = w / 2 - lw / 2, ly = h - sz.bottom - 30;
    ctx.fillStyle = 'rgba(0, 230, 118, 0.85)';
    drawRoundRect(ctx, lx, ly, lw, 24, 5);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText(label, w / 2, ly + 12);
    ctx.font = '11px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('サムネイル時にカットされる領域', w / 2, sz.top / 2 || 12);
  }

  function toggleThumbTrim(groupId, sizeId, show) {
    const img = sourceImages[groupId];
    if (!img) return;
    const size = ALL_SIZES.find(s => s.id === sizeId);
    if (!size || !size.thumbTrim) return;
    const wrap = document.getElementById('wrap-' + sizeId);
    if (!wrap) return;
    const canvas = createResized(img, size.w, size.h, size.crop);
    canvas.id = 'canvas-' + sizeId;
    if (show) {
      drawThumbTrimOverlay(canvas, size.thumbTrim);
      canvas.dataset.thumbTrimOverlay = '1';
    }
    wrap.innerHTML = '';
    wrap.appendChild(canvas);
  }

  function toggleAiUpscale(groupId, sizeId, enabled) {
    aiUpscaleFlags[sizeId] = enabled;
    const group = GROUPS.find(g => g.id === groupId);
    if (sourceImages[groupId] && group) renderGroup(group);
  }

  // ── File size display ─────────────────────────────────
  async function updateFileSizeDisplay(sizeId, groupId) {
    const size = ALL_SIZES.find(s => s.id === sizeId);
    if (!size) return;
    const el = document.getElementById('filesize-' + sizeId);
    if (!el) return;
    const blob = await getBlob(sizeId, groupId);
    if (!blob) return;
    const label = blob.size >= 1024 * 1024 ? (blob.size / 1024 / 1024).toFixed(1) + 'MB' : (blob.size / 1024).toFixed(0) + 'KB';
    const maxLabel = size.maxBytes >= 1024*1024 ? (size.maxBytes/1024/1024) + 'MB' : (size.maxBytes/1024) + 'KB';
    const over = size.maxBytes && blob.size > size.maxBytes;
    let status;
    if (over) {
      status = '<span style="color:#e53935;font-weight:600;">⚠ 超過（これ以上の圧縮不可）</span>';
    } else if (blob._compressed) {
      status = `<span style="color:#2196f3;">自動圧縮済み（Q:${Math.round(blob._appliedQuality * 100)}%）✓</span>`;
    } else {
      status = '<span style="color:#43a047;">✓</span>';
    }
    el.innerHTML = `📦 ${label} / 上限 ${maxLabel}　${status}`;
  }

  // ── Blob generation ───────────────────────────────────
  function getRequestedMimeType(forcePng) {
    return forcePng ? 'image/png' : format === 'webp' ? 'image/webp' : 'image/png';
  }
  function getExtFromMime(mime) {
    if (mime === 'image/webp') return 'webp';
    return 'png';
  }

  function getBlob(sizeId, groupId) {
    return new Promise(async resolve => {
      const size = ALL_SIZES.find(s => s.id === sizeId);
      if (!size) { resolve(null); return; }
      const domCanvas = document.getElementById('canvas-' + sizeId);
      let canvas;
      if (domCanvas && domCanvas.dataset.thumbTrimOverlay && sourceImages[groupId]) {
        canvas = createResized(sourceImages[groupId], size.w, size.h, size.crop);
      } else {
        canvas = domCanvas;
      }
      if (!canvas) { resolve(null); return; }
      const mimeType = getRequestedMimeType(size.forcePng);
      const maxBytes = size.maxBytes;
      const toBlob = (q) => new Promise(r => canvas.toBlob(b => r(b), mimeType, q));
      let blob = await toBlob(0.92);
      let appliedQuality = 0.92;
      if (maxBytes && blob && blob.size > maxBytes && mimeType !== 'image/png') {
        for (const q of [0.85, 0.78, 0.70, 0.60, 0.50]) {
          blob = await toBlob(q);
          appliedQuality = q;
          if (blob.size <= maxBytes) break;
        }
      }
      if (blob && blob.type !== mimeType && !blob._actualExt) {
        blob._actualExt = getExtFromMime(blob.type);
      }
      blob._appliedQuality = appliedQuality;
      blob._compressed = appliedQuality < 0.92;
      resolve(blob);
    });
  }

  // ── Download ──────────────────────────────────────────
  function findGroupForSize(sizeId) {
    return GROUPS.find(g => g.sizes.some(s => s.id === sizeId));
  }

  function downloadSingle(groupId, sizeId) {
    const size = ALL_SIZES.find(s => s.id === sizeId);
    if (!size || !document.getElementById('canvas-' + sizeId)) return;
    getBlob(sizeId, groupId).then(blob => {
      if (!blob) return;
      const ext = blob._actualExt || (size.forcePng ? 'png' : format);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${size.dlName}.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  async function downloadAll() {
    const btn = document.getElementById('dl-all-btn');
    const hasAny = GROUPS.some(g => sourceImages[g.id]);
    if (!hasAny) {
      alert('画像がアップロードされていません。');
      return;
    }
    btn.textContent = '⏳ 生成中...';
    btn.disabled = true;

    const zip = new JSZip();
    for (const group of GROUPS) {
      if (!sourceImages[group.id]) continue;
      for (const size of group.sizes) {
        const blob = await getBlob(size.id, group.id);
        if (!blob) continue;
        const ext = blob._actualExt || (size.forcePng ? 'png' : format);
        zip.file(`${size.dlName}.${ext}`, blob);
      }
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'images_resized.zip';
    a.click();
    URL.revokeObjectURL(url);
    btn.textContent = '📦 まとめてダウンロード（ZIP）';
    btn.disabled = false;
  }

  // ── Init ──────────────────────────────────────────────
  buildOutputCards();
  setupDropZones();
</script>
  <footer class="app-footer">
    <span class="app-footer-text">⚠️ 機密情報・個人情報のアップロードは禁止です</span>
  </footer>
  <script src="../../assets/copy-utils.js"></script>
  <script src="../../assets/history.js"></script>
  <script>HistoryManager.init('Banner Resizer');</script>
</body>
