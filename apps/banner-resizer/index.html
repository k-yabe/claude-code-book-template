<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Resizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .wrap { max-width: 800px; margin: 0 auto; }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #001f33;
      text-decoration: none;
      font-weight: 600;
    }
    .back:hover { text-decoration: underline; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 0.85rem; color: #636e72; margin-bottom: 24px; }

    .card {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #b2bec3;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8f9fa;
    }
    .dropzone:hover, .dropzone.over { border-color: #001f33; background: #f0f4f8; }
    .dropzone-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .dropzone-text { font-size: 0.95rem; font-weight: 600; color: #2d3436; margin-bottom: 4px; }
    .dropzone-sub { font-size: 0.8rem; color: #636e72; }
    .dropzone input { display: none; }

    /* Format selector */
    .format-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .format-label { font-size: 0.88rem; font-weight: 700; color: #2d3436; }
    .format-btn {
      padding: 6px 18px;
      border: 1.5px solid #dfe6e9;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      background: #f5f6fa;
      color: #636e72;
      transition: all 0.15s;
    }
    .format-btn.active { background: #001f33; color: #fff; border-color: #001f33; }

    /* Previews */
    .previews { display: none; }
    .previews.on { display: block; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .preview-item {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 12px;
      padding: 16px;
    }
    .preview-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #636e72;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .preview-size {
      font-size: 0.78rem;
      color: #b2bec3;
      margin-bottom: 10px;
    }
    .preview-canvas-wrap {
      width: 100%;
      background: #f0f0f0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-canvas-wrap canvas {
      width: 100%;
      height: auto;
      display: block;
    }
    .dl-btn {
      width: 100%;
      padding: 8px;
      background: #f5f6fa;
      color: #001f33;
      border: 1.5px solid #dfe6e9;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .dl-btn:hover { background: #001f33; color: #fff; border-color: #001f33; }

    .dl-all-btn {
      width: 100%;
      padding: 14px;
      background: #001f33;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.04em;
    }
    .dl-all-btn:hover { opacity: 0.85; }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #2d3436;
    }

    /* カスタムサイズ */
    .custom-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid #f0f0f0;
    }
    .custom-row input[type="text"],
    .custom-row input[type="number"] {
      padding: 7px 10px;
      border: 1.5px solid #dfe6e9;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #2d3436;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-row input[type="number"] { width: 80px; }
    .custom-row input[type="text"]   { width: 110px; }
    .custom-row input:focus { border-color: #001f33; }
    .custom-row .add-btn {
      padding: 7px 16px;
      background: #001f33;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .custom-row .add-btn:hover { opacity: 0.8; }
    .custom-row .sep { color: #b2bec3; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../../">← アプリ一覧へ</a>
  <h1>Banner Resizer</h1>
  <p class="sub">バナー画像を1枚アップロードするだけで、3サイズを一括生成します</p>

  <div class="card">
    <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="dropzone-icon">🖼️</div>
      <div class="dropzone-text">画像をドロップ、またはクリックして選択</div>
      <div class="dropzone-sub">PNG / JPG / WebP 対応</div>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp">
    </div>

    <div class="format-row">
      <span class="format-label">出力形式：</span>
      <button class="format-btn active" id="btn-png" onclick="setFormat('png')">PNG</button>
      <button class="format-btn" id="btn-webp" onclick="setFormat('webp')">WebP</button>
    </div>
  </div>

  <div class="previews" id="previews">
    <div class="card">
      <p class="section-title">プレビュー</p>
      <div class="preview-grid" id="preview-grid"></div>
      <div class="custom-row">
        <input type="text"   id="custom-name" placeholder="名前（任意）" />
        <input type="number" id="custom-w" placeholder="幅" min="1" />
        <span class="sep">×</span>
        <input type="number" id="custom-h" placeholder="高さ" min="1" />
        <button class="add-btn" onclick="addCustomSize()">＋ 追加</button>
      </div>
    </div>
    <div class="card">
      <button class="dl-all-btn" id="dl-all-btn" onclick="downloadAll()">📦 まとめてダウンロード（ZIP）</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const SIZES = [
    { id: 'ogp',    label: 'OGP',    w: 1200, h: 630, forcePng: true },
    { id: 'banner', label: 'バナー（MV）',   w: 800,  h: 446 },
    { id: 'list',   label: '一覧（index）', w: 350,  h: 200 },
  ];

  let format = 'png';
  let sourceImage = null;
  let filename = 'banner';
  let customSizes = []; // ユーザー追加サイズ

  function setFormat(f) {
    format = f;
    document.getElementById('btn-png').classList.toggle('active', f === 'png');
    document.getElementById('btn-webp').classList.toggle('active', f === 'webp');
    if (sourceImage) renderAll();
  }

  // Drag & Drop
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    filename = file.name.replace(/\.[^.]+$/, '');
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        sourceImage = img;
        renderAll();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function renderAll() {
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';

    [...SIZES, ...customSizes].forEach(size => {
      const canvas = createResized(sourceImage, size.w, size.h);

      const item = document.createElement('div');
      item.className = 'preview-item';
      item.innerHTML = `
        <div class="preview-name">${size.label}${size.forcePng ? ' <span style="font-size:0.7rem;color:#b2bec3;font-weight:400;text-transform:none;">PNG固定</span>' : ''}</div>
        <div class="preview-size">${size.w} × ${size.h}px</div>
        <div class="preview-canvas-wrap"></div>
        <button class="dl-btn" onclick="downloadSingle('${size.id}')">ダウンロード</button>
      `;
      item.querySelector('.preview-canvas-wrap').appendChild(canvas);
      canvas.id = 'canvas-' + size.id;
      grid.appendChild(item);
    });

    document.getElementById('previews').classList.add('on');
  }

  function createResized(img, targetW, targetH) {
    // アスペクト比を保ちながら中心クロップ
    const srcRatio = img.width / img.height;
    const dstRatio = targetW / targetH;

    let sx, sy, sw, sh;
    if (srcRatio > dstRatio) {
      sh = img.height;
      sw = img.height * dstRatio;
      sx = (img.width - sw) / 2;
      sy = 0;
    } else {
      sw = img.width;
      sh = img.width / dstRatio;
      sx = 0;
      sy = (img.height - sh) / 2;
    }

    // 多段階ダウンスケールで品質向上（縮小率が2倍以上の場合）
    let srcCanvas = document.createElement('canvas');
    srcCanvas.width = sw;
    srcCanvas.height = sh;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.imageSmoothingEnabled = true;
    srcCtx.imageSmoothingQuality = 'high';
    srcCtx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    let curW = sw, curH = sh;
    while (curW / targetW > 2 || curH / targetH > 2) {
      const nextW = Math.max(Math.floor(curW / 2), targetW);
      const nextH = Math.max(Math.floor(curH / 2), targetH);
      const tmp = document.createElement('canvas');
      tmp.width = nextW;
      tmp.height = nextH;
      const tmpCtx = tmp.getContext('2d');
      tmpCtx.imageSmoothingEnabled = true;
      tmpCtx.imageSmoothingQuality = 'high';
      tmpCtx.drawImage(srcCanvas, 0, 0, nextW, nextH);
      srcCanvas = tmp;
      curW = nextW;
      curH = nextH;
    }

    const canvas = document.createElement('canvas');
    canvas.width = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(srcCanvas, 0, 0, targetW, targetH);
    return canvas;
  }

  function addCustomSize() {
    const nameEl = document.getElementById('custom-name');
    const wEl = document.getElementById('custom-w');
    const hEl = document.getElementById('custom-h');
    const w = parseInt(wEl.value);
    const h = parseInt(hEl.value);
    if (!w || !h || w < 1 || h < 1) return;

    const id = `custom-${Date.now()}`;
    const label = nameEl.value.trim() || `${w}×${h}`;
    customSizes.push({ id, label, w, h });

    nameEl.value = '';
    wEl.value = '';
    hEl.value = '';

    if (sourceImage) renderAll();
  }

  function getBlob(canvasId, forcePng) {
    return new Promise(resolve => {
      const canvas = document.getElementById(canvasId);
      const mimeType = (!forcePng && format === 'webp') ? 'image/webp' : 'image/png';
      canvas.toBlob(resolve, mimeType, 0.92);
    });
  }

  function downloadSingle(sizeId) {
    const size = SIZES.find(s => s.id === sizeId);
    const ext = size.forcePng ? 'png' : format;
    getBlob('canvas-' + sizeId, size.forcePng).then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${filename}_${size.w}x${size.h}.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  async function downloadAll() {
    const btn = document.getElementById('dl-all-btn');
    btn.textContent = '⏳ 生成中...';
    btn.disabled = true;

    const zip = new JSZip();
    for (const size of [...SIZES, ...customSizes]) {
      const ext = size.forcePng ? 'png' : format;
      const blob = await getBlob('canvas-' + size.id, size.forcePng);
      zip.file(`${filename}_${size.w}x${size.h}.${ext}`, blob);
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${filename}_resized.zip`;
    a.click();
    URL.revokeObjectURL(url);

    btn.textContent = '📦 3サイズをまとめてダウンロード（ZIP）';
    btn.disabled = false;
  }
</script>
</body>
</html>
