<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Resizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 0 16px 64px;
    }

    .navbar {
      background: #001f33;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -16px;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-logo { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.2em; color: #ffb81c; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      padding: 6px 14px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .wrap { max-width: 800px; margin: 0 auto; padding-top: 40px; }

    h1 { font-size: 1.4rem; font-weight: 700; color: #001f33; letter-spacing: -0.01em; margin-bottom: 4px; }

    .sub {
      font-size: 0.88rem;
      color: #636e72;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .card {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 0;
      padding: 28px;
      margin-bottom: 16px;
    }

    /* Format selector */
    .format-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .format-label { font-size: 0.88rem; font-weight: 700; color: #2d3436; }
    .format-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 0;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      background: #f0f2f5;
      color: #636e72;
      transition: all 0.15s;
    }
    .format-btn.active { background: #001f33; color: #fff; border-color: #001f33; }

    /* Size card */
    .size-card {
      background: #fff;
      border: 2px solid #dfe6e9;
      padding: 24px;
      margin-bottom: 16px;
    }
    .size-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .size-card-dot {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }
    .size-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #001f33;
    }
    .size-card-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 6px;
      margin-left: 4px;
    }
    .size-card-meta {
      font-size: 0.8rem;
      color: #636e72;
      margin-bottom: 12px;
    }
    .size-card-note {
      font-size: 0.75rem;
      color: #636e72;
      margin-bottom: 12px;
      line-height: 1.6;
      padding: 8px 10px;
      background: #f8f9fa;
    }

    /* Drop zone (per card) */
    .dropzone {
      border: 2px dashed #b2bec3;
      border-radius: 0;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8f9fa;
      margin-bottom: 12px;
    }
    .dropzone:hover, .dropzone.over { border-color: #001f33; background: #f0f4f8; }
    .dropzone-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .dropzone-text { font-size: 0.85rem; font-weight: 600; color: #2d3436; margin-bottom: 2px; }
    .dropzone-sub { font-size: 0.75rem; color: #636e72; }
    .dropzone input { display: none; }
    .dropzone.has-image { padding: 12px 16px; border-style: solid; border-color: #dfe6e9; background: #fff; }
    .dropzone.has-image .dropzone-icon { font-size: 1rem; margin-bottom: 0; }
    .dropzone.has-image .dropzone-text { font-size: 0.78rem; }

    /* Preview area */
    .preview-canvas-wrap {
      width: 100%;
      background: #f0f0f0;
      border-radius: 0;
      overflow: hidden;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }
    .preview-canvas-wrap canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    /* AI loading indicator */
    .ai-loading {
      padding: 20px 12px;
      font-size: 0.78rem;
      color: #636e72;
      text-align: center;
      line-height: 1.6;
    }
    .ai-loading-spinner {
      display: inline-block;
      margin-bottom: 4px;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .dl-btn {
      width: 100%;
      padding: 8px;
      background: #f0f2f5;
      color: #001f33;
      border: none;
      border-radius: 0;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .dl-btn:hover { background: #001f33; color: #fff; border-color: #001f33; }
    .dl-btn:disabled { opacity: 0.4; cursor: default; }
    .dl-btn:disabled:hover { background: #f0f2f5; color: #001f33; }

    .dl-all-btn {
      width: 100%;
      padding: 14px;
      background: #001f33;
      color: #fff;
      border: none;
      border-radius: 0;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.04em;
    }
    .dl-all-btn:hover { opacity: 0.85; }

    /* AIアップスケール チェックボックス */
    .ai-upscale-check {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: #636e72;
      cursor: pointer;
      user-select: none;
    }
    .ai-upscale-check input[type="checkbox"] {
      accent-color: #001f33;
      width: 13px;
      height: 13px;
      cursor: pointer;
    }
    .ai-upscale-check:hover { color: #2d3436; }

    .app-footer {
      background: #001f33;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 40px;
    }
    .app-footer-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
    }

    @media (max-width: 600px) {
      .navbar { padding: 0 16px; margin: 0 -16px; }
      .wrap { padding-top: 20px; }
    }
  </style>
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <a href="../../" class="back-btn">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Banner Resizer</span>
  </div>
</nav>
<div class="wrap">
  <h1>Banner Resizer</h1>
  <p class="sub">用途ごとに画像をアップロードして、規定サイズに変換します</p>
  <p style="font-size:0.75rem;color:#e17055;margin-bottom:20px;">⚠️ 機密情報・個人情報を含む画像はアップロードしないでください</p>

  <div class="format-row">
    <span class="format-label">出力形式：</span>
    <button class="format-btn active" id="btn-webp" onclick="setFormat('webp')">WebP</button>
    <button class="format-btn" id="btn-png" onclick="setFormat('png')">PNG</button>
    <span style="font-size:0.75rem;color:#636e72;">※ OGPはPNG固定</span>
  </div>

  <div id="size-cards"></div>

  <div class="card">
    <button class="dl-all-btn" id="dl-all-btn" onclick="downloadAll()">📦 まとめてダウンロード（ZIP）</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  if (localStorage.getItem('auth') !== '1') { location.href = '/'; }

  const SIZES = [
    { id: 'banner', label: 'バナー（MV）',   w: 1920, h: 1080, dlName: 'img-mv', maxBytes: 1 * 1024 * 1024, color: '#ffb81c', note: '1920×1080px にリサイズ（トリミングなし）' },
    { id: 'index',  label: '一覧サムネイル', w: 1920, h: 1080, dlName: 'img-index', maxBytes: 1 * 1024 * 1024, color: '#636e72', note: '1920×1080px にリサイズ。CMS上でサムネイル表示時に上下24px・左右100pxが自動カットされます', thumbTrim: { top: 24, bottom: 24, left: 100, right: 100 } },
    { id: 'ogp',    label: 'OGP',          w: 1200, h: 630, forcePng: true, aiUpscale: true, dlName: 'img-ogp', maxBytes: 100 * 1024, crop: true, color: '#1C304B', note: '1200×630px にセンタークロップ＋リサイズ。PNG固定・100KB以下' },
  ];

  let format = 'webp';
  const sourceImages = {};  // sizeId → Image
  const aiUpscaleFlags = {};

  // ── AI Upscale ────────────────────────────────────────
  let _libsLoading = null;
  let _upscaler = null;

  function loadAILibs() {
    if (_libsLoading) return _libsLoading;
    _libsLoading = (async () => {
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/upscalerjs@1.0.0-beta.18/dist/browser/umd/upscaler.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@1.0.0-beta.16/dist/browser/umd/2x.min.js');
    })();
    return _libsLoading;
  }

  function loadImageFromSrc(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function createWithAI(img, w, h, crop) {
    if (img.width >= w && img.height >= h) {
      return createResized(img, w, h, crop);
    }
    try {
      await loadAILibs();
      if (!_upscaler) {
        const modelArg = window.ESRGANSlim ? window.ESRGANSlim['2x'] : undefined;
        _upscaler = new Upscaler(modelArg ? { model: modelArg } : {});
      }
      const upscaledSrc = await _upscaler.upscale(img);
      const upscaledImg = await loadImageFromSrc(upscaledSrc);
      return createResized(upscaledImg, w, h, crop);
    } catch (e) {
      console.warn('AI upscale failed, using standard resize:', e);
      return createResized(img, w, h, crop);
    }
  }

  // ── Format selector ───────────────────────────────────
  function setFormat(f) {
    format = f;
    document.getElementById('btn-png').classList.toggle('active', f === 'png');
    document.getElementById('btn-webp').classList.toggle('active', f === 'webp');
    // Re-render all cards that have images
    for (const size of SIZES) {
      if (sourceImages[size.id]) renderCard(size);
    }
  }

  // ── Build cards ───────────────────────────────────────
  function buildCards() {
    const container = document.getElementById('size-cards');
    for (const size of SIZES) {
      if (aiUpscaleFlags[size.id] === undefined) {
        aiUpscaleFlags[size.id] = size.aiUpscale === true;
      }

      const card = document.createElement('div');
      card.className = 'size-card';
      card.id = 'card-' + size.id;
      card.innerHTML = `
        <div class="size-card-header">
          <span class="size-card-dot" style="background:${size.color || '#636e72'}"></span>
          <span class="size-card-title">${size.label}${size.forcePng ? '<span class="size-card-badge" style="color:#001f33;background:#ffb81c;">PNG固定</span>' : ''}</span>
        </div>
        <div class="size-card-meta">${size.w} × ${size.h}px　/　上限 ${size.maxBytes >= 1024*1024 ? (size.maxBytes/1024/1024) + 'MB' : (size.maxBytes/1024) + 'KB'}</div>
        ${size.note ? `<div class="size-card-note">${size.note}</div>` : ''}
        <div class="dropzone" id="dz-${size.id}" onclick="document.getElementById('file-${size.id}').click()">
          <div class="dropzone-icon">🖼️</div>
          <div class="dropzone-text">画像をドロップ、またはクリックして選択</div>
          <div class="dropzone-sub">PNG / JPG / WebP</div>
          <input type="file" id="file-${size.id}" accept="image/png,image/jpeg,image/webp">
        </div>
        <label class="ai-upscale-check">
          <input type="checkbox" id="ai-check-${size.id}" ${aiUpscaleFlags[size.id] ? 'checked' : ''}
            onchange="toggleAiUpscale('${size.id}', this.checked)">
          AIアップスケール適用（小さい画像を高品質拡大）
        </label>
        <div class="preview-canvas-wrap" id="wrap-${size.id}" style="display:none;"></div>
        ${size.thumbTrim ? `<label style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:#667;margin:4px 0;cursor:pointer;user-select:none;">
          <input type="checkbox" id="trim-check-${size.id}" onchange="toggleThumbTrim('${size.id}', this.checked)">
          サムネイル時のカット領域を表示
        </label>` : ''}
        <div class="file-size-info" id="filesize-${size.id}" style="font-size:0.8rem;color:#667;margin:4px 0 8px;min-height:1.2em;"></div>
        <button class="dl-btn" id="dl-btn-${size.id}" onclick="downloadSingle('${size.id}')" disabled>ダウンロード</button>
      `;
      container.appendChild(card);

      // Per-card drag & drop
      const dz = document.getElementById('dz-' + size.id);
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('over'));
      dz.addEventListener('drop', e => {
        e.preventDefault();
        dz.classList.remove('over');
        const file = e.dataTransfer.files[0];
        if (file) loadFileForSize(file, size.id);
      });
      document.getElementById('file-' + size.id).addEventListener('change', e => {
        if (e.target.files[0]) loadFileForSize(e.target.files[0], size.id);
      });
    }
  }

  function loadFileForSize(file, sizeId) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        sourceImages[sizeId] = img;
        const size = SIZES.find(s => s.id === sizeId);
        renderCard(size);
        // Update dropzone to show filename
        const dz = document.getElementById('dz-' + sizeId);
        dz.classList.add('has-image');
        dz.querySelector('.dropzone-icon').textContent = '✅';
        dz.querySelector('.dropzone-text').textContent = file.name + '（クリックで変更）';
        dz.querySelector('.dropzone-sub').textContent = `${img.width}×${img.height}px`;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── Render single card ────────────────────────────────
  async function renderCard(size) {
    const img = sourceImages[size.id];
    if (!img) return;

    const wrap = document.getElementById('wrap-' + size.id);
    wrap.style.display = 'flex';
    wrap.innerHTML = '';

    const aiEnabled = !!aiUpscaleFlags[size.id];
    const needsAI = aiEnabled && (img.width < size.w || img.height < size.h);

    if (needsAI) {
      wrap.innerHTML = '<div class="ai-loading"><span class="ai-loading-spinner">⏳</span><br>AIアップスケール中...</div>';
      const canvas = await createWithAI(img, size.w, size.h, size.crop);
      canvas.id = 'canvas-' + size.id;
      wrap.innerHTML = '';
      wrap.appendChild(canvas);
    } else {
      const canvas = createResized(img, size.w, size.h, size.crop);
      canvas.id = 'canvas-' + size.id;
      wrap.appendChild(canvas);
    }

    // Re-apply thumb trim overlay if checkbox is checked
    const trimCheck = document.getElementById('trim-check-' + size.id);
    if (trimCheck && trimCheck.checked && size.thumbTrim) {
      const canvas = document.getElementById('canvas-' + size.id);
      drawThumbTrimOverlay(canvas, size.thumbTrim);
      canvas.dataset.thumbTrimOverlay = '1';
    }

    document.getElementById('dl-btn-' + size.id).disabled = false;
    updateFileSizeDisplay(size.id);
  }

  // ── Resize ────────────────────────────────────────────
  function createResized(img, targetW, targetH, crop) {
    let sx = 0, sy = 0, sw = img.width, sh = img.height;

    if (crop) {
      const srcRatio = img.width / img.height;
      const dstRatio = targetW / targetH;
      if (srcRatio > dstRatio) {
        sw = img.height * dstRatio;
        sx = (img.width - sw) / 2;
      } else {
        sh = img.width / dstRatio;
        sy = (img.height - sh) / 2;
      }
    }

    let srcCanvas = document.createElement('canvas');
    srcCanvas.width = sw;
    srcCanvas.height = sh;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.imageSmoothingEnabled = true;
    srcCtx.imageSmoothingQuality = 'high';
    srcCtx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    let curW = sw, curH = sh;
    while (curW / targetW > 2 || curH / targetH > 2) {
      const nextW = Math.max(Math.floor(curW / 2), targetW);
      const nextH = Math.max(Math.floor(curH / 2), targetH);
      const tmp = document.createElement('canvas');
      tmp.width = nextW;
      tmp.height = nextH;
      const tmpCtx = tmp.getContext('2d');
      tmpCtx.imageSmoothingEnabled = true;
      tmpCtx.imageSmoothingQuality = 'high';
      tmpCtx.drawImage(srcCanvas, 0, 0, nextW, nextH);
      srcCanvas = tmp;
      curW = nextW;
      curH = nextH;
    }

    const canvas = document.createElement('canvas');
    canvas.width = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(srcCanvas, 0, 0, targetW, targetH);
    return canvas;
  }

  // ── Thumb trim overlay ────────────────────────────────
  function drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawThumbTrimOverlay(canvas, sz) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = 'rgba(255, 100, 100, 0.3)';
    ctx.fillRect(0, 0, w, sz.top);
    ctx.fillRect(0, h - sz.bottom, w, sz.bottom);
    ctx.fillRect(0, sz.top, sz.left, h - sz.top - sz.bottom);
    ctx.fillRect(w - sz.right, sz.top, sz.right, h - sz.top - sz.bottom);
    ctx.setLineDash([8, 5]);
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = 2;
    ctx.strokeRect(sz.left, sz.top, w - sz.left - sz.right, h - sz.top - sz.bottom);
    ctx.setLineDash([]);
    ctx.font = 'bold 14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const safeW = w - sz.left - sz.right, safeH = h - sz.top - sz.bottom;
    const label = `サムネイル安全エリア ${safeW}×${safeH}px`;
    const lw = ctx.measureText(label).width + 16;
    const lx = w / 2 - lw / 2, ly = h - sz.bottom - 30;
    ctx.fillStyle = 'rgba(0, 230, 118, 0.85)';
    drawRoundRect(ctx, lx, ly, lw, 24, 5);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText(label, w / 2, ly + 12);
    ctx.font = '11px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('サムネイル時にカットされる領域', w / 2, sz.top / 2 || 12);
  }

  function toggleThumbTrim(sizeId, show) {
    const img = sourceImages[sizeId];
    if (!img) return;
    const size = SIZES.find(s => s.id === sizeId);
    if (!size || !size.thumbTrim) return;
    const wrap = document.getElementById('wrap-' + sizeId);
    if (!wrap) return;
    const canvas = createResized(img, size.w, size.h, size.crop);
    canvas.id = 'canvas-' + sizeId;
    if (show) {
      drawThumbTrimOverlay(canvas, size.thumbTrim);
      canvas.dataset.thumbTrimOverlay = '1';
    }
    wrap.innerHTML = '';
    wrap.appendChild(canvas);
  }

  function toggleAiUpscale(sizeId, enabled) {
    aiUpscaleFlags[sizeId] = enabled;
    const size = SIZES.find(s => s.id === sizeId);
    if (sourceImages[sizeId] && size) renderCard(size);
  }

  // ── File size display ─────────────────────────────────
  async function updateFileSizeDisplay(sizeId) {
    const size = SIZES.find(s => s.id === sizeId);
    if (!size) return;
    const el = document.getElementById('filesize-' + sizeId);
    if (!el) return;
    const blob = await getBlob(sizeId);
    if (!blob) return;
    const label = blob.size >= 1024 * 1024 ? (blob.size / 1024 / 1024).toFixed(1) + 'MB' : (blob.size / 1024).toFixed(0) + 'KB';
    const maxLabel = size.maxBytes >= 1024*1024 ? (size.maxBytes/1024/1024) + 'MB' : (size.maxBytes/1024) + 'KB';
    const over = size.maxBytes && blob.size > size.maxBytes;
    const overMsg = over
      ? ' <span style="color:#e53935;font-weight:600;">⚠ 超過</span>'
      : ' <span style="color:#43a047;">✓</span>';
    el.innerHTML = `📦 ${label} / 上限 ${maxLabel}` + overMsg;
  }

  // ── Blob generation ───────────────────────────────────
  function getRequestedMimeType(forcePng) {
    return forcePng ? 'image/png' : format === 'webp' ? 'image/webp' : 'image/png';
  }

  function getExtFromMime(mime) {
    if (mime === 'image/webp') return 'webp';
    return 'png';
  }

  function getBlob(sizeId) {
    return new Promise(async resolve => {
      const size = SIZES.find(s => s.id === sizeId);
      if (!size) { resolve(null); return; }
      const domCanvas = document.getElementById('canvas-' + sizeId);
      let canvas;
      if (domCanvas && domCanvas.dataset.thumbTrimOverlay && sourceImages[sizeId]) {
        canvas = createResized(sourceImages[sizeId], size.w, size.h, size.crop);
      } else {
        canvas = domCanvas;
      }
      if (!canvas) { resolve(null); return; }
      const mimeType = getRequestedMimeType(size.forcePng);
      const maxBytes = size.maxBytes;
      const toBlob = (q) => new Promise(r => canvas.toBlob(b => r(b), mimeType, q));
      let blob = await toBlob(0.92);
      if (maxBytes && blob && blob.size > maxBytes && mimeType !== 'image/png') {
        for (const q of [0.85, 0.78, 0.70]) {
          blob = await toBlob(q);
          if (blob.size <= maxBytes) break;
        }
      }
      if (blob && blob.type !== mimeType && !blob._actualExt) {
        blob._actualExt = getExtFromMime(blob.type);
      }
      resolve(blob);
    });
  }

  // ── Download ──────────────────────────────────────────
  function downloadSingle(sizeId) {
    const size = SIZES.find(s => s.id === sizeId);
    if (!size || !document.getElementById('canvas-' + sizeId)) return;
    getBlob(sizeId).then(blob => {
      if (!blob) return;
      const ext = blob._actualExt || (size.forcePng ? 'png' : format);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${size.dlName}.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  async function downloadAll() {
    const btn = document.getElementById('dl-all-btn');
    const uploaded = SIZES.filter(s => sourceImages[s.id]);
    if (uploaded.length === 0) {
      alert('画像がアップロードされていません。');
      return;
    }

    btn.textContent = '⏳ 生成中...';
    btn.disabled = true;

    const zip = new JSZip();
    for (const size of uploaded) {
      const blob = await getBlob(size.id);
      if (!blob) continue;
      const ext = blob._actualExt || (size.forcePng ? 'png' : format);
      zip.file(`${size.dlName}.${ext}`, blob);
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'images_resized.zip';
    a.click();
    URL.revokeObjectURL(url);

    btn.textContent = '📦 まとめてダウンロード（ZIP）';
    btn.disabled = false;
  }

  // ── Init ──────────────────────────────────────────────
  buildCards();
</script>

    <span class="app-footer-text">⚠️ 機密情報・個人情報のアップロードは禁止です</span>
  </footer>

  <script src="../../assets/history.js"></script>

</body>
