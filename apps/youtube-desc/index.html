<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Description Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #001f33;
      text-decoration: none;
      font-weight: 600;
    }
    .back:hover { text-decoration: underline; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 0.85rem; color: #636e72; margin-bottom: 32px; }

    .card {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 0.8rem;
      font-weight: 400;
      color: #636e72;
      margin-left: 6px;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dfe6e9;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #2d3436;
      background: #fff;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    textarea:focus, input[type="text"]:focus { border-color: #001f33; }


    .generate-btn {
      width: 100%;
      padding: 16px;
      background: #001f33;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }
    .generate-btn:hover { opacity: 0.85; }

    /* Step indicator */
    .step-note {
      background: #e8f4fd;
      border: 1.5px solid #b3d9f7;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.85rem;
      color: #2d6a9f;
      line-height: 1.7;
      display: none;
    }
    .step-note.on { display: block; }
    .step-note strong { display: block; margin-bottom: 4px; font-size: 0.88rem; }

    /* Output */
    .output { display: none; }
    .output.on { display: block; }

    .out-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .out-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #636e72;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .copy-btn {
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      background: #001f33;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .copy-btn.done { background: #00b894; }

    .out-text {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #dfe6e9;
      border-radius: 10px;
      font-size: 0.88rem;
      background: #f8f9fa;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      color: #2d3436;
      font-family: inherit;
    }

    .open-claude {
      display: block;
      margin-top: 12px;
      padding: 13px;
      background: #f5f6fa;
      border: 2px solid #dfe6e9;
      border-radius: 10px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: #001f33;
      text-decoration: none;
      transition: all 0.15s;
    }
    .open-claude:hover { background: #dfe6e9; }
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../../">← アプリ一覧へ</a>
  <h1>YouTube Description Generator</h1>
  <p class="sub">動画の内容を入力するとClaude.ai用プロンプトを生成します。コピーしてClaude.aiに貼り付けるだけで完成。</p>

  <!-- Input card -->
  <div class="card">
    <div class="field">
      <label>動画タイトル</label>
      <input type="text" id="title" placeholder="例：AIがものづくりを変える：アジャイル開発の最前線" />
    </div>

    <div class="field">
      <label>動画の内容 <span style="color:#e17055; font-weight:400; font-size:0.8rem;">必須</span></label>
      <textarea id="content" rows="8" placeholder="台本・メモ・テーマ・キーワードなど、なんでもOK&#10;&#10;例：&#10;・AIと製造業の未来について話す動画&#10;・ゲスト：○○さん（エンジニア）&#10;・アジャイル開発、デジタルツイン、AIの活用事例を紹介&#10;・視聴者は製造業に関わるビジネスパーソン向け"></textarea>
    </div>

    <div class="field">
      <label>掲載するリンク</label>
      <textarea id="links" rows="3" placeholder="1行に1つ記入（YouTube動画・公式サイト・採用ページなど）&#10;例：公式サイト https://www.akkodis.com/ja&#10;　　採用情報 https://www.akkodis.com/ja/careers"></textarea>
    </div>

    <div class="field">
      <label>タイムスタンプ</label>
      <textarea id="timestamps" rows="3" placeholder="00:00 イントロ&#10;01:30 AIとは&#10;05:00 まとめ"></textarea>
    </div>

    <button class="generate-btn" onclick="generate()">プロンプトを生成する</button>
  </div>

  <!-- Step note -->
  <div class="step-note" id="step-note">
    <strong>① 下のプロンプトをコピー　② Claude.aiに貼り付けて送信</strong>
    説明文・タイトル・ハッシュタグが生成されます。
  </div>

  <!-- Output -->
  <div class="card output" id="output">
    <div class="out-header">
      <span class="out-label">Claude.ai 用プロンプト</span>
      <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">コピー</button>
    </div>
    <div class="out-text" id="out-prompt"></div>
    <a class="open-claude" href="https://claude.ai" target="_blank" rel="noopener">
      Claude.ai を開く →
    </a>
  </div>
</div>

<script>
const SNS = `▼SNS
Facebook▶ https://www.facebook.com/akkodisjapan/
LinkedIn▶ https://www.linkedin.com/company/akkodis
X▶ https://x.com/AkkodisJapan`;

  function generate() {
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const links = document.getElementById('links').value.trim();
    const timestamps = document.getElementById('timestamps').value.trim();

    if (!content) {
      alert('動画の内容を入力してください。');
      return;
    }

    let prompt = `あなたはAKKODiS JapanのYouTube担当アシスタントです。
以下の動画情報をもとに、YouTube用のタイトル・説明文・ハッシュタグを日本語で作成してください。
`;
    if (title) {
      prompt += `
【動画タイトル（仮）】
${title}
`;
    }
    prompt += `
【動画の内容・メモ】
${content}
`;

    if (links) {
      prompt += `
【説明文に掲載するリンク（必ず含める。YouTubeのURLは関連動画として、HPなどは公式リンクとして適切に配置してください）】
${links}
`;
    }

    if (timestamps) {
      prompt += `
【タイムスタンプ（目次として含める）】
${timestamps}
`;
    }

    prompt += `
【SNSリンク（必ず含める）】
${SNS}

---
【出力形式】
以下の3つをそれぞれ出力してください。

■ タイトル
（SEOを意識した魅力的な動画タイトル）

■ 説明文
（構成：
 1. 冒頭3文 ← YouTubeで「もっと見る」前に表示される重要な部分。キーワードを含め動画の価値を伝える
 2. 掲載リンク（提供されたもの）
 3. リンク（YouTubeは関連動画、HPなどは公式リンクとして適切に配置）
 4. 目次（タイムスタンプが提供された場合のみ）
 5. SNSリンク
 6. ハッシュタグ5つ）

■ ハッシュタグ
（動画内容・業界・AKKODiSに関連する5つ）`;

    document.getElementById('out-prompt').textContent = prompt;
    document.getElementById('output').classList.add('on');
    document.getElementById('step-note').classList.add('on');
    document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyPrompt() {
    const text = document.getElementById('out-prompt').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピー済み！';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('done'); }, 2000);
    });
  }
</script>
</body>
</html>
