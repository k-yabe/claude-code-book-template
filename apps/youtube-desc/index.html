<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Description Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #001f33;
      text-decoration: none;
      font-weight: 600;
    }
    .back:hover { text-decoration: underline; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 0.85rem; color: #636e72; margin-bottom: 24px; }

    .card {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #2d3436;
    }
    .required { font-size: 0.72rem; font-weight: 700; color: #c0392b; background: #ffeaea; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .optional { font-size: 0.72rem; font-weight: 700; color: #636e72; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .field-hint { font-size: 0.82rem; color: #636e72; margin-bottom: 8px; margin-top: -4px; line-height: 1.5; }

    .divider {
      border: none;
      border-top: 2px solid #f0f0f0;
      margin: 24px 0;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dfe6e9;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #2d3436;
      background: #fff;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    textarea:focus, input[type="text"]:focus { border-color: #001f33; }

    /* Link checkboxes */
    .link-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .check-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #001f33; }

    .free-link-label {
      font-size: 0.82rem;
      color: #636e72;
      margin-bottom: 6px;
      margin-top: 4px;
    }

    .generate-btn {
      width: 100%;
      padding: 16px;
      background: #001f33;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }
    .generate-btn:hover { opacity: 0.85; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .loading {
      display: none;
      text-align: center;
      padding: 32px;
      color: #636e72;
      font-size: 0.9rem;
    }
    .loading.on { display: block; }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #dfe6e9;
      border-top-color: #001f33;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      display: none;
      background: #fff5f5;
      border: 1.5px solid #ff7675;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #d63031;
      margin-top: 12px;
    }
    .error.on { display: block; }

    .output { display: none; }
    .output.on { display: block; }

    .out-section { margin-bottom: 20px; }
    .out-section:last-child { margin-bottom: 0; }

    .out-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .out-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #636e72;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .copy-btn {
      font-size: 0.78rem;
      font-weight: 700;
      color: #001f33;
      background: #f5f6fa;
      border: 1.5px solid #dfe6e9;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: #001f33; color: #fff; border-color: #001f33; }
    .copy-btn.done { background: #00b894; color: #fff; border-color: #00b894; }

    .out-text {
      padding: 14px 16px;
      border: 1.5px solid #dfe6e9;
      border-radius: 10px;
      font-size: 0.88rem;
      background: #f8f9fa;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      color: #2d3436;
      font-family: inherit;
    }
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../../">← アプリ一覧へ</a>
  <h1>YouTube説明文ジェネレーター</h1>
  <p class="sub">動画の情報を入力するだけで、タイトル・説明文・ハッシュタグをAIが自動生成します</p>

  <div class="card">
    <div class="field">
      <label>動画タイトル <span class="required">必須</span></label>
      <input type="text" id="title" placeholder="例：AIがものづくりを変える：アジャイル開発の最前線" />
    </div>

    <div class="field">
      <label>動画の内容 <span class="required">必須</span></label>
      <p class="field-hint">台本・原稿・LPの文章などをそのままペーストしてOK！短いメモやキーワード列挙でも生成できます。</p>
      <textarea id="content" rows="8" placeholder="原稿・台本・LPのテキストなどをそのまま貼り付けてください。箇条書きや走り書きでもOKです。"></textarea>
    </div>

    <hr class="divider">

    <div class="field">
      <label>掲載するリンク <span class="optional">任意</span></label>
      <p class="field-hint">説明文に載せたいリンクにチェックを入れてください。</p>
      <div class="link-options">
        <label class="check-item">
          <input type="checkbox" id="link-top">
          公式HP（https://www.akkodis.com/ja）
        </label>
        <label class="check-item">
          <input type="checkbox" id="link-careers">
          採用情報（https://www.akkodis.com/ja/careers）
        </label>
      </div>
      <p class="free-link-label">関連動画・プレスリリースなどその他のリンク（1行に1つ）</p>
      <textarea id="links-free" rows="2" placeholder="https://www.youtube.com/watch?v=...&#10;https://prtimes.jp/..."></textarea>
    </div>

    <div class="field">
      <label>目次（タイムスタンプ） <span class="optional">任意</span></label>
      <p class="field-hint">長い動画の場合は目次として掲載されます。不要な場合は空欄のままでOK。</p>
      <textarea id="timestamps" rows="3" placeholder="00:00 イントロ&#10;01:30 AIとは&#10;05:00 まとめ"></textarea>
    </div>

    <button class="generate-btn" id="gen-btn" onclick="generate()">生成する</button>
    <div class="error" id="error"></div>
  </div>

  <div class="loading" id="loading">
    <span class="spinner"></span>生成中...
  </div>

  <div class="card output" id="output">
    <div class="out-section">
      <div class="out-header">
        <span class="out-label">タイトル</span>
        <button class="copy-btn" onclick="copyEl('out-title', this)">コピー</button>
      </div>
      <div class="out-text" id="out-title"></div>
    </div>
    <div class="out-section">
      <div class="out-header">
        <span class="out-label">説明文</span>
        <button class="copy-btn" onclick="copyEl('out-desc', this)">コピー</button>
      </div>
      <div class="out-text" id="out-desc" style="min-height:160px;"></div>
    </div>
    <div class="out-section">
      <div class="out-header">
        <span class="out-label">ハッシュタグ</span>
        <button class="copy-btn" onclick="copyEl('out-tags', this)">コピー</button>
      </div>
      <div class="out-text" id="out-tags"></div>
    </div>
  </div>
</div>

<script>
  const SNS = `▼SNS\nFacebook▶ https://www.facebook.com/akkodisjapan/\nLinkedIn▶ https://www.linkedin.com/company/akkodis\nX▶ https://x.com/AkkodisJapan`;

  async function generate() {
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const linkTop = document.getElementById('link-top').checked;
    const linkCareers = document.getElementById('link-careers').checked;
    const linksFree = document.getElementById('links-free').value.trim();
    const timestamps = document.getElementById('timestamps').value.trim();

    const errorEl = document.getElementById('error');
    const loadingEl = document.getElementById('loading');
    const outputEl = document.getElementById('output');
    const btn = document.getElementById('gen-btn');

    errorEl.classList.remove('on');
    if (!title) { showErr('動画タイトルを入力してください。'); return; }
    if (!content) { showErr('動画の内容を入力してください。'); return; }

    btn.disabled = true;
    loadingEl.classList.add('on');
    outputEl.classList.remove('on');

    // Build link sections
    const hpLines = [];
    if (linkTop) hpLines.push('公式ホームページ：https://www.akkodis.com/ja');
    if (linkCareers) hpLines.push('採用サイト：https://www.akkodis.com/ja/careers');

    const ytLines = [];
    const otherLines = [...hpLines]; // HP links go into ■関連リンクはこちら
    if (linksFree) {
      linksFree.split('\n').forEach(line => {
        line = line.trim();
        if (!line) return;
        if (line.includes('youtube.com') || line.includes('youtu.be')) {
          ytLines.push(line);
        } else {
          otherLines.push(line);
        }
      });
    }

    let linkSections = '';
    if (otherLines.length) linkSections += `■関連リンクはこちら\n${otherLines.join('\n')}\n`;
    if (ytLines.length) linkSections += `■関連動画はこちら\n${ytLines.join('\n')}\n`;

    let userMsg = '';
    if (title) userMsg += `【動画タイトル】\n${title}\n\n`;
    userMsg += `【動画の内容・メモ】\n${content}\n`;
    if (linkSections) userMsg += `\n【説明文に含めるリンクセクション（以下をそのまま説明文に含める）】\n${linkSections}`;
    if (timestamps) userMsg += `\n【タイムスタンプ（「【目次】」という見出しをつけて記載）】\n${timestamps}\n`;
    userMsg += `\n【SNSリンク（必ず含める）】\n${SNS}`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-opus-4-6',
          max_tokens: 2048,
          system: `あなたはAKKODiS JapanのYouTube担当アシスタントです。
提供された動画情報をもとに、YouTube用のタイトル・説明文・ハッシュタグを日本語で生成してください。

以下のJSON形式のみで回答してください（コードブロック不要）:
{"title":"タイトル","description":"説明文","hashtags":"＃タグ1 ＃タグ2 ＃タグ3 ＃タグ4 ＃タグ5"}

【説明文の構成】
1. 冒頭3文：キーワードを含め動画の価値を伝える（YouTubeの「もっと見る」前に表示される部分）

2. リンクセクション：【説明文に含めるリンクセクション】が提供された場合、その内容をそのまま説明文に含める（追加・変更・省略しないこと）

4. 目次：タイムスタンプが提供された場合のみ以下の形式で追加
【目次】
[タイムスタンプ]

5. SNSリンク：必ず以下の形式で含める
■AKKODiS公式SNSぜひチェックしてみてください！
Facebook→ https://www.facebook.com/akkodisjapan/
LinkedIn→ https://www.linkedin.com/company/akkodis
X→ https://x.com/AkkodisJapan

6. ＃ハッシュタグ5個（全角＃を使用）を説明文末尾に追加。hashtagsフィールドにも同じものを記載`,
          messages: [{ role: 'user', content: userMsg }],
        }),
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error?.message || `エラー: ${res.status}`);
      }

      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      let parsed;
      try {
        const cleaned = raw.replace(/^```(?:json)?\n?/m, '').replace(/\n?```$/m, '').trim();
        parsed = JSON.parse(cleaned);
      } catch {
        throw new Error('応答の解析に失敗しました。もう一度お試しください。');
      }

      document.getElementById('out-title').textContent = parsed.title || '';
      document.getElementById('out-desc').textContent = parsed.description || '';
      document.getElementById('out-tags').textContent = parsed.hashtags || '';
      outputEl.classList.add('on');
      outputEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showErr(err.message);
    } finally {
      btn.disabled = false;
      loadingEl.classList.remove('on');
    }
  }

  function showErr(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('on');
  }

  function copyEl(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
      btn.textContent = 'コピー済み！';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('done'); }, 2000);
    });
  }
</script>
</body>
</html>
