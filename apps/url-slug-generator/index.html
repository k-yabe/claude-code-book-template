<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Slug Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      color: #2d3436;
      min-height: 100vh;
    }

    .navbar {
      background: #001f33;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-logo { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.2em; color: #ffb81c; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      padding: 6px 14px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #001f33; letter-spacing: -0.01em; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #8a9bb0; margin-bottom: 32px; }

    .card {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      padding: 28px 32px;
      margin-bottom: 16px;
    }

    .step {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      margin-bottom: 12px;
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      border-bottom: 1.5px solid #f0f2f5;
    }
    .step-num {
      width: 28px;
      height: 28px;
      background: #1C304B;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1C304B;
      flex: 1;
    }
    .step-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
    }
    .badge-required { background: #ffeaea; color: #c0392b; }
    .badge-optional { background: #f0f0f0; color: #636e72; }
    .step-body { padding: 20px 22px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #636e72;
      margin-bottom: 8px;
    }
    label .optional {
      font-weight: 400;
      color: #b2bec3;
      margin-left: 6px;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e8ecf0;
      background: #fff;
      font-size: 0.95rem;
      color: #2d3436;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]::placeholder, textarea::placeholder { color: #b2bec3; }
    input[type="text"]:focus, textarea:focus {
      border-color: #ffb81c;
      box-shadow: 0 0 0 3px rgba(255,184,28,0.12);
    }

    textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }

    .upload-area {
      border: 2px dashed #d0d8e4;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-area:hover { border-color: #ffb81c; background: #fffdf5; }
    .upload-area.dragover { border-color: #ffb81c; background: #fffdf5; }
    .upload-area.has-file { border-color: #00b894; border-style: solid; background: #f0fdf8; }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.85rem; color: #8a9bb0; }
    .upload-filename { font-size: 0.85rem; color: #00b894; font-weight: 600; margin-top: 6px; }

    .generate-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,184,28,0.25);
      margin-bottom: 20px;
    }
    .generate-btn:hover { opacity: 0.92; box-shadow: 0 6px 28px rgba(255,184,28,0.4); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,31,51,0.3);
      border-top-color: #001f33;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .output-section { display: none; }

    .output-header {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8a9bb0;
      margin-bottom: 12px;
    }

    .slug-list { display: flex; flex-direction: column; gap: 10px; }

    .slug-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #e8ecf0;
      padding: 14px 18px;
    }

    .slug-value {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #1a1a2e;
      font-weight: 600;
      word-break: break-all;
    }

    .copy-btn {
      flex-shrink: 0;
      padding: 6px 16px;
      background: #001f33;
      color: #fff;
      border: none;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .copy-btn.copied { background: #00b894; }

    .slug-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .slug-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      
      background: #f0f2f5;
      color: #636e72;
    }
    .slug-badge.ok    { background: #f0fdf8; color: #00695c; }
    .slug-badge.warn  { background: #fffde7; color: #b45309; }
    .slug-badge.over  { background: #fff5f4; color: #c0392b; }

    .copy-all-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: none;
      border: 1.5px solid #e8ecf0;
      color: #636e72;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .copy-all-btn:hover { border-color: #001f33; color: #001f33; }
    .copy-all-btn.copied { border-color: #00b894; color: #00b894; }

    .error-msg {
      color: #e17055;
      font-size: 0.85rem;
      padding: 12px 16px;
      background: #fff5f4;
      border: 1.5px solid #fab1a0;
      margin-bottom: 16px;
      display: none;
    }

    /* SEOスコアバッジ */
    .seo-score-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
      cursor: default;
      position: relative;
      white-space: nowrap;
    }
    .seo-score-badge.score-s { background: #ffb81c; color: #001f33; }
    .seo-score-badge.score-a { background: #001f33; color: #fff; }
    .seo-score-badge.score-b { background: #e8ecf0; color: #8a9bb0; }

    /* ツールチップ */
    .seo-score-badge .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #001f33;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 400;
      padding: 6px 10px;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }
    .seo-score-badge:hover .tooltip { display: block; }

    /* ソートボタン */
    .sort-btn {
      padding: 6px 14px;
      background: none;
      border: 1.5px solid #e8ecf0;
      color: #636e72;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .sort-btn:hover { border-color: #001f33; color: #001f33; }
    .sort-btn.active { background: #001f33; border-color: #001f33; color: #fff; }
    .output-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .sample-hint { font-size: 0.75rem; color: #b2bec3; margin: 6px 0 0; }
    .sample-btn { background: none; border: none; color: #8a9bb0; font-size: 0.75rem; font-weight: 700; padding: 0; cursor: pointer; font-family: inherit; text-decoration: underline; transition: color 0.15s; }
    .sample-btn:hover { color: #001f33; }
    .app-footer {
      background: #001f33;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 40px;
    }
    .app-footer-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .container { padding: 20px 16px 60px; }
      .form-row { flex-direction: column; }
      .param-prefix { width: 100%; }
      .param-input { min-width: 0; width: 100%; }
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <a href="../../" class="back-btn">← アプリ一覧へ</a>
      <div class="navbar-divider"></div>
      <img src="../../assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:22px;display:block;">
      <div class="navbar-divider"></div>
      <span class="navbar-title">URL Slug Generator</span>
    </div>
  </nav>

  <div class="container">
    <h1>URL Slug Generator</h1>
    <p class="subtitle">ページタイトルからURL候補をAIが自動生成</p>

    <!-- Step 1 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">ページタイトルを入力</div>
        <span class="step-badge badge-required">必須</span>
      </div>
      <div class="step-body">
        <input type="text" id="title-input" placeholder="例：Azure AI で実現する次世代クラウド運用セミナー" autocomplete="off" />
        <div class="sample-hint">はじめての方は <button class="sample-btn" id="sample-btn">サンプルで試す →</button></div>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">ページ説明を入力</div>
        <span class="step-badge badge-optional">任意</span>
      </div>
      <div class="step-body">
        <textarea id="desc-input" placeholder="ページの説明を入力すると、より精度の高い候補が生成されます"></textarea>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">3</div>
        <div class="step-title">ファイルをアップロード</div>
        <span class="step-badge badge-optional">任意</span>
      </div>
      <div class="step-body">
        <div class="upload-area" id="upload-area">
          <input type="file" id="pdf-input" accept=".pdf,.pptx,.docx,.txt,.md" />
          <div class="upload-icon">📄</div>
          <div class="upload-text">PDF / PPTX / DOCX / TXT をドラッグ&ドロップ、またはクリックして選択</div>
          <div class="upload-filename" id="upload-filename" style="display:none"></div>
        </div>
        <p style="font-size:0.75rem;color:#e17055;margin-top:8px;">⚠️ 機密情報・個人情報を含むファイルはアップロードしないでください</p>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="generate-btn" id="generate-btn">候補を生成する</button>

    <div class="output-section" id="output-section">
      <div class="output-controls">
        <div class="output-header" style="margin-bottom:0;">URL候補</div>
        <button class="sort-btn" id="sort-btn">スコア順にソート</button>
      </div>
      <div class="slug-list" id="slug-list"></div>
      <button class="copy-all-btn" id="copy-all-btn">全候補をまとめてコピー</button>
      <button class="generate-btn" id="regenerate-btn" style="margin-top:12px">再生成する</button>
    </div>
  </div>

  <script>
    // ── 対応拡張子 ─────────────────────────────────────
    const ACCEPTED_EXTS = ['.pdf', '.pptx', '.docx', '.txt', '.md'];
    function isAccepted(file) {
      return ACCEPTED_EXTS.some(ext => file.name.toLowerCase().endsWith(ext));
    }

    // ── PDF テキスト抽出（PDF.js） ──────────────────────
    async function extractPdfText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async e => {
          try {
            const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';
            const pdf = await pdfjsLib.getDocument({ data: e.target.result }).promise;
            let text = '';
            const maxPages = Math.min(pdf.numPages, 3);
            for (let i = 1; i <= maxPages; i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              text += content.items.map(item => item.str).join(' ') + '\n';
            }
            resolve(text.trim());
          } catch (err) {
            reject(err);
          }
        };
        reader.readAsArrayBuffer(file);
      });
    }

    // ── JSZip ロード（PPTX / DOCX 共用） ───────────────
    let _jszipReady = null;
    function loadJSZip() {
      if (_jszipReady) return _jszipReady;
      _jszipReady = new Promise(resolve => {
        if (window.JSZip) { resolve(window.JSZip); return; }
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload = () => resolve(window.JSZip);
        document.head.appendChild(s);
      });
      return _jszipReady;
    }

    // ── PPTX テキスト抽出 ──────────────────────────────
    async function extractPptxText(file) {
      const JSZip = await loadJSZip();
      const zip = await JSZip.loadAsync(await file.arrayBuffer());
      const slideFiles = Object.keys(zip.files)
        .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
        .sort()
        .slice(0, 5);
      let text = '';
      for (const name of slideFiles) {
        const xml = await zip.files[name].async('string');
        const matches = xml.match(/<a:t[^>]*>([^<]+)<\/a:t>/g) || [];
        text += matches.map(m => m.replace(/<[^>]+>/g, '')).join(' ') + '\n';
      }
      return text.trim();
    }

    // ── DOCX テキスト抽出 ──────────────────────────────
    async function extractDocxText(file) {
      const JSZip = await loadJSZip();
      const zip = await JSZip.loadAsync(await file.arrayBuffer());
      const xml = await zip.files['word/document.xml'].async('string');
      const matches = xml.match(/<w:t[^>]*>([^<]+)<\/w:t>/g) || [];
      return matches.map(m => m.replace(/<[^>]+>/g, '')).join(' ').trim();
    }

    // ── テキストファイル抽出 ────────────────────────────
    async function extractTextFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.trim());
        reader.onerror = reject;
        reader.readAsText(file, 'UTF-8');
      });
    }

    // ── ファイル種別ディスパッチ ────────────────────────
    async function extractFileText(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith('.pdf'))  return extractPdfText(file);
      if (name.endsWith('.pptx')) return extractPptxText(file);
      if (name.endsWith('.docx')) return extractDocxText(file);
      return extractTextFile(file); // .txt / .md
    }

    // ── ファイルアップロードUI ──────────────────────────
    const uploadArea = document.getElementById('upload-area');
    const pdfInput = document.getElementById('pdf-input');
    const uploadFilename = document.getElementById('upload-filename');

    pdfInput.addEventListener('change', () => {
      if (pdfInput.files[0]) {
        uploadFilename.textContent = pdfInput.files[0].name;
        uploadFilename.style.display = 'block';
        uploadArea.classList.add('has-file');
      }
    });

    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && isAccepted(file)) {
        const dt = new DataTransfer();
        dt.items.add(file);
        pdfInput.files = dt.files;
        uploadFilename.textContent = file.name;
        uploadFilename.style.display = 'block';
        uploadArea.classList.add('has-file');
      }
    });

    // ── 生成 ───────────────────────────────────────────
    const generateBtn = document.getElementById('generate-btn');
    const errorMsg = document.getElementById('error-msg');
    const outputSection = document.getElementById('output-section');
    const slugList = document.getElementById('slug-list');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
    function hideError() {
      errorMsg.style.display = 'none';
    }

    // ── SEOスコア計算 ───────────────────────────────────
    function calcSeoScore(slug) {
      const words = slug.split('-').filter(Boolean);
      const wordCount = words.length;
      const allLower = /^[a-z-]+$/.test(slug);         // 小文字英字とハイフンのみ
      const hasNumber = /\d/.test(slug);
      const mainlyLower = /^[a-z0-9-]+$/.test(slug);

      if (wordCount >= 3 && wordCount <= 5 && allLower && !hasNumber) {
        return {
          grade: 'S',
          label: '★★★',
          tooltip: '単語数3〜5、小文字英字のみ、ハイフン区切り、数字なし',
          cls: 'score-s',
        };
      } else if (wordCount >= 2 && wordCount <= 6 && mainlyLower) {
        return {
          grade: 'A',
          label: '★★☆',
          tooltip: '単語数2〜6、小文字英字メイン',
          cls: 'score-a',
        };
      }
      return {
        grade: 'B',
        label: '★☆☆',
        tooltip: '単語数・文字種がSEO推奨範囲外',
        cls: 'score-b',
      };
    }

    const SCORE_ORDER = { S: 0, A: 1, B: 2 };
    let _currentSlugs = [];
    let _isSorted = false;

    function slugBadges(slug) {
      const words = slug.split('-').filter(Boolean).length;
      const chars = slug.length;
      const wordCls = words >= 3 && words <= 5 ? 'ok' : words < 3 ? 'warn' : 'over';
      const charCls = chars <= 60 ? 'ok' : chars <= 75 ? 'warn' : 'over';
      return `<div class="slug-meta">
        <span class="slug-badge ${wordCls}">${words}単語（推奨3〜5）</span>
        <span class="slug-badge ${charCls}">${chars}文字（推奨60文字以内）</span>
      </div>`;
    }

    function renderSlugs(slugs) {
      slugList.innerHTML = slugs.map(slug => {
        const score = calcSeoScore(slug);
        return `
        <div class="slug-item" style="flex-direction:column;align-items:flex-start;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:10px;">
            <div style="display:flex;align-items:center;gap:10px;min-width:0;">
              <span class="seo-score-badge ${score.cls}">
                ${score.label}
                <span class="tooltip">${score.tooltip}</span>
              </span>
              <span class="slug-value">${slug}</span>
            </div>
            <button class="copy-btn" data-slug="${slug}">コピー</button>
          </div>
          ${slugBadges(slug)}
        </div>`;
      }).join('');

      slugList.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          navigator.clipboard.writeText(this.dataset.slug).then(() => {
            this.textContent = 'コピーしました';
            this.classList.add('copied');
            setTimeout(() => {
              this.textContent = 'コピー';
              this.classList.remove('copied');
            }, 2000);
          });
        });
      });

      // 一括コピー
      const copyAllBtn = document.getElementById('copy-all-btn');
      copyAllBtn.onclick = () => {
        navigator.clipboard.writeText(slugs.join('\n')).then(() => {
          copyAllBtn.textContent = '✅ コピーしました';
          copyAllBtn.classList.add('copied');
          setTimeout(() => {
            copyAllBtn.textContent = '全候補をまとめてコピー';
            copyAllBtn.classList.remove('copied');
          }, 2000);
        });
      };
    }

    async function generate() {
      hideError();
      const title = document.getElementById('title-input').value.trim();
      const desc = document.getElementById('desc-input').value.trim();
      const pdfFile = pdfInput.files[0];

      if (!title) {
        document.getElementById('title-input').focus();
        showError('ページタイトルを入力してください');
        return;
      }

      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="spinner"></span>生成中...';
      const regenBtn = document.getElementById('regenerate-btn');
      if (regenBtn) { regenBtn.disabled = true; regenBtn.innerHTML = '<span class="spinner"></span>生成中...'; }
      outputSection.style.display = 'none';

      try {
        let fileText = '';
        if (pdfFile) {
          fileText = await extractFileText(pdfFile);
        }

        let userMsg = `以下のページのURLスラッグ候補を5個生成してください。\n\n【ページタイトル】\n${title}`;
        if (desc) userMsg += `\n\n【概要】\n${desc}`;
        if (fileText) userMsg += `\n\n【ファイル内容（抜粋）】\n${fileText.slice(0, 1000)}`;

        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            _user: sessionStorage.getItem('username') || 'unknown',
            _app: 'URL Slug Generator',
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 256,
            system: `あなたはWebページのURLスラッグを生成する専門家です。
以下のルールに従ってURLスラッグ候補を生成してください：
- 小文字の英数字とハイフンのみ使用
- 連番（01, 02など）は使わない
- 短く・意味が伝わる・覚えやすいもの
- 日本語タイトルは英訳してスラッグ化
- 5個の候補を1行に1個ずつ出力（説明文や番号は不要）`,
            messages: [{ role: 'user', content: userMsg }],
          }),
        });

        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          throw new Error(e.error?.message || `エラー: ${res.status}`);
        }

        const data = await res.json();
        const raw = data.content?.[0]?.text || '';
        const slugs = raw.split('\n')
          .map(l => l.trim().replace(/^[-\s\d.]+/, '').trim())
          .filter(l => /^[a-z0-9-]+$/.test(l))
          .slice(0, 3);

        if (slugs.length === 0) throw new Error('候補の生成に失敗しました。もう一度お試しください。');

        _currentSlugs = slugs;
        HistoryManager.save(document.getElementById('title-input').value || '', slugs.join('\n'));
        _isSorted = true;
        const sortBtn = document.getElementById('sort-btn');
        if (sortBtn) { sortBtn.classList.add('active'); sortBtn.textContent = '元の順序に戻す'; }
        const sortedSlugs = [...slugs].sort((a, b) =>
          SCORE_ORDER[calcSeoScore(a).grade] - SCORE_ORDER[calcSeoScore(b).grade]
        );
        renderSlugs(sortedSlugs);
        outputSection.style.display = 'block';
        outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        showError(err.message);
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '候補を生成する';
        const regenBtn = document.getElementById('regenerate-btn');
        if (regenBtn) { regenBtn.disabled = false; regenBtn.textContent = '再生成する'; }
      }
    }

    generateBtn.addEventListener('click', generate);
    document.getElementById('regenerate-btn').addEventListener('click', generate);

    // ── ソートボタン ────────────────────────────────────
    document.getElementById('sort-btn').addEventListener('click', function() {
      if (_currentSlugs.length === 0) return;
      _isSorted = !_isSorted;
      if (_isSorted) {
        const sorted = [..._currentSlugs].sort((a, b) =>
          SCORE_ORDER[calcSeoScore(a).grade] - SCORE_ORDER[calcSeoScore(b).grade]
        );
        renderSlugs(sorted);
        this.classList.add('active');
        this.textContent = '元の順序に戻す';
      } else {
        renderSlugs(_currentSlugs);
        this.classList.remove('active');
        this.textContent = 'スコア順にソート';
      }
    });
  </script>
<script src="../../assets/history.js"></script>
