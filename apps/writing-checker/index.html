<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Checker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; }

    .navbar {
      background: #001f33; height: 58px; display: flex; align-items: center;
      padding: 0 40px; gap: 14px; position: sticky; top: 0; z-index: 10;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2); font-size: 0.78rem;
      color: rgba(255,255,255,0.65); cursor: pointer; padding: 6px 14px;
      text-decoration: none; transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .container { max-width: 800px; margin: 0 auto; padding: 36px 24px 80px; }

    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; color: #001f33; letter-spacing: -0.01em; margin-bottom: 4px; }
    .page-header p { font-size: 0.82rem; color: #8a9bb0; }

    /* 入力切り替えタブ */
    .input-tabs { display: flex; border-bottom: 2px solid #e8ecf0; margin-bottom: 16px; }
    .input-tab {
      padding: 9px 22px; border: none; background: none; font-family: inherit;
      font-size: 0.88rem; font-weight: 600; color: #a0aab4; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
    }
    .input-tab.active { color: #001f33; border-bottom-color: #ffb81c; }
    .input-tab:hover:not(.active) { color: #4a5568; }

    .input-panel { display: none; }
    .input-panel.active { display: block; }

    /* テキスト入力 */
    .text-area {
      width: 100%; min-height: 200px; padding: 14px 16px;
      border: 1.5px solid #e8ecf0; background: #fff; font-size: 0.92rem;
      font-family: inherit; color: #2d3436; resize: vertical; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; line-height: 1.7;
    }
    .text-area:focus { border-color: #ffb81c; box-shadow: 0 0 0 3px rgba(255,184,28,0.12); }
    .text-area::placeholder { color: #c8d0da; }
    .char-count { font-size: 0.72rem; color: #b2bec3; text-align: right; margin: 4px 0 0; }
    .char-count.over { color: #c0392b; font-weight: 700; }
    .sample-hint {
      font-size: 0.75rem; color: #b2bec3; margin: 6px 0 0;
    }
    .sample-btn {
      background: none; border: none; color: #8a9bb0; font-size: 0.75rem;
      font-weight: 700; padding: 0; cursor: pointer; font-family: inherit;
      text-decoration: underline; transition: color 0.15s;
    }
    .sample-btn:hover { color: #001f33; }

    /* ファイルアップロード */
    .file-drop {
      border: 2px dashed #e2e8f0; background: #fafbfc; padding: 48px 24px;
      text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .file-drop:hover, .file-drop.dragover { border-color: #ffb81c; background: #fffbf0; }
    .file-drop-icon { font-size: 2rem; margin-bottom: 10px; }
    .file-drop-label { font-size: 0.88rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; }
    .file-drop-sub { font-size: 0.75rem; color: #a0aab4; }
    .file-input { display: none; }
    .file-status { margin-top: 12px; font-size: 0.82rem; color: #001f33; font-weight: 600; min-height: 1.2em; }
    .file-status.error { color: #c0392b; }

    /* ボタン */
    .check-btn {
      width: 100%; padding: 13px; background: #ffb81c; border: none;
      color: #001f33; font-size: 0.95rem; font-weight: 800; cursor: pointer;
      font-family: inherit; transition: all 0.15s; margin-top: 12px;
    }
    .check-btn:hover:not(:disabled) { background: #f0ac10; }
    .check-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .reset-btn {
      padding: 13px 20px; background: #fff; border: 1.5px solid #e8ecf0;
      color: #8a9bb0; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .reset-btn:hover { border-color: #001f33; color: #001f33; }

    .error-msg { font-size: 0.79rem; color: #e17055; min-height: 1.2em; margin-top: 8px; }

    /* ローディング */
    .loading-msg {
      text-align: center; padding: 40px 20px; background: #fff;
      border: 1px solid #e2e8f0; color: #9aa5b4; font-size: 0.87rem; margin-top: 16px;
    }
    .loading-dots { display: inline-flex; gap: 5px; margin-left: 6px; vertical-align: middle; }
    .loading-dot { width: 5px; height: 5px; background: #ffb81c; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.35; } 40% { transform: scale(1); opacity: 1; } }

    /* 結果 */
    .result-area { margin-top: 16px; }

    .result-ok {
      background: #fff; border-left: 3px solid #ffb81c; padding: 20px 22px;
      display: flex; align-items: center; gap: 12px;
    }
    .result-ok-text { font-size: 0.9rem; font-weight: 700; color: #001f33; }

    .result-summary {
      font-size: 0.78rem; color: #8a9bb0; margin-bottom: 12px; font-weight: 600;
    }

    .issue-card {
      background: #fff; border: 1px solid #e8ecf0; margin-bottom: 10px;
      overflow: hidden;
    }

    .issue-diff {
      display: flex; align-items: stretch; gap: 0;
    }
    .issue-before, .issue-after {
      flex: 1; padding: 14px 16px;
    }
    .issue-before { background: #f5f6f8; border-right: 1px solid #e8ecf0; border-left: 3px solid #ffb81c; }
    .issue-after  { background: #001f33; }
    .diff-label {
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .issue-before .diff-label { color: #8a9bb0; }
    .issue-after  .diff-label { color: #ffb81c; }
    .diff-text {
      font-size: 0.88rem; font-weight: 700; line-height: 1.5;
    }
    .issue-before .diff-text { color: #4a5568; }
    .issue-after  .diff-text { color: #fff; }

    .issue-arrow {
      display: flex; align-items: center; padding: 0 12px;
      color: #ffb81c; font-size: 1.1rem; font-weight: 700;
      background: #fff; flex-shrink: 0;
      border-right: 1px solid #e8ecf0; border-left: 1px solid #e8ecf0;
    }

    .issue-note {
      font-size: 0.75rem; color: #8a9bb0; padding: 8px 16px 10px;
      border-top: 1px solid #f0f2f5; line-height: 1.5;
      display: flex; align-items: center; gap: 8px;
    }
    .issue-tag {
      font-size: 0.62rem; font-weight: 800; padding: 2px 7px;
      flex-shrink: 0; letter-spacing: 0.04em;
    }
    .tag-style   { background: rgba(0,31,51,0.08); color: #001f33; }
    .tag-brand   { background: rgba(255,184,28,0.25); color: #5c3d00; }
    .tag-iown    { background: #ffb81c; color: #001f33; }

    .copy-btn {
      background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.7);
      font-size: 0.68rem; font-weight: 700; padding: 3px 9px; cursor: pointer;
      font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .copy-btn:hover { border-color: #ffb81c; color: #ffb81c; }
    .copy-btn.copied { border-color: #ffb81c; color: #ffb81c; }

    .result-actions { margin-bottom: 16px; }
    .result-summary { font-size: 0.78rem; color: #8a9bb0; font-weight: 600; }

    /* 修正済み全文エリア（主役） */
    .corrected-section { margin-bottom: 28px; }
    .corrected-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .corrected-title { font-size: 0.95rem; font-weight: 700; color: #001f33; }
    .copy-full-btn {
      background: #001f33; border: none; color: #fff;
      font-size: 0.82rem; font-weight: 700; padding: 8px 20px; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .copy-full-btn:hover { opacity: 0.75; }
    .corrected-card {
      background: #fff; border: 1px solid #e8ecf0; border-left: 3px solid #001f33;
    }
    .corrected-card:focus-within { box-shadow: 0 0 0 3px rgba(0,31,51,0.08); }
    .corrected-display {
      width: 100%; min-height: 200px; padding: 14px 16px;
      font-size: 0.92rem; font-family: inherit; color: #2d3436; line-height: 1.7;
      border: none; outline: none; box-sizing: border-box; background: #fff;
      white-space: pre-wrap; word-wrap: break-word; cursor: text;
    }
    .corrected-highlight {
      background: #ffb81c; color: #001f33; padding: 0 1px; font-weight: 700;
    }

    /* 修正詳細セクション */
    .detail-header {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #e8ecf0;
    }
    .detail-title { font-size: 0.78rem; font-weight: 700; color: #8a9bb0; }
    .app-footer {
      background: #001f33;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 40px;
    }
    .app-footer-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 768px) {
      .container { padding: 24px 20px 60px; }
      .navbar { padding: 0 20px; }
    }

    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .container { padding: 20px 16px 60px; }
    }
  </style>
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <a class="back-btn" href="../../">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Writing Checker</span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Writing Checker</h1>
    <p>記者ハンドブック準拠の表記ルールとAKKODiS固有名詞・IOWN®・Microsoft表記で文章をチェックします</p>
  </div>

  <div class="input-tabs">
    <button class="input-tab active" data-tab="text">📝 テキストを貼り付け</button>
    <button class="input-tab" data-tab="file">📎 ファイルをアップロード</button>
  </div>

  <!-- テキスト入力 -->
  <div class="input-panel active" id="panel-text">
    <label for="text-input" style="display:none;">チェックする文章</label>
    <textarea class="text-area" id="text-input" placeholder="チェックしたい文章を貼り付けてください"></textarea>
    <div class="char-count"><span id="char-count">0</span> 文字</div>
    <div class="sample-hint">はじめての方は <button class="sample-btn" id="sample-btn">サンプルテキストで試す →</button></div>
  </div>

  <!-- ファイルアップロード -->
  <div class="input-panel" id="panel-file">
    <div class="file-drop" id="file-drop">
      <div class="file-drop-icon">📂</div>
      <div class="file-drop-label">クリックまたはドラッグ＆ドロップでファイルを選択</div>
      <div class="file-drop-sub">対応形式: Word（.docx）・PDF・TXT</div>
      <input type="file" class="file-input" id="file-input" accept=".pdf,.txt,.docx">
    </div>
    <div class="file-status" id="file-status"></div>
  </div>

  <div style="display:flex;gap:8px;margin-top:12px;">
    <button class="check-btn" id="check-btn" style="margin-top:0;flex:1;">チェックする</button>
    <button class="reset-btn" id="reset-btn">クリア</button>
  </div>
  <div class="error-msg" id="error-msg" role="alert"></div>

  <div id="loading" class="loading-msg" style="display:none;">
    チェック中
    <span class="loading-dots">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </span>
  </div>

  <div class="result-area" id="result"></div>
</div>

<script src="../../assets/copy-utils.js"></script>
<script src="../../assets/history.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="knowledge.js"></script>
<script>
  let currentTab = 'text';
  let uploadedText = null;

  // タブ切り替え
  document.querySelectorAll('.input-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
      currentTab = tab.dataset.tab;
    });
  });

  // 文字数カウント
  document.getElementById('text-input').addEventListener('input', function () {
    const len = this.value.length;
    const el = document.getElementById('char-count');
    const wrap = el.parentElement;
    el.textContent = len;
    if (len > 8000) {
      wrap.classList.add('over');
      el.textContent = `${len}（8,000文字を超えた部分はチェック対象外）`;
    } else {
      wrap.classList.remove('over');
    }
  });

  // ファイルアップロード
  const fileDrop = document.getElementById('file-drop');
  const fileInput = document.getElementById('file-input');
  const fileStatus = document.getElementById('file-status');

  fileDrop.addEventListener('click', () => fileInput.click());
  fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragover'); });
  fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
  fileDrop.addEventListener('drop', e => {
    e.preventDefault();
    fileDrop.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  async function handleFile(file) {
    fileStatus.className = 'file-status';
    uploadedText = null;
    const ext = file.name.split('.').pop().toLowerCase();

    if (ext === 'txt') {
      const text = await file.text();
      uploadedText = text.trim();
      fileStatus.textContent = `✓ ${file.name}（${uploadedText.length}文字）`;
      return;
    }

    if (ext === 'pdf') {
      fileStatus.textContent = `${file.name} テキスト抽出中...`;
      try {
        if (typeof pdfjsLib === 'undefined') throw new Error('PDF読み込みに失敗しました');
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n';
        }
        text = text.trim();
        if (text.length < 10) throw new Error('テキストを抽出できませんでした（スキャンPDFの可能性があります）');
        uploadedText = text.slice(0, 10000);
        fileStatus.textContent = `✓ ${file.name}（${uploadedText.length}文字抽出）`;
      } catch (err) {
        fileStatus.className = 'file-status error';
        fileStatus.textContent = err.message;
        fileInput.value = '';
      }
      return;
    }

    if (ext === 'docx') {
      fileStatus.textContent = `${file.name} テキスト抽出中...`;
      try {
        if (typeof mammoth === 'undefined') throw new Error('Wordファイルの読み込みに失敗しました');
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        const text = result.value.trim();
        if (text.length < 10) throw new Error('テキストを抽出できませんでした');
        uploadedText = text.slice(0, 10000);
        fileStatus.textContent = `✓ ${file.name}（${uploadedText.length}文字抽出）`;
      } catch (err) {
        fileStatus.className = 'file-status error';
        fileStatus.textContent = err.message;
        fileInput.value = '';
      }
      return;
    }

    fileStatus.className = 'file-status error';
    fileStatus.textContent = 'Word（.docx）・PDF・TXTファイルのみ対応しています';
  }

  // 出力パース
  const INVALID_PATTERNS = ['指摘取り消し', '対象外', 'かもしれない', '可能性がある', '原文確認', 'ただし'];

  function parseResult(raw) {
    if (raw.includes('===OK===')) return { ok: true, issues: [] };
    const issues = [];
    const seen = new Set();
    const blocks = raw.split('---').map(b => b.trim()).filter(b => b && !b.includes('==='));
    for (const block of blocks) {
      const get = key => { const m = block.match(new RegExp(`${key}:\\s*(.+)`)); return m ? m[1].trim() : ''; };
      const issue = {
        category: get('カテゴリ'),
        problem: get('問題箇所'),
        note: get('指摘'),
        fix: get('修正例'),
      };
      const combined = `${issue.fix}${issue.note}`;
      if (INVALID_PATTERNS.some(p => combined.includes(p))) continue;
      if (issue.fix && issue.problem && issue.fix.length > issue.problem.length * 4) continue;
      const key = `${issue.problem}|${issue.note}`;
      if ((issue.note || issue.category) && !seen.has(key)) {
        seen.add(key);
        issues.push(issue);
      }
    }
    return { ok: false, issues };
  }

  function escHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderResult(parsed) {
    const el = document.getElementById('result');
    if (parsed.ok) {
      el.innerHTML = `<div class="result-ok"><span style="font-size:1.4rem">✅</span><span class="result-ok-text">問題は見つかりませんでした</span></div>`;
      return;
    }

    const tagClass = cat => {
      if (!cat) return 'tag-style';
      if (cat.includes('IOWN')) return 'tag-iown';
      if (cat.includes('AKKODiS')) return 'tag-brand';
      if (cat.includes('Microsoft')) return 'tag-brand';
      return 'tag-style';
    };
    const tagLabel = cat => {
      if (!cat) return '表記';
      if (cat.includes('IOWN')) return 'IOWN®';
      if (cat.includes('AKKODiS')) return 'ブランド';
      if (cat.includes('Microsoft')) return 'Microsoft';
      return '表記ルール';
    };

    const cards = parsed.issues.map((issue, i) => `
      <div class="issue-card">
        <div class="issue-diff">
          <div class="issue-before">
            <div class="diff-label">修正前</div>
            <div class="diff-text">${escHtml(issue.problem || '—')}</div>
          </div>
          <div class="issue-arrow">→</div>
          <div class="issue-after">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
              <div>
                <div class="diff-label">修正後</div>
                <div class="diff-text">${escHtml(issue.fix || '—')}</div>
              </div>
              <button class="copy-btn" onclick="copyFix(this, ${i})">コピー</button>
            </div>
          </div>
        </div>
        <div class="issue-note">
          <span class="issue-tag ${tagClass(issue.category)}">${tagLabel(issue.category)}</span>
          ${escHtml(issue.note)}
        </div>
      </div>`).join('');

    // 修正済み全文＋ハイライトを生成
    let correctedText = window._originalText || '';
    let highlightedHtml = escHtml(window._originalText || '');
    for (const issue of parsed.issues) {
      if (issue.problem && issue.fix) {
        correctedText = correctedText.split(issue.problem).join(issue.fix);
        highlightedHtml = highlightedHtml.split(escHtml(issue.problem))
          .join(`<span class="corrected-highlight">${escHtml(issue.fix)}</span>`);
      }
    }
    highlightedHtml = highlightedHtml.replace(/\n/g, '<br>');

    el.innerHTML = `
      <div class="result-actions">
        <span class="result-summary">✏️ ${parsed.issues.length}件の修正箇所が見つかりました</span>
      </div>
      <div class="corrected-section">
        <div class="corrected-header">
          <span class="corrected-title">✅ 修正済み全文</span>
          <button class="copy-full-btn" onclick="copyFullText(this)">📋 コピー</button>
        </div>
        <div class="corrected-card">
          <div class="corrected-display" id="corrected-display" contenteditable="true">${highlightedHtml}</div>
        </div>
      </div>
      <div class="detail-header">
        <span class="detail-title">📝 修正内容の詳細</span>
      </div>
      ${cards}`;

    window._currentIssues = parsed.issues;
  }

  // チェック実行
  async function runCheck() {
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    let text = '';
    if (currentTab === 'text') {
      text = document.getElementById('text-input').value.trim();
      if (!text) { errEl.textContent = '文章を入力してください'; return; }
    } else {
      if (!uploadedText) { errEl.textContent = 'ファイルをアップロードしてください'; return; }
      text = uploadedText;
    }

    window._originalText = text;
    const btn = document.getElementById('check-btn');
    btn.disabled = true;
    btn.textContent = 'チェック中...';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').innerHTML = '';

    try {
      const r = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          _user: sessionStorage.getItem('username') || 'unknown',
          _app: 'Writing Checker',
          model: 'claude-sonnet-4-6',
          max_tokens: 3000,
          system: CHECK_SYSTEM_PROMPT,
          messages: [{ role: 'user', content: `以下の文章をチェックしてください。\n\n${text.slice(0, 8000)}` }],
        }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error?.message || 'チェックに失敗しました');
      const raw = data.content?.[0]?.text || '';
      if (!raw) throw new Error('チェックに失敗しました');
      const parsed = parseResult(raw);
      renderResult(parsed);
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
      if (!parsed.ok) {
        const corrected = document.getElementById('corrected-display')?.innerText || '';
        HistoryManager.save(text.slice(0, 300), corrected);
      }
    } catch (err) {
      errEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'チェックする';
      document.getElementById('loading').style.display = 'none';
    }
  }

  function copyFix(btn, idx) {
    const fix = (window._currentIssues?.[idx]?.fix || '').replace(/^→\s*/, '');
    copyToClipboard(fix, btn);
  }

  function copyFullText(btn) {
    const el = document.getElementById('corrected-display');
    const text = el ? el.innerText : '';
    copyToClipboard(text, btn);
  }

  const SAMPLE_TEXT = `弊社のコンピュータシステムはクラウドサーバを活用し、ユーザの利便性を高めています。シュミレーション機能を用いた分析を行なうことで、より精度の高いサービスを提供しています。

また、マイクロソフト AzureおよびクラウドサービスのホームページをEメールにてご案内しております。更なる業務効率化に向け、引き続きご支援いたします。

従って、本プロジェクトは第１四半期より開始する予定です。`;

  document.getElementById('sample-btn').addEventListener('click', () => {
    document.getElementById('text-input').value = SAMPLE_TEXT;
    document.getElementById('char-count').textContent = SAMPLE_TEXT.length;
    document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="text"]').classList.add('active');
    document.getElementById('panel-text').classList.add('active');
    currentTab = 'text';
  });

  function copyAll() {
    const issues = window._currentIssues || [];
    const text = issues.map((iss, i) =>
      `[${i+1}] ${iss.problem} → ${iss.fix}\n    ${iss.note}`
    ).join('\n\n');
    const btn = document.querySelector('.copy-all-btn');
    copyToClipboard(text, btn);
  }

  document.getElementById('check-btn').addEventListener('click', runCheck);
  HistoryManager.init('Writing Checker');

  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('text-input').value = '';
    document.getElementById('char-count').textContent = '0';
    document.getElementById('char-count').parentElement.classList.remove('over');
    document.getElementById('file-status').textContent = '';
    document.getElementById('file-input').value = '';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('result').innerHTML = '';
    document.getElementById('loading').style.display = 'none';
    uploadedText = null;
    window._currentIssues = [];
  });
</script>
