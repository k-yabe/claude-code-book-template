<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; }

    .navbar {
      background: #001f33; height: 58px; display: flex; align-items: center;
      padding: 0 40px; gap: 14px; position: sticky; top: 0; z-index: 10;
    }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2); font-size: 0.78rem;
      color: rgba(255,255,255,0.65); cursor: pointer; padding: 6px 14px;
      text-decoration: none; transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .container { max-width: 760px; margin: 0 auto; padding: 28px 40px 80px; }

    h1 { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 0.82rem; color: #8a9bb0; margin-bottom: 28px; }

    .main-card { background: #fff; border: 1.5px solid #e8ecf0; padding: 24px; margin-bottom: 16px; }

    /* プラットフォーム */
    .platform-btns { display: flex; gap: 8px; margin-bottom: 20px; }
    .platform-btn {
      flex: 1; padding: 10px; border: 1.5px solid #e8ecf0; background: #fff;
      font-size: 0.85rem; font-weight: 700; color: #8a9bb0; cursor: pointer;
      font-family: inherit; transition: all 0.15s; text-align: center;
    }
    .platform-btn.active { border-color: #ffb81c; background: #fffbf0; color: #001f33; }
    .platform-btn:hover:not(.active) { border-color: #d0d8e0; color: #2d3436; }

    /* URL入力 */
    .url-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .url-row { display: flex; gap: 0; }
    .url-input {
      flex: 1; padding: 13px 16px; border: 1.5px solid #e8ecf0; border-right: none;
      font-size: 0.92rem; color: #2d3436; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: #ffb81c; }
    .url-input::placeholder { color: #c0c8d4; }
    .url-remove-btn {
      padding: 0 14px; border: 1.5px solid #e8ecf0; border-left: none; background: #fff;
      color: #c0c8d4; cursor: pointer; font-size: 0.9rem; transition: all 0.15s;
    }
    .url-remove-btn:hover { color: #e17055; border-color: #f0c0b0; background: #fff5f5; }
    .url-add-btn {
      width: 100%; padding: 9px; background: none; border: 1.5px dashed #d0d8e0;
      font-size: 0.78rem; color: #8a9bb0; cursor: pointer; font-family: inherit;
      transition: all 0.15s; margin-bottom: 12px;
    }
    .url-add-btn:hover { border-color: #ffb81c; color: #001f33; }
    .generate-btn {
      width: 100%; padding: 13px; background: #ffb81c; border: none; color: #001f33;
      font-size: 0.92rem; font-weight: 800; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { font-size: 0.8rem; color: #e17055; margin-top: 8px; min-height: 1.2em; }

    /* 出力 */
    .output-section { display: none; }
    .output-card { background: #fff; border: 1.5px solid #e8ecf0; }
    .output-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid #f0f2f5;
    }
    .output-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; color: #001f33; }
    .output-meta { display: flex; align-items: center; gap: 12px; }
    .char-count { font-size: 0.75rem; color: #8a9bb0; }
    .char-count.over { color: #e17055; font-weight: 700; }
    .copy-btn {
      padding: 6px 16px; background: #001f33; border: none; color: #fff;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .output-body { padding: 20px; }
    .output-text {
      font-size: 0.9rem; line-height: 1.8; color: #2d3436;
      white-space: pre-wrap; word-break: break-word;
    }
    .regen-btn {
      margin-top: 12px; padding: 8px 18px; background: none; border: 1.5px solid #e8ecf0;
      font-size: 0.78rem; color: #636e72; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .regen-btn:hover { border-color: #ffb81c; color: #001f33; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="back-btn" href="../../">← アプリ一覧へ</a>
  <img src="../../assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:20px;display:block;">
  <div class="navbar-divider"></div>
  <span class="navbar-title">Post Generator</span>
</nav>

<div class="container">
  <h1>Post Generator</h1>
  <p class="subtitle">記事URLを入力するだけでChatter / LinkedIn / X用の投稿文を自動生成します</p>

  <div class="main-card">
    <!-- プラットフォーム選択 -->
    <div class="platform-btns">
      <button class="platform-btn active" data-platform="chatter">☁ Chatter</button>
      <button class="platform-btn" data-platform="linkedin">🔗 LinkedIn</button>
      <button class="platform-btn" data-platform="x">✦ X (Twitter)</button>
    </div>

    <!-- URL入力（複数対応） -->
    <div class="url-list" id="url-list">
      <div class="url-row">
        <input class="url-input" type="text" placeholder="https://www.akkodis.com/..." autocomplete="off">
        <button class="url-remove-btn" style="display:none">✕</button>
      </div>
    </div>
    <button class="url-add-btn" id="url-add-btn">＋ URLを追加（複数記事から生成）</button>
    <button class="generate-btn" id="generate-btn">生成する</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- 出力 -->
  <div class="output-section" id="output-section">
    <div class="output-card">
      <div class="output-header">
        <span class="output-label" id="output-label">CHATTER</span>
        <div class="output-meta">
          <span class="char-count" id="char-count"></span>
          <button class="copy-btn" id="copy-btn">コピー</button>
        </div>
      </div>
      <div class="output-body">
        <div class="output-text" id="output-text"></div>
        <button class="regen-btn" id="regen-btn">↺ 再生成</button>
      </div>
    </div>
  </div>
</div>

<script>
  const LIMITS = { chatter: 1000, linkedin: 1300, x: 140 };
  const MAX_URLS = 4;

  let platform = 'chatter';
  let linkedinRefs = [];
  let chatterRefs = [];
  let articleCache = {};  // url -> {title, text}

  // 参考投稿をJSONから読み込み
  fetch('refs.json').then(r => r.json()).then(d => { linkedinRefs = d; }).catch(() => {});
  fetch('chatter_refs.json').then(r => r.json()).then(d => { chatterRefs = d; }).catch(() => {});

  // ── プラットフォーム ─────────────────────────────────
  document.querySelectorAll('.platform-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      platform = btn.dataset.platform;
      updateCharCount();
    });
  });

  // ── URL管理 ──────────────────────────────────────────
  function getUrlInputs() {
    return Array.from(document.querySelectorAll('#url-list .url-input'));
  }

  function getUrls() {
    return getUrlInputs().map(i => i.value.trim()).filter(Boolean);
  }

  function updateRemoveButtons() {
    const rows = document.querySelectorAll('#url-list .url-row');
    rows.forEach(row => {
      row.querySelector('.url-remove-btn').style.display = rows.length > 1 ? '' : 'none';
    });
    document.getElementById('url-add-btn').style.display = rows.length >= MAX_URLS ? 'none' : '';
  }

  function addUrlRow() {
    const list = document.getElementById('url-list');
    const row = document.createElement('div');
    row.className = 'url-row';
    row.innerHTML = `<input class="url-input" type="text" placeholder="https://www.akkodis.com/..." autocomplete="off"><button class="url-remove-btn">✕</button>`;
    row.querySelector('.url-remove-btn').addEventListener('click', () => {
      row.remove();
      updateRemoveButtons();
    });
    list.appendChild(row);
    updateRemoveButtons();
    row.querySelector('.url-input').focus();
  }

  document.getElementById('url-add-btn').addEventListener('click', addUrlRow);

  // 最初の行の削除ボタンにもイベント設定
  document.querySelector('.url-remove-btn').addEventListener('click', function() {
    this.closest('.url-row').remove();
    updateRemoveButtons();
  });

  // ── 生成 ─────────────────────────────────────────────
  async function generate() {
    const urls = getUrls();
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (urls.length === 0) {
      errEl.textContent = '有効なURLを入力してください（https://...）';
      return;
    }
    const invalidUrl = urls.find(u => !u.startsWith('https://'));
    if (invalidUrl) {
      errEl.textContent = `無効なURL: ${invalidUrl}`;
      return;
    }

    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = '取得中...';
    document.getElementById('output-section').style.display = 'none';

    try {
      // 未キャッシュのURLを並列取得
      const uncached = urls.filter(u => !articleCache[u]);
      await Promise.all(uncached.map(async url => {
        const r = await fetch('/api/fetch-article', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(`${url} の取得に失敗しました`);
        articleCache[url] = d;
      }));

      btn.textContent = '生成中...';
      document.getElementById('output-text').textContent = '';
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

      const articles = urls.map(u => articleCache[u]);
      const platformLabel = platform === 'linkedin' ? 'LinkedIn' : platform === 'x' ? 'X (Twitter)' : 'Salesforce Chatter';
      const limit = LIMITS[platform];

      const refs = platform === 'chatter' ? chatterRefs : linkedinRefs;

      let platformRule, styleRule;
      if (platform === 'chatter') {
        styleRule = `- 絵文字を積極的に使う（📢🗓📍🔗🎯🚀💡など）
- タイトルの直後にハッシュタグ（#）を並べる
- 「🎯 こんな方におすすめ」「🚀 社員の皆さまへ」のセクションを設ける
- セミナー情報は 🗓📍💰🔗 で整理して記載
- 箇条書きは「・」を使用`;
        platformRule = `社内向けの告知文として構造化して書く。ハッシュタグは5〜8個程度`;
      } else if (platform === 'linkedin') {
        styleRule = `- 普通の人間が書いたような自然な文体にする
- **太字** は絶対に使わない
- 「：」「✅」「💡」などの装飾記号は使わない（絵文字は文脈に合う場合のみ1〜2個まで）
- 箇条書きを多用しない（使うなら「・」で最大3行まで）
- 「〜をお知らせします」「〜を実現します」「〜な世界へ」などのAIっぽい決まり文句は使わない
- 文末は体言止めや短い一文で締める`;
        platformRule = `末尾に日本語ハッシュタグを3〜5個`;
      } else {
        styleRule = `- 普通の人間が書いたような自然な文体にする
- **太字** や装飾記号は使わない
- 文末は体言止めや短い一文で締める`;
        platformRule = `端的でキャッチーに、ハッシュタグ1〜2個`;
      }

      const articlesText = articles.map((a, i) =>
        articles.length > 1
          ? `【記事${i+1} タイトル】\n${a.title}\n\n【記事${i+1} 内容】\n${a.text}`
          : `【記事タイトル】\n${a.title}\n\n【記事内容】\n${a.text}`
      ).join('\n\n---\n\n');

      const urlsText = urls.length > 1
        ? `複数記事のリンクをそれぞれ末尾に含める:\n${urls.map((u,i) => `記事${i+1}: ${u}`).join('\n')}`
        : `記事リンクを末尾に含める: ${urls[0]}`;

      const prompt = `あなたはAKKODiS Japanの${platform === 'chatter' ? '社内広報' : 'SNS担当'}マーケターです。以下の記事をもとに${platformLabel}用の投稿文を1つ書いてください。

【文体ルール（厳守）】
${styleRule}

【投稿条件】
- ${limit}文字以内（厳守）
- ${platformRule}
- ${urlsText}

【参考にすべき文体・構成】
${refs.slice(0, 3).join('\n\n---\n\n')}

---

${articlesText}

投稿文のみを出力してください。`;

      document.getElementById('output-label').textContent = platformLabel.toUpperCase();

      const res = await fetch('/api/generate-stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1024,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) throw new Error('生成に失敗しました');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      const outputEl = document.getElementById('output-text');
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value).split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.text) { fullText += parsed.text; outputEl.textContent = fullText; updateCharCount(); }
          } catch (e) { if (e.message !== 'Unexpected end of JSON input') throw e; }
        }
      }

      if (!fullText) throw new Error('生成に失敗しました。もう一度お試しください。');
    } catch (err) {
      errEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '生成する';
    }
  }

  document.getElementById('generate-btn').addEventListener('click', generate);
  document.getElementById('regen-btn').addEventListener('click', generate);

  // Enterキーで生成（最後のURL欄のみ）
  document.getElementById('url-list').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.classList.contains('url-input')) generate();
  });

  // ── 文字数 ───────────────────────────────────────────
  function updateCharCount() {
    const text = document.getElementById('output-text').textContent;
    if (!text) return;
    const limit = LIMITS[platform];
    const el = document.getElementById('char-count');
    el.textContent = `${text.length} / ${limit}文字`;
    el.className = 'char-count' + (text.length > limit ? ' over' : '');
  }

  // ── コピー ───────────────────────────────────────────
  document.getElementById('copy-btn').addEventListener('click', () => {
    const text = document.getElementById('output-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピーしました';
      setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
    });
  });
</script>
</body>
</html>
