<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS Post Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; }

    .navbar {
      background: #001f33; height: 58px; display: flex; align-items: center;
      padding: 0 40px; gap: 14px; position: sticky; top: 0; z-index: 10;
    }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2); font-size: 0.78rem;
      color: rgba(255,255,255,0.65); cursor: pointer; padding: 6px 14px;
      text-decoration: none; transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    .container { max-width: 760px; margin: 0 auto; padding: 28px 40px 80px; }

    h1 { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 0.82rem; color: #8a9bb0; margin-bottom: 28px; }

    /* メイン入力カード */
    .main-card { background: #fff; border: 1.5px solid #e8ecf0; padding: 24px; margin-bottom: 16px; }

    /* プラットフォーム */
    .platform-btns { display: flex; gap: 8px; margin-bottom: 20px; }
    .platform-btn {
      flex: 1; padding: 10px; border: 1.5px solid #e8ecf0; background: #fff;
      font-size: 0.85rem; font-weight: 700; color: #8a9bb0; cursor: pointer;
      font-family: inherit; transition: all 0.15s; text-align: center;
    }
    .platform-btn.active { border-color: #ffb81c; background: #fffbf0; color: #001f33; }
    .platform-btn:hover:not(.active) { border-color: #d0d8e0; color: #2d3436; }

    /* URL入力 */
    .url-row { display: flex; gap: 0; }
    .url-input {
      flex: 1; padding: 13px 16px; border: 1.5px solid #e8ecf0; border-right: none;
      font-size: 0.92rem; color: #2d3436; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: #ffb81c; }
    .url-input::placeholder { color: #c0c8d4; }
    .generate-btn {
      padding: 13px 28px; background: #ffb81c; border: none; color: #001f33;
      font-size: 0.92rem; font-weight: 800; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { font-size: 0.8rem; color: #e17055; margin-top: 8px; min-height: 1.2em; }

    /* 参考投稿 */
    .refs-section {
      background: #fff; border: 1.5px solid #e8ecf0; margin-bottom: 16px;
    }
    .refs-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid #f0f2f5; cursor: pointer;
    }
    .refs-header-left { display: flex; align-items: center; gap: 10px; }
    .refs-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; color: #8a9bb0; }
    .refs-count { font-size: 0.68rem; background: #e8ecf0; color: #8a9bb0; padding: 1px 7px; }
    .refs-toggle { font-size: 0.72rem; color: #b2bec3; }
    .refs-body { display: none; padding: 16px 20px; }
    .refs-body.open { display: block; }
    .ref-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .ref-item {
      border: 1.5px solid #e8ecf0; padding: 8px 12px; font-size: 0.78rem;
      color: #636e72; line-height: 1.5; position: relative;
    }
    .ref-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .ref-item-num { font-size: 0.65rem; font-weight: 700; color: #ffb81c; }
    .ref-delete-btn {
      background: none; border: none; color: #c0c8d4; cursor: pointer;
      font-size: 0.75rem; padding: 0; transition: color 0.15s;
    }
    .ref-delete-btn:hover { color: #e17055; }
    .ref-preview { max-height: 60px; overflow: hidden; white-space: pre-wrap; word-break: break-all; }
    .ref-add-btn {
      width: 100%; padding: 8px; background: none; border: 1.5px dashed #d0d8e0;
      font-size: 0.78rem; color: #8a9bb0; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .ref-add-btn:hover { border-color: #ffb81c; color: #001f33; }
    .ref-input-wrap { display: none; margin-top: 8px; }
    .ref-input-wrap.open { display: block; }
    .ref-input-wrap textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e8ecf0; font-size: 0.82rem;
      color: #2d3436; font-family: inherit; outline: none; resize: vertical;
      transition: border-color 0.15s; line-height: 1.6; margin-bottom: 8px;
    }
    .ref-input-wrap textarea:focus { border-color: #ffb81c; }
    .ref-save-btn {
      padding: 7px 16px; background: #ffb81c; border: none; color: #001f33;
      font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .ref-reset-btn {
      padding: 7px 12px; background: none; border: 1.5px solid #e8ecf0; color: #8a9bb0;
      font-size: 0.75rem; cursor: pointer; font-family: inherit; margin-left: 8px;
      transition: all 0.15s;
    }
    .ref-reset-btn:hover { border-color: #b2bec3; color: #636e72; }

    /* 出力 */
    .output-section { display: none; }
    .output-card { background: #fff; border: 1.5px solid #e8ecf0; }
    .output-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid #f0f2f5;
    }
    .output-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; color: #001f33; }
    .output-meta { display: flex; align-items: center; gap: 12px; }
    .char-count { font-size: 0.75rem; color: #8a9bb0; }
    .char-count.over { color: #e17055; font-weight: 700; }
    .copy-btn {
      padding: 6px 16px; background: #001f33; border: none; color: #fff;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .output-body { padding: 20px; }
    .output-text {
      font-size: 0.9rem; line-height: 1.8; color: #2d3436;
      white-space: pre-wrap; word-break: break-word;
    }
    .regen-btn {
      margin-top: 12px; padding: 8px 18px; background: none; border: 1.5px solid #e8ecf0;
      font-size: 0.78rem; color: #636e72; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .regen-btn:hover { border-color: #ffb81c; color: #001f33; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="back-btn" href="../../">← アプリ一覧へ</a>
  <img src="../../assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:20px;display:block;">
  <div class="navbar-divider"></div>
  <span class="navbar-title">SNS Post Generator</span>
</nav>

<div class="container">
  <h1>SNS Post Generator</h1>
  <p class="subtitle">記事URLを入力するだけでLinkedIn / X用の投稿文を自動生成します</p>

  <div class="main-card">
    <!-- プラットフォーム選択 -->
    <div class="platform-btns">
      <button class="platform-btn active" data-platform="linkedin">🔗 LinkedIn</button>
      <button class="platform-btn" data-platform="x">✦ X (Twitter)</button>
    </div>

    <!-- URL入力 + 生成ボタン -->
    <div class="url-row">
      <input class="url-input" id="url-input" type="text" placeholder="https://www.akkodis.com/..." autocomplete="off">
      <button class="generate-btn" id="generate-btn">生成する</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- 参考投稿（折りたたみ） -->
  <div class="refs-section">
    <div class="refs-header" id="refs-header">
      <div class="refs-header-left">
        <span class="refs-label">参考投稿</span>
        <span class="refs-count" id="refs-count">0件</span>
      </div>
      <span class="refs-toggle" id="refs-toggle">▼ 編集</span>
    </div>
    <div class="refs-body" id="refs-body">
      <div class="ref-list" id="ref-list"></div>
      <button class="ref-add-btn" id="ref-add-btn">＋ 参考投稿を追加</button>
      <div class="ref-input-wrap" id="ref-input-wrap">
        <textarea id="ref-input" rows="5" placeholder="参考にしたい投稿文を貼り付けてください"></textarea>
        <div>
          <button class="ref-save-btn" id="ref-save-btn">保存</button>
          <button class="ref-reset-btn" id="ref-reset-btn">デフォルトに戻す</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 出力 -->
  <div class="output-section" id="output-section">
    <div class="output-card">
      <div class="output-header">
        <span class="output-label" id="output-label">LINKEDIN</span>
        <div class="output-meta">
          <span class="char-count" id="char-count"></span>
          <button class="copy-btn" id="copy-btn">コピー</button>
        </div>
      </div>
      <div class="output-body">
        <div class="output-text" id="output-text"></div>
        <button class="regen-btn" id="regen-btn">↺ 再生成</button>
      </div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'snsgen_refs_v2';
  const LIMITS = { linkedin: 1300, x: 140 };

  const DEFAULT_REFS = [
    `3月8日はInternational Women's Day🌍

Akkodis Thinkers and Makers Vol 1 2026では、フランス・ドイツ・中東・日本で活躍する女性たちの才能・多様性・野心を称える特別版が公開されました。

AKKODiS Japanからは、ビジネスデベロップメントマネージャーの川口理沙がAI導入について紹介しています。
・ 利用率98%を達成
・ ADKARチェンジマネジメントモデルを活用
・ 強制ではなく「個人の目的」に基づくボトムアップのアプローチ
・ 従業員が自発的にアプリを作成し、ワークフローを自動化

導入初期は利用が伸び悩んだものの、認知・意欲・知識・能力・定着の各段階を丁寧に構築した結果、多様な職種において自発的なエンゲージメントが生まれました。

詳細はこちらから👇（英語コンテンツ）
https://lnkd.in/e8JFYYUR

#Akkodis #AI活用 #DX #IWD2026`,

    `AKKODiSは、IOWN Global Forumのメンバーとして、次世代インフラを相互運用可能な導入へと前進させるための、エコシステムの整合および検証の取り組みに貢献しています。

MWC Barcelona 2026のホール2、スタンド2B40 にて、ぜひお立ち寄りください。

#Akkodis #thefutureisphotonic #IOWNGlobalForum #MWC2026 #AkkodisIntelligence`,

    `【大賞決定！産学連携ビジネスコンペティション2025】
「就活が不安で眠れない」、そんな学生のリアルな声から生まれたのは、悩みを相談できるゲームサービスでした。

「持続可能な社会を創ろう！」をテーマに、大学生とAKKODiSのテックコンサルタントが混成チームで社会課題に挑みました。

大賞：芝浦工業大学「慈愛」── 就活生の不安を軽減するゲームサービス
2位：法政大学「yoyakuプロジェクト」── 街の余白を活用するスキマ広告
3位：大阪経済大学「御縁倶楽部」── 学生の「やってみたい」を応援する学び場
オーディエンス賞：武蔵野大学「chaps」── 政治参加を促すカードゲーム

▶ 受賞結果の詳細はこちら
https://lnkd.in/eHkUHwH5`,

    `学生と現役テックコンサルタントが混成チームを組み、半年以上の本気の協働。
社会課題を解決するビジネスモデルを一緒に創り上げる実践型プログラムです。

AKKODiSは、テクノロジーと人の力で社会をより良くする人財を育て続けます。

▼受賞結果の詳細はこちら
https://lnkd.in/eHkUHwH5

#AKKODiS #産学連携 #ビジネスコンペティション #テックコンサルタント #人財育成 #社会課題解決 #サステナビリティ`,

    `Mobile World Congress Barcelona 2026にて、AKKODiSのIOWN推進室長 森本直彦 が、企業課題に対してAKKODiSが IOWN Global Forumのコミュニティとどのように連携しているかについて紹介します。
ホール2、スタンド2B40にて、実環境でのデモンストレーションや先行導入ユースケースをご覧ください。

#Akkodis #FutureIsPhotonic #IOWNGlobalForum #MWC2026 #FutureOfTelecom #AkkodisIntelligence`,

    `未来は、テクノロジーだけではつくられません。
それを現実と融合させる「人」がいて、はじめて社会を動かします。

AKKODiS IOWN FUSION BASEは、IOWN®が描く可能性を、実際の社会価値へとつなげるために生まれた共創拠点です。

この拠点では、
・次世代の技術を実際に体感できるハンズオン環境の提供
・IOWN®を深く、実践的に理解する人財の育成
・製造業やモビリティをはじめとする、業界横断のユースケース創出と検証

に取り組んでいます。

#AKKODiS #IOWN #Engineering #TalentDevelopment #Innovation #IOWNGlobalForum #AkkodisIntelligence`,
  ];

  let platform = 'linkedin';
  let refs = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') ?? [...DEFAULT_REFS];
  let lastUrl = '';
  let lastArticle = null;

  // ── プラットフォーム ─────────────────────────────────
  document.querySelectorAll('.platform-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      platform = btn.dataset.platform;
      updateCharCount();
    });
  });

  // ── 参考投稿 ─────────────────────────────────────────
  function saveRefs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(refs)); }

  function renderRefs() {
    document.getElementById('refs-count').textContent = `${refs.length}件`;
    const list = document.getElementById('ref-list');
    list.innerHTML = refs.map((r, i) => `
      <div class="ref-item">
        <div class="ref-item-header">
          <span class="ref-item-num">参考 ${i + 1}</span>
          <button class="ref-delete-btn" onclick="deleteRef(${i})">✕</button>
        </div>
        <div class="ref-preview">${r.slice(0, 100).replace(/</g,'&lt;')}${r.length > 100 ? '…' : ''}</div>
      </div>`).join('');
    document.getElementById('ref-add-btn').style.display = refs.length >= 10 ? 'none' : '';
  }

  function deleteRef(i) {
    refs.splice(i, 1); saveRefs(); renderRefs();
  }

  document.getElementById('refs-header').addEventListener('click', () => {
    const body = document.getElementById('refs-body');
    const toggle = document.getElementById('refs-toggle');
    body.classList.toggle('open');
    toggle.textContent = body.classList.contains('open') ? '▲ 閉じる' : '▼ 編集';
  });

  document.getElementById('ref-add-btn').addEventListener('click', () => {
    document.getElementById('ref-input-wrap').classList.add('open');
    document.getElementById('ref-input').focus();
  });

  document.getElementById('ref-save-btn').addEventListener('click', () => {
    const val = document.getElementById('ref-input').value.trim();
    if (!val) return;
    refs.push(val);
    saveRefs();
    document.getElementById('ref-input').value = '';
    document.getElementById('ref-input-wrap').classList.remove('open');
    renderRefs();
  });

  document.getElementById('ref-reset-btn').addEventListener('click', () => {
    if (!confirm('参考投稿をデフォルトに戻しますか？')) return;
    refs = [...DEFAULT_REFS];
    localStorage.removeItem(STORAGE_KEY);
    renderRefs();
  });

  renderRefs();

  // ── 生成 ─────────────────────────────────────────────
  async function generate() {
    const url = document.getElementById('url-input').value.trim();
    const errEl = document.getElementById('error-msg');
    if (!url || !url.startsWith('https://')) {
      errEl.textContent = '有効なURLを入力してください（https://...）';
      return;
    }
    errEl.textContent = '';

    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = '取得中...';
    document.getElementById('output-section').style.display = 'none';

    try {
      // 記事取得（キャッシュ）
      if (url !== lastUrl) {
        const r = await fetch('/api/fetch-article', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || '記事の取得に失敗しました');
        lastArticle = d;
        lastUrl = url;
      }

      btn.textContent = '生成中...';

      const platformLabel = platform === 'linkedin' ? 'LinkedIn' : 'X (Twitter)';
      const limit = LIMITS[platform];
      const refSection = refs.length > 0
        ? `\n\n【参考投稿（トーン・構成・ハッシュタグスタイルを参考にすること）】\n${refs.slice(0, 4).map((r, i) => `--- 参考${i+1} ---\n${r}`).join('\n')}`
        : '';

      const prompt = `あなたはAKKODiS JapanのB2Bマーケターです。以下の記事をもとに${platformLabel}用の投稿文を1つ生成してください。

【条件】
- ${limit}文字以内（厳守）
- ${platform === 'linkedin' ? '改行を活用して読みやすく、末尾に日本語ハッシュタグを3〜5個' : '端的でキャッチーに、ハッシュタグ1〜2個'}
- AKKODiSブランドらしいプロフェッショナルなトーン
- 記事リンクを末尾に含める: ${url}

【記事タイトル】
${lastArticle.title}

【記事内容】
${lastArticle.text}${refSection}

投稿文のみを出力してください。`;

      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1024,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || '生成に失敗しました');
      const text = data?.content?.[0]?.text?.trim() || '';
      if (!text) throw new Error('生成に失敗しました。もう一度お試しください。');

      document.getElementById('output-label').textContent = platformLabel.toUpperCase();
      document.getElementById('output-text').textContent = text;
      document.getElementById('output-section').style.display = 'block';
      updateCharCount();
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      errEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '生成する';
    }
  }

  document.getElementById('generate-btn').addEventListener('click', generate);
  document.getElementById('regen-btn').addEventListener('click', generate);
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });

  // ── 文字数 ───────────────────────────────────────────
  function updateCharCount() {
    const text = document.getElementById('output-text').textContent;
    if (!text) return;
    const limit = LIMITS[platform];
    const el = document.getElementById('char-count');
    el.textContent = `${text.length} / ${limit}文字`;
    el.className = 'char-count' + (text.length > limit ? ' over' : '');
  }

  // ── コピー ───────────────────────────────────────────
  document.getElementById('copy-btn').addEventListener('click', () => {
    const text = document.getElementById('output-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピーしました';
      setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
    });
  });
</script>
</body>
</html>
