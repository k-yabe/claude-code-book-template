<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉️</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketo Mail Generator</title>
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <style>
    /* === App-specific styles (Marketo Mail Generator) === */

    h1 {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.01em;
      margin-bottom: var(--sp-1);
    }

    .step-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
    }
    .badge-required { background: var(--error-bg); color: var(--error-text); }
    .badge-optional { background: var(--border-light); color: var(--text-secondary); }

    .form-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }

    .param-prefix {
      font-size: var(--text-base);
      color: var(--text-secondary);
      white-space: nowrap;
      font-family: var(--font-mono);
      background: var(--bg);
      padding: 10px 12px;
      border: 1.5px solid var(--border);
    }

    .param-input {
      flex: 1;
      min-width: 220px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: var(--text-md);
      color: var(--text);
      outline: none;
      text-decoration: none;
      font-family: var(--font-mono);
    }
    .param-input::placeholder { color: var(--text-faint); }
    .param-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .param-hint {
      font-size: var(--text-sm);
      color: var(--text-faint);
      margin-top: var(--sp-2);
    }

    textarea {
      min-height: 200px;
    }

    .generate-btn {
      margin-bottom: var(--sp-5);
    }

    .output-section { display: none; }

    .output-block {
      background: var(--surface);
      border: 1.5px solid var(--border);
      margin-bottom: var(--sp-5);
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px var(--sp-5);
      border-bottom: 1.5px solid var(--border);
      background: var(--surface-alt);
    }

    .output-label {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .output-content {
      padding: var(--sp-5);
      font-size: var(--text-base);
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      font-family: inherit;
      min-height: 100px;
    }

    .output-content.html-view {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      background: var(--surface-alt);
    }

    .url-count {
      font-size: var(--text-sm);
      color: var(--text-faint);
      padding: var(--sp-2) var(--sp-5) var(--sp-3);
    }

    .preview-toggle {
      padding: 4px 12px;
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--ease);
    }
    .preview-toggle:hover { border-color: var(--navy); color: var(--navy); }
    .preview-toggle.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

    .html-preview-frame {
      width: 100%;
      min-height: 200px;
      border: none;
      display: none;
      background: var(--surface);
      padding: var(--sp-5);
    }

    .url-list {
      display: none;
      background: var(--surface);
      border: 1.5px solid var(--border);
      margin-bottom: var(--sp-5);
    }
    .url-list-header {
      padding: var(--sp-3) var(--sp-5);
      border-bottom: 1.5px solid var(--border);
      background: var(--surface-alt);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
    .url-list-body { padding: var(--sp-3) var(--sp-5); }
    .url-list-item {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.8rem;
      align-items: flex-start;
    }
    .url-list-item:last-child { border-bottom: none; }
    .url-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      background: var(--navy);
      color: var(--white);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .url-original { color: var(--text-secondary); word-break: break-all; line-height: 1.4; }
    .url-campaign { color: var(--text-faint); font-family: var(--font-mono); font-size: 0.73rem; word-break: break-all; }

    .url-item-main {
      flex: 1;
      min-width: 0;
    }
    .url-edit-input {
      width: 100%;
      padding: 5px 8px;
      border: 1.5px solid var(--gold);
      background: var(--gold-20);
      font-size: 0.8rem;
      font-family: var(--font-mono);
      color: var(--text);
      outline: none;
      box-sizing: border-box;
    }
    .url-edit-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .url-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: 2px;
    }
    .url-edit-btn, .url-delete-btn {
      padding: 3px 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: inherit;
      transition: all var(--ease);
      white-space: nowrap;
    }
    .url-edit-btn:hover {
      border-color: var(--navy);
      color: var(--navy);
    }
    .url-delete-btn:hover {
      border-color: var(--error-border);
      color: var(--error-text);
      background: var(--error-bg);
    }
    .url-save-btn {
      padding: 3px 10px;
      border: none;
      background: var(--gold);
      color: var(--navy);
      font-size: var(--text-xs);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity var(--ease);
    }
    .url-save-btn:hover { opacity: 0.85; }
    .url-cancel-btn {
      padding: 3px 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: inherit;
      transition: all var(--ease);
    }
    .url-cancel-btn:hover { border-color: var(--text-secondary); color: var(--text); }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <a href="../../" class="back-btn">← アプリ一覧へ</a>
      <div class="navbar-divider"></div>
      <span class="navbar-title">Marketo Mail Generator</span>
    </div>
  </nav>

  <div class="container">
    <h1>Marketo Mail Generator</h1>
    <p class="subtitle">メール本文を貼り付けてUTMパラメーターを付与し、テキスト版・HTML版を同時生成</p>

    <!-- Step 1: パラメーター入力 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">UTM Campaign を入力</div>
        <span class="step-badge badge-required">必須</span>
      </div>
      <div class="step-body">
        <div class="form-row">
          <span class="param-prefix">utm_campaign=ak_clt_</span>
          <label for="campaign-input" style="display:none;">UTM Campaignパラメーター</label>
          <input
            type="text"
            class="param-input"
            id="campaign-input"
            placeholder="20260312_seminar"
            autocomplete="off"
          />
        </div>
        <p class="param-hint">utm_source=marketo　utm_medium=email　は自動で付与。URLごとに01, 02... と連番が付きます</p>
      </div>
    </div>


    <!-- Step 2: 本文入力 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">メール本文を貼り付け</div>
        <span class="step-badge badge-required">必須</span>
      </div>
      <div class="step-body">
        <textarea id="body-input" placeholder="メール本文をここに貼り付けてください。本文中のURLに自動でパラメーターが付与されます。"></textarea>
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">生成する</button>

    <!-- 出力 -->
    <div class="output-section" id="output-section">

      <div class="output-block">
        <div class="output-header">
          <span class="output-label">テキスト版</span>
          <button class="copy-btn" id="copy-text-btn">コピー</button>
        </div>
        <div class="output-content" id="text-output"></div>
        <div class="url-count" id="text-url-count"></div>
      </div>

      <div class="output-block">
        <div class="output-header">
          <span class="output-label">HTML版</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="preview-toggle" id="preview-toggle">プレビュー</button>
            <button class="copy-btn" id="copy-html-btn">コピー</button>
          </div>
        </div>
        <div class="output-content html-view" id="html-output"></div>
        <iframe class="html-preview-frame" id="html-preview-frame"></iframe>
        <div class="url-count" id="html-url-count"></div>
      </div>

      <!-- URL番号付きリスト -->
      <div class="url-list" id="url-list">
        <div class="url-list-header">URL 一覧</div>
        <div class="url-list-body" id="url-list-body"></div>
      </div>

    </div>
  </div>

  <script>
    if (localStorage.getItem('auth') !== '1') { location.href = '/'; }
    const URL_REGEX = /https?:\/\/[^\s\u3000\u3001\u3002\uff01\uff09\u300d\uff0c]+/g;

    // URL一覧の状態管理（originalUrl: 元URL, editedUrl: 編集後URL）
    let urlItems = [];
    let currentBody = '';
    let currentCampaign = '';
    function buildParams(campaign) {
      return `utm_source=marketo&utm_medium=email&utm_campaign=ak_clt_${campaign}`;
    }

    function appendParams(url, params) {
      return url.includes('?') ? `${url}&${params}` : `${url}?${params}`;
    }

    function stripParams(url) {
      return url.split('?')[0];
    }

    // urlItems を使って本文を再生成（削除・編集を反映）
    // urlItems[i].deleted === true のURLは元URLをそのまま残し、連番から除外する
    function rebuildOutputs() {
      if (!currentBody) return;

      // 生きているアイテムのみ順番に番号を振る
      let activeNum = 0;
      // 元本文のURL出現順に urlItems を対応付け（全アイテム含む）
      let allIdx = 0;

      const textResult = currentBody.replace(URL_REGEX, (originalUrl) => {
        const item = urlItems[allIdx++];
        if (!item) return originalUrl;
        if (item.deleted) return originalUrl; // 削除済みは元URLをそのまま残す
        activeNum++;
        const num = String(activeNum).padStart(2, '0');
        const params = buildParams(`${currentCampaign}${num}`);
        return `[[${appendParams(item.editedUrl, params)}]]`;
      });

      // HTML版
      let allIdx2 = 0;
      let activeNum2 = 0;
      const escaped = currentBody
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      const linkedHtml = escaped.replace(URL_REGEX, (originalUrl) => {
        const item = urlItems[allIdx2++];
        if (!item) return escapeHtml(originalUrl);
        if (item.deleted) return escapeHtml(originalUrl); // 削除済みは元URLテキストを残す
        activeNum2++;
        const num = String(activeNum2).padStart(2, '0');
        const params = buildParams(`${currentCampaign}${num}`);
        const fullUrl = appendParams(item.editedUrl, params);
        const displayUrl = stripParams(item.editedUrl);
        return `<a href="${fullUrl}" target="_blank">${displayUrl}</a>`;
      });
      const htmlResult = linkedHtml.replace(/\n/g, '<br>\n');

      document.getElementById('text-output').textContent = textResult;
      document.getElementById('html-output').textContent = htmlResult;

      const n = urlItems.filter(item => !item.deleted).length;
      const countMsg = n > 0 ? `${n}件のURLにパラメーターを付与しました` : 'URLは検出されませんでした';
      document.getElementById('text-url-count').textContent = countMsg;
      document.getElementById('html-url-count').textContent = countMsg;

      // プレビュー中なら更新
      if (previewMode) {
        const frameEl = document.getElementById('html-preview-frame');
        frameEl.srcdoc = `<style>body{font-family:'Segoe UI','Helvetica Neue',sans-serif;font-size:14px;line-height:1.7;color:#2d3436;padding:0;margin:0;}a{color:#001f33;}}</style>${htmlResult}`;
      }
    }

    document.getElementById('generate-btn').addEventListener('click', () => {
      const campaign = document.getElementById('campaign-input').value.trim();
      const body = document.getElementById('body-input').value;

      if (!campaign) {
        document.getElementById('campaign-input').focus();
        document.getElementById('campaign-input').style.borderColor = '#e17055';
        setTimeout(() => {
          document.getElementById('campaign-input').style.borderColor = '';
        }, 1500);
        return;
      }

      if (!body.trim()) {
        document.getElementById('body-input').focus();
        return;
      }

      currentBody = body;
      currentCampaign = campaign;

      // urlItems を初期化
      const matches = [...body.matchAll(new RegExp(URL_REGEX.source, 'g'))];
      urlItems = matches.map(m => ({ originalUrl: m[0], editedUrl: m[0], deleted: false }));

      // プレビューをリセット
      previewMode = false;
      document.getElementById('html-output').style.display = 'block';
      document.getElementById('html-preview-frame').style.display = 'none';
      document.getElementById('preview-toggle').classList.remove('active');
      document.getElementById('preview-toggle').textContent = 'プレビュー';

      rebuildOutputs();
      renderUrlList();
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      HistoryManager.save(campaign, document.getElementById('text-output').textContent);
    });

    function setupCopyBtn(btnId, getContent) {
      document.getElementById(btnId).addEventListener('click', function() {
        const content = getContent();
        copyToClipboard(content, this);
      });
    }

    setupCopyBtn('copy-text-btn', () => document.getElementById('text-output').textContent);
    setupCopyBtn('copy-html-btn', () => document.getElementById('html-output').textContent);

    // HTMLプレビュートグル
    let previewMode = false;
    document.getElementById('preview-toggle').addEventListener('click', function() {
      previewMode = !previewMode;
      const codeEl = document.getElementById('html-output');
      const frameEl = document.getElementById('html-preview-frame');
      if (previewMode) {
        const html = codeEl.textContent;
        frameEl.srcdoc = `<style>body{font-family:'Segoe UI','Helvetica Neue',sans-serif;font-size:14px;line-height:1.7;color:#2d3436;padding:0;margin:0;}a{color:#001f33;}}</style>${html}`;
        frameEl.style.display = 'block';
        codeEl.style.display = 'none';
        this.classList.add('active');
        this.textContent = 'コード';
        frameEl.onload = () => {
          try { frameEl.style.minHeight = frameEl.contentDocument.body.scrollHeight + 40 + 'px'; } catch {}
        };
      } else {
        frameEl.style.display = 'none';
        codeEl.style.display = 'block';
        this.classList.remove('active');
        this.textContent = 'プレビュー';
      }
    });

    // URL一覧の描画（urlItems ベース、deleted は非表示）
    function renderUrlList() {
      const listEl = document.getElementById('url-list');
      const bodyEl = document.getElementById('url-list-body');
      if (urlItems.length === 0) { listEl.style.display = 'none'; return; }

      // 表示行の連番は生きているアイテムの順番
      let activeNum = 0;
      bodyEl.innerHTML = urlItems.map((item, i) => {
        if (item.deleted) return '';
        activeNum++;
        const num = String(activeNum).padStart(2, '0');
        return `
          <div class="url-list-item" data-index="${i}">
            <div class="url-num">${activeNum}</div>
            <div class="url-item-main">
              <div class="url-original url-display">${escapeHtml(item.editedUrl)}</div>
              <div class="url-campaign">utm_campaign=ak_clt_${currentCampaign}${num}</div>
            </div>
            <div class="url-actions">
              <button class="url-edit-btn" onclick="startEdit(${i})">編集</button>
              <button class="url-delete-btn" onclick="deleteUrl(${i})">×</button>
            </div>
          </div>`;
      }).join('');

      listEl.style.display = 'block';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // インライン編集開始
    function startEdit(index) {
      const item = urlItems[index];
      const rowEl = document.querySelector(`.url-list-item[data-index="${index}"]`);
      const mainEl = rowEl.querySelector('.url-item-main');
      const actionsEl = rowEl.querySelector('.url-actions');

      mainEl.innerHTML = `
        <input class="url-edit-input" id="url-edit-${index}" value="${escapeHtml(item.editedUrl)}" />
        <div class="url-campaign" style="margin-top:4px;">編集後のURLに保存されます</div>
      `;
      actionsEl.innerHTML = `
        <button class="url-save-btn" onclick="saveEdit(${index})">保存</button>
        <button class="url-cancel-btn" onclick="cancelEdit(${index})">キャンセル</button>
      `;

      const inputEl = document.getElementById(`url-edit-${index}`);
      inputEl.focus();
      inputEl.select();
      // Enterキーで保存
      inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit(index);
        if (e.key === 'Escape') cancelEdit(index);
      });
    }

    // 編集保存
    function saveEdit(index) {
      const inputEl = document.getElementById(`url-edit-${index}`);
      const newUrl = inputEl.value.trim();
      if (newUrl) {
        urlItems[index].editedUrl = newUrl;
      }
      rebuildOutputs();
      renderUrlList();
    }

    // 編集キャンセル
    function cancelEdit(index) {
      renderUrlList();
    }

    // URL削除（deleted フラグを立てて出力から除外、一覧からも非表示）
    function deleteUrl(index) {
      urlItems[index].deleted = true;
      rebuildOutputs();
      renderUrlList();
    }
  </script>

  <footer class="app-footer">
    <span class="app-footer-text">⚠️ 機密情報・個人情報のアップロードは禁止です</span>
  </footer>

  <script src="../../assets/history.js"></script>
  <script>HistoryManager.init('Marketo Mail Generator');</script>
  <script src="../../assets/onboarding.js"></script>
  <script>initOnboarding({
    appName: 'marketo-mail-generator',
    title: 'Marketo Mail Generator',
    description: 'メール配信の本文作成を大幅に時短できます',
    features: [
      { icon: '✉️', text: '目的を伝えるだけでMarketo用の本文をAI生成' },
      { icon: '🎯', text: 'ターゲットに合わせたトーンで自動調整' },
      { icon: '⏱️', text: '毎回ゼロから書く手間がなくなる' }
    ]
  });</script>
</body>
