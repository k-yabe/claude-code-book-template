<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketo Mail Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      color: #2d3436;
      min-height: 100vh;
    }

    .navbar {
      background: #001f33;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .navbar-logo {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #ffb81c;
    }
    .navbar-divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.15);
    }
    .navbar-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }
    .back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      padding: 6px 14px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #8a9bb0;
      margin-bottom: 32px;
    }

    .step {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      margin-bottom: 12px;
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      border-bottom: 1.5px solid #f0f2f5;
    }
    .step-num {
      width: 28px;
      height: 28px;
      background: #1C304B;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1C304B;
      flex: 1;
    }
    .step-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
    }
    .badge-required { background: #ffeaea; color: #c0392b; }
    .badge-optional { background: #f0f0f0; color: #636e72; }
    .step-body { padding: 20px 22px; }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .param-prefix {
      font-size: 0.85rem;
      color: #636e72;
      white-space: nowrap;
      font-family: monospace;
      background: #f0f2f5;
      padding: 10px 12px;
      border: 1.5px solid #e8ecf0;
    }

    .param-input {
      flex: 1;
      min-width: 220px;
      padding: 10px 14px;
      border: 1.5px solid #e8ecf0;
      background: #fff;
      font-size: 0.95rem;
      color: #2d3436;
      outline: none;
      text-decoration: none;
      font-family: 'Courier New', monospace;
    }
    .param-input::placeholder { color: #b2bec3; }
    .param-input:focus {
      border-color: #ffb81c;
      box-shadow: 0 0 0 3px rgba(255,184,28,0.12);
    }

    .param-hint {
      font-size: 0.78rem;
      color: #b2bec3;
      margin-top: 8px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      padding: 14px 16px;
      border: 1.5px solid #e8ecf0;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #2d3436;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea::placeholder { color: #b2bec3; }
    textarea:focus {
      border-color: #ffb81c;
      box-shadow: 0 0 0 3px rgba(255,184,28,0.12);
    }

    .generate-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,184,28,0.25);
      margin-bottom: 20px;
    }
    .generate-btn:hover {
      opacity: 0.92;
      box-shadow: 0 6px 28px rgba(255,184,28,0.4);
    }
    .generate-btn:active { transform: scale(0.99); }

    .output-section { display: none; }

    .output-block {
      background: #fff;
      border: 1.5px solid #e8ecf0;
      margin-bottom: 20px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1.5px solid #e8ecf0;
      background: #f8f9fb;
    }

    .output-label {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #636e72;
    }

    .copy-btn {
      padding: 6px 16px;
      background: #001f33;
      color: #fff;
      border: none;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .copy-btn.copied {
      background: #00b894;
    }

    .output-content {
      padding: 20px;
      font-size: 0.88rem;
      line-height: 1.75;
      color: #2d3436;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: inherit;
      min-height: 100px;
    }

    .output-content.html-view {
      font-family: monospace;
      font-size: 0.82rem;
      background: #fafbfc;
    }

    .url-count {
      font-size: 0.78rem;
      color: #b2bec3;
      padding: 8px 20px 12px;
    }

    .preview-toggle {
      padding: 4px 12px;
      background: none;
      border: 1.5px solid #e8ecf0;
      color: #636e72;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .preview-toggle:hover { border-color: #001f33; color: #001f33; }
    .preview-toggle.active { background: #001f33; color: #fff; border-color: #001f33; }

    .html-preview-frame {
      width: 100%;
      min-height: 200px;
      border: none;
      display: none;
      background: #fff;
      padding: 20px;
    }

    .url-list {
      display: none;
      background: #fff;
      border: 1.5px solid #e8ecf0;
      margin-bottom: 20px;
    }
    .url-list-header {
      padding: 12px 20px;
      border-bottom: 1.5px solid #e8ecf0;
      background: #f8f9fb;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #636e72;
    }
    .url-list-body { padding: 12px 20px; }
    .url-list-item {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 0.8rem;
      align-items: flex-start;
    }
    .url-list-item:last-child { border-bottom: none; }
    .url-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      background: #1C304B;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .url-original { color: #636e72; word-break: break-all; line-height: 1.4; }
    .url-campaign { color: #b2bec3; font-family: monospace; font-size: 0.73rem; word-break: break-all; }

    .url-item-main {
      flex: 1;
      min-width: 0;
    }
    .url-edit-input {
      width: 100%;
      padding: 5px 8px;
      border: 1.5px solid #ffb81c;
      background: #fffdf5;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
      color: #2d3436;
      outline: none;
      box-sizing: border-box;
    }
    .url-edit-input:focus {
      border-color: #ffb81c;
      box-shadow: 0 0 0 3px rgba(255,184,28,0.12);
    }
    .url-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: 2px;
    }
    .url-edit-btn, .url-delete-btn {
      padding: 3px 8px;
      border: 1.5px solid #e8ecf0;
      background: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      color: #636e72;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .url-edit-btn:hover {
      border-color: #001f33;
      color: #001f33;
    }
    .url-delete-btn:hover {
      border-color: #e17055;
      color: #e17055;
      background: #ffeaea;
    }
    .url-save-btn {
      padding: 3px 10px;
      border: none;
      background: #ffb81c;
      color: #001f33;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .url-save-btn:hover { opacity: 0.85; }
    .url-cancel-btn {
      padding: 3px 8px;
      border: 1.5px solid #e8ecf0;
      background: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      color: #636e72;
      font-family: inherit;
      transition: all 0.15s;
    }
    .url-cancel-btn:hover { border-color: #636e72; color: #2d3436; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <a href="../../" class="back-btn">← アプリ一覧へ</a>
      <div class="navbar-divider"></div>
      <img src="../../assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:22px;display:block;">
      <div class="navbar-divider"></div>
      <span class="navbar-title">Marketo Mail Generator</span>
    </div>
  </nav>

  <div class="container">
    <h1>Marketo Mail Generator</h1>
    <p class="subtitle">メール本文を貼り付けてUTMパラメーターを付与し、テキスト版・HTML版を同時生成</p>

    <!-- Step 1: パラメーター入力 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">UTM Campaign を入力</div>
        <span class="step-badge badge-required">必須</span>
      </div>
      <div class="step-body">
        <div class="form-row">
          <span class="param-prefix">utm_campaign=ak_clt_</span>
          <input
            type="text"
            class="param-input"
            id="campaign-input"
            placeholder="20260312_seminar"
            autocomplete="off"
          />
        </div>
        <p class="param-hint">utm_source=marketo　utm_medium=email　は自動で付与。URLごとに01, 02... と連番が付きます</p>
      </div>
    </div>


    <!-- Step 2: 本文入力 -->
    <div class="step">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">メール本文を貼り付け</div>
        <span class="step-badge badge-required">必須</span>
      </div>
      <div class="step-body">
        <textarea id="body-input" placeholder="メール本文をここに貼り付けてください。本文中のURLに自動でパラメーターが付与されます。"></textarea>
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">生成する</button>

    <!-- 出力 -->
    <div class="output-section" id="output-section">

      <div class="output-block">
        <div class="output-header">
          <span class="output-label">テキスト版</span>
          <button class="copy-btn" id="copy-text-btn">コピー</button>
        </div>
        <div class="output-content" id="text-output"></div>
        <div class="url-count" id="text-url-count"></div>
      </div>

      <div class="output-block">
        <div class="output-header">
          <span class="output-label">HTML版</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="preview-toggle" id="preview-toggle">プレビュー</button>
            <button class="copy-btn" id="copy-html-btn">コピー</button>
          </div>
        </div>
        <div class="output-content html-view" id="html-output"></div>
        <iframe class="html-preview-frame" id="html-preview-frame"></iframe>
        <div class="url-count" id="html-url-count"></div>
      </div>

      <!-- URL番号付きリスト -->
      <div class="url-list" id="url-list">
        <div class="url-list-header">URL 一覧</div>
        <div class="url-list-body" id="url-list-body"></div>
      </div>

    </div>
  </div>

  <script>
    const URL_REGEX = /https?:\/\/[^\s\u3000\u3001\u3002\uff01\uff09\u300d\uff0c]+/g;

    // URL一覧の状態管理（originalUrl: 元URL, editedUrl: 編集後URL）
    let urlItems = [];
    let currentBody = '';
    let currentCampaign = '';
    function buildParams(campaign) {
      return `utm_source=marketo&utm_medium=email&utm_campaign=ak_clt_${campaign}`;
    }

    function appendParams(url, params) {
      return url.includes('?') ? `${url}&${params}` : `${url}?${params}`;
    }

    function stripParams(url) {
      return url.split('?')[0];
    }

    // urlItems を使って本文を再生成（削除・編集を反映）
    // urlItems[i].deleted === true のURLは元URLをそのまま残し、連番から除外する
    function rebuildOutputs() {
      if (!currentBody) return;

      // 生きているアイテムのみ順番に番号を振る
      let activeNum = 0;
      // 元本文のURL出現順に urlItems を対応付け（全アイテム含む）
      let allIdx = 0;

      const textResult = currentBody.replace(URL_REGEX, (originalUrl) => {
        const item = urlItems[allIdx++];
        if (!item) return originalUrl;
        if (item.deleted) return originalUrl; // 削除済みは元URLをそのまま残す
        activeNum++;
        const num = String(activeNum).padStart(2, '0');
        const params = buildParams(`${currentCampaign}${num}`);
        return `[[${appendParams(item.editedUrl, params)}]]`;
      });

      // HTML版
      let allIdx2 = 0;
      let activeNum2 = 0;
      const escaped = currentBody
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      const linkedHtml = escaped.replace(URL_REGEX, (originalUrl) => {
        const item = urlItems[allIdx2++];
        if (!item) return escapeHtml(originalUrl);
        if (item.deleted) return escapeHtml(originalUrl); // 削除済みは元URLテキストを残す
        activeNum2++;
        const num = String(activeNum2).padStart(2, '0');
        const params = buildParams(`${currentCampaign}${num}`);
        const fullUrl = appendParams(item.editedUrl, params);
        const displayUrl = stripParams(item.editedUrl);
        return `<a href="${fullUrl}" target="_blank">${displayUrl}</a>`;
      });
      const htmlResult = linkedHtml.replace(/\n/g, '<br>\n');

      document.getElementById('text-output').textContent = textResult;
      document.getElementById('html-output').textContent = htmlResult;

      const n = urlItems.filter(item => !item.deleted).length;
      const countMsg = n > 0 ? `${n}件のURLにパラメーターを付与しました` : 'URLは検出されませんでした';
      document.getElementById('text-url-count').textContent = countMsg;
      document.getElementById('html-url-count').textContent = countMsg;

      // プレビュー中なら更新
      if (previewMode) {
        const frameEl = document.getElementById('html-preview-frame');
        frameEl.srcdoc = `<style>body{font-family:'Segoe UI','Helvetica Neue',sans-serif;font-size:14px;line-height:1.7;color:#2d3436;padding:0;margin:0;}a{color:#001f33;}}</style>${htmlResult}`;
      }
    }

    document.getElementById('generate-btn').addEventListener('click', () => {
      const campaign = document.getElementById('campaign-input').value.trim();
      const body = document.getElementById('body-input').value;

      if (!campaign) {
        document.getElementById('campaign-input').focus();
        document.getElementById('campaign-input').style.borderColor = '#e17055';
        setTimeout(() => {
          document.getElementById('campaign-input').style.borderColor = '';
        }, 1500);
        return;
      }

      if (!body.trim()) {
        document.getElementById('body-input').focus();
        return;
      }

      currentBody = body;
      currentCampaign = campaign;

      // urlItems を初期化
      const matches = [...body.matchAll(new RegExp(URL_REGEX.source, 'g'))];
      urlItems = matches.map(m => ({ originalUrl: m[0], editedUrl: m[0], deleted: false }));

      // プレビューをリセット
      previewMode = false;
      document.getElementById('html-output').style.display = 'block';
      document.getElementById('html-preview-frame').style.display = 'none';
      document.getElementById('preview-toggle').classList.remove('active');
      document.getElementById('preview-toggle').textContent = 'プレビュー';

      rebuildOutputs();
      renderUrlList();
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    function setupCopyBtn(btnId, getContent) {
      document.getElementById(btnId).addEventListener('click', function() {
        const content = getContent();
        navigator.clipboard.writeText(content).then(() => {
          this.textContent = 'コピーしました';
          this.classList.add('copied');
          setTimeout(() => {
            this.textContent = 'コピー';
            this.classList.remove('copied');
          }, 2000);
        });
      });
    }

    setupCopyBtn('copy-text-btn', () => document.getElementById('text-output').textContent);
    setupCopyBtn('copy-html-btn', () => document.getElementById('html-output').textContent);

    // HTMLプレビュートグル
    let previewMode = false;
    document.getElementById('preview-toggle').addEventListener('click', function() {
      previewMode = !previewMode;
      const codeEl = document.getElementById('html-output');
      const frameEl = document.getElementById('html-preview-frame');
      if (previewMode) {
        const html = codeEl.textContent;
        frameEl.srcdoc = `<style>body{font-family:'Segoe UI','Helvetica Neue',sans-serif;font-size:14px;line-height:1.7;color:#2d3436;padding:0;margin:0;}a{color:#001f33;}}</style>${html}`;
        frameEl.style.display = 'block';
        codeEl.style.display = 'none';
        this.classList.add('active');
        this.textContent = 'コード';
        frameEl.onload = () => {
          try { frameEl.style.minHeight = frameEl.contentDocument.body.scrollHeight + 40 + 'px'; } catch {}
        };
      } else {
        frameEl.style.display = 'none';
        codeEl.style.display = 'block';
        this.classList.remove('active');
        this.textContent = 'プレビュー';
      }
    });

    // URL一覧の描画（urlItems ベース、deleted は非表示）
    function renderUrlList() {
      const listEl = document.getElementById('url-list');
      const bodyEl = document.getElementById('url-list-body');
      if (urlItems.length === 0) { listEl.style.display = 'none'; return; }

      // 表示行の連番は生きているアイテムの順番
      let activeNum = 0;
      bodyEl.innerHTML = urlItems.map((item, i) => {
        if (item.deleted) return '';
        activeNum++;
        const num = String(activeNum).padStart(2, '0');
        return `
          <div class="url-list-item" data-index="${i}">
            <div class="url-num">${activeNum}</div>
            <div class="url-item-main">
              <div class="url-original url-display">${escapeHtml(item.editedUrl)}</div>
              <div class="url-campaign">utm_campaign=ak_clt_${currentCampaign}${num}</div>
            </div>
            <div class="url-actions">
              <button class="url-edit-btn" onclick="startEdit(${i})">編集</button>
              <button class="url-delete-btn" onclick="deleteUrl(${i})">×</button>
            </div>
          </div>`;
      }).join('');

      listEl.style.display = 'block';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // インライン編集開始
    function startEdit(index) {
      const item = urlItems[index];
      const rowEl = document.querySelector(`.url-list-item[data-index="${index}"]`);
      const mainEl = rowEl.querySelector('.url-item-main');
      const actionsEl = rowEl.querySelector('.url-actions');

      mainEl.innerHTML = `
        <input class="url-edit-input" id="url-edit-${index}" value="${escapeHtml(item.editedUrl)}" />
        <div class="url-campaign" style="margin-top:4px;">編集後のURLに保存されます</div>
      `;
      actionsEl.innerHTML = `
        <button class="url-save-btn" onclick="saveEdit(${index})">保存</button>
        <button class="url-cancel-btn" onclick="cancelEdit(${index})">キャンセル</button>
      `;

      const inputEl = document.getElementById(`url-edit-${index}`);
      inputEl.focus();
      inputEl.select();
      // Enterキーで保存
      inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit(index);
        if (e.key === 'Escape') cancelEdit(index);
      });
    }

    // 編集保存
    function saveEdit(index) {
      const inputEl = document.getElementById(`url-edit-${index}`);
      const newUrl = inputEl.value.trim();
      if (newUrl) {
        urlItems[index].editedUrl = newUrl;
      }
      rebuildOutputs();
      renderUrlList();
    }

    // 編集キャンセル
    function cancelEdit(index) {
      renderUrlList();
    }

    // URL削除（deleted フラグを立てて出力から除外、一覧からも非表示）
    function deleteUrl(index) {
      urlItems[index].deleted = true;
      rebuildOutputs();
      renderUrlList();
    }
  </script>

</body>
</html>
