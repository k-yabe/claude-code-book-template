<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪄</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Maker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f0f2f5; color: #2d3436; min-height: 100vh; display: flex; flex-direction: column; }

    /* ナビバー */
    .navbar {
      background: #001f33; height: 58px; display: flex; align-items: center;
      padding: 0 40px; gap: 14px; position: sticky; top: 0; z-index: 10;
    }
    .navbar-brand { display: flex; align-items: center; gap: 14px; }
    .navbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .navbar-title { font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.9); }
    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2); font-size: 0.78rem;
      color: rgba(255,255,255,0.65); cursor: pointer; padding: 6px 14px;
      text-decoration: none; transition: all 0.15s;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    /* メインコンテナ */
    .container { max-width: 800px; margin: 0 auto; padding: 24px 24px 60px; flex: 1; width: 100%; }

    /* チャットエリア */
    .chat-box {
      background: #fff; border: 1.5px solid #e8ecf0;
      display: flex; flex-direction: column; min-height: 520px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    /* サジェスチョン（初期表示） */
    .suggestions { padding: 12px 16px; background: #fafbfc; border-bottom: 1px solid #e8ecf0; }
    .suggestions-label { font-size: 0.72rem; color: #8a9bb0; font-weight: 600; margin-bottom: 8px; }
    .sug-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .sug-chip {
      padding: 6px 14px; font-size: 0.75rem; background: #fff; color: #4a5568;
      border: 1.5px solid #e8ecf0; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .sug-chip:hover { border-color: #ffb81c; background: #fffbf0; color: #001f33; }

    /* チャットメッセージ */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      min-height: 300px; max-height: 500px;
    }
    .chat-row { display: flex; gap: 10px; align-items: flex-start; animation: fadeIn 0.3s ease; }
    .chat-row.ai { align-self: flex-start; }
    .chat-row.user { align-self: flex-end; flex-direction: row-reverse; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .chat-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .chat-avatar.ai { background: #fffbf0; }
    .chat-avatar.user { background: #e8ecf0; }

    .chat-bubble {
      max-width: 78%; padding: 12px 16px; font-size: 0.85rem;
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
    }
    .chat-bubble.ai { background: #f7f8fa; color: #2d3436; border: 1px solid #e8ecf0; }
    .chat-bubble.user { background: #001f33; color: #fff; }

    /* プロンプト結果バブル */
    .prompt-result {
      background: #fff; border: 1.5px solid #001f33; padding: 0; max-width: 90%;
    }
    .prompt-result-header {
      background: #001f33; color: #fff; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .prompt-result-title { font-size: 0.82rem; font-weight: 700; }
    .prompt-copy-btn {
      background: #ffb81c; color: #001f33; border: none;
      font-size: 0.75rem; font-weight: 700; padding: 5px 14px;
      cursor: pointer; font-family: inherit; transition: opacity 0.15s;
    }
    .prompt-copy-btn:hover { opacity: 0.85; }
    .prompt-result-body {
      padding: 14px 16px; font-size: 0.84rem; line-height: 1.8;
      font-family: 'Consolas', 'Monaco', monospace; color: #2d3436;
      white-space: pre-wrap; word-break: break-word; max-height: 400px;
      overflow-y: auto;
    }
    .prompt-result-hint {
      padding: 8px 16px; background: #fafbfc; border-top: 1px solid #e8ecf0;
      font-size: 0.72rem; color: #8a9bb0;
    }

    /* ローディング */
    .chat-bubble.loading { color: #9aa5b4; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; }
    .loading-dots { display: inline-flex; gap: 4px; }
    .loading-dot { width: 5px; height: 5px; background: #ffb81c; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.35; } 40% { transform: scale(1); opacity: 1; } }

    /* 入力バー */
    .chat-input-bar {
      padding: 12px 16px; background: #fff; border-top: 1px solid #e8ecf0;
      display: flex; gap: 8px;
    }
    .chat-input-bar textarea {
      flex: 1; border: 1.5px solid #e8ecf0; padding: 10px 14px;
      font-size: 0.85rem; font-family: inherit; resize: none; height: 44px;
      outline: none; color: #2d3436; line-height: 1.5;
    }
    .chat-input-bar textarea:focus { border-color: #ffb81c; box-shadow: 0 0 0 3px rgba(255,184,28,0.12); }
    .chat-input-bar textarea::placeholder { color: #c8d0da; }
    .send-btn {
      background: #ffb81c; color: #001f33; border: none; padding: 10px 20px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* フッター */
    .app-footer {
      background: #001f33; border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 40px; display: flex; align-items: center;
      justify-content: space-between; margin-top: 40px;
    }
    .app-footer-text { font-size: 0.72rem; color: rgba(255,255,255,0.8); }

    @media (max-width: 768px) {
      .container { padding: 16px 16px 60px; }
      .navbar { padding: 0 20px; }
      .chat-bubble { max-width: 88%; }
      .prompt-result { max-width: 95%; }
    }
    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
    }
  </style>
  <link rel="stylesheet" href="../../assets/app-styles.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <a class="back-btn" href="../../">← アプリ一覧へ</a>
    <div class="navbar-divider"></div>
    <span class="navbar-title">Prompt Maker</span>
  </div>
</nav>

<div class="container">
  <div class="chat-box">
    <!-- サジェスチョン -->
    <div class="suggestions" id="suggestions">
      <div class="suggestions-label">💡 こんな用途で使えます — クリックで入力</div>
      <div class="sug-chips">
        <button class="sug-chip" data-msg="LinkedIn投稿でセミナーの集客をしたい">SNS投稿</button>
        <button class="sug-chip" data-msg="セミナー参加者にフォローアップメールを送りたい">メール文面</button>
        <button class="sug-chip" data-msg="新規事業の企画書のアウトラインを作りたい">企画書</button>
        <button class="sug-chip" data-msg="四半期の売上データを分析して改善提案をまとめたい">分析レポート</button>
        <button class="sug-chip" data-msg="製品紹介ページを自然な英語に翻訳したい">翻訳</button>
        <button class="sug-chip" data-msg="社内勉強会のスライド構成を考えたい">プレゼン資料</button>
      </div>
    </div>

    <!-- チャットメッセージ -->
    <div class="chat-messages" id="chat-messages">
      <div class="chat-row ai">
        <div class="chat-avatar ai">🪄</div>
        <div class="chat-bubble ai">AIの力を最大限引き出すプロンプトを一緒に作りましょう！

何をしたいか、ざっくりで構いません。
例えば「セミナー集客用のSNS投稿を作りたい」のように教えてください。

こちらから質問しながら、最適なプロンプトに仕上げていきます。</div>
      </div>
    </div>

    <!-- 入力バー -->
    <div class="chat-input-bar">
      <textarea id="user-input" placeholder="やりたいことを入力してください（例: セミナー集客用のLinkedIn投稿を作りたい）" rows="1"></textarea>
      <button class="send-btn" id="send-btn">送信</button>
    </div>
  </div>
</div>

<script src="../../assets/copy-utils.js"></script>
<script src="../../assets/history.js"></script>
<script>
  // ── 状態管理 ──────────────────────────
  const messages = []; // { role: 'user'|'assistant', content: '' }
  let generating = false;
  let promptGenerated = false;

  const SYSTEM_PROMPT = `あなたは「プロのプロンプトエンジニア」です。ユーザーの抽象的な要望を具体化し、AIの性能を最大限に引き出す最適なプロンプトを設計してください。

## あなたの行動フロー

### フェーズ1: ヒアリング（最初の1〜2ターン）
ユーザーの最初の要望を受けたら、不足している情報を特定し、3〜5個の具体的な質問を**番号付きリスト**で投げかけてください。
質問すべき項目:
- 目的（何を達成したいか）
- 想定読者・ターゲット
- トーン・文体の希望
- 出力の形式や分量
- 制約条件（避けたいこと、必須要素など）

質問は簡潔に。「〜ですか？」「〜を教えてください」形式で。

### フェーズ2: プロンプト生成
ユーザーが質問に回答したら、以下のルールでプロンプトを生成してください:

1. まず「📋 プロンプトを生成しました！」と一行書く
2. 次の行に「---PROMPT_START---」と書く（これは区切り記号です）
3. プロンプト本文を出力する
4. 最後の行に「---PROMPT_END---」と書く
5. その後に「このプロンプトをコピーしてAIに貼り付けるだけで使えます。修正したい点があれば教えてください。」と書く

プロンプト本文のルール:
- 4つの構成要素を含む: インストラクション（指示）・コンテキスト（背景）・インプット（入力データ）・アウトプット（出力形式）
- セクションを##見出しで分ける
- プレースホルダーは【】で囲む（例: 【ここに製品名を入力】）
- 日本語で記述
- コピーしてそのまま使える完成度にする

### フェーズ3: 洗練
ユーザーから修正依頼が来たら、同じフォーマット（---PROMPT_START--- 〜 ---PROMPT_END---）で改善版を出力してください。`;

  // ── DOM ──────────────────────────
  const chatEl = document.getElementById('chat-messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const sugEl = document.getElementById('suggestions');

  // ── チャット描画 ──────────────────────────
  function addBubble(role, content) {
    // プロンプト結果を含むか検出
    const hasPrompt = content.includes('---PROMPT_START---') && content.includes('---PROMPT_END---');

    const row = document.createElement('div');
    row.className = `chat-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `chat-avatar ${role}`;
    avatar.textContent = role === 'ai' ? '🪄' : '👤';

    if (hasPrompt) {
      // プロンプト結果を特別表示
      const parts = content.split('---PROMPT_START---');
      const beforePrompt = parts[0].trim();
      const afterParts = parts[1].split('---PROMPT_END---');
      const promptText = afterParts[0].trim();
      const afterPrompt = afterParts[1] ? afterParts[1].trim() : '';

      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex;flex-direction:column;gap:10px;max-width:90%;';

      // 前置きテキスト
      if (beforePrompt) {
        const pre = document.createElement('div');
        pre.className = 'chat-bubble ai';
        pre.textContent = beforePrompt;
        wrapper.appendChild(pre);
      }

      // プロンプト結果カード
      const card = document.createElement('div');
      card.className = 'prompt-result';
      card.innerHTML = `
        <div class="prompt-result-header">
          <span class="prompt-result-title">✅ 生成されたプロンプト</span>
          <button class="prompt-copy-btn" id="copy-prompt-btn">📋 コピー</button>
        </div>
        <div class="prompt-result-body">${escHtml(promptText)}</div>
        <div class="prompt-result-hint">💡 このプロンプトをコピーしてChatGPT・Claude・Geminiなどに貼り付けてください</div>`;
      wrapper.appendChild(card);

      // 後続テキスト
      if (afterPrompt) {
        const post = document.createElement('div');
        post.className = 'chat-bubble ai';
        post.textContent = afterPrompt;
        wrapper.appendChild(post);
      }

      row.appendChild(avatar);
      row.appendChild(wrapper);
      chatEl.appendChild(row);

      // コピーボタン
      card.querySelector('#copy-prompt-btn').addEventListener('click', function() {
        copyToClipboard(promptText, this);
      });

      // 履歴保存
      const userFirstMsg = messages.find(m => m.role === 'user')?.content || '';
      HistoryManager.save(userFirstMsg.slice(0, 300), promptText);
      promptGenerated = true;
    } else {
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      bubble.textContent = content;
      row.appendChild(avatar);
      row.appendChild(bubble);
      chatEl.appendChild(row);
    }

    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addLoading() {
    const row = document.createElement('div');
    row.className = 'chat-row ai';
    row.id = 'loading-row';
    row.innerHTML = `
      <div class="chat-avatar ai">🪄</div>
      <div class="chat-bubble ai loading">
        考え中
        <span class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </span>
      </div>`;
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeLoading() {
    document.getElementById('loading-row')?.remove();
  }

  function escHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── 送信処理 ──────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || generating) return;

    // サジェスチョン非表示
    sugEl.style.display = 'none';

    // ユーザーメッセージ表示
    addBubble('user', text);
    messages.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = '44px';

    generating = true;
    sendBtn.disabled = true;
    addLoading();

    try {
      const r = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          _user: sessionStorage.getItem('username') || 'unknown',
          _app: 'Prompt Maker',
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          system: SYSTEM_PROMPT,
          messages: messages.map(m => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error?.message || 'エラーが発生しました');
      const reply = data.content?.[0]?.text || '';
      if (!reply.trim()) throw new Error('応答が空です。もう一度お試しください。');

      removeLoading();
      messages.push({ role: 'assistant', content: reply });
      addBubble('ai', reply);
    } catch (err) {
      removeLoading();
      addBubble('ai', `⚠️ ${err.message}`);
    } finally {
      generating = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── イベント ──────────────────────────
  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // テキストエリア自動高さ調整
  inputEl.addEventListener('input', () => {
    inputEl.style.height = '44px';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // サジェスチョンクリック
  document.querySelectorAll('.sug-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.dataset.msg;
      inputEl.focus();
    });
  });

  HistoryManager.init('Prompt Maker');
</script>
  <footer class="app-footer">
    <span class="app-footer-text">⚠️ 機密情報・個人情報のアップロードは禁止です</span>
  </footer>
</body>
</html>
