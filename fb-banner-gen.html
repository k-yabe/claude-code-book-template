<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Facebook広告バナー生成</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      color: #fff;
      min-height: 100vh;
    }
    h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; color: #ffb81c; }
    .meta { font-size: 0.8rem; color: #636e72; margin-bottom: 28px; }
    canvas {
      width: 540px;
      height: 540px;
      display: block;
      border: 1px solid #2d3436;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }
    button {
      padding: 12px 32px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .note {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #636e72;
    }
  </style>
</head>
<body>
  <h1>Facebook広告バナー自動生成</h1>
  <p class="meta">1080 × 1080 px　│　元画像: img-mv.webp を読み取り再生成</p>
  <canvas id="canvas"></canvas>
  <div class="actions">
    <button onclick="downloadPng()">PNG でダウンロード</button>
  </div>
  <p class="note">※ 元バナーの人物・テキスト・ブランドカラーをそのまま使用して再構成しています</p>

  <script>
    const W = 1080, H = 1080;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = W;
    canvas.height = H;

    const NAVY   = '#001f33';
    const YELLOW = '#ffb81c';
    const WHITE  = '#ffffff';

    const src = new Image();
    src.src = 'img-mv.webp';
    src.onload = () => render(src);
    src.onerror = () => {
      ctx.fillStyle = '#c0392b';
      ctx.font = '28px sans-serif';
      ctx.fillText('画像の読み込みに失敗しました', 40, 540);
    };

    function render(src) {
      // ── 背景 ──────────────────────────────────────────
      ctx.fillStyle = NAVY;
      ctx.fillRect(0, 0, W, H);

      // ── 人物写真（右側）──────────────────────────────
      // 元画像(800×466)から人物のみを切り出し
      // x=560〜: 見出しテキスト終端より右
      // y=60〜: AKKODiSロゴ（y=0〜55）を除外
      const pSX = 560, pSY = 60, pSW = 240, pSH = 406;
      const pDW = 480;
      const pDH = Math.round(pSH * (pDW / pSW)); // ≈ 812px
      const pDX = W - pDW; // = 600
      const pDY = 200; // 上から少し下げて配置（顔が中央寄りに）
      ctx.drawImage(src, pSX, pSY, pSW, pSH, pDX, pDY, pDW, pDH);

      // 上端フェード（紺背景から人物へ自然につなぐ）
      const topFade = ctx.createLinearGradient(0, pDY, 0, pDY + 120);
      topFade.addColorStop(0, NAVY);
      topFade.addColorStop(1, 'transparent');
      ctx.fillStyle = topFade;
      ctx.fillRect(pDX, pDY, pDW, 120);

      // 左端フェード（テキストエリアとの境界を自然に）
      const fadeGrad = ctx.createLinearGradient(pDX, 0, pDX + 200, 0);
      fadeGrad.addColorStop(0, NAVY);
      fadeGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = fadeGrad;
      ctx.fillRect(pDX, pDY, 200, pDH);

      // 下端フェード（底バーへの接続・元画像の登壇者テキストも隠す）
      const bottomFade = ctx.createLinearGradient(0, 640, 0, 900);
      bottomFade.addColorStop(0, 'transparent');
      bottomFade.addColorStop(1, NAVY);
      ctx.fillStyle = bottomFade;
      ctx.fillRect(pDX, 640, pDW, 260);

      // ── 上部バー（黄色）──────────────────────────────
      ctx.fillStyle = YELLOW;
      ctx.fillRect(0, 0, W, 78);

      // ターゲット文字（黒）
      ctx.fillStyle = NAVY;
      ctx.font = 'bold 24px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText('人材派遣の窓口担当者さま向け　【実践編】', 28, 39);

      // AKKODiS ロゴ（右端）
      ctx.textAlign = 'right';
      ctx.font = 'bold 36px "Helvetica Neue", Arial, sans-serif';
      ctx.fillText('AKKODiS', W - 26, 39);
      ctx.textAlign = 'left';

      // ── 左アクセントライン ─────────────────────────
      ctx.fillStyle = YELLOW;
      ctx.fillRect(28, 120, 7, 220);

      // ── メインコピー ──────────────────────────────────
      ctx.fillStyle = WHITE;
      ctx.textBaseline = 'top';

      ctx.font = 'bold 66px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('厚労省のQA集から学ぶ', 48, 122);

      ctx.font = 'bold 64px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('適正な運営方法', 48, 208);
      ctx.fillText('教えます', 48, 295);

      // ── サブコピー ────────────────────────────────────
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.font = '30px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('正しい解釈と適正な', 48, 400);
      ctx.fillText('改善・事例紹介が身につく', 48, 444);

      // ── 登壇者情報 ───────────────────────────────────
      ctx.fillStyle = 'rgba(255,255,255,0.60)';
      ctx.font = '18px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('AKKODiSコンサルティング株式会社', 48, 670);
      ctx.fillText('Solution Accelerator本部　Quality & Strategic Collaboration部', 48, 698);
      ctx.fillText('Quality & Complianceグループ', 48, 726);

      ctx.fillStyle = WHITE;
      ctx.font = 'bold 42px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('藤牧 法義', 48, 768);

      // ── 下部バー（黄色）──────────────────────────────
      ctx.fillStyle = YELLOW;
      ctx.fillRect(0, 895, W, 185);

      // 日付
      ctx.fillStyle = NAVY;
      ctx.font = 'bold 88px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('2026.6.16', 36, 900);

      ctx.font = 'bold 48px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('（火）', 510, 924);

      ctx.font = '38px "Noto Sans JP", "Hiragino Sans", sans-serif';
      ctx.fillText('13:00〜14:00　｜　ONLINE', 36, 1010);
    }

    function downloadPng() {
      const a = document.createElement('a');
      a.download = 'fb-banner-1080x1080.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
