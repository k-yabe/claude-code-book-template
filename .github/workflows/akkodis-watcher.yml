name: AKKODiS Watcher

on:
  schedule:
    # 毎日 JST 9:00（UTC 0:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r apps/akkodis-watcher/requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python apps/akkodis-watcher/scraper.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/akkodis-watcher/data/articles.json
          git diff --cached --quiet || git commit -m "chore: update akkodis articles [skip ci]"
          git push
