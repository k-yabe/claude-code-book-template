name: Claude Issue Triage

on:
  issues:
    types:
      - opened

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Decide labels by Claude
        id: decide
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          show_full_output: true

          prompt: |
            You are an issue triage assistant.
            Choose 1-2 labels from this allowed list only:
            - bug
            - enhancement
            - question
            - documentation
            - needs-triage

            Return JSON only.

            ISSUE_TITLE:
            ${{ github.event.issue.title }}

            ISSUE_BODY:
            ${{ github.event.issue.body }}

          claude_args: |
            --json-schema '{
              "type":"object",
              "properties":{
                "labels":{
                  "type":"array",
                  "items":{"type":"string"},
                  "minItems":1,
                  "maxItems":2
                },
                "reason":{
                  "type":"string"
                }
              },
              "required":["labels"]
            }'
            --disallowedTools Bash,WebFetch,WebSearch

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const raw = `${{ steps.decide.outputs.structured_output }}`.trim();

            const start = raw.indexOf('{');
            const end = raw.lastIndexOf('}');
            if (start === -1 || end === -1 || end <= start) {
              core.setFailed(`No JSON object found in structured_output. Raw:\n${raw}`);
              return;
            }

            const jsonText = raw.slice(start, end + 1);
            let out;
            try {
              out = JSON.parse(jsonText);
            } catch (e) {
              core.setFailed(`JSON.parse failed. Extracted:\n${jsonText}\n\nRaw:\n${raw}`);
              return;
            }

            const labels = out.labels || [];
            if (!Array.isArray(labels) || labels.length === 0) {
              core.setFailed(`No labels returned. Parsed:\n${jsonText}`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels
            });

            core.info(`Applied labels: ${labels.join(", ")}`);
