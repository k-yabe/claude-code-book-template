name: Claude Issue Triage
description: Auto label issues using Claude (no gh / no WebFetch)

on:
  issues:
    types: [opened]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Decide labels by Claude
        id: decide
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"

          prompt: |
            You are an issue triage assistant.
            Choose 1-2 labels from this allowed list only:
            - bug
            - enhancement
            - question
            - documentation
            - needs-triage

            Return JSON only.

            ISSUE_TITLE:
            ${{ github.event.issue.title }}

            ISSUE_BODY:
            ${{ github.event.issue.body }}

          claude_args: |
            --json-schema '{
              "type":"object",
              "properties":{
                "labels":{
                  "type":"array",
                  "items":{"type":"string"},
                  "minItems":1,
                  "maxItems":2
                },
                "reason":{
                  "type":"string"
                }
              },
              "required":["labels"]
            }'
            --disallowedTools Bash,WebFetch,WebSearch

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const out = JSON.parse(`${{ toJSON(steps.decide.outputs.structured_output) }}`);
            const labels = out.labels || [];
            if (labels.length === 0) {
              core.setFailed("No labels returned by Claude.");
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels
            });
            core.info(`Applied labels: ${labels.join(", ")}`);
