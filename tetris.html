<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テトリス</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    canvas {
      display: block;
      box-shadow: 0 0 40px rgba(100, 100, 255, 0.2);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  // ── 定数 ──
  const COLS = 10;
  const ROWS = 20;
  const CELL = 30;   // ボードのセルサイズ（px）
  const NCELL = 24;  // Nextプレビューのセルサイズ（px）
  const BW = COLS * CELL;  // ボード幅  = 300
  const BH = ROWS * CELL;  // ボード高さ = 600
  const PW = 156;           // サイドパネル幅
  const W  = BW + PW;       // キャンバス幅 = 456
  const H  = BH;            // キャンバス高さ = 600

  // テトリミノ定義（形・色）
  const PIECES = [
    { shape: [[1,1,1,1]],         color: '#00e5ff' }, // I シアン
    { shape: [[1,1],[1,1]],       color: '#ffee00' }, // O 黄
    { shape: [[0,1,0],[1,1,1]],   color: '#cc00ff' }, // T 紫
    { shape: [[0,1,1],[1,1,0]],   color: '#00e676' }, // S 緑
    { shape: [[1,1,0],[0,1,1]],   color: '#ff1744' }, // Z 赤
    { shape: [[1,0,0],[1,1,1]],   color: '#2979ff' }, // J 青
    { shape: [[0,0,1],[1,1,1]],   color: '#ff9100' }, // L 橙
  ];

  // 消去ライン数 → 基本得点
  const SCORE_TABLE = [0, 100, 300, 500, 800];

  // ── キャンバス ──
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width  = W;
  canvas.height = H;

  // ── ゲーム状態 ──
  // state: 'idle' | 'playing' | 'paused' | 'gameover'
  let board, current, next, score, lines, level, dropInterval, dropTimer, state;

  // ── 初期化 ──
  function newBoard() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  function randPiece() {
    const p     = PIECES[Math.floor(Math.random() * PIECES.length)];
    const shape = p.shape.map(row => [...row]);
    return {
      shape,
      color: p.color,
      x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
      y: 0,
    };
  }

  function reset() {
    board        = newBoard();
    score        = 0;
    lines        = 0;
    level        = 1;
    dropInterval = 800;  // ms（レベルが上がると短くなる）
    dropTimer    = 0;
    current      = randPiece();
    next         = randPiece();
    state        = 'idle';
  }

  // ── ゲームロジック ──

  // 指定した位置・形で配置できるか判定
  function isValid(shape, ox, oy) {
    for (let r = 0; r < shape.length; r++)
      for (let c = 0; c < shape[r].length; c++)
        if (shape[r][c]) {
          const nx = ox + c, ny = oy + r;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
          if (ny >= 0 && board[ny][nx])            return false;
        }
    return true;
  }

  // 時計回りに90度回転
  function rotate(matrix) {
    const rows = matrix.length, cols = matrix[0].length;
    const result = Array.from({ length: cols }, () => Array(rows).fill(0));
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        result[c][rows - 1 - r] = matrix[r][c];
    return result;
  }

  // 現在ピースをボードに固定し、次のピースへ
  function merge() {
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c]) {
          const ny = current.y + r;
          if (ny < 0) { state = 'gameover'; return; }
          board[ny][current.x + c] = current.color;
        }

    clearLines();
    current = next;
    next    = randPiece();

    // 新しいピースが置けなければゲームオーバー
    if (!isValid(current.shape, current.x, current.y)) {
      state = 'gameover';
    }
  }

  // 揃ったラインを消去してスコア加算
  function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(cell => cell !== null)) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(null));
        r++;       // 同じ行インデックスを再チェック
        cleared++;
      }
    }
    if (cleared > 0) {
      score += (SCORE_TABLE[cleared] ?? 800) * level;
      lines += cleared;
      level        = Math.floor(lines / 10) + 1;
      dropInterval = Math.max(80, 800 - (level - 1) * 70);
    }
  }

  // 移動・回転
  function moveLeft()  { if (isValid(current.shape, current.x - 1, current.y)) current.x--; }
  function moveRight() { if (isValid(current.shape, current.x + 1, current.y)) current.x++; }

  function softDrop() {
    if (isValid(current.shape, current.x, current.y + 1)) {
      current.y++;
      score += 1;
    }
    dropTimer = 0;
  }

  function hardDrop() {
    while (isValid(current.shape, current.x, current.y + 1)) {
      current.y++;
      score += 2;
    }
    merge();
    dropTimer = 0;
  }

  function rotatePiece() {
    const rotated = rotate(current.shape);
    // ウォールキック：中央→左→右→左2→右2 の順に試す
    for (const kick of [0, -1, 1, -2, 2]) {
      if (isValid(rotated, current.x + kick, current.y)) {
        current.shape  = rotated;
        current.x     += kick;
        return;
      }
    }
  }

  function togglePause() {
    if      (state === 'playing') state = 'paused';
    else if (state === 'paused')  state = 'playing';
  }

  // ── 描画 ──

  function drawCell(cx, cy, color, size) {
    size = size ?? CELL;
    const x = cx * size, y = cy * size;
    // 本体
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
    // 上・左のハイライト（立体感）
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fillRect(x + 1, y + 1, size - 2, 4);
    ctx.fillRect(x + 1, y + 1, 4, size - 2);
    // 下・右のシャドウ
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x + 1, y + size - 5, size - 2, 4);
    ctx.fillRect(x + size - 5, y + 1, 4, size - 2);
  }

  function draw() {
    // 背景
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // ボード背景
    ctx.fillStyle = '#10102a';
    ctx.fillRect(0, 0, BW, BH);

    // グリッド線
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth   = 1;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, BH); ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(BW, r * CELL); ctx.stroke();
    }

    // 固定済みのブロック
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c]) drawCell(c, r, board[r][c]);

    // 操作中のピース
    if (state === 'playing' || state === 'paused') {
      for (let r = 0; r < current.shape.length; r++)
        for (let c = 0; c < current.shape[r].length; c++)
          if (current.shape[r][c])
            drawCell(current.x + c, current.y + r, current.color);
    }

    // サイドパネル
    drawPanel();

    // オーバーレイ
    if (state === 'idle')
      drawOverlay('TETRIS', 'Space キーでスタート');
    if (state === 'paused')
      drawOverlay('一時停止', 'P キーで再開');
    if (state === 'gameover')
      drawOverlay('GAME OVER', `スコア: ${score.toLocaleString()}\nSpace キーでリスタート`);
  }

  function drawPanel() {
    const px = BW + 16;

    ctx.textAlign = 'left';

    // ── スコア・レベル・ライン ──
    panelLabel(px, 36,  'SCORE');
    panelValue(px, 60,  score.toLocaleString());

    panelLabel(px, 102, 'LEVEL');
    panelValue(px, 126, level);

    panelLabel(px, 168, 'LINES');
    panelValue(px, 192, lines);

    // ── Nextプレビュー ──
    panelLabel(px, 236, 'NEXT');

    if (next) {
      const offX = BW + 24;
      const offY = 250;
      ctx.save();
      ctx.translate(offX, offY);
      for (let r = 0; r < next.shape.length; r++)
        for (let c = 0; c < next.shape[r].length; c++)
          if (next.shape[r][c]) {
            const x = c * NCELL, y = r * NCELL;
            ctx.fillStyle = next.color;
            ctx.fillRect(x + 1, y + 1, NCELL - 2, NCELL - 2);
            ctx.fillStyle = 'rgba(255,255,255,0.28)';
            ctx.fillRect(x + 1, y + 1, NCELL - 2, 3);
            ctx.fillRect(x + 1, y + 1, 3, NCELL - 2);
          }
      ctx.restore();
    }

    // ── 操作説明 ──
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font      = '10px monospace';
    [
      '← →  左右移動',
      '↑      回転',
      '↓      ゆっくり落下',
      'Space  即落下',
      'P         一時停止',
    ].forEach((t, i) => ctx.fillText(t, px, H - 96 + i * 19));
  }

  function panelLabel(x, y, text) {
    ctx.font      = '600 11px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.fillText(text, x, y);
  }

  function panelValue(x, y, val) {
    ctx.font      = 'bold 24px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(String(val), x, y);
  }

  function drawOverlay(title, subtitle) {
    // 半透明の黒いオーバーレイ
    ctx.fillStyle = 'rgba(0, 0, 0, 0.68)';
    ctx.fillRect(0, 0, BW, BH);

    // タイトル
    ctx.textAlign = 'center';
    ctx.font      = 'bold 32px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(title, BW / 2, BH / 2 - 18);

    // サブタイトル（改行対応）
    ctx.font      = '14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.60)';
    subtitle.split('\n').forEach((line, i) => {
      ctx.fillText(line, BW / 2, BH / 2 + 16 + i * 24);
    });

    ctx.textAlign = 'left';
  }

  // ── キー入力 ──
  document.addEventListener('keydown', e => {
    // スクロールなどのデフォルト動作を防ぐ
    if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp','Space'].includes(e.code)) {
      e.preventDefault();
    }

    // アイドル・ゲームオーバー時
    if (state === 'idle'     && e.code === 'Space') { state = 'playing';                 return; }
    if (state === 'gameover' && e.code === 'Space') { reset(); state = 'playing';         return; }

    // 一時停止
    if (e.code === 'KeyP') { togglePause(); return; }

    if (state !== 'playing') return;

    if (e.code === 'ArrowLeft')  moveLeft();
    if (e.code === 'ArrowRight') moveRight();
    if (e.code === 'ArrowDown')  softDrop();
    if (e.code === 'ArrowUp')    rotatePiece();
    if (e.code === 'Space')      hardDrop();
  });

  // ── ゲームループ ──
  let lastTime = null;

  function loop(ts) {
    const dt = lastTime === null ? 0 : ts - lastTime;
    lastTime = ts;

    if (state === 'playing') {
      dropTimer += dt;
      if (dropTimer >= dropInterval) {
        if (isValid(current.shape, current.x, current.y + 1)) {
          current.y++;
        } else {
          merge();
        }
        dropTimer = 0;
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  // ── 起動 ──
  reset();
  requestAnimationFrame(loop);
</script>
</body>
</html>
