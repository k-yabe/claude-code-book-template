<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – AKKODiS Marketing Apps</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #001f33; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap { text-align: center; padding: 40px 24px; }
    .logo { margin-bottom: 40px; }
    .code { font-size: 5rem; font-weight: 800; color: #ffb81c; line-height: 1; margin-bottom: 12px; }
    .message { font-size: 1rem; color: rgba(255,255,255,0.6); margin-bottom: 32px; }
    .btn {
      display: inline-block; background: #ffb81c; color: #001f33;
      font-size: 0.9rem; font-weight: 800; padding: 12px 28px;
      text-decoration: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="/assets/SVG/AKKODIS_Logo_RGB_WHITE.svg" alt="AKKODiS" style="height:24px;">
    </div>
    <div class="code">404</div>
    <p class="message">お探しのページは見つかりませんでした</p>
    <a class="btn" href="/">ホームへ戻る</a>
  </div>
</body>
</html>
