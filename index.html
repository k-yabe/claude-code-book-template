<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
    }

    /* ── ログイン画面 ── */
    #login-screen {
      background: #001f33;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 0 8px;
    }

    .login-box h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .login-tagline {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
    }

    .login-box input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      font-size: 0.95rem;
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }

    .login-box input::placeholder { color: rgba(255,255,255,0.3); }
    .login-box input:focus {
      border-color: #ffb81c;
      background: rgba(255,255,255,0.09);
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .login-box button:hover { opacity: 0.88; }
    .login-box button:active { transform: scale(0.98); }

    .login-error {
      font-size: 0.8rem;
      color: #ff7675;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* ── アプリ一覧 ── */
    #app-screen {
      display: none;
      background: #f5f6fa;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .portal-header {
      max-width: 800px;
      margin: 0 auto 36px;
    }

    .portal-logo {
      font-size: 1.1rem;
      font-weight: 900;
      color: #001f33;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .portal-logo span { color: #ffb81c; }

    .portal-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .portal-sub {
      font-size: 0.85rem;
      color: #636e72;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    a.card {
      display: block;
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    a.card:hover {
      border-color: #ffb81c;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,196,0,0.15);
    }

    .card-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .card-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .card-desc { font-size: 0.8rem; color: #636e72; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-box">
      <h2>Marketing Apps</h2>
      <p class="login-tagline">マーケティング部専用</p>
      <input type="password" id="pw-input" placeholder="Password" />
      <button id="pw-btn">Sign In</button>
      <div class="login-error" id="pw-error"></div>
    </div>
  </div>

  <!-- アプリ一覧（認証後に表示） -->
  <div id="app-screen">
    <div class="portal-header">
      <div class="portal-title">Marketing Apps</div>
      <p class="portal-sub">使いたいアプリを選んでください</p>
    </div>
    <div class="grid">
      <a class="card" href="apps/akkodis-watcher/">
        <div class="card-icon">📡</div>
        <div class="card-name">Global Antenna</div>
        <div class="card-desc">AKKODiSグローバルサイトの新着記事を毎日チェック</div>
      </a>
      <a class="card" href="apps/youtube-desc/">
        <div class="card-icon">🎬</div>
        <div class="card-name">YouTube Generator</div>
        <div class="card-desc">動画説明文・タイトル・ハッシュタグをAIで自動生成</div>
      </a>
      <a class="card" href="apps/banner-resizer/">
        <div class="card-icon">🖼️</div>
        <div class="card-name">Banner Resizer</div>
        <div class="card-desc">バナー画像を1枚アップロードして3サイズを一括生成</div>
      </a>
    </div>
  </div>

  <script>
    const PASSWORD = 'marketing';
    const loginScreen = document.getElementById('login-screen');
    const appScreen   = document.getElementById('app-screen');
    const pwInput     = document.getElementById('pw-input');
    const pwBtn       = document.getElementById('pw-btn');
    const pwError     = document.getElementById('pw-error');

    function showApp() {
      loginScreen.style.display = 'none';
      appScreen.style.display   = 'block';
    }

    if (sessionStorage.getItem('auth') === '1') showApp();

    function tryLogin() {
      if (pwInput.value === PASSWORD) {
        sessionStorage.setItem('auth', '1');
        showApp();
      } else {
        pwError.textContent = 'パスワードが違います';
        pwInput.value = '';
        pwInput.focus();
      }
    }

    pwBtn.addEventListener('click', tryLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  </script>
</body>
</html>
