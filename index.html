<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アプリ一覧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #636e72;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    a.card {
      display: block;
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    a.card:hover {
      border-color: #6c5ce7;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,92,231,0.12);
    }

    .card-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #636e72;
      line-height: 1.5;
    }

    /* ログイン画面 */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #login-screen h1 {
      margin-bottom: 8px;
    }

    #login-screen .subtitle {
      margin-bottom: 32px;
    }

    .login-box {
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-box input {
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #dfe6e9;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus {
      border-color: #6c5ce7;
    }

    .login-box button {
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: #6c5ce7;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-box button:hover {
      background: #5a4bd1;
    }

    .login-error {
      font-size: 0.85rem;
      color: #d63031;
      text-align: center;
      min-height: 1.2em;
    }

    #app-screen { display: none; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <h1>アプリ一覧</h1>
    <p class="subtitle">パスワードを入力してください</p>
    <div class="login-box">
      <input type="password" id="pw-input" placeholder="パスワード" />
      <button id="pw-btn">ログイン</button>
      <div class="login-error" id="pw-error"></div>
    </div>
  </div>

  <!-- アプリ一覧（認証後に表示） -->
  <div id="app-screen">
  <h1>アプリ一覧</h1>
  <p class="subtitle">使いたいアプリを選んでください</p>

  <div class="grid">
    <a class="card" href="apps/breakout/">
      <div class="card-icon">🎮</div>
      <div class="card-name">ブロックゲーム</div>
      <div class="card-desc">落下ブロックを操作するパズルゲーム</div>
    </a>
    <a class="card" href="apps/tetris.html">
      <div class="card-icon">🟦</div>
      <div class="card-name">テトリス</div>
      <div class="card-desc">7種類のテトリミノを積み上げるパズルゲーム</div>
    </a>
    <a class="card" href="apps/counter.html">
      <div class="card-icon">📝</div>
      <div class="card-name">文字数カウンター</div>
      <div class="card-desc">メール・SNS・広告文の文字数をリアルタイム確認</div>
    </a>
    <a class="card" href="apps/planner.html">
      <div class="card-icon">📅</div>
      <div class="card-name">プランナー</div>
      <div class="card-desc">タスクとスケジュールを管理する</div>
    </a>
    <a class="card" href="apps/puyo.html">
      <div class="card-icon">🟢</div>
      <div class="card-name">ぷよぷよ</div>
      <div class="card-desc">同色4個以上つなげて消すパズルゲーム</div>
    </a>
    <a class="card" href="apps/akkodis-watcher/">
      <div class="card-icon">👁️</div>
      <div class="card-name">AKKODiS ウォッチャー</div>
      <div class="card-desc">AKKODiSサイトの新着記事を毎日チェック</div>
    </a>
  </div>
  </div>

  <script>
    const PASSWORD = 'yabe';
    const loginScreen = document.getElementById('login-screen');
    const appScreen   = document.getElementById('app-screen');
    const pwInput     = document.getElementById('pw-input');
    const pwBtn       = document.getElementById('pw-btn');
    const pwError     = document.getElementById('pw-error');

    function showApp() {
      loginScreen.style.display = 'none';
      appScreen.style.display   = 'block';
    }

    // セッション中はスキップ
    if (sessionStorage.getItem('auth') === '1') showApp();

    function tryLogin() {
      if (pwInput.value === PASSWORD) {
        sessionStorage.setItem('auth', '1');
        showApp();
      } else {
        pwError.textContent = 'パスワードが違います';
        pwInput.value = '';
        pwInput.focus();
      }
    }

    pwBtn.addEventListener('click', tryLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  </script>
</body>
</html>
