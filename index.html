<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
    }

    /* ── ログイン画面 ── */
    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #login-screen {
      background-color: #040d17;
      background-image:
        radial-gradient(ellipse 700px 500px at 75% 10%, rgba(255,184,28,0.08) 0%, transparent 100%),
        radial-gradient(ellipse 500px 500px at 10% 90%, rgba(0,80,160,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 100%);
      background-size: cover, cover, 36px 36px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 48px 44px;
      animation: loginFadeIn 0.5s ease both;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #ffb81c;
      margin-bottom: 16px;
    }
    .login-brand::before {
      content: '';
      display: block;
      width: 18px;
      height: 2px;
      background: #ffb81c;
      border-radius: 2px;
    }

    .login-box h2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .login-tagline {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.32);
      margin-bottom: 36px;
    }

    .login-box input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .login-box input::placeholder { color: rgba(255,255,255,0.25); }
    .login-box input:focus {
      border-color: rgba(255,184,28,0.6);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(255,184,28,0.1);
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      background: #ffb81c;
      color: #001f33;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,184,28,0.3);
    }
    .login-box button:hover {
      opacity: 0.92;
      box-shadow: 0 6px 28px rgba(255,184,28,0.45);
    }
    .login-box button:active { transform: scale(0.98); }

    .login-error {
      font-size: 0.8rem;
      color: #ff7675;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* ── アプリ一覧 ── */
    #app-screen {
      display: none;
      background: #f5f6fa;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .portal-header {
      max-width: 1100px;
      margin: 0 auto 36px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .portal-logo {
      font-size: 1.1rem;
      font-weight: 900;
      color: #001f33;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .portal-logo span { color: #ffb81c; }

    .portal-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .portal-sub {
      font-size: 0.85rem;
      color: #636e72;
    }

    .logout-btn {
      background: none;
      border: 1.5px solid #dfe6e9;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #636e72;
      cursor: pointer;
      padding: 6px 14px;
      white-space: nowrap;
      margin-top: 4px;
      transition: all 0.15s;
    }
    .logout-btn:hover { border-color: #b2bec3; color: #2d3436; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    a.card:hover {
      border-color: #ffb81c;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,196,0,0.15);
    }

    .card-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .card-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .card-desc {
      font-size: 0.8rem;
      color: #636e72;
      line-height: 1.5;
      flex: 1;
    }
    .card-tag {
      margin-top: 12px;
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      color: #0078d4;
      background: #e8f1fb;
      border-radius: 99px;
      padding: 2px 10px;
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-brand">AKKODiS</div>
      <h2>Marketing Apps</h2>
      <p class="login-tagline">For Marketing Team</p>
      <input type="password" id="pw-input" placeholder="Password" />
      <button id="pw-btn">Sign In</button>
      <div class="login-error" id="pw-error"></div>
    </div>
  </div>

  <!-- アプリ一覧（認証後に表示） -->
  <div id="app-screen">
    <div class="portal-header">
      <div>
        <div class="portal-title">Marketing Apps</div>
        <p class="portal-sub">使いたいアプリを選んでください</p>
      </div>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
    <div class="grid">
      <a class="card" href="apps/akkodis-watcher/">
        <div class="card-icon">📡</div>
        <div class="card-name">Global Antenna</div>
        <div class="card-desc">AKKODiSグローバルサイトの新着記事を毎日チェック</div>
      </a>
      <a class="card" href="apps/youtube-desc/">
        <div class="card-icon">🎬</div>
        <div class="card-name">YouTube Generator</div>
        <div class="card-desc">動画説明文・タイトル・ハッシュタグをAIで自動生成</div>
      </a>
      <a class="card" href="apps/banner-resizer/">
        <div class="card-icon">🖼️</div>
        <div class="card-name">Banner Resizer</div>
        <div class="card-desc">バナー画像を1枚アップロードして3サイズを一括生成</div>
      </a>
      <a class="card" href="https://m365.cloud.microsoft/chat/?titleId=T_8aa0cc54-ad42-710e-b66b-a63fa397a14a&source=embedded-builder" target="_blank" rel="noopener">
        <div class="card-icon">🛡️</div>
        <div class="card-name">Brand Guardian Pro</div>
        <div class="card-desc">ブランドガイドラインに沿った表現をAIがチェック・サポート</div>
        <div class="card-tag">Microsoft Copilot Agent</div>
      </a>
    </div>
  </div>

  <script>
    const PASSWORD = 'teamgrowth';
    const loginScreen = document.getElementById('login-screen');
    const appScreen   = document.getElementById('app-screen');
    const pwInput     = document.getElementById('pw-input');
    const pwBtn       = document.getElementById('pw-btn');
    const pwError     = document.getElementById('pw-error');

    function showApp() {
      loginScreen.style.display = 'none';
      appScreen.style.display   = 'block';
    }

    if (sessionStorage.getItem('auth') === '1') showApp();

    function tryLogin() {
      if (pwInput.value === PASSWORD) {
        sessionStorage.setItem('auth', '1');
        showApp();
      } else {
        pwError.textContent = 'パスワードが違います';
        pwInput.value = '';
        pwInput.focus();
      }
    }

    pwBtn.addEventListener('click', tryLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('auth');
      appScreen.style.display  = 'none';
      loginScreen.style.display = 'flex';
      pwInput.value = '';
    });
  </script>
</body>
</html>
