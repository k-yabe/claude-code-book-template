<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アプリ一覧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #636e72;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    a.card {
      display: block;
      background: #fff;
      border: 2px solid #dfe6e9;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    a.card:hover {
      border-color: #6c5ce7;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,92,231,0.12);
    }

    .card-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #636e72;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>アプリ一覧</h1>
  <p class="subtitle">使いたいアプリを選んでください</p>

  <div class="grid">
    <a class="card" href="apps/breakout/">
      <div class="card-icon">🎮</div>
      <div class="card-name">ブロックゲーム</div>
      <div class="card-desc">落下ブロックを操作するパズルゲーム</div>
    </a>
    <a class="card" href="apps/tetris.html">
      <div class="card-icon">🟦</div>
      <div class="card-name">テトリス</div>
      <div class="card-desc">7種類のテトリミノを積み上げるパズルゲーム</div>
    </a>
    <a class="card" href="apps/counter.html">
      <div class="card-icon">📝</div>
      <div class="card-name">文字数カウンター</div>
      <div class="card-desc">メール・SNS・広告文の文字数をリアルタイム確認</div>
    </a>
    <a class="card" href="apps/planner.html">
      <div class="card-icon">📅</div>
      <div class="card-name">プランナー</div>
      <div class="card-desc">タスクとスケジュールを管理する</div>
    </a>
  </div>
</body>
</html>
